metadata:
  id: advanced-03-exists-antipattern
  title: "EXISTS와 안티 패턴"
  title_en: "EXISTS and Anti-Patterns"
  difficulty: advanced
  category: exercises
  concepts: [EXISTS, NOT EXISTS, Correlated Subquery, Anti-join Pattern, Universal Quantification, Double Negation]
  table_count: 9
  tables: [customers, orders, order_items, products, reviews, wishlists, complaints, categories, payments]

problems:
  - id: a03e-01
    level: 3
    type: "Subquery"
    title: "2024년에 주문을 한 적이 있는 고객만 조회하세요."
    title_en: "Check only customers who have placed an order in 2024."
    body: |
      고객 ID, 이름, 등급, 가입일을 표시합니다. `EXISTS`를 사용하세요.
    body_en: |
      Displays customer ID, name, level, and subscription date. Use `EXISTS`.
    hint: |
      `WHERE EXISTS (SELECT 1 FROM orders WHERE customer_id = c.id AND ...)`
      서브쿼리에서 외부 쿼리의 `c.id`를 참조하는 것이 상관 서브쿼리입니다.
    hint_en: |
      `WHERE EXISTS (SELECT 1 FROM orders WHERE customer_id = c.id AND ...)`
      A subquery that references `c.id` of the outer query is a correlated subquery.
    reference_sql: |
      SELECT
          c.id,
          c.name,
          c.grade,
          c.created_at AS signup_date
      FROM customers AS c
      WHERE EXISTS (
          SELECT 1
          FROM orders AS o
          WHERE o.customer_id = c.id
            AND o.ordered_at LIKE '2024%'
            AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
      )
      ORDER BY c.id
      LIMIT 20;

  - id: a03e-02
    level: 3
    type: "Subquery"
    title: "한 번도 주문한 적이 없는 고객을 찾으세요."
    title_en: "Find customers who have never placed an order."
    body: |
      가입만 하고 주문 이력이 전혀 없는 고객입니다. `NOT EXISTS`를 사용하세요.
    body_en: |
      This is a customer who has only registered but has no order history. Use `NOT EXISTS`.
    hint: |
      `WHERE NOT EXISTS (SELECT 1 FROM orders WHERE customer_id = c.id)`
      이때 취소/반품 주문도 "주문한 적 있음"으로 간주합니다 (상태 필터 없음).
    hint_en: |
      `WHERE NOT EXISTS (SELECT 1 FROM orders WHERE customer_id = c.id)`
      At this time, canceled/returned orders are also considered “placed” (no status filter).
    reference_sql: |
      SELECT
          c.id,
          c.name,
          c.grade,
          c.created_at AS signup_date,
          ROUND(JULIANDAY('2025-12-31') - JULIANDAY(c.created_at), 0) AS days_since_signup
      FROM customers AS c
      WHERE NOT EXISTS (
          SELECT 1
          FROM orders AS o
          WHERE o.customer_id = c.id
      )
      ORDER BY c.created_at
      LIMIT 20;

  - id: a03e-03
    level: 3
    type: "Subquery"
    title: "리뷰를 남기지 않은 구매 확인 고객을 찾으세요."
    title_en: "Find verified customers who have not left a review."
    body: |
      주문 상태가 'confirmed'인 주문이 있지만 리뷰를 단 한 건도 작성하지 않은 고객입니다.
    body_en: |
      Customers who have orders with an order status of 'confirmed' but who have not written a single review.
    hint: |
      조건 2개를 조합합니다:
      `EXISTS (... orders WHERE status = 'confirmed')` AND
      `NOT EXISTS (... reviews WHERE customer_id = c.id)`.
    hint_en: |
      Combine 2 conditions:
      `EXISTS (... orders WHERE status = 'confirmed')` AND
      `NOT EXISTS (... reviews WHERE customer_id = c.id)`.
    reference_sql: |
      SELECT
          c.id,
          c.name,
          c.grade,
          COUNT(o.id) AS confirmed_orders
      FROM customers AS c
      INNER JOIN orders AS o
          ON c.id = o.customer_id
         AND o.status = 'confirmed'
      WHERE NOT EXISTS (
          SELECT 1
          FROM reviews AS r
          WHERE r.customer_id = c.id
      )
      GROUP BY c.id, c.name, c.grade
      ORDER BY confirmed_orders DESC
      LIMIT 15;

  - id: a03e-04
    level: 3
    type: "Subquery"
    title: "위시리스트에 담았지만 아직 구매하지 않은 상품-고객 조합을 찾으세요."
    title_en: "Find product-customer combinations that have been added to their wishlist but have not yet been purchased."
    body: |
      위시리스트의 `is_purchased = 0`인 항목 중, 해당 고객이 해당 상품을 실제로 주문한 적도 없는 경우입니다.
    body_en: |
      Among the `is_purchased = 0` items in the wishlist, the customer has never actually ordered the product.
    hint: |
      `wishlists`를 기준으로, `NOT EXISTS`로 `order_items`와 `orders`를 결합한 서브쿼리를 만듭니다.
      서브쿼리 조건: 같은 `customer_id`와 같은 `product_id`.
    hint_en: |
      Based on `wishlists`, create a subquery combining `order_items` and `orders` with `NOT EXISTS`.
      Subquery condition: equal to `customer_id` and equal to `product_id`.
    reference_sql: |
      SELECT
          w.customer_id,
          c.name     AS customer_name,
          w.product_id,
          p.name     AS product_name,
          p.price,
          w.created_at AS wishlisted_at
      FROM wishlists AS w
      INNER JOIN customers AS c ON w.customer_id = c.id
      INNER JOIN products  AS p ON w.product_id  = p.id
      WHERE w.is_purchased = 0
        AND NOT EXISTS (
            SELECT 1
            FROM order_items AS oi
            INNER JOIN orders AS o ON oi.order_id = o.id
            WHERE o.customer_id = w.customer_id
              AND oi.product_id = w.product_id
              AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
        )
      ORDER BY w.created_at DESC
      LIMIT 15;

  - id: a03e-05
    level: 3
    type: "Subquery"
    title: "CS 문의가 접수된 적이 없는 고객 중, 주문 금액 상위 10명을 찾으세요."
    title_en: "Find the top 10 customers by order amount who have never received a CS inquiry."
    body: |
      클레임 없이 꾸준히 구매하는 "우량 고객"을 식별합니다.
    body_en: |
      Identify “blue-chip customers” who consistently purchase without making a claim.
    hint: |
      `NOT EXISTS (SELECT 1 FROM complaints WHERE customer_id = c.id)`로 문의 이력이 없는 고객을 필터링하고,
      `SUM(total_amount)`으로 총 구매 금액 상위 10명을 추출합니다.
    hint_en: |
      Filter customers with no inquiry history with `NOT EXISTS (SELECT 1 FROM complaints WHERE customer_id = c.id)`,
      Extract the top 10 users by total purchase amount with `SUM(total_amount)`.
    reference_sql: |
      SELECT
          c.id,
          c.name,
          c.grade,
          COUNT(o.id) AS order_count,
          ROUND(SUM(o.total_amount), 0) AS total_spent
      FROM customers AS c
      INNER JOIN orders AS o ON c.id = o.customer_id
      WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
        AND NOT EXISTS (
            SELECT 1
            FROM complaints AS cp
            WHERE cp.customer_id = c.id
        )
      GROUP BY c.id, c.name, c.grade
      ORDER BY total_spent DESC
      LIMIT 10;

  - id: a03e-06
    level: 3
    type: "Subquery"
    title: "3개 이상의 서로 다른 카테고리에서 상품을 구매한 고객을 찾으세요."
    title_en: "Find customers who purchased products from 3 or more different categories"
    body: |
      EXISTS 내부에서 집계를 사용합니다.
    body_en: |
      EXISTS uses aggregates internally.
    hint: |
      `EXISTS` 안에서 `GROUP BY customer_id HAVING COUNT(DISTINCT category_id) >= 3`을 사용합니다.
      또는 상관 서브쿼리로 카테고리 수를 세는 방법도 있습니다.
    hint_en: |
      Use `GROUP BY customer_id HAVING COUNT(DISTINCT category_id) >= 3` within `EXISTS`.
      Alternatively, you can count the number of categories with a correlated subquery.
    reference_sql: |
      SELECT
          c.id,
          c.name,
          c.grade
      FROM customers AS c
      WHERE EXISTS (
          SELECT 1
          FROM order_items AS oi
          INNER JOIN orders   AS o ON oi.order_id   = o.id
          INNER JOIN products AS p ON oi.product_id = p.id
          WHERE o.customer_id = c.id
            AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
          GROUP BY o.customer_id
          HAVING COUNT(DISTINCT p.category_id) >= 3
      )
      ORDER BY c.grade DESC, c.name
      LIMIT 20;

  - id: a03e-07
    level: 3
    type: "Subquery"
    title: "모든 결제가 정상 완료된 주문만 조회하세요."
    title_en: "Only view orders for which all payments have been completed successfully."
    body: |
      한 주문에 여러 결제가 있을 수 있습니다. 실패(`failed`)나 환불(`refunded`)된 결제가 하나라도 없는 주문을 찾습니다.
    body_en: |
      There may be multiple payments in one order. Find orders that do not have any failed (`failed`) or refunded (`refunded`) payments.
    hint: |
      "실패/환불이 없다" = `NOT EXISTS (... payments WHERE status IN ('failed', 'refunded') AND order_id = o.id)`.
      추가로 결제가 하나 이상 존재해야 합니다(`EXISTS`).
    hint_en: |
      "Failure/No refund" = `NOT EXISTS (... payments WHERE status IN ('failed', 'refunded') AND order_id = o.id)`.
      Additionally, at least one payment must exist (`EXISTS`).
    reference_sql: |
      SELECT
          o.id,
          o.order_number,
          o.total_amount,
          o.ordered_at,
          o.status
      FROM orders AS o
      WHERE EXISTS (
          SELECT 1
          FROM payments AS p
          WHERE p.order_id = o.id
            AND p.status = 'completed'
      )
      AND NOT EXISTS (
          SELECT 1
          FROM payments AS p
          WHERE p.order_id = o.id
            AND p.status IN ('failed', 'refunded')
      )
      AND o.ordered_at LIKE '2024%'
      ORDER BY o.ordered_at DESC
      LIMIT 15;

  - id: a03e-08
    level: 3
    type: "Subquery"
    title: "특정 상품(ID=1)과 함께 자주 구매되는 상품을 찾으세요 (동시 구매 분석)."
    title_en: "Find products that are frequently purchased together with a specific product (ID=1) (simultaneous purchase analysis)."
    body: |
      상품 1을 포함한 주문에서, 상품 1 이외의 다른 상품 중 동시 구매 빈도가 높은 순으로 정렬합니다.
    body_en: |
      In orders containing product 1, items other than product 1 are sorted in order of frequency of simultaneous purchase.
    hint: |
      외부 쿼리는 `order_items`에서 `product_id != 1`인 항목을 집계합니다.
      `EXISTS`로 "해당 주문에 상품 1이 포함되어 있는지"를 확인합니다.
    hint_en: |
      The outer query aggregates items from `order_items` to `product_id != 1`.
      `EXISTS` checks whether “the order contains product 1”.
    reference_sql: |
      SELECT
          p.id    AS product_id,
          p.name  AS product_name,
          p.price,
          COUNT(DISTINCT oi.order_id) AS co_purchase_count
      FROM order_items AS oi
      INNER JOIN products AS p ON oi.product_id = p.id
      WHERE oi.product_id != 1
        AND EXISTS (
            SELECT 1
            FROM order_items AS oi2
            WHERE oi2.order_id   = oi.order_id
              AND oi2.product_id = 1
        )
      GROUP BY p.id, p.name, p.price
      ORDER BY co_purchase_count DESC
      LIMIT 10;

  - id: a03e-09
    level: 3
    type: "Subquery"
    title: "\"매월 빠짐없이 주문한 고객\"을 찾으세요 (2024년 12개월)."
    title_en: "Find “customers who ordered every month” (12 months to 2024)."
    body: |
      2024년의 모든 12개월에 최소 1건의 주문이 있는 고객입니다.
    body_en: |
      Customers with at least 1 order in any 12 months in 2024.
    hint: |
      `NOT EXISTS`와 재귀 CTE(또는 하드코딩된 월 리스트)를 조합합니다.
      "모든 월에 주문이 있다" = "주문이 없는 월이 존재하지 않는다" (NOT EXISTS).
    hint_en: |
      Combines `NOT EXISTS` with a recursive CTE (or a hardcoded list of months).
      “Every month has orders” = “There is no month without orders” (NOT EXISTS).
    reference_sql: |
      WITH RECURSIVE months AS (
          SELECT '2024-01' AS ym
          UNION ALL
          SELECT SUBSTR(DATE(ym || '-01', '+1 month'), 1, 7)
          FROM months
          WHERE ym < '2024-12'
      )
      SELECT
          c.id,
          c.name,
          c.grade
      FROM customers AS c
      WHERE NOT EXISTS (
          -- 주문이 없는 월이 하나라도 있으면 제외
          SELECT 1
          FROM months AS m
          WHERE NOT EXISTS (
              SELECT 1
              FROM orders AS o
              WHERE o.customer_id = c.id
                AND SUBSTR(o.ordered_at, 1, 7) = m.ym
                AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
          )
      )
      ORDER BY c.grade DESC, c.name;

  - id: a03e-10
    level: 3
    type: "Subquery"
    title: "2024년에 주문은 했지만 2025년에는 주문하지 않은 \"이탈 고객\"을 찾으세요."
    title_en: "Look for “churn customers” who ordered in 2024 but not in 2025."
    body: |
      두 개의 EXISTS/NOT EXISTS 조건을 결합합니다.
    body_en: |
      Combines two EXISTS/NOT EXISTS conditions.
    hint: |
      `EXISTS (... 2024년 주문)` AND `NOT EXISTS (... 2025년 주문)`.
      이탈 고객의 2024년 마지막 주문일과 총 구매 금액도 표시하면 유용합니다.
    hint_en: |
      `EXISTS (... 2024년 주문)` AND `NOT EXISTS (... 2025년 주문)`.
      It would be useful to also display the churn customer's last order date in 2024 and their total purchase amount.
    reference_sql: |
      SELECT
          c.id,
          c.name,
          c.grade,
          MAX(o.ordered_at) AS last_order_date,
          COUNT(o.id) AS orders_in_2024,
          ROUND(SUM(o.total_amount), 0) AS spent_in_2024
      FROM customers AS c
      INNER JOIN orders AS o
          ON c.id = o.customer_id
         AND o.ordered_at LIKE '2024%'
         AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
      WHERE NOT EXISTS (
          SELECT 1
          FROM orders AS o2
          WHERE o2.customer_id = c.id
            AND o2.ordered_at LIKE '2025%'
            AND o2.status NOT IN ('cancelled', 'returned', 'return_requested')
      )
      GROUP BY c.id, c.name, c.grade
      ORDER BY spent_in_2024 DESC
      LIMIT 15;

  - id: a03e-11
    level: 4
    type: "Subquery"
    title: "모든 주문에서 카드로만 결제한 고객을 찾으세요."
    title_en: "Find customers who only paid by card on all orders"
    body: |
      카드 외 결제 수단(kakao_pay, naver_pay, bank_transfer 등)을 한 번도 사용하지 않은 고객입니다.
    body_en: |
      This is a customer who has never used a payment method other than a card (kakao_pay, naver_pay, bank_transfer, etc.).
    hint: |
      전칭 한정: "모든 결제가 카드" = "카드가 아닌 결제가 **존재하지 않는다**".
      `NOT EXISTS (... payments WHERE method != 'card' ...)`를 사용합니다.
      주문 이력이 있는 고객만 대상으로 합니다.
    hint_en: |
      Nickname only: "All payments are by card" = "No non-card payments **exist**".
      Use `NOT EXISTS (... payments WHERE method != 'card' ...)`.
      Only customers with an order history are eligible.
    reference_sql: |
      SELECT
          c.id,
          c.name,
          c.grade,
          COUNT(DISTINCT o.id) AS order_count,
          ROUND(SUM(o.total_amount), 0) AS total_spent
      FROM customers AS c
      INNER JOIN orders AS o ON c.id = o.customer_id
      WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
        -- 카드가 아닌 결제가 한 건도 없어야 함
        AND NOT EXISTS (
            SELECT 1
            FROM payments AS p
            INNER JOIN orders AS o2 ON p.order_id = o2.id
            WHERE o2.customer_id = c.id
              AND p.method != 'card'
        )
        -- 결제 이력이 있어야 함
        AND EXISTS (
            SELECT 1
            FROM payments AS p
            INNER JOIN orders AS o3 ON p.order_id = o3.id
            WHERE o3.customer_id = c.id
              AND p.method = 'card'
        )
      GROUP BY c.id, c.name, c.grade
      ORDER BY total_spent DESC
      LIMIT 15;

  - id: a03e-12
    level: 4
    type: "Subquery"
    title: "\"모든 종류의 문의 카테고리\"를 경험한 고객을 찾으세요."
    title_en: "Find customers who have experienced “all types of inquiry categories”"
    body: |
      `complaints` 테이블의 모든 `category` 값에 대해 최소 1건의 문의를 제출한 고객입니다.
    body_en: |
      Customers who have submitted at least one inquiry for every `category` value in the `complaints` table.
    hint: |
      전칭 한정의 이중 부정 패턴:
      "모든 카테고리에 문의가 있다" = "문의가 없는 카테고리가 **존재하지 않는다**".
      `NOT EXISTS (SELECT category FROM (SELECT DISTINCT category FROM complaints) WHERE NOT EXISTS (... 해당 고객의 해당 카테고리 문의))`.
    hint_en: |
      Double negation pattern for prequalification:
      "There are inquiries in all categories" = "There is **no category** in which there are no inquiries."
      `NOT EXISTS (SELECT category FROM (SELECT DISTINCT category FROM complaints) WHERE NOT EXISTS (... 해당 고객의 해당 카테고리 문의))`.
    reference_sql: |
      SELECT
          c.id,
          c.name,
          c.grade,
          (SELECT COUNT(DISTINCT cp.category) FROM complaints AS cp WHERE cp.customer_id = c.id) AS category_count
      FROM customers AS c
      WHERE NOT EXISTS (
          -- 문의가 없는 카테고리가 하나라도 있으면 제외
          SELECT DISTINCT cp_all.category
          FROM complaints AS cp_all
          WHERE NOT EXISTS (
              SELECT 1
              FROM complaints AS cp
              WHERE cp.customer_id = c.id
                AND cp.category = cp_all.category
          )
      )
      ORDER BY c.name;

  - id: a03e-13
    level: 4
    type: "Subquery"
    title: "\"가격이 100만원 이상인 상품만 구매한\" 고객을 찾으세요."
    title_en: "Find customers who “only purchased products priced over 1 million won”"
    body: |
      저가 상품을 한 번도 구매하지 않은 프리미엄 고객입니다.
    body_en: |
      These are premium customers who have never purchased a low-priced product.
    hint: |
      "100만원 미만 상품 구매가 존재하지 않는다":
      `NOT EXISTS (... order_items JOIN products WHERE price < 1000000 AND customer_id = c.id)`.
      동시에 주문 이력은 있어야 합니다(`EXISTS`).
    hint_en: |
      “There is no purchase of products under 1 million won”:
      `NOT EXISTS (... order_items JOIN products WHERE price < 1000000 AND customer_id = c.id)`.
      At the same time, there must be an order history (`EXISTS`).
    reference_sql: |
      SELECT
          c.id,
          c.name,
          c.grade,
          COUNT(DISTINCT o.id) AS order_count,
          ROUND(SUM(o.total_amount), 0) AS total_spent,
          ROUND(AVG(o.total_amount), 0) AS avg_order_value
      FROM customers AS c
      INNER JOIN orders AS o ON c.id = o.customer_id
      WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
        -- 100만원 미만 상품 구매가 없어야 함
        AND NOT EXISTS (
            SELECT 1
            FROM order_items AS oi
            INNER JOIN orders AS o2 ON oi.order_id = o2.id
            INNER JOIN products AS p ON oi.product_id = p.id
            WHERE o2.customer_id = c.id
              AND p.price < 1000000
              AND o2.status NOT IN ('cancelled', 'returned', 'return_requested')
        )
      GROUP BY c.id, c.name, c.grade
      ORDER BY total_spent DESC
      LIMIT 10;

  - id: a03e-14
    level: 4
    type: "Subquery"
    title: "재구매 상품 쌍을 찾으세요 — 같은 고객이 다른 주문에서 동일 상품을 2번 이상 구매한 경우입니다."
    title_en: "Find repeat product pairs — where the same customer has purchased the same product more than once in different orders."
    body: |
      EXISTS로 "동일 고객, 동일 상품, 다른 주문"을 확인합니다.
    body_en: |
      EXISTS checks for “same customer, same product, different orders”.
    hint: |
      `order_items`를 기준으로, `EXISTS`에서 같은 `product_id`, 같은 `customer_id`이지만
      다른 `order_id`인 레코드가 있는지 확인합니다.
      고객-상품 조합별로 재구매 횟수를 집계합니다.
    hint_en: |
      Based on `order_items`, `EXISTS` is the same as `product_id`, and `customer_id` is the same.
      Check if there is another record with `order_id`.
      Counts the number of repeat purchases by customer-product combination.
    reference_sql: |
      SELECT
          c.name     AS customer_name,
          p.name     AS product_name,
          COUNT(DISTINCT oi.order_id) AS purchase_count,
          SUM(oi.quantity) AS total_qty
      FROM order_items AS oi
      INNER JOIN orders    AS o ON oi.order_id   = o.id
      INNER JOIN customers AS c ON o.customer_id = c.id
      INNER JOIN products  AS p ON oi.product_id = p.id
      WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
        AND EXISTS (
            -- 같은 고객이 같은 상품을 다른 주문에서 구매
            SELECT 1
            FROM order_items AS oi2
            INNER JOIN orders AS o2 ON oi2.order_id = o2.id
            WHERE o2.customer_id = o.customer_id
              AND oi2.product_id = oi.product_id
              AND oi2.order_id   != oi.order_id
              AND o2.status NOT IN ('cancelled', 'returned', 'return_requested')
        )
      GROUP BY c.id, c.name, p.id, p.name
      ORDER BY purchase_count DESC
      LIMIT 15;

  - id: a03e-15
    level: 4
    type: "Subquery"
    title: "\"NOT EXISTS vs LEFT JOIN IS NULL\" 안티 조인 패턴을 비교하세요."
    title_en: "Compare \"NOT EXISTS vs LEFT JOIN IS NULL\" anti-join patterns."
    body: |
      2024년에 리뷰를 남기지 않은 상품을 두 가지 방법으로 조회하고, 결과가 동일한지 확인합니다.
    body_en: |
      Look for products that haven't left reviews in 2024 in two ways and see if the results are the same.
    hint: |
      방법 1: `NOT EXISTS (SELECT 1 FROM reviews WHERE product_id = p.id AND created_at LIKE '2024%')`.
      방법 2: `LEFT JOIN reviews ON ... WHERE r.id IS NULL`.
      두 쿼리를 `EXCEPT`로 비교하면 차집합이 비어 있어야 합니다.
    hint_en: |
      Method 1: `NOT EXISTS (SELECT 1 FROM reviews WHERE product_id = p.id AND created_at LIKE '2024%')`.
      Method 2: `LEFT JOIN reviews ON ... WHERE r.id IS NULL`.
      If you compare two queries with `EXCEPT`, the difference must be empty.
    reference_sql: |
      -- 방법 1: NOT EXISTS
      SELECT p.id, p.name
      FROM products AS p
      WHERE p.is_active = 1
        AND NOT EXISTS (
            SELECT 1
            FROM reviews AS r
            WHERE r.product_id = p.id
              AND r.created_at LIKE '2024%'
        )
      ORDER BY p.id;

      -- 방법 2: LEFT JOIN ... IS NULL
      SELECT p.id, p.name
      FROM products AS p
      LEFT JOIN reviews AS r
          ON r.product_id = p.id
         AND r.created_at LIKE '2024%'
      WHERE p.is_active = 1
        AND r.id IS NULL
      ORDER BY p.id;

      -- 동일성 검증: 차집합이 비어야 함
      SELECT p.id, p.name
      FROM products AS p
      WHERE p.is_active = 1
        AND NOT EXISTS (
            SELECT 1 FROM reviews AS r
            WHERE r.product_id = p.id AND r.created_at LIKE '2024%'
        )
      
      EXCEPT
      
      SELECT p.id, p.name
      FROM products AS p
      LEFT JOIN reviews AS r
          ON r.product_id = p.id AND r.created_at LIKE '2024%'
      WHERE p.is_active = 1
        AND r.id IS NULL;
