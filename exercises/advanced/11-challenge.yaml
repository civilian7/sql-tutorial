  - id: c11-30
    level: 5
    type: "Analytics"
    tags: [CTE, Window funcs, LAG, Consecutive, Aggregate, orders]
    title: "3일 연속 매출 증가 구간"
    title_en: "3+ Consecutive Days of Increasing Revenue"
    question: |
      일별 매출이 3일 연속 증가한 구간을 찾으세요.
      시작일, 종료일, 연속 일수를 표시합니다.
    question_en: |
      Find periods of 3+ consecutive days with increasing daily revenue.
      Show start date, end date, and streak length.
    hint: |
      - LAG로 전일 매출 비교하여 증가 여부 플래그
      - 증가 플래그가 끊기는 지점을 그룹 경계로 사용 (island 패턴)
      - 그룹별 연속 일수 >= 3 필터
    hint_en: |
      - Use LAG to flag daily revenue increases
      - Use flag breaks as group boundaries (island pattern)
      - Filter groups with streak >= 3
    reference_sql:
      sqlite: |
        WITH daily AS (
            SELECT
                SUBSTR(ordered_at, 1, 10) AS order_date,
                ROUND(SUM(total_amount), 2) AS revenue
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
              AND ordered_at >= '2024-01-01'
            GROUP BY SUBSTR(ordered_at, 1, 10)
        ),
        with_flag AS (
            SELECT
                order_date,
                revenue,
                LAG(revenue) OVER (ORDER BY order_date) AS prev_revenue,
                CASE
                    WHEN revenue > LAG(revenue) OVER (ORDER BY order_date) THEN 1
                    ELSE 0
                END AS is_increase
            FROM daily
        ),
        with_group AS (
            SELECT
                order_date,
                revenue,
                is_increase,
                SUM(CASE WHEN is_increase = 0 THEN 1 ELSE 0 END) OVER (
                    ORDER BY order_date
                    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
                ) AS grp
            FROM with_flag
        )
        SELECT
            MIN(order_date) AS start_date,
            MAX(order_date) AS end_date,
            COUNT(*) AS streak_days
        FROM with_group
        WHERE is_increase = 1
        GROUP BY grp
        HAVING COUNT(*) >= 3
        ORDER BY start_date;
