  - id: c11-34
    level: 5
    type: "Analytics"
    tags: [CTE, Window funcs, NTILE, Aggregate, Median, customers, orders]
    title: "등급별 주문 금액 중앙값"
    title_en: "Median Order Amount by Customer Grade"
    question: |
      고객 등급별 주문 금액의 중앙값(median)을 계산하세요.
      SQLite에는 MEDIAN 함수가 없으므로 NTILE 또는 ROW_NUMBER로 구현합니다.
    question_en: |
      Calculate the median order amount per customer grade.
      SQLite lacks MEDIAN, so implement it using NTILE or ROW_NUMBER.
    hint: |
      - `ROW_NUMBER()` OVER (PARTITION BY grade ORDER BY total_amount)
      - 전체 건수의 절반 위치가 중앙값
      - `COUNT(*) OVER (PARTITION BY grade)`로 전체 건수 파악
    hint_en: |
      - `ROW_NUMBER()` OVER (PARTITION BY grade ORDER BY total_amount)
      - Median is at half of total count
      - `COUNT(*) OVER (PARTITION BY grade)` for total count
    reference_sql:
      common: |
        WITH grade_orders AS (
            SELECT
                c.grade,
                o.total_amount,
                ROW_NUMBER() OVER (PARTITION BY c.grade ORDER BY o.total_amount) AS rn,
                COUNT(*) OVER (PARTITION BY c.grade) AS cnt
            FROM orders AS o
            INNER JOIN customers AS c ON o.customer_id = c.id
            WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
        )
        SELECT
            grade,
            ROUND(AVG(total_amount), 2) AS median_amount
        FROM grade_orders
        WHERE rn IN (cnt / 2, cnt / 2 + 1)
        GROUP BY grade
        ORDER BY
            CASE grade
                WHEN 'VIP' THEN 1 WHEN 'GOLD' THEN 2
                WHEN 'SILVER' THEN 3 WHEN 'BRONZE' THEN 4
            END;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 20
    validation:
      type: result_match

  - id: c11-35
    level: 5
    type: "Analytics"
    tags: [CTE, Window funcs, ROW_NUMBER, Median, JULIANDAY, shipping]
    title: "택배사별 배송일 중앙값"
    title_en: "Median Delivery Days by Carrier"
    question: |
      택배사별 배송 소요일의 중앙값을 계산하세요.
    question_en: |
      Calculate the median delivery duration (in days) by carrier.
    hint: |
      - `JULIANDAY(delivered_at) - JULIANDAY(shipped_at)`로 배송일 계산
      - `ROW_NUMBER()`로 순위를 매긴 후 중앙 위치의 값 추출
    hint_en: |
      - Calculate delivery days: `JULIANDAY(delivered_at) - JULIANDAY(shipped_at)`
      - Use `ROW_NUMBER()` and pick the middle value
    reference_sql:
      sqlite: |
        WITH delivery_days AS (
            SELECT
                carrier,
                ROUND(JULIANDAY(delivered_at) - JULIANDAY(shipped_at), 1) AS days,
                ROW_NUMBER() OVER (PARTITION BY carrier ORDER BY JULIANDAY(delivered_at) - JULIANDAY(shipped_at)) AS rn,
                COUNT(*) OVER (PARTITION BY carrier) AS cnt
            FROM shipping
            WHERE delivered_at IS NOT NULL
              AND shipped_at IS NOT NULL
        )
        SELECT
            carrier,
            ROUND(AVG(days), 2) AS median_days
        FROM delivery_days
        WHERE rn IN (cnt / 2, cnt / 2 + 1)
        GROUP BY carrier
        ORDER BY median_days;
      oracle: |
        WITH delivery_days AS (
            SELECT
                carrier,
                ROUND(CAST(delivered_at AS DATE) - CAST(shipped_at AS DATE), 1) AS days,
                ROW_NUMBER() OVER (PARTITION BY carrier ORDER BY CAST(delivered_at AS DATE) - CAST(shipped_at AS DATE)) AS rn,
                COUNT(*) OVER (PARTITION BY carrier) AS cnt
            FROM shipping
            WHERE delivered_at IS NOT NULL
              AND shipped_at IS NOT NULL
        )
        SELECT
            carrier,
            ROUND(AVG(days), 2) AS median_days
        FROM delivery_days
        WHERE rn IN (TRUNC(cnt / 2), TRUNC(cnt / 2) + 1)
        GROUP BY carrier
        ORDER BY median_days;
      sqlserver: |
        WITH delivery_days AS (
            SELECT
                carrier,
                ROUND(CAST(DATEDIFF(DAY, shipped_at, delivered_at) AS FLOAT), 1) AS days,
                ROW_NUMBER() OVER (PARTITION BY carrier ORDER BY DATEDIFF(DAY, shipped_at, delivered_at)) AS rn,
                COUNT(*) OVER (PARTITION BY carrier) AS cnt
            FROM shipping
            WHERE delivered_at IS NOT NULL
              AND shipped_at IS NOT NULL
        )
        SELECT
            carrier,
            ROUND(AVG(days), 2) AS median_days
        FROM delivery_days
        WHERE rn IN (cnt / 2, cnt / 2 + 1)
        GROUP BY carrier
        ORDER BY median_days;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 20
    validation:
      type: result_match

  - id: c11-36
    level: 5
    type: "Analytics"
    tags: [CTE, Aggregate, Analytics patterns, Funnel, product_views, carts, cart_items, orders, order_items]
    title: "디바이스별 퍼널 이탈 분석"
    title_en: "Funnel Drop-off by Device Type"
    question: |
      device_type(desktop/mobile/tablet)별로
      조회 -> 장바구니 -> 구매 퍼널의 각 단계별 전환율과 이탈률을 구하세요.
    question_en: |
      By device_type (desktop/mobile/tablet), calculate conversion and drop-off rates
      for view -> cart -> purchase funnel.
    hint: |
      - `product_views.device_type`으로 디바이스 구분
      - 각 단계의 고유 고객 수를 device_type별로 집계
      - 이탈률 = 1 - 전환율
    hint_en: |
      - Group by `product_views.device_type`
      - Count distinct customers at each stage by device
      - Drop-off rate = 1 - conversion rate
    reference_sql:
      common: |
        WITH view_step AS (
            SELECT
                device_type,
                COUNT(DISTINCT customer_id) AS viewers
            FROM product_views
            GROUP BY device_type
        ),
        cart_step AS (
            SELECT
                pv.device_type,
                COUNT(DISTINCT c.customer_id) AS carters
            FROM product_views AS pv
            INNER JOIN carts AS c ON pv.customer_id = c.customer_id
            INNER JOIN cart_items AS ci ON c.id = ci.cart_id AND pv.product_id = ci.product_id
            GROUP BY pv.device_type
        ),
        purchase_step AS (
            SELECT
                pv.device_type,
                COUNT(DISTINCT o.customer_id) AS buyers
            FROM product_views AS pv
            INNER JOIN orders AS o ON pv.customer_id = o.customer_id
            INNER JOIN order_items AS oi ON o.id = oi.order_id AND pv.product_id = oi.product_id
            WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
            GROUP BY pv.device_type
        )
        SELECT
            vs.device_type,
            vs.viewers,
            COALESCE(cs.carters, 0) AS carters,
            ROUND(100.0 * COALESCE(cs.carters, 0) / vs.viewers, 2) AS view_to_cart_pct,
            COALESCE(ps.buyers, 0) AS buyers,
            ROUND(100.0 * COALESCE(ps.buyers, 0) / NULLIF(COALESCE(cs.carters, 0), 0), 2) AS cart_to_buy_pct,
            ROUND(100.0 * COALESCE(ps.buyers, 0) / vs.viewers, 2) AS view_to_buy_pct
        FROM view_step AS vs
        LEFT JOIN cart_step AS cs ON vs.device_type = cs.device_type
        LEFT JOIN purchase_step AS ps ON vs.device_type = ps.device_type
        ORDER BY vs.device_type;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 20
    validation:
      type: result_match

  - id: c11-37
    level: 5
    type: "Analytics"
    tags: [CTE, Aggregate, Analytics patterns, Attribution, product_views, orders]
    title: "채널 기여도 분석"
    title_en: "Channel Attribution Analysis"
    question: |
      product_views의 referrer_source별로 조회수와 최종 구매 전환 수를 구하세요.
      다중 채널 고객의 경우 마지막 접촉(last-touch) 기준으로 크레딧을 부여합니다.
    question_en: |
      Calculate views and purchase conversions by referrer_source.
      For multi-channel customers, give credit to the last-touch channel before purchase.
    hint: |
      - 고객별 마지막 referrer_source를 먼저 구함 (최근 product_view)
      - 해당 채널에 전환 크레딧 부여
    hint_en: |
      - Get last referrer_source per customer (most recent product_view)
      - Credit that channel for conversion
    reference_sql:
      common: |
        WITH last_touch AS (
            SELECT
                pv.customer_id,
                pv.referrer_source,
                ROW_NUMBER() OVER (
                    PARTITION BY pv.customer_id
                    ORDER BY pv.viewed_at DESC
                ) AS rn
            FROM product_views AS pv
            INNER JOIN orders AS o ON pv.customer_id = o.customer_id
            WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
        ),
        channel_views AS (
            SELECT
                referrer_source,
                COUNT(*) AS total_views,
                COUNT(DISTINCT customer_id) AS unique_viewers
            FROM product_views
            GROUP BY referrer_source
        ),
        channel_conversions AS (
            SELECT
                referrer_source,
                COUNT(DISTINCT customer_id) AS conversions
            FROM last_touch
            WHERE rn = 1
            GROUP BY referrer_source
        )
        SELECT
            cv.referrer_source,
            cv.total_views,
            cv.unique_viewers,
            COALESCE(cc.conversions, 0) AS last_touch_conversions,
            ROUND(100.0 * COALESCE(cc.conversions, 0) / cv.unique_viewers, 2) AS conversion_rate_pct
        FROM channel_views AS cv
        LEFT JOIN channel_conversions AS cc ON cv.referrer_source = cc.referrer_source
        ORDER BY last_touch_conversions DESC;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 20
    validation:
      type: result_match

  - id: c11-38
    level: 5
    type: "Analytics"
    tags: [CTE, Window funcs, Island and gap, Date, product_views, customers]
    title: "활성일 아일랜드 탐지"
    title_en: "Active Day Island Detection"
    question: |
      고객별 product_views에서 연속 활성일(island)을 찾으세요.
      예: 고객이 월/화/수 조회 -> 목 미조회 -> 금/토 조회이면 2개 아일랜드(3일, 2일).
    question_en: |
      Find "islands" of consecutive active days per customer in product_views.
      e.g., Mon/Tue/Wed views -> Thu gap -> Fri/Sat views = 2 islands (3 days, 2 days).
    hint: |
      - 고객별 조회 날짜를 `DISTINCT`로 추출
      - `DATE - ROW_NUMBER` 패턴으로 연속 날짜 그룹화
      - 그룹별 MIN/MAX/COUNT
    hint_en: |
      - Extract distinct view dates per customer
      - Use `date - ROW_NUMBER` pattern to group consecutive dates
      - MIN/MAX/COUNT per group
    reference_sql:
      sqlite: |
        WITH active_days AS (
            SELECT DISTINCT
                customer_id,
                SUBSTR(viewed_at, 1, 10) AS view_date
            FROM product_views
            WHERE customer_id <= 200
        ),
        with_rn AS (
            SELECT
                customer_id,
                view_date,
                JULIANDAY(view_date) - ROW_NUMBER() OVER (
                    PARTITION BY customer_id ORDER BY view_date
                ) AS grp
            FROM active_days
        ),
        islands AS (
            SELECT
                customer_id,
                MIN(view_date) AS island_start,
                MAX(view_date) AS island_end,
                COUNT(*) AS island_days
            FROM with_rn
            GROUP BY customer_id, grp
            HAVING COUNT(*) >= 3
        )
        SELECT
            c.name AS customer_name,
            i.island_start,
            i.island_end,
            i.island_days
        FROM islands AS i
        INNER JOIN customers AS c ON i.customer_id = c.id
        ORDER BY i.island_days DESC, c.name
        LIMIT 20;
      oracle: |
        WITH active_days AS (
            SELECT DISTINCT
                customer_id,
                SUBSTR(viewed_at, 1, 10) AS view_date
            FROM product_views
            WHERE customer_id <= 200
        ),
        with_rn AS (
            SELECT
                customer_id,
                view_date,
                CAST(view_date AS DATE) - ROW_NUMBER() OVER (
                    PARTITION BY customer_id ORDER BY view_date
                ) AS grp
            FROM active_days
        ),
        islands AS (
            SELECT
                customer_id,
                MIN(view_date) AS island_start,
                MAX(view_date) AS island_end,
                COUNT(*) AS island_days
            FROM with_rn
            GROUP BY customer_id, grp
            HAVING COUNT(*) >= 3
        )
        SELECT
            c.name AS customer_name,
            i.island_start,
            i.island_end,
            i.island_days
        FROM islands i
        INNER JOIN customers c ON i.customer_id = c.id
        ORDER BY i.island_days DESC, c.name
        FETCH FIRST 20 ROWS ONLY;
      sqlserver: |
        WITH active_days AS (
            SELECT DISTINCT
                customer_id,
                SUBSTRING(viewed_at, 1, 10) AS view_date
            FROM product_views
            WHERE customer_id <= 200
        ),
        with_rn AS (
            SELECT
                customer_id,
                view_date,
                DATEADD(DAY, -ROW_NUMBER() OVER (
                    PARTITION BY customer_id ORDER BY view_date
                ), CAST(view_date AS DATE)) AS grp
            FROM active_days
        ),
        islands AS (
            SELECT
                customer_id,
                MIN(view_date) AS island_start,
                MAX(view_date) AS island_end,
                COUNT(*) AS island_days
            FROM with_rn
            GROUP BY customer_id, grp
            HAVING COUNT(*) >= 3
        )
        SELECT TOP 20
            c.name AS customer_name,
            i.island_start,
            i.island_end,
            i.island_days
        FROM islands AS i
        INNER JOIN customers AS c ON i.customer_id = c.id
        ORDER BY i.island_days DESC, c.name;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 20
    validation:
      type: result_match

  - id: c11-39
    level: 5
    type: "Analytics"
    tags: [CTE, Subquery, Aggregate, Window funcs, Analytics patterns, orders, customers, order_items, products]
    title: "월간 종합 대시보드"
    title_en: "Complete Monthly Dashboard"
    question: |
      한 쿼리로 2024년 월별 종합 대시보드를 만드세요:
      매출, 주문 수, 신규 고객 수, 활성 고객 수, 평균 주문 금액,
      전월 대비 매출 증감률, 매출 1위 상품명.
    question_en: |
      Build a complete monthly dashboard for 2024 in one query:
      revenue, orders, new customers, active customers, avg order value,
      month-over-month revenue change, and top product by revenue.
    hint: |
      - 주문/고객/상품 통계를 각각 CTE로 준비
      - 월 기준으로 모두 JOIN
      - LAG로 전월 대비 증감률
      - ROW_NUMBER로 월별 매출 1위 상품
    hint_en: |
      - Prepare order/customer/product stats in separate CTEs
      - JOIN all by month
      - LAG for month-over-month change
      - ROW_NUMBER for top product per month
    reference_sql:
      common: |
        WITH monthly_orders AS (
            SELECT
                SUBSTR(ordered_at, 1, 7) AS year_month,
                COUNT(*) AS order_count,
                ROUND(SUM(total_amount), 0) AS revenue,
                ROUND(AVG(total_amount), 0) AS avg_order_value,
                COUNT(DISTINCT customer_id) AS active_customers
            FROM orders
            WHERE ordered_at LIKE '2024%'
              AND status NOT IN ('cancelled', 'returned', 'return_requested')
            GROUP BY SUBSTR(ordered_at, 1, 7)
        ),
        new_customers AS (
            SELECT
                SUBSTR(created_at, 1, 7) AS year_month,
                COUNT(*) AS new_customer_count
            FROM customers
            WHERE created_at LIKE '2024%'
            GROUP BY SUBSTR(created_at, 1, 7)
        ),
        top_products AS (
            SELECT
                SUBSTR(o.ordered_at, 1, 7) AS year_month,
                p.name AS product_name,
                ROUND(SUM(oi.quantity * oi.unit_price), 0) AS product_revenue,
                ROW_NUMBER() OVER (
                    PARTITION BY SUBSTR(o.ordered_at, 1, 7)
                    ORDER BY SUM(oi.quantity * oi.unit_price) DESC
                ) AS rn
            FROM order_items AS oi
            INNER JOIN orders AS o ON oi.order_id = o.id
            INNER JOIN products AS p ON oi.product_id = p.id
            WHERE o.ordered_at LIKE '2024%'
              AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
            GROUP BY SUBSTR(o.ordered_at, 1, 7), p.id, p.name
        ),
        with_growth AS (
            SELECT
                mo.year_month,
                mo.revenue,
                mo.order_count,
                COALESCE(nc.new_customer_count, 0) AS new_customers,
                mo.active_customers,
                mo.avg_order_value,
                LAG(mo.revenue) OVER (ORDER BY mo.year_month) AS prev_revenue,
                ROUND(100.0 * (mo.revenue - LAG(mo.revenue) OVER (ORDER BY mo.year_month))
                    / NULLIF(LAG(mo.revenue) OVER (ORDER BY mo.year_month), 0), 1) AS mom_growth_pct,
                tp.product_name AS top_product
            FROM monthly_orders AS mo
            LEFT JOIN new_customers AS nc ON mo.year_month = nc.year_month
            LEFT JOIN top_products AS tp ON mo.year_month = tp.year_month AND tp.rn = 1
        )
        SELECT
            year_month,
            revenue,
            order_count,
            new_customers,
            active_customers,
            avg_order_value,
            mom_growth_pct,
            top_product
        FROM with_growth
        ORDER BY year_month;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 20
    validation:
      type: result_match

  - id: c11-40
    level: 2
    type: "String/Date"
    tags: [SELECT, WHERE, products]
    title: "JSON 스펙 조회"
    title_en: "JSON Specs Query"
    question: |
      products 테이블의 specs(JSON) 칼럼에서 CPU 정보를 추출하세요.
      specs가 NULL이 아닌 상품의 이름과 CPU 정보를 표시합니다.
    question_en: |
      Extract CPU information from the products.specs JSON column.
      Show product name and CPU for products where specs is not NULL.
    hint: |
      - SQLite: `JSON_EXTRACT(specs, '$.cpu')` 사용
      - PostgreSQL: `specs->>'cpu'` 사용
      - `WHERE specs IS NOT NULL` 필터
    hint_en: |
      - SQLite: use `JSON_EXTRACT(specs, '$.cpu')`
      - PostgreSQL: use `specs->>'cpu'`
      - Filter `WHERE specs IS NOT NULL`
    reference_sql:
      sqlite: |
        SELECT
            name,
            brand,
            price,
            JSON_EXTRACT(specs, '$.cpu') AS cpu,
            JSON_EXTRACT(specs, '$.ram') AS ram,
            JSON_EXTRACT(specs, '$.storage') AS storage
        FROM products
        WHERE specs IS NOT NULL
          AND JSON_EXTRACT(specs, '$.cpu') IS NOT NULL
        ORDER BY price DESC
        LIMIT 20;
      mysql: |
        SELECT
            name,
            brand,
            price,
            JSON_EXTRACT(specs, '$.cpu') AS cpu,
            JSON_EXTRACT(specs, '$.ram') AS ram,
            JSON_EXTRACT(specs, '$.storage') AS storage
        FROM products
        WHERE specs IS NOT NULL
          AND JSON_EXTRACT(specs, '$.cpu') IS NOT NULL
        ORDER BY price DESC
        LIMIT 20;
      postgresql: |
        SELECT
            name,
            brand,
            price,
            specs->>'cpu' AS cpu,
            specs->>'ram' AS ram,
            specs->>'storage' AS storage
        FROM products
        WHERE specs IS NOT NULL
          AND specs->>'cpu' IS NOT NULL
        ORDER BY price DESC
        LIMIT 20;
      oracle: |
        SELECT
            name,
            brand,
            price,
            JSON_VALUE(specs, '$.cpu') AS cpu,
            JSON_VALUE(specs, '$.ram') AS ram,
            JSON_VALUE(specs, '$.storage') AS storage
        FROM products
        WHERE specs IS NOT NULL
          AND JSON_VALUE(specs, '$.cpu') IS NOT NULL
        ORDER BY price DESC
        FETCH FIRST 20 ROWS ONLY;
      sqlserver: |
        SELECT TOP 20
            name,
            brand,
            price,
            JSON_VALUE(specs, '$.cpu') AS cpu,
            JSON_VALUE(specs, '$.ram') AS ram,
            JSON_VALUE(specs, '$.storage') AS storage
        FROM products
        WHERE specs IS NOT NULL
          AND JSON_VALUE(specs, '$.cpu') IS NOT NULL
        ORDER BY price DESC;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match
