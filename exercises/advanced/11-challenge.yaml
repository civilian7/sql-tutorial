  - id: c11-25
    level: 4
    type: "Analytics"
    tags: [CTE, Aggregate, Analytics patterns, point_transactions, customers]
    title: "포인트 잔액 불일치 탐지"
    title_en: "Point Balance Drift Detection"
    question: |
      point_transactions의 SUM(amount)과 customers.point_balance가
      일치하지 않는 고객을 찾으세요.
    question_en: |
      Find customers where the SUM of point_transactions.amount
      does not match customers.point_balance.
    hint: |
      - `SUM(pt.amount)` 고객별 합계
      - `customers.point_balance`와 비교
    hint_en: |
      - `SUM(pt.amount)` per customer
      - Compare with `customers.point_balance`
    reference_sql:
      common: |
        WITH point_sum AS (
            SELECT
                customer_id,
                SUM(amount) AS calculated_balance
            FROM point_transactions
            GROUP BY customer_id
        )
        SELECT
            c.id AS customer_id,
            c.name,
            c.point_balance AS stored_balance,
            COALESCE(ps.calculated_balance, 0) AS calculated_balance,
            c.point_balance - COALESCE(ps.calculated_balance, 0) AS drift
        FROM customers AS c
        LEFT JOIN point_sum AS ps ON c.id = ps.customer_id
        WHERE c.point_balance != COALESCE(ps.calculated_balance, 0)
        ORDER BY ABS(c.point_balance - COALESCE(ps.calculated_balance, 0)) DESC
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-26
    level: 4
    type: "Analytics"
    tags: [CTE, JOIN, CASE, Aggregate, Analytics patterns, promotions, orders, order_items]
    title: "프로모션 리프트 분석"
    title_en: "Promotion Lift Analysis"
    question: |
      프로모션 기간 중 일평균 매출과 프로모션 외 기간의 일평균 매출을 비교하세요.
      프로모션별 리프트(%)를 계산합니다.
    question_en: |
      Compare average daily revenue during promotion periods vs outside.
      Calculate lift percentage per promotion.
    hint: |
      - `promotions.started_at` ~ `ended_at` 기간의 전체 매출 / 기간 일수
      - 비프로모션 기간의 전체 매출 / 기간 일수
    hint_en: |
      - Total revenue during `started_at` to `ended_at` / number of days
      - Same for non-promotion period
    reference_sql:
      sqlite: |
        WITH promo_daily AS (
            SELECT
                pr.id AS promo_id,
                pr.name AS promo_name,
                ROUND(SUM(o.total_amount), 0) AS promo_revenue,
                CAST(JULIANDAY(pr.ended_at) - JULIANDAY(pr.started_at) + 1 AS INTEGER) AS promo_days
            FROM promotions AS pr
            INNER JOIN orders AS o
                ON o.ordered_at BETWEEN pr.started_at AND pr.ended_at
               AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
            WHERE pr.started_at >= '2024-01-01'
            GROUP BY pr.id, pr.name, pr.started_at, pr.ended_at
        ),
        overall_daily AS (
            SELECT
                ROUND(SUM(total_amount) / 365.0, 0) AS avg_daily_revenue
            FROM orders
            WHERE ordered_at LIKE '2024%'
              AND status NOT IN ('cancelled', 'returned', 'return_requested')
        )
        SELECT
            pd.promo_name,
            pd.promo_revenue,
            pd.promo_days,
            ROUND(1.0 * pd.promo_revenue / pd.promo_days, 0) AS promo_avg_daily,
            od.avg_daily_revenue AS baseline_avg_daily,
            ROUND(100.0 * ((1.0 * pd.promo_revenue / pd.promo_days) - od.avg_daily_revenue)
                / od.avg_daily_revenue, 1) AS lift_pct
        FROM promo_daily AS pd
        CROSS JOIN overall_daily AS od
        ORDER BY lift_pct DESC
        LIMIT 15;
      oracle: |
        WITH promo_daily AS (
            SELECT
                pr.id AS promo_id,
                pr.name AS promo_name,
                ROUND(SUM(o.total_amount), 0) AS promo_revenue,
                CAST(pr.ended_at AS DATE) - CAST(pr.started_at AS DATE) + 1 AS promo_days
            FROM promotions pr
            INNER JOIN orders o
                ON o.ordered_at BETWEEN pr.started_at AND pr.ended_at
               AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
            WHERE pr.started_at >= '2024-01-01'
            GROUP BY pr.id, pr.name, pr.started_at, pr.ended_at
        ),
        overall_daily AS (
            SELECT
                ROUND(SUM(total_amount) / 365.0, 0) AS avg_daily_revenue
            FROM orders
            WHERE ordered_at LIKE '2024%'
              AND status NOT IN ('cancelled', 'returned', 'return_requested')
        )
        SELECT
            pd.promo_name,
            pd.promo_revenue,
            pd.promo_days,
            ROUND(1.0 * pd.promo_revenue / pd.promo_days, 0) AS promo_avg_daily,
            od.avg_daily_revenue AS baseline_avg_daily,
            ROUND(100.0 * ((1.0 * pd.promo_revenue / pd.promo_days) - od.avg_daily_revenue)
                / od.avg_daily_revenue, 1) AS lift_pct
        FROM promo_daily pd
        CROSS JOIN overall_daily od
        ORDER BY lift_pct DESC
        FETCH FIRST 15 ROWS ONLY;
      sqlserver: |
        WITH promo_daily AS (
            SELECT
                pr.id AS promo_id,
                pr.name AS promo_name,
                ROUND(SUM(o.total_amount), 0) AS promo_revenue,
                DATEDIFF(DAY, pr.started_at, pr.ended_at) + 1 AS promo_days
            FROM promotions AS pr
            INNER JOIN orders AS o
                ON o.ordered_at BETWEEN pr.started_at AND pr.ended_at
               AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
            WHERE pr.started_at >= '2024-01-01'
            GROUP BY pr.id, pr.name, pr.started_at, pr.ended_at
        ),
        overall_daily AS (
            SELECT
                ROUND(SUM(total_amount) / 365.0, 0) AS avg_daily_revenue
            FROM orders
            WHERE ordered_at LIKE '2024%'
              AND status NOT IN ('cancelled', 'returned', 'return_requested')
        )
        SELECT TOP 15
            pd.promo_name,
            pd.promo_revenue,
            pd.promo_days,
            ROUND(1.0 * pd.promo_revenue / pd.promo_days, 0) AS promo_avg_daily,
            od.avg_daily_revenue AS baseline_avg_daily,
            ROUND(100.0 * ((1.0 * pd.promo_revenue / pd.promo_days) - od.avg_daily_revenue)
                / od.avg_daily_revenue, 1) AS lift_pct
        FROM promo_daily AS pd
        CROSS JOIN overall_daily AS od
        ORDER BY lift_pct DESC;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-27
    level: 4
    type: "Analytics"
    tags: [CTE, JOIN, Aggregate, Analytics patterns, order_items, orders, products, categories]
    title: "카테고리 교차 판매 분석"
    title_en: "Category Cross-Sell Analysis"
    question: |
      같은 주문에서 가장 자주 함께 구매되는 카테고리 쌍을 찾으세요.
    question_en: |
      Find category pairs most frequently bought together in the same order.
    hint: |
      - 주문별 카테고리 목록을 먼저 구한 뒤
      - Self-join으로 모든 카테고리 쌍 생성 (c1.id < c2.id로 중복 제거)
    hint_en: |
      - Get category list per order first
      - Self-join to generate all pairs (c1.id < c2.id to avoid duplicates)
    reference_sql:
      common: |
        WITH order_categories AS (
            SELECT DISTINCT
                oi.order_id,
                p.category_id,
                cat.name AS category_name
            FROM order_items AS oi
            INNER JOIN products AS p ON oi.product_id = p.id
            INNER JOIN categories AS cat ON p.category_id = cat.id
            INNER JOIN orders AS o ON oi.order_id = o.id
            WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
        )
        SELECT
            oc1.category_name AS category_1,
            oc2.category_name AS category_2,
            COUNT(*) AS co_occurrence
        FROM order_categories AS oc1
        INNER JOIN order_categories AS oc2
            ON oc1.order_id = oc2.order_id
           AND oc1.category_id < oc2.category_id
        GROUP BY oc1.category_name, oc2.category_name
        ORDER BY co_occurrence DESC
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-28
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, LAG, LEAD, customer_grade_history, customers]
    title: "등급 하락 궤적 추적"
    title_en: "Grade Downgrade Trajectory"
    question: |
      customer_grade_history에서 연속 하락(downgrade)이 2회 이상인 고객을 찾으세요.
      예: VIP -> GOLD -> SILVER
    question_en: |
      Find customers with 2+ consecutive downgrades in grade history.
      e.g., VIP -> GOLD -> SILVER
    hint: |
      - `LAG(reason) OVER (PARTITION BY customer_id ORDER BY changed_at)` 사용
      - 현재와 이전 모두 'downgrade'인 행을 찾기
    hint_en: |
      - Use `LAG(reason) OVER (PARTITION BY customer_id ORDER BY changed_at)`
      - Find rows where both current and previous reason = 'downgrade'
    reference_sql:
      common: |
        WITH grade_seq AS (
            SELECT
                customer_id,
                old_grade,
                new_grade,
                reason,
                changed_at,
                LAG(reason) OVER (
                    PARTITION BY customer_id ORDER BY changed_at
                ) AS prev_reason,
                LAG(old_grade) OVER (
                    PARTITION BY customer_id ORDER BY changed_at
                ) AS prev_old_grade
            FROM customer_grade_history
        )
        SELECT
            gs.customer_id,
            c.name AS customer_name,
            gs.prev_old_grade AS grade_before,
            gs.old_grade AS grade_mid,
            gs.new_grade AS grade_after,
            gs.changed_at
        FROM grade_seq AS gs
        INNER JOIN customers AS c ON gs.customer_id = c.id
        WHERE gs.reason = 'downgrade'
          AND gs.prev_reason = 'downgrade'
        ORDER BY gs.customer_id, gs.changed_at;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-29
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, LAG, Aggregate, Date, JULIANDAY, shipping]
    title: "택배사별 월별 배송 성과 및 추이"
    title_en: "Carrier Monthly Delivery Performance with Trend"
    question: |
      택배사별 월별 평균 배송 소요일과 전월 대비 변화를 보여주세요.
    question_en: |
      Show average delivery days by carrier by month,
      with month-over-month change.
    hint: |
      - `JULIANDAY(delivered_at) - JULIANDAY(shipped_at)` 로 배송일
      - `LAG(avg_days) OVER (PARTITION BY carrier ORDER BY month)` 로 전월 비교
    hint_en: |
      - Delivery days: `JULIANDAY(delivered_at) - JULIANDAY(shipped_at)`
      - Previous month: `LAG(avg_days) OVER (PARTITION BY carrier ORDER BY month)`
    reference_sql:
      sqlite: |
        WITH monthly_carrier AS (
            SELECT
                carrier,
                SUBSTR(shipped_at, 1, 7) AS ship_month,
                COUNT(*) AS delivery_count,
                ROUND(AVG(JULIANDAY(delivered_at) - JULIANDAY(shipped_at)), 2) AS avg_days
            FROM shipping
            WHERE delivered_at IS NOT NULL
              AND shipped_at IS NOT NULL
              AND shipped_at >= '2024-01-01'
            GROUP BY carrier, SUBSTR(shipped_at, 1, 7)
        )
        SELECT
            carrier,
            ship_month,
            delivery_count,
            avg_days,
            LAG(avg_days) OVER (PARTITION BY carrier ORDER BY ship_month) AS prev_month_days,
            ROUND(avg_days - LAG(avg_days) OVER (PARTITION BY carrier ORDER BY ship_month), 2) AS mom_change
        FROM monthly_carrier
        ORDER BY carrier, ship_month;
      oracle: |
        WITH monthly_carrier AS (
            SELECT
                carrier,
                SUBSTR(shipped_at, 1, 7) AS ship_month,
                COUNT(*) AS delivery_count,
                ROUND(AVG(CAST(delivered_at AS DATE) - CAST(shipped_at AS DATE)), 2) AS avg_days
            FROM shipping
            WHERE delivered_at IS NOT NULL
              AND shipped_at IS NOT NULL
              AND shipped_at >= '2024-01-01'
            GROUP BY carrier, SUBSTR(shipped_at, 1, 7)
        )
