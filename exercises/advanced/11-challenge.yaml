    validation:
      type: result_match

  - id: c11-32
    level: 5
    type: "Analytics"
    tags: [CTE, Window funcs, LAG, Session, JULIANDAY, product_views]
    title: "세션 정의 (30분 갭)"
    title_en: "Session Definition (30-min Gap)"
    question: |
      product_views를 세션으로 그룹화하세요 (같은 고객의 조회 간 30분 이상 간격이면 새 세션).
      고객별 세션 수, 세션당 평균 조회 수를 구하세요.
    question_en: |
      Group product_views into sessions (30+ minute gap = new session for same customer).
      Calculate sessions per customer and average views per session.
    hint: |
      - `LAG(viewed_at)`로 이전 조회 시간
      - 30분 = `(JULIANDAY(현재) - JULIANDAY(이전)) * 24 * 60 > 30`
      - `SUM(is_new_session) OVER (...)`로 세션 번호 부여
    hint_en: |
      - Use `LAG(viewed_at)` for previous view time
      - 30 min = `(JULIANDAY(current) - JULIANDAY(prev)) * 24 * 60 > 30`
      - `SUM(is_new_session) OVER (...)` to assign session numbers
    reference_sql:
      sqlite: |
        WITH view_gaps AS (
            SELECT
                customer_id,
                viewed_at,
                CASE
                    WHEN LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    ) IS NULL THEN 1
                    WHEN (JULIANDAY(viewed_at) - JULIANDAY(LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    ))) * 24 * 60 > 30 THEN 1
                    ELSE 0
                END AS is_new_session
            FROM product_views
            WHERE customer_id <= 500
        ),
        with_session AS (
            SELECT
                customer_id,
                viewed_at,
                SUM(is_new_session) OVER (
                    PARTITION BY customer_id ORDER BY viewed_at
                    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
                ) AS session_id
            FROM view_gaps
        ),
        session_stats AS (
            SELECT
                customer_id,
                session_id,
                COUNT(*) AS views_in_session
            FROM with_session
            GROUP BY customer_id, session_id
        )
        SELECT
            COUNT(DISTINCT customer_id) AS total_customers,
            COUNT(*) AS total_sessions,
            ROUND(1.0 * COUNT(*) / COUNT(DISTINCT customer_id), 1) AS avg_sessions_per_customer,
            ROUND(AVG(views_in_session), 1) AS avg_views_per_session
        FROM session_stats;
      oracle: |
        WITH view_gaps AS (
            SELECT
                customer_id,
                viewed_at,
                CASE
                    WHEN LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    ) IS NULL THEN 1
                    WHEN (CAST(viewed_at AS DATE) - CAST(LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    ) AS DATE)) * 24 * 60 > 30 THEN 1
                    ELSE 0
                END AS is_new_session
            FROM product_views
            WHERE customer_id <= 500
        ),
        with_session AS (
            SELECT
                customer_id,
                viewed_at,
                SUM(is_new_session) OVER (
                    PARTITION BY customer_id ORDER BY viewed_at
                    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
                ) AS session_id
            FROM view_gaps
        ),
        session_stats AS (
