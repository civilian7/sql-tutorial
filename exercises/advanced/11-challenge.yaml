metadata:
  id: advanced-11-challenge
  title: "도전 문제"
  title_en: "Challenge Problems"
  difficulty: advanced
  level: 4
  type: Analytics
  concepts: [Window, Analytics, CTE, consecutive, median, retention]
  tables: [categories, customers, orders, order_items, products, reviews, shipping, point_transactions, product_views, inventory_transactions, wishlists, calendar]
  estimated_minutes: 120
  description: "solvesql/LeetCode 스타일의 고난도 문제들입니다."
  description_en: "High-difficulty problems inspired by solvesql/LeetCode patterns."

problems:
  # ──────────────────────────────────────────────
  # Level 2 (5 problems)
  # ──────────────────────────────────────────────

  - id: c11-01
    level: 2
    type: "Aggregate"
    tags: [Aggregate, GROUP BY, HAVING, reviews, customers, products]
    title: "중복 리뷰 감지"
    title_en: "Duplicate Review Detection"
    question: |
      같은 상품에 2회 이상 리뷰를 작성한 고객을 찾으세요.
      고객명, 상품명, 리뷰 횟수를 표시합니다.
    question_en: |
      Find customers who reviewed the same product more than once.
      Show customer name, product name, and review count.
    hint: |
      - `reviews`를 `customers`, `products`와 JOIN
      - `GROUP BY customer_id, product_id` 후 `HAVING COUNT(*) >= 2`
    hint_en: |
      - JOIN `reviews` with `customers` and `products`
      - `GROUP BY customer_id, product_id` then `HAVING COUNT(*) >= 2`
    reference_sql:
      common: |
        SELECT
            c.name AS customer_name,
            p.name AS product_name,
            COUNT(*) AS review_count
        FROM reviews AS r
        INNER JOIN customers AS c ON r.customer_id = c.id
        INNER JOIN products AS p ON r.product_id = p.id
        GROUP BY r.customer_id, r.product_id, c.name, p.name
        HAVING COUNT(*) >= 2
        ORDER BY review_count DESC;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-02
    level: 2
    type: "Aggregate"
    tags: [Aggregate, CASE, Date, calendar, orders]
    title: "평일 vs 주말 평균 주문 금액 비교"
    title_en: "Weekday vs Weekend Average Order Amount"
    question: |
      calendar 테이블을 활용하여 평일과 주말의 평균 주문 금액을 비교하세요.
      평일/주말 구분, 주문 수, 평균 주문 금액, 총 매출을 표시합니다.
    question_en: |
      Using the calendar table, compare average order amounts on weekdays vs weekends.
      Show weekday/weekend label, order count, average order value, and total revenue.
    hint: |
      - `calendar.is_weekend` 칼럼 활용
      - `orders`와 `calendar`를 날짜로 JOIN
    hint_en: |
      - Use `calendar.is_weekend` column
      - JOIN `orders` with `calendar` on date
    reference_sql:
      common: |
        SELECT
            CASE cal.is_weekend
                WHEN 1 THEN 'Weekend'
                ELSE 'Weekday'
            END AS day_type,
            COUNT(*) AS order_count,
            ROUND(AVG(o.total_amount), 2) AS avg_order_value,
            ROUND(SUM(o.total_amount), 2) AS total_revenue
        FROM orders AS o
        INNER JOIN calendar AS cal
            ON SUBSTR(o.ordered_at, 1, 10) = cal.date_key
        WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
        GROUP BY cal.is_weekend
        ORDER BY cal.is_weekend;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-03
    level: 2
    type: "Window"
    tags: [CTE, Window funcs, LAG, Aggregate, Date, orders]
    title: "전일 대비 주문 수 증감"
    title_en: "Daily Order Count vs Previous Day"
    question: |
      2024년 12월의 일별 주문 수를 구하고,
      LAG를 사용하여 전일 대비 주문 수가 증가한 날만 표시하세요.
    question_en: |
      Calculate daily order counts for December 2024.
      Use LAG to show only days where the count increased vs the previous day.
    hint: |
      - `SUBSTR(ordered_at, 1, 10)`으로 날짜 추출
      - `LAG(order_count) OVER (ORDER BY order_date)`로 전일 값 참조
    hint_en: |
      - Extract date with `SUBSTR(ordered_at, 1, 10)`
      - Use `LAG(order_count) OVER (ORDER BY order_date)` for previous day
    reference_sql:
      common: |
        WITH daily AS (
            SELECT
                SUBSTR(ordered_at, 1, 10) AS order_date,
                COUNT(*) AS order_count
            FROM orders
            WHERE ordered_at LIKE '2024-12%'
              AND status NOT IN ('cancelled')
            GROUP BY SUBSTR(ordered_at, 1, 10)
        ),
        with_prev AS (
            SELECT
                order_date,
                order_count,
                LAG(order_count) OVER (ORDER BY order_date) AS prev_count
            FROM daily
        )
        SELECT
            order_date,
            order_count,
            prev_count,
            order_count - prev_count AS diff
        FROM with_prev
        WHERE order_count > prev_count
        ORDER BY order_date;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-04
    level: 2
    type: "Window"
    tags: [CTE, Window funcs, ROW_NUMBER, Aggregate, products, categories, order_items, orders]
    title: "카테고리별 3번째로 비싼 상품"
    title_en: "3rd Most Expensive Product per Category"
    question: |
      각 카테고리에서 가격이 3번째로 비싼 상품을 찾으세요.
      카테고리명, 상품명, 가격, 순위를 표시합니다.
    question_en: |
      Find the 3rd most expensive product in each category.
      Show category name, product name, price, and rank.
    hint: |
      - `ROW_NUMBER() OVER (PARTITION BY category_id ORDER BY price DESC)`
      - `WHERE rn = 3`으로 필터
    hint_en: |
      - `ROW_NUMBER() OVER (PARTITION BY category_id ORDER BY price DESC)`
      - Filter `WHERE rn = 3`
    reference_sql:
      common: |
        WITH ranked AS (
            SELECT
                cat.name AS category,
                p.name AS product_name,
                p.price,
                ROW_NUMBER() OVER (
                    PARTITION BY p.category_id
                    ORDER BY p.price DESC
                ) AS rn
            FROM products AS p
            INNER JOIN categories AS cat ON p.category_id = cat.id
            WHERE p.is_active = 1
        )
        SELECT category, product_name, price, rn AS rank
        FROM ranked
        WHERE rn = 3
        ORDER BY price DESC;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-05
    level: 2
    type: "Aggregate"
    tags: [Aggregate, CASE, MOD, customers, orders]
    title: "A/B 버킷 분할"
    title_en: "A/B Bucket Split"
    question: |
      고객 ID의 홀짝(MOD)으로 A/B 그룹을 나누고,
      각 그룹의 고객 수, 평균 주문 금액, 평균 주문 횟수를 비교하세요.
    question_en: |
      Split customers into A/B groups using MOD(id, 2).
      Compare customer count, average order value, and average order count per group.
    hint: |
      - `CASE WHEN c.id % 2 = 0 THEN 'A' ELSE 'B' END`
      - `customers`와 `orders` JOIN 후 그룹별 집계
    hint_en: |
      - `CASE WHEN c.id % 2 = 0 THEN 'A' ELSE 'B' END`
      - JOIN `customers` with `orders`, aggregate by group
    reference_sql:
      common: |
        SELECT
            CASE WHEN c.id % 2 = 0 THEN 'A' ELSE 'B' END AS bucket,
            COUNT(DISTINCT c.id) AS customer_count,
            COUNT(o.id) AS total_orders,
            ROUND(AVG(o.total_amount), 2) AS avg_order_value,
            ROUND(1.0 * COUNT(o.id) / COUNT(DISTINCT c.id), 1) AS avg_orders_per_customer
        FROM customers AS c
        LEFT JOIN orders AS o
            ON c.id = o.customer_id
           AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
        GROUP BY CASE WHEN c.id % 2 = 0 THEN 'A' ELSE 'B' END
        ORDER BY bucket;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  # ──────────────────────────────────────────────
  # Level 3 (10 problems)
  # ──────────────────────────────────────────────

  - id: c11-06
    level: 3
    type: "Subquery/CTE"
    tags: [CTE, Subquery, CASE, categories]
    title: "트리 노드 타입 분류"
    title_en: "Tree Node Type Classification"
    question: |
      categories 테이블에서 각 카테고리를 root / inner / leaf로 분류하세요.
      root: parent_id가 NULL, inner: 자식이 있는 비루트, leaf: 자식이 없는 노드.
    question_en: |
      Classify each category as root / inner / leaf.
      Root: parent_id IS NULL. Inner: non-root with children. Leaf: no children.
    hint: |
      - `LEFT JOIN categories AS child ON cat.id = child.parent_id`
      - `CASE`로 parent_id와 child 존재 여부에 따라 분류
    hint_en: |
      - `LEFT JOIN categories AS child ON cat.id = child.parent_id`
      - Use `CASE` based on parent_id and child existence
    reference_sql:
      common: |
        SELECT
            cat.id,
            cat.name,
            cat.parent_id,
            cat.depth,
            CASE
                WHEN cat.parent_id IS NULL THEN 'root'
                WHEN EXISTS (SELECT 1 FROM categories c2 WHERE c2.parent_id = cat.id) THEN 'inner'
                ELSE 'leaf'
            END AS node_type
        FROM categories AS cat
        ORDER BY cat.depth, cat.sort_order;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-07
    level: 3
    type: "Aggregate"
    tags: [CTE, Aggregate, CASE, Date, orders]
    title: "일별 주문 취소율 (최근 30일)"
    title_en: "Daily Order Cancellation Rate (Last 30 Days)"
    question: |
      최근 30일간(2025-12-01 ~ 2025-12-31 기준) 일별 전체 주문 수와
      취소된 주문 수, 취소율(%)을 계산하세요.
    question_en: |
      For the last 30 days (based on 2025-12-01 to 2025-12-31),
      calculate daily total orders, cancelled orders, and cancellation rate.
    hint: |
      - `status = 'cancelled'`인 주문 비율 계산
      - `SUM(CASE WHEN status = 'cancelled' THEN 1 ELSE 0 END)`
    hint_en: |
      - Calculate ratio of `status = 'cancelled'` orders
      - `SUM(CASE WHEN status = 'cancelled' THEN 1 ELSE 0 END)`
    reference_sql:
      common: |
        SELECT
            SUBSTR(ordered_at, 1, 10) AS order_date,
            COUNT(*) AS total_orders,
            SUM(CASE WHEN status = 'cancelled' THEN 1 ELSE 0 END) AS cancelled_orders,
            ROUND(100.0 * SUM(CASE WHEN status = 'cancelled' THEN 1 ELSE 0 END)
                / COUNT(*), 2) AS cancel_rate_pct
        FROM orders
        WHERE ordered_at BETWEEN '2025-12-01' AND '2025-12-31 23:59:59'
        GROUP BY SUBSTR(ordered_at, 1, 10)
        ORDER BY order_date;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-08
    level: 3
    type: "CASE/IF"
    tags: [CASE, Aggregate, orders]
    title: "할부 금액 계산"
    title_en: "Installment Amount Calculation"
    question: |
      주문 금액이 500,000원 이상인 주문에 대해
      3개월, 6개월, 12개월 할부 시 월 납부액을 계산하세요.
      주문번호, 총액, 3/6/12개월 월납부액을 표시합니다.
    question_en: |
      For orders over 500,000 KRW, calculate monthly installment amounts
      for 3, 6, and 12 months. Show order number, total, and monthly amounts.
    hint: |
      - `ROUND(total_amount / 3, 0)` 등으로 단순 분할
      - `WHERE total_amount >= 500000`
    hint_en: |
      - Simple division: `ROUND(total_amount / 3, 0)` etc.
      - `WHERE total_amount >= 500000`
    reference_sql:
      common: |
        SELECT
            order_number,
            total_amount,
            ROUND(total_amount / 3, 0) AS monthly_3m,
            ROUND(total_amount / 6, 0) AS monthly_6m,
            ROUND(total_amount / 12, 0) AS monthly_12m
        FROM orders
        WHERE total_amount >= 500000
          AND status NOT IN ('cancelled', 'returned', 'return_requested')
        ORDER BY total_amount DESC
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-09
    level: 3
    type: "Subquery/CTE"
    tags: [CTE, Subquery, Aggregate, customers]
    title: "NULL 생년월일 추정"
    title_en: "Estimate NULL Birth Dates"
    question: |
      birth_date가 NULL인 고객에게, 같은 등급(grade) 고객의 평균 출생 연도를 대입하세요.
      고객명, 등급, 원래 birth_date, 추정 birth_year를 표시합니다.
    question_en: |
      For customers with NULL birth_date, estimate their birth year
      using the average birth year of customers in the same grade.
      Show name, grade, original birth_date, and estimated birth_year.
    hint: |
      - `AVG(CAST(SUBSTR(birth_date, 1, 4) AS INTEGER))`로 등급별 평균 출생 연도
      - `LEFT JOIN` 또는 스칼라 서브쿼리로 NULL 고객에 적용
    hint_en: |
      - `AVG(CAST(SUBSTR(birth_date, 1, 4) AS INTEGER))` for average birth year by grade
      - Apply to NULL customers via `LEFT JOIN` or scalar subquery
    reference_sql:
      common: |
        WITH grade_avg_year AS (
            SELECT
                grade,
                ROUND(AVG(CAST(SUBSTR(birth_date, 1, 4) AS INTEGER)), 0) AS avg_birth_year
            FROM customers
            WHERE birth_date IS NOT NULL
            GROUP BY grade
        )
        SELECT
            c.id,
            c.name,
            c.grade,
            c.birth_date,
            gay.avg_birth_year AS estimated_birth_year
        FROM customers AS c
        INNER JOIN grade_avg_year AS gay ON c.grade = gay.grade
        WHERE c.birth_date IS NULL
        ORDER BY c.grade, c.id
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-10
    level: 3
    type: "Subquery/CTE"
    tags: [CTE, Window funcs, ROW_NUMBER, wishlists]
    title: "중복 위시리스트 찾기"
    title_en: "Find Duplicate Wishlists"
    question: |
      wishlists 테이블에는 UNIQUE 제약이 있지만,
      만약 중복이 있었다면 어떤 SQL로 찾고 가장 오래된 것만 남길 수 있을까요?
      ROW_NUMBER로 같은 customer_id + product_id 중 가장 최근 것을 식별하세요.
    question_en: |
      Although wishlists has a UNIQUE constraint,
      write SQL to identify duplicates (same customer_id + product_id)
      and mark all but the earliest using ROW_NUMBER.
    hint: |
      - `ROW_NUMBER() OVER (PARTITION BY customer_id, product_id ORDER BY created_at)`
      - `rn > 1`이면 삭제 대상
    hint_en: |
      - `ROW_NUMBER() OVER (PARTITION BY customer_id, product_id ORDER BY created_at)`
      - `rn > 1` marks records to delete
    reference_sql:
      common: |
        WITH ranked AS (
            SELECT
                id,
                customer_id,
                product_id,
                created_at,
                ROW_NUMBER() OVER (
                    PARTITION BY customer_id, product_id
                    ORDER BY created_at ASC
                ) AS rn
            FROM wishlists
        )
        SELECT id, customer_id, product_id, created_at, rn,
               CASE WHEN rn > 1 THEN 'DELETE' ELSE 'KEEP' END AS action
        FROM ranked
        WHERE customer_id IN (
            SELECT customer_id FROM wishlists
            GROUP BY customer_id
            HAVING COUNT(*) > 1
        )
        ORDER BY customer_id, product_id, rn
        LIMIT 30;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-11
    level: 3
    type: "Aggregate"
    tags: [CTE, Aggregate, JOIN, Analytics patterns, customers, orders]
    title: "가입 채널별 전환율"
    title_en: "Signup-to-Order Conversion Rate by Channel"
    question: |
      acquisition_channel별로 가입 고객 수와 첫 주문까지 도달한 고객 수,
      전환율(%)을 계산하세요.
    question_en: |
      Calculate signup count, first-order count, and conversion rate
      by acquisition_channel.
    hint: |
      - `customers.acquisition_channel`로 그룹화
      - `orders`에 1건이라도 있으면 전환된 것
    hint_en: |
      - Group by `customers.acquisition_channel`
      - Customer is converted if they have at least 1 order
    reference_sql:
      common: |
        SELECT
            COALESCE(c.acquisition_channel, 'unknown') AS channel,
            COUNT(*) AS signup_count,
            COUNT(DISTINCT o.customer_id) AS converted_count,
            ROUND(100.0 * COUNT(DISTINCT o.customer_id) / COUNT(*), 1) AS conversion_rate_pct
        FROM customers AS c
        LEFT JOIN orders AS o
            ON c.id = o.customer_id
           AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
        GROUP BY COALESCE(c.acquisition_channel, 'unknown')
        ORDER BY conversion_rate_pct DESC;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-12
    level: 3
    type: "Aggregate"
    tags: [CTE, CASE, Aggregate, JOIN, inventory_transactions, products]
    title: "Flow vs Stock 비교"
    title_en: "Flow vs Stock Comparison"
    question: |
      상품별 재고 입출고 흐름(flow: 입고-출고 합계)과
      현재 재고(stock: products.stock_qty)를 비교하세요.
      차이가 있는 상품을 식별합니다.
    question_en: |
      Compare inventory flow (sum of inbound - outbound from transactions)
      with current stock (products.stock_qty) per product.
      Identify products where they differ.
    hint: |
      - `inventory_transactions`에서 `SUM(quantity)` (quantity는 입고=양수, 출고=음수)
      - `products.stock_qty`와 비교
    hint_en: |
      - `SUM(quantity)` from `inventory_transactions` (positive=inbound, negative=outbound)
      - Compare with `products.stock_qty`
    reference_sql:
      common: |
        WITH flow AS (
            SELECT
                product_id,
                SUM(quantity) AS net_flow
            FROM inventory_transactions
            GROUP BY product_id
        )
        SELECT
            p.name AS product_name,
            p.stock_qty AS current_stock,
            f.net_flow AS calculated_stock,
            p.stock_qty - f.net_flow AS discrepancy
        FROM products AS p
        INNER JOIN flow AS f ON p.id = f.product_id
        WHERE p.stock_qty != f.net_flow
        ORDER BY ABS(p.stock_qty - f.net_flow) DESC
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-13
    level: 3
    type: "Window"
    tags: [CTE, Window funcs, LAG, Consecutive, orders, customers]
    title: "연속 동일 상태 주문"
    title_en: "Consecutive Same-Status Orders"
    question: |
      고객별로 3건 이상 연속으로 같은 status인 주문을 찾으세요.
      LAG를 사용하여 이전 2건의 status와 비교합니다.
    question_en: |
      Find customers with 3+ consecutive orders having the same status.
      Use LAG to compare with the previous 2 orders' status.
    hint: |
      - `LAG(status, 1)`, `LAG(status, 2)` 사용
      - 3건이 모두 같은 status이면 해당 행 표시
    hint_en: |
      - Use `LAG(status, 1)` and `LAG(status, 2)`
      - Show rows where all 3 have the same status
    reference_sql:
      common: |
        WITH order_seq AS (
            SELECT
                customer_id,
                order_number,
                status,
                ordered_at,
                LAG(status, 1) OVER (PARTITION BY customer_id ORDER BY ordered_at) AS prev_1,
                LAG(status, 2) OVER (PARTITION BY customer_id ORDER BY ordered_at) AS prev_2
            FROM orders
        )
        SELECT
            os.customer_id,
            c.name AS customer_name,
            os.order_number,
            os.status,
            os.prev_1,
            os.prev_2,
            os.ordered_at
        FROM order_seq AS os
        INNER JOIN customers AS c ON os.customer_id = c.id
        WHERE os.status = os.prev_1
          AND os.status = os.prev_2
        ORDER BY os.customer_id, os.ordered_at
        LIMIT 30;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-14
    level: 3
    type: "Window"
    tags: [CTE, Window funcs, ROW_NUMBER, Aggregate, JOIN, order_items, orders, products, categories]
    title: "카테고리별 매출 Top 3 상품"
    title_en: "Top 3 Products by Revenue per Category"
    question: |
      ROW_NUMBER를 사용하여 각 카테고리에서 매출 상위 3개 상품을 구하세요.
      카테고리명, 순위, 상품명, 매출을 표시합니다.
    question_en: |
      Use ROW_NUMBER to find the top 3 products by revenue per category.
      Show category, rank, product name, and revenue.
    hint: |
      - `ROW_NUMBER() OVER (PARTITION BY cat.id ORDER BY revenue DESC)`
      - `WHERE rn <= 3`
    hint_en: |
      - `ROW_NUMBER() OVER (PARTITION BY cat.id ORDER BY revenue DESC)`
      - `WHERE rn <= 3`
    reference_sql:
      common: |
        WITH product_revenue AS (
            SELECT
                cat.name AS category,
                cat.id AS category_id,
                p.name AS product_name,
                ROUND(SUM(oi.quantity * oi.unit_price), 2) AS revenue,
                ROW_NUMBER() OVER (
                    PARTITION BY cat.id
                    ORDER BY SUM(oi.quantity * oi.unit_price) DESC
                ) AS rn
            FROM order_items AS oi
            INNER JOIN orders AS o ON oi.order_id = o.id
            INNER JOIN products AS p ON oi.product_id = p.id
            INNER JOIN categories AS cat ON p.category_id = cat.id
            WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
            GROUP BY cat.id, cat.name, p.id, p.name
        )
        SELECT category, rn AS rank, product_name, revenue
        FROM product_revenue
        WHERE rn <= 3
        ORDER BY category, rn;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

  - id: c11-15
    level: 3
    type: "JOIN/UNION"
    tags: [JOIN, Self-join, staff]
    title: "멘토링 페어 매칭"
    title_en: "Mentoring Pair Matching"
    question: |
      같은 부서 내에서 주니어(role='staff')와 시니어(role='manager')를
      멘토-멘티 쌍으로 매칭하세요. 부서명, 멘티명, 멘토명을 표시합니다.
    question_en: |
      Match junior staff (role='staff') with seniors (role='manager')
      in the same department as mentor-mentee pairs.
      Show department, mentee name, and mentor name.
    hint: |
      - `staff` 테이블을 self-join: `s1.department = s2.department`
      - `s1.role = 'staff'` AND `s2.role = 'manager'`
    hint_en: |
      - Self-join `staff`: `s1.department = s2.department`
      - `s1.role = 'staff'` AND `s2.role = 'manager'`
    reference_sql:
      common: |
        SELECT
            s1.department,
            s1.name AS mentee,
            s1.role AS mentee_role,
            s2.name AS mentor,
            s2.role AS mentor_role
        FROM staff AS s1
        INNER JOIN staff AS s2
            ON s1.department = s2.department
           AND s2.role = 'manager'
        WHERE s1.role = 'staff'
          AND s1.is_active = 1
          AND s2.is_active = 1
        ORDER BY s1.department, s1.name;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 10
    validation:
      type: result_match

