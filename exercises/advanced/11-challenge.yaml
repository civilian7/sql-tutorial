  - id: c11-31
    level: 5
    type: "Analytics"
    tags: [CTE, Window funcs, Consecutive, Aggregate, Date, orders, customers]
    title: "연속 월 주문 고객"
    title_en: "Customers with Consecutive Monthly Orders"
    question: |
      5개월 이상 연속으로 매월 주문한 고객을 찾으세요.
      고객명, 연속 시작월, 연속 종료월, 연속 개월 수를 표시합니다.
    question_en: |
      Find customers who ordered every month for 5+ consecutive months.
      Show customer name, streak start month, end month, and duration.
    hint: |
      - 고객별 월별 주문 여부를 먼저 구함
      - 연속 월을 감지하려면 "month_number - ROW_NUMBER" 패턴 사용
      - 같은 차이값을 가진 행들이 연속 구간
    hint_en: |
      - Get monthly order flag per customer first
      - Use "month_number - ROW_NUMBER" pattern to detect consecutive months
      - Rows with same difference form a consecutive group
    reference_sql:
      sqlite: |
        WITH customer_months AS (
            SELECT DISTINCT
                customer_id,
                SUBSTR(ordered_at, 1, 7) AS order_month,
                CAST(SUBSTR(ordered_at, 1, 4) AS INTEGER) * 12
                    + CAST(SUBSTR(ordered_at, 6, 2) AS INTEGER) AS month_num
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
        ),
        with_rn AS (
            SELECT
                customer_id,
                order_month,
                month_num,
                month_num - ROW_NUMBER() OVER (
                    PARTITION BY customer_id ORDER BY month_num
                ) AS grp
            FROM customer_months
        ),
        streaks AS (
            SELECT
                customer_id,
                MIN(order_month) AS start_month,
                MAX(order_month) AS end_month,
                COUNT(*) AS consecutive_months
            FROM with_rn
            GROUP BY customer_id, grp
            HAVING COUNT(*) >= 5
        )
        SELECT
            c.name AS customer_name,
            c.grade,
            s.start_month,
            s.end_month,
            s.consecutive_months
        FROM streaks AS s
        INNER JOIN customers AS c ON s.customer_id = c.id
        ORDER BY s.consecutive_months DESC, c.name
        LIMIT 20;
      oracle: |
        WITH customer_months AS (
            SELECT DISTINCT
                customer_id,
                SUBSTR(ordered_at, 1, 7) AS order_month,
                CAST(SUBSTR(ordered_at, 1, 4) AS NUMBER) * 12
                    + CAST(SUBSTR(ordered_at, 6, 2) AS NUMBER) AS month_num
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
        ),
        with_rn AS (
            SELECT
                customer_id,
                order_month,
                month_num,
                month_num - ROW_NUMBER() OVER (
                    PARTITION BY customer_id ORDER BY month_num
                ) AS grp
            FROM customer_months
        ),
        streaks AS (
            SELECT
                customer_id,
                MIN(order_month) AS start_month,
                MAX(order_month) AS end_month,
                COUNT(*) AS consecutive_months
            FROM with_rn
            GROUP BY customer_id, grp
            HAVING COUNT(*) >= 5
        )
        SELECT
            c.name AS customer_name,
            c.grade,
            s.start_month,
            s.end_month,
            s.consecutive_months
        FROM streaks s
        INNER JOIN customers c ON s.customer_id = c.id
        ORDER BY s.consecutive_months DESC, c.name
        FETCH FIRST 20 ROWS ONLY;
      sqlserver: |
        WITH customer_months AS (
            SELECT DISTINCT
                customer_id,
                SUBSTRING(ordered_at, 1, 7) AS order_month,
                CAST(SUBSTRING(ordered_at, 1, 4) AS INT) * 12
                    + CAST(SUBSTRING(ordered_at, 6, 2) AS INT) AS month_num
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
        ),
        with_rn AS (
