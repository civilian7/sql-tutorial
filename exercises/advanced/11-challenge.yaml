  - id: c11-18
    level: 4
    type: "Analytics"
    tags: [CTE, Aggregate, Date, Analytics patterns, product_views]
    title: "DAU/MAU 고착도"
    title_en: "DAU/MAU Stickiness Ratio"
    question: |
      2024년 12월 기준으로 product_views의 일별 활성 고객(DAU)과
      월간 활성 고객(MAU) 비율을 계산하세요. DAU/MAU가 고착도(Stickiness)입니다.
    question_en: |
      For December 2024, calculate daily active users (DAU) and monthly active users (MAU)
      from product_views. DAU/MAU ratio is the stickiness metric.
    hint: |
      - DAU = 일별 `COUNT(DISTINCT customer_id)`
      - MAU = 해당 월 전체 `COUNT(DISTINCT customer_id)` (서브쿼리)
      - Stickiness = DAU / MAU
    hint_en: |
      - DAU = daily `COUNT(DISTINCT customer_id)`
      - MAU = monthly `COUNT(DISTINCT customer_id)` (subquery)
      - Stickiness = DAU / MAU
    reference_sql:
      common: |
        WITH dau AS (
            SELECT
                SUBSTR(viewed_at, 1, 10) AS view_date,
                COUNT(DISTINCT customer_id) AS daily_active
            FROM product_views
            WHERE viewed_at LIKE '2024-12%'
            GROUP BY SUBSTR(viewed_at, 1, 10)
        ),
        mau AS (
            SELECT COUNT(DISTINCT customer_id) AS monthly_active
            FROM product_views
            WHERE viewed_at LIKE '2024-12%'
        )
        SELECT
            d.view_date,
            d.daily_active AS dau,
            m.monthly_active AS mau,
            ROUND(100.0 * d.daily_active / m.monthly_active, 2) AS stickiness_pct
        FROM dau AS d
        CROSS JOIN mau AS m
        ORDER BY d.view_date;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-19
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, Moving average, Aggregate, orders]
    title: "7일 이동 평균 매출"
    title_en: "7-Day Moving Average Revenue"
    question: |
      2024년 12월의 일별 매출과 7일 이동 평균을 계산하세요.
      `AVG() OVER (ROWS BETWEEN 6 PRECEDING AND CURRENT ROW)`를 사용합니다.
    question_en: |
      Calculate daily revenue and 7-day moving average for December 2024.
      Use `AVG() OVER (ROWS BETWEEN 6 PRECEDING AND CURRENT ROW)`.
    hint: |
      - 일별 매출을 먼저 집계
      - `AVG(daily_revenue) OVER (ORDER BY date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW)`
    hint_en: |
      - Aggregate daily revenue first
      - `AVG(daily_revenue) OVER (ORDER BY date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW)`
    reference_sql:
      common: |
        WITH daily_revenue AS (
            SELECT
                SUBSTR(ordered_at, 1, 10) AS order_date,
                ROUND(SUM(total_amount), 2) AS revenue
            FROM orders
            WHERE ordered_at LIKE '2024-12%'
              AND status NOT IN ('cancelled', 'returned', 'return_requested')
            GROUP BY SUBSTR(ordered_at, 1, 10)
        )
        SELECT
            order_date,
            revenue,
            ROUND(AVG(revenue) OVER (
                ORDER BY order_date
                ROWS BETWEEN 6 PRECEDING AND CURRENT ROW
            ), 2) AS moving_avg_7d
        FROM daily_revenue
        ORDER BY order_date;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-20
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, Moving average, Aggregate, orders]
    title: "3개월 이동 평균 월매출"
    title_en: "3-Month Moving Average Monthly Revenue"
    question: |
      월별 매출과 3개월 이동 평균을 계산하세요.
      최근 24개월 데이터를 사용합니다.
    question_en: |
      Calculate monthly revenue with a 3-month moving average.
      Use the last 24 months of data.
    hint: |
      - `AVG(revenue) OVER (ORDER BY month ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)`
    hint_en: |
      - `AVG(revenue) OVER (ORDER BY month ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)`
    reference_sql:
      common: |
        WITH monthly AS (
            SELECT
                SUBSTR(ordered_at, 1, 7) AS year_month,
                ROUND(SUM(total_amount), 0) AS revenue
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
              AND ordered_at >= '2024-01-01'
            GROUP BY SUBSTR(ordered_at, 1, 7)
        )
        SELECT
            year_month,
            revenue,
            ROUND(AVG(revenue) OVER (
                ORDER BY year_month
                ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
            ), 0) AS moving_avg_3m
        FROM monthly
        ORDER BY year_month;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-21
    level: 4
    type: "Window"
    tags: [Window funcs, Aggregate, Running total, orders]
    title: "연도 내 누적 월매출"
    title_en: "Cumulative Monthly Revenue Within Year"
    question: |
      각 연도별로 월별 매출과 연도 내 누적 매출을 계산하세요.
      PARTITION BY year로 연도마다 누적이 리셋됩니다.
    question_en: |
      Calculate monthly revenue and cumulative revenue within each year.
      Use PARTITION BY year so cumulative resets each year.
    hint: |
      - `SUM(revenue) OVER (PARTITION BY year ORDER BY month)`
    hint_en: |
      - `SUM(revenue) OVER (PARTITION BY year ORDER BY month)`
    reference_sql:
      common: |
        SELECT
            SUBSTR(ordered_at, 1, 4) AS year,
            SUBSTR(ordered_at, 1, 7) AS year_month,
            ROUND(SUM(total_amount), 0) AS monthly_revenue,
            ROUND(SUM(SUM(total_amount)) OVER (
                PARTITION BY SUBSTR(ordered_at, 1, 4)
                ORDER BY SUBSTR(ordered_at, 1, 7)
            ), 0) AS cumulative_revenue
        FROM orders
        WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
          AND ordered_at >= '2023-01-01'
        GROUP BY SUBSTR(ordered_at, 1, 4), SUBSTR(ordered_at, 1, 7)
        ORDER BY year_month;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-22
    level: 4
    type: "Analytics"
    tags: [CTE, Window funcs, Aggregate, Analytics patterns, Pareto, customers, orders]
    title: "파레토 분석 (고객)"
    title_en: "Pareto Analysis (Customers)"
    question: |
      매출의 80%를 생성하는 고객이 전체의 몇 %인지 분석하세요.
      고객별 매출 누적 비율과 고객 순위를 표시합니다.
    question_en: |
      Analyze what percentage of customers generate 80% of revenue.
      Show cumulative revenue percentage and customer rank.
    hint: |
      - 고객별 매출을 내림차순 정렬 후 누적 SUM
      - 전체 매출 대비 누적 비율 계산
      - 80% 도달 시점의 고객 수 / 전체 고객 수
    hint_en: |
      - Sort customer revenue descending, calculate cumulative SUM
      - Calculate cumulative % of total revenue
      - Find customer count at 80% threshold / total customers
    reference_sql:
      common: |
        WITH customer_revenue AS (
            SELECT
                customer_id,
                ROUND(SUM(total_amount), 2) AS revenue
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
            GROUP BY customer_id
        ),
        ranked AS (
            SELECT
                customer_id,
                revenue,
                SUM(revenue) OVER (ORDER BY revenue DESC) AS cumulative_revenue,
                SUM(revenue) OVER () AS total_revenue,
                ROW_NUMBER() OVER (ORDER BY revenue DESC) AS rank,
                COUNT(*) OVER () AS total_customers
            FROM customer_revenue
        )
        SELECT
            rank,
            revenue,
            ROUND(100.0 * cumulative_revenue / total_revenue, 2) AS cumulative_pct,
            ROUND(100.0 * rank / total_customers, 2) AS customer_pct,
            CASE
                WHEN 100.0 * cumulative_revenue / total_revenue <= 80 THEN 'Top 80%'
                ELSE 'Remaining'
            END AS pareto_group
        FROM ranked
        WHERE rank <= 50 OR 100.0 * cumulative_revenue / total_revenue BETWEEN 78 AND 82
        ORDER BY rank;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-23
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, LAG, JULIANDAY, Analytics patterns, orders, customers]
    title: "구매 주기 분석"
    title_en: "Purchase Cycle Analysis"
    question: |
      고객별 연속 주문 간 평균 일수(구매 주기)를 계산하세요.
      LAG로 이전 주문일을 가져와 JULIANDAY 차이를 구합니다.
    question_en: |
      Calculate the average days between consecutive orders per customer.
      Use LAG to get previous order date and compute JULIANDAY difference.
    hint: |
      - `LAG(ordered_at) OVER (PARTITION BY customer_id ORDER BY ordered_at)`
      - `JULIANDAY(ordered_at) - JULIANDAY(prev_ordered_at)`
      - `AVG()`로 고객별 평균 주기
    hint_en: |
      - `LAG(ordered_at) OVER (PARTITION BY customer_id ORDER BY ordered_at)`
      - `JULIANDAY(ordered_at) - JULIANDAY(prev_ordered_at)`
      - `AVG()` for average cycle per customer
    reference_sql:
      sqlite: |
        WITH order_gaps AS (
            SELECT
                customer_id,
                ordered_at,
                LAG(ordered_at) OVER (
                    PARTITION BY customer_id ORDER BY ordered_at
                ) AS prev_ordered_at
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
        )
        SELECT
            c.name AS customer_name,
            c.grade,
            COUNT(*) AS gap_count,
            ROUND(AVG(JULIANDAY(og.ordered_at) - JULIANDAY(og.prev_ordered_at)), 1) AS avg_cycle_days,
            MIN(CAST(JULIANDAY(og.ordered_at) - JULIANDAY(og.prev_ordered_at) AS INTEGER)) AS min_days,
            MAX(CAST(JULIANDAY(og.ordered_at) - JULIANDAY(og.prev_ordered_at) AS INTEGER)) AS max_days
        FROM order_gaps AS og
        INNER JOIN customers AS c ON og.customer_id = c.id
        WHERE og.prev_ordered_at IS NOT NULL
        GROUP BY og.customer_id, c.name, c.grade
        HAVING COUNT(*) >= 3
        ORDER BY avg_cycle_days ASC
        LIMIT 20;
      oracle: |
        WITH order_gaps AS (
            SELECT
                customer_id,
                ordered_at,
                LAG(ordered_at) OVER (
                    PARTITION BY customer_id ORDER BY ordered_at
                ) AS prev_ordered_at
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
        )
        SELECT
            c.name AS customer_name,
            c.grade,
            COUNT(*) AS gap_count,
            ROUND(AVG(CAST(og.ordered_at AS DATE) - CAST(og.prev_ordered_at AS DATE)), 1) AS avg_cycle_days,
            MIN(CAST(og.ordered_at AS DATE) - CAST(og.prev_ordered_at AS DATE)) AS min_days,
            MAX(CAST(og.ordered_at AS DATE) - CAST(og.prev_ordered_at AS DATE)) AS max_days
        FROM order_gaps og
        INNER JOIN customers c ON og.customer_id = c.id
        WHERE og.prev_ordered_at IS NOT NULL
        GROUP BY og.customer_id, c.name, c.grade
        HAVING COUNT(*) >= 3
        ORDER BY avg_cycle_days ASC
        FETCH FIRST 20 ROWS ONLY;
      sqlserver: |
        WITH order_gaps AS (
            SELECT
                customer_id,
                ordered_at,
                LAG(ordered_at) OVER (
                    PARTITION BY customer_id ORDER BY ordered_at
                ) AS prev_ordered_at
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
        )
        SELECT TOP 20
            c.name AS customer_name,
            c.grade,
            COUNT(*) AS gap_count,
            ROUND(AVG(CAST(DATEDIFF(DAY, og.prev_ordered_at, og.ordered_at) AS FLOAT)), 1) AS avg_cycle_days,
            MIN(DATEDIFF(DAY, og.prev_ordered_at, og.ordered_at)) AS min_days,
            MAX(DATEDIFF(DAY, og.prev_ordered_at, og.ordered_at)) AS max_days
        FROM order_gaps AS og
        INNER JOIN customers AS c ON og.customer_id = c.id
        WHERE og.prev_ordered_at IS NOT NULL
        GROUP BY og.customer_id, c.name, c.grade
        HAVING COUNT(*) >= 3
        ORDER BY avg_cycle_days ASC;
    supported_db: [sqlite, mysql, postgresql]
    max_score: 15
    validation:
      type: result_match

  - id: c11-24
    level: 4
    type: "Analytics"
    tags: [CTE, Aggregate, Date, Analytics patterns, JULIANDAY, customers, orders]
    title: "첫 구매 후 재구매율"
    title_en: "First Purchase Repurchase Rate"
    question: |
      첫 주문 후 30일/60일/90일 이내에 재구매한 고객 비율을 구하세요.
    question_en: |
      Calculate the % of customers who repurchased within 30, 60, and 90 days
      of their first order.
    hint: |
      - 고객별 첫 주문일 = `MIN(ordered_at)`
      - 두 번째 주문이 첫 주문 + N일 이내인지 확인
    hint_en: |
      - First order = `MIN(ordered_at)` per customer
      - Check if second order is within first_order + N days
    reference_sql:
      sqlite: |
        WITH first_order AS (
            SELECT
                customer_id,
                MIN(ordered_at) AS first_ordered_at
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
            GROUP BY customer_id
        ),
        repeat_order AS (
            SELECT
                fo.customer_id,
                fo.first_ordered_at,
                MIN(o.ordered_at) AS second_ordered_at
            FROM first_order AS fo
            INNER JOIN orders AS o
                ON fo.customer_id = o.customer_id
               AND o.ordered_at > fo.first_ordered_at
               AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
            GROUP BY fo.customer_id, fo.first_ordered_at
        )
        SELECT
            COUNT(DISTINCT fo.customer_id) AS total_customers,
            COUNT(DISTINCT CASE
                WHEN JULIANDAY(ro.second_ordered_at) - JULIANDAY(fo.first_ordered_at) <= 30
                THEN fo.customer_id
            END) AS repurchase_30d,
            ROUND(100.0 * COUNT(DISTINCT CASE
                WHEN JULIANDAY(ro.second_ordered_at) - JULIANDAY(fo.first_ordered_at) <= 30
                THEN fo.customer_id
            END) / COUNT(DISTINCT fo.customer_id), 1) AS repurchase_30d_pct,
            COUNT(DISTINCT CASE
                WHEN JULIANDAY(ro.second_ordered_at) - JULIANDAY(fo.first_ordered_at) <= 60
                THEN fo.customer_id
            END) AS repurchase_60d,
            ROUND(100.0 * COUNT(DISTINCT CASE
                WHEN JULIANDAY(ro.second_ordered_at) - JULIANDAY(fo.first_ordered_at) <= 60
                THEN fo.customer_id
            END) / COUNT(DISTINCT fo.customer_id), 1) AS repurchase_60d_pct,
            COUNT(DISTINCT CASE
                WHEN JULIANDAY(ro.second_ordered_at) - JULIANDAY(fo.first_ordered_at) <= 90
                THEN fo.customer_id
            END) AS repurchase_90d,
            ROUND(100.0 * COUNT(DISTINCT CASE
                WHEN JULIANDAY(ro.second_ordered_at) - JULIANDAY(fo.first_ordered_at) <= 90
                THEN fo.customer_id
            END) / COUNT(DISTINCT fo.customer_id), 1) AS repurchase_90d_pct
        FROM first_order AS fo
        LEFT JOIN repeat_order AS ro ON fo.customer_id = ro.customer_id;
      oracle: |
        WITH first_order AS (
            SELECT
                customer_id,
                MIN(ordered_at) AS first_ordered_at
            FROM orders
            WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
