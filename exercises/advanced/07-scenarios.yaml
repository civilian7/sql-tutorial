metadata:
  id: advanced-07-scenarios
  title: "비즈니스 시나리오"
  title_en: "Business Scenarios"
  difficulty: advanced
  category: exercises
  concepts: [CTE, Scalar Subquery, CASE, JULIANDAY, Business Reporting]
  table_count: 8
