problems:
  - id: a22-01
    level: 4
    type: "Window"
    tags: [Window funcs, Running total, point_transactions]
    title: "포인트 누적 잔액 검증 (Running Total)"
    title_en: "Point Running Total Verification"
    body: |
      point_transactions의 balance_after가 올바른지 SUM() OVER()로 검증하세요.
      특정 고객(예: id=100)의 포인트 거래 내역을 시간순으로 나열하고,
      누적 합계(calculated_balance)와 balance_after를 비교합니다.
    body_en: |
      Verify point_transactions.balance_after using SUM() OVER().
      For a specific customer (e.g., id=100), list point transactions chronologically
      and compare calculated running total with balance_after.
    hint: |
      - `SUM(amount) OVER (PARTITION BY customer_id ORDER BY created_at, id)` 사용
      - `ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`
      - `balance_after`와 비교하여 차이가 있는 행 확인
    hint_en: |
      - Use `SUM(amount) OVER (PARTITION BY customer_id ORDER BY created_at, id)`
      - `ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`
      - Compare with `balance_after` to find discrepancies
    reference_sql: |
      SELECT
          id,
          type,
          reason,
          amount,
          balance_after,
          SUM(amount) OVER (
              ORDER BY created_at, id
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
          ) AS calculated_balance,
          balance_after - SUM(amount) OVER (
              ORDER BY created_at, id
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
          ) AS diff,
          created_at
      FROM point_transactions
      WHERE customer_id = 100
      ORDER BY created_at, id;

  - id: a22-02
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, LAG, CASE, customer_grade_history, customers]
    title: "등급 변경 이력 추적 (LAG)"
    title_en: "Grade Change History Tracking (LAG)"
    body: |
      customer_grade_history에서 LAG()를 사용하여 각 변경 이전의 등급을 가져오세요.
      old_grade와 LAG 결과가 일치하는지도 확인합니다.
    body_en: |
      Use LAG() on customer_grade_history to fetch the previous grade before each change.
      Also verify if old_grade matches the LAG result.
    hint: |
      - `LAG(new_grade) OVER (PARTITION BY customer_id ORDER BY changed_at)`
      - 이전 레코드의 new_grade가 현재 레코드의 old_grade와 일치해야 함
    hint_en: |
      - `LAG(new_grade) OVER (PARTITION BY customer_id ORDER BY changed_at)`
      - Previous record's new_grade should match current record's old_grade
    reference_sql: |
      WITH grade_changes AS (
          SELECT
              customer_id,
              old_grade,
              new_grade,
              reason,
              changed_at,
              LAG(new_grade) OVER (
                  PARTITION BY customer_id
                  ORDER BY changed_at
              ) AS prev_new_grade
          FROM customer_grade_history
      )
      SELECT
          gc.customer_id,
          c.name,
          gc.old_grade,
          gc.new_grade,
          gc.prev_new_grade,
          CASE
              WHEN gc.old_grade = gc.prev_new_grade THEN 'OK'
              WHEN gc.prev_new_grade IS NULL THEN 'FIRST'
              ELSE 'MISMATCH'
          END AS check_status,
          gc.reason,
          gc.changed_at
      FROM grade_changes AS gc
      INNER JOIN customers AS c ON gc.customer_id = c.id
      WHERE gc.prev_new_grade IS NOT NULL
      ORDER BY gc.customer_id, gc.changed_at
      LIMIT 30;

  - id: a22-03
    level: 4
    type: "Analytics"
    tags: [CTE, Subquery, Aggregate, Analytics patterns, product_views, cart_items, carts, order_items, orders]
    title: "퍼널 분석: 조회 -> 장바구니 -> 구매"
    title_en: "Funnel Analysis: View -> Cart -> Purchase"
    body: |
      product_views, cart_items, order_items를 활용하여
      상품 조회 -> 장바구니 담기 -> 실제 구매의 전환율을 계산하세요.
    body_en: |
      Using product_views, cart_items, and order_items,
      calculate conversion rates for the funnel: view -> add to cart -> purchase.
    hint: |
      - 각 단계의 고유 고객-상품 조합 수를 계산
      - 퍼널은 반드시 같은 고객이 같은 상품을 봐야 함
      - 스칼라 서브쿼리 또는 CTE 사용
    hint_en: |
      - Count unique customer-product pairs at each stage
      - The funnel requires the same customer viewing the same product
      - Use scalar subqueries or CTEs
    reference_sql: |
      WITH funnel AS (
          SELECT
              (SELECT COUNT(DISTINCT customer_id || '-' || product_id)
               FROM product_views) AS step1_views,
              (SELECT COUNT(DISTINCT c.customer_id || '-' || ci.product_id)
               FROM cart_items ci
               INNER JOIN carts c ON ci.cart_id = c.id) AS step2_cart,
              (SELECT COUNT(DISTINCT o.customer_id || '-' || oi.product_id)
               FROM order_items oi
               INNER JOIN orders o ON oi.order_id = o.id
               WHERE o.status NOT IN ('cancelled')) AS step3_purchase
      )
      SELECT
          step1_views,
          step2_cart,
          ROUND(100.0 * step2_cart / step1_views, 2) AS view_to_cart_pct,
          step3_purchase,
          ROUND(100.0 * step3_purchase / step2_cart, 2) AS cart_to_purchase_pct,
          ROUND(100.0 * step3_purchase / step1_views, 2) AS view_to_purchase_pct
      FROM funnel;

  - id: a22-04
    level: 5
    type: "Analytics"
    tags: [CTE, Window funcs, LAG, Session, JULIANDAY, product_views]
    title: "세션 분석: 상품 조회 세션화"
    title_en: "Session Analysis: Product View Sessions"
    body: |
      product_views를 세션 단위로 그룹화하세요.
      같은 고객의 조회 간 30분 이상 간격이 있으면 새 세션으로 판별합니다.
      고객별 평균 세션 수와 세션당 평균 조회 수를 구하세요.
    body_en: |
      Group product_views into sessions.
      A gap of 30+ minutes between views by the same customer starts a new session.
      Calculate average sessions per customer and average views per session.
    hint: |
      - `LAG(viewed_at) OVER (PARTITION BY customer_id ORDER BY viewed_at)`
      - 이전 조회와의 시간 차이 > 30분이면 새 세션
      - `SUM(new_session_flag) OVER (...)` 로 세션 번호 부여
    hint_en: |
      - `LAG(viewed_at) OVER (PARTITION BY customer_id ORDER BY viewed_at)`
      - If time gap > 30 minutes, mark as new session
      - `SUM(new_session_flag) OVER (...)` to assign session numbers
    reference_sql:
      sqlite: |
        WITH view_gaps AS (
            SELECT
                customer_id,
                viewed_at,
                LAG(viewed_at) OVER (
                    PARTITION BY customer_id ORDER BY viewed_at
                ) AS prev_viewed_at,
                CASE
                    WHEN LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    ) IS NULL THEN 1
                    WHEN (JULIANDAY(viewed_at) - JULIANDAY(LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    ))) * 24 * 60 > 30 THEN 1
                    ELSE 0
                END AS is_new_session
            FROM product_views
            WHERE customer_id <= 1000
        ),
        with_session AS (
            SELECT
                customer_id,
                viewed_at,
                SUM(is_new_session) OVER (
                    PARTITION BY customer_id ORDER BY viewed_at
                    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
                ) AS session_id
            FROM view_gaps
        ),
        session_stats AS (
            SELECT
                customer_id,
                session_id,
                COUNT(*) AS views_in_session
            FROM with_session
            GROUP BY customer_id, session_id
        )
        SELECT
            COUNT(DISTINCT customer_id) AS total_customers,
            COUNT(*) AS total_sessions,
            ROUND(1.0 * COUNT(*) / COUNT(DISTINCT customer_id), 1) AS avg_sessions_per_customer,
            ROUND(AVG(views_in_session), 1) AS avg_views_per_session
        FROM session_stats;
      mysql: |
        WITH view_gaps AS (
            SELECT
                customer_id,
                viewed_at,
                LAG(viewed_at) OVER (
                    PARTITION BY customer_id ORDER BY viewed_at
                ) AS prev_viewed_at,
                CASE
                    WHEN LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    ) IS NULL THEN 1
                    WHEN TIMESTAMPDIFF(MINUTE, LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    ), viewed_at) > 30 THEN 1
                    ELSE 0
                END AS is_new_session
            FROM product_views
            WHERE customer_id <= 1000
        ),
        with_session AS (
            SELECT
                customer_id,
                viewed_at,
                SUM(is_new_session) OVER (
                    PARTITION BY customer_id ORDER BY viewed_at
                    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
                ) AS session_id
            FROM view_gaps
        ),
        session_stats AS (
            SELECT
                customer_id,
                session_id,
                COUNT(*) AS views_in_session
            FROM with_session
            GROUP BY customer_id, session_id
        )
        SELECT
            COUNT(DISTINCT customer_id) AS total_customers,
            COUNT(*) AS total_sessions,
            ROUND(1.0 * COUNT(*) / COUNT(DISTINCT customer_id), 1) AS avg_sessions_per_customer,
            ROUND(AVG(views_in_session), 1) AS avg_views_per_session
        FROM session_stats;
      postgresql: |
        WITH view_gaps AS (
            SELECT
                customer_id,
                viewed_at,
                LAG(viewed_at) OVER (
                    PARTITION BY customer_id ORDER BY viewed_at
                ) AS prev_viewed_at,
                CASE
                    WHEN LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    ) IS NULL THEN 1
                    WHEN EXTRACT(EPOCH FROM (viewed_at::timestamp - LAG(viewed_at) OVER (
                        PARTITION BY customer_id ORDER BY viewed_at
                    )::timestamp)) / 60 > 30 THEN 1
                    ELSE 0
                END AS is_new_session
            FROM product_views
            WHERE customer_id <= 1000
        ),
        with_session AS (
            SELECT
                customer_id,
                viewed_at,
                SUM(is_new_session) OVER (
                    PARTITION BY customer_id ORDER BY viewed_at
                    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
                ) AS session_id
            FROM view_gaps
        ),
        session_stats AS (
            SELECT
                customer_id,
                session_id,
                COUNT(*) AS views_in_session
            FROM with_session
            GROUP BY customer_id, session_id
        )
        SELECT
            COUNT(DISTINCT customer_id) AS total_customers,
            COUNT(*) AS total_sessions,
            ROUND(1.0 * COUNT(*) / COUNT(DISTINCT customer_id), 1) AS avg_sessions_per_customer,
            ROUND(AVG(views_in_session), 1) AS avg_views_per_session
        FROM session_stats;

  - id: a22-05
    level: 4
    type: "Analytics"
    tags: [CTE, Aggregate, Date, Analytics patterns, Cohort, customers, orders]
    title: "코호트 리텐션: 가입 채널 x 가입월"
    title_en: "Cohort Retention: Acquisition Channel x Signup Month"
    body: |
      가입 채널(acquisition_channel)과 가입 월 기준으로
      30일/60일/90일 리텐션율을 계산하세요.
    body_en: |
      Calculate 30/60/90 day retention rates
      by acquisition channel and signup month.
    hint: |
      - 코호트 = 가입 채널 + 가입 월
      - 30일 리텐션: 가입 후 30일 이내 주문한 고객 비율
      - `DATE(created_at, '+30 days')` 활용
    hint_en: |
      - Cohort = acquisition channel + signup month
      - 30-day retention: percentage of customers who ordered within 30 days of signup
      - Use `DATE(created_at, '+30 days')`
    reference_sql:
      sqlite: |
        WITH cohort AS (
            SELECT
                id AS customer_id,
                COALESCE(acquisition_channel, 'unknown') AS channel,
                SUBSTR(created_at, 1, 7) AS signup_month,
                created_at
            FROM customers
            WHERE created_at LIKE '2024%'
        ),
        cohort_activity AS (
            SELECT
                co.channel,
                co.signup_month,
                COUNT(DISTINCT co.customer_id) AS cohort_size,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at <= DATE(co.created_at, '+30 days')
                    THEN co.customer_id
                END) AS active_30d,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at > DATE(co.created_at, '+30 days')
                     AND o.ordered_at <= DATE(co.created_at, '+60 days')
                    THEN co.customer_id
                END) AS active_60d,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at > DATE(co.created_at, '+60 days')
                     AND o.ordered_at <= DATE(co.created_at, '+90 days')
                    THEN co.customer_id
                END) AS active_90d
            FROM cohort AS co
            LEFT JOIN orders AS o
                ON co.customer_id = o.customer_id
               AND o.status NOT IN ('cancelled')
            GROUP BY co.channel, co.signup_month
        )
        SELECT
            channel,
            signup_month,
            cohort_size,
            active_30d,
            ROUND(100.0 * active_30d / cohort_size, 1) AS retention_30d_pct,
            active_60d,
            ROUND(100.0 * active_60d / cohort_size, 1) AS retention_60d_pct,
            active_90d,
            ROUND(100.0 * active_90d / cohort_size, 1) AS retention_90d_pct
        FROM cohort_activity
        WHERE cohort_size >= 10
        ORDER BY channel, signup_month;
      mysql: |
        WITH cohort AS (
            SELECT
                id AS customer_id,
                COALESCE(acquisition_channel, 'unknown') AS channel,
                SUBSTR(created_at, 1, 7) AS signup_month,
                created_at
            FROM customers
            WHERE created_at LIKE '2024%'
        ),
        cohort_activity AS (
            SELECT
                co.channel,
                co.signup_month,
                COUNT(DISTINCT co.customer_id) AS cohort_size,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at <= DATE_ADD(co.created_at, INTERVAL 30 DAY)
                    THEN co.customer_id
                END) AS active_30d,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at > DATE_ADD(co.created_at, INTERVAL 30 DAY)
                     AND o.ordered_at <= DATE_ADD(co.created_at, INTERVAL 60 DAY)
                    THEN co.customer_id
                END) AS active_60d,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at > DATE_ADD(co.created_at, INTERVAL 60 DAY)
                     AND o.ordered_at <= DATE_ADD(co.created_at, INTERVAL 90 DAY)
                    THEN co.customer_id
                END) AS active_90d
            FROM cohort AS co
            LEFT JOIN orders AS o
                ON co.customer_id = o.customer_id
               AND o.status NOT IN ('cancelled')
            GROUP BY co.channel, co.signup_month
        )
        SELECT
            channel,
            signup_month,
            cohort_size,
            active_30d,
            ROUND(100.0 * active_30d / cohort_size, 1) AS retention_30d_pct,
            active_60d,
            ROUND(100.0 * active_60d / cohort_size, 1) AS retention_60d_pct,
            active_90d,
            ROUND(100.0 * active_90d / cohort_size, 1) AS retention_90d_pct
        FROM cohort_activity
        WHERE cohort_size >= 10
        ORDER BY channel, signup_month;
      postgresql: |
        WITH cohort AS (
            SELECT
                id AS customer_id,
                COALESCE(acquisition_channel, 'unknown') AS channel,
                SUBSTR(created_at, 1, 7) AS signup_month,
                created_at
            FROM customers
            WHERE created_at LIKE '2024%'
        ),
        cohort_activity AS (
            SELECT
                co.channel,
                co.signup_month,
                COUNT(DISTINCT co.customer_id) AS cohort_size,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at <= (co.created_at::date + INTERVAL '30 days')
                    THEN co.customer_id
                END) AS active_30d,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at > (co.created_at::date + INTERVAL '30 days')
                     AND o.ordered_at <= (co.created_at::date + INTERVAL '60 days')
                    THEN co.customer_id
                END) AS active_60d,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at > (co.created_at::date + INTERVAL '60 days')
                     AND o.ordered_at <= (co.created_at::date + INTERVAL '90 days')
                    THEN co.customer_id
                END) AS active_90d
            FROM cohort AS co
            LEFT JOIN orders AS o
                ON co.customer_id = o.customer_id
               AND o.status NOT IN ('cancelled')
            GROUP BY co.channel, co.signup_month
        )
        SELECT
            channel,
            signup_month,
            cohort_size,
            active_30d,
            ROUND(100.0 * active_30d / cohort_size, 1) AS retention_30d_pct,
            active_60d,
            ROUND(100.0 * active_60d / cohort_size, 1) AS retention_60d_pct,
            active_90d,
            ROUND(100.0 * active_90d / cohort_size, 1) AS retention_90d_pct
        FROM cohort_activity
        WHERE cohort_size >= 10
        ORDER BY channel, signup_month;

  - id: a22-06
    level: 4
    type: "Analytics"
    tags: [CTE, JOIN, CASE, Aggregate, Analytics patterns, promotions, promotion_products, order_items, orders]
    title: "프로모션 효과 분석"
    title_en: "Promotion Effectiveness Analysis"
    body: |
      프로모션 기간 중 대상 상품의 주문 금액과
      프로모션 기간 외 주문 금액을 비교하세요.
      프로모션별 매출 증감률을 계산합니다.
    body_en: |
      Compare order amounts for promotion products during vs outside promotion periods.
      Calculate revenue change rate per promotion.
    hint: |
      - `promotion_products`에서 대상 상품 목록 확보
      - 프로모션 기간: `promotions.started_at` ~ `ended_at`
      - 기간 중/외 매출을 CASE로 분리
    hint_en: |
      - Get target products from `promotion_products`
      - Promotion period: `promotions.started_at` to `ended_at`
      - Separate during/outside revenue with CASE
    reference_sql:
      sqlite: |
        WITH promo_products AS (
            SELECT
                promo.id AS promo_id,
                promo.name AS promo_name,
                promo.started_at,
                promo.ended_at,
                pp.product_id
            FROM promotions AS promo
            INNER JOIN promotion_products AS pp ON promo.id = pp.promotion_id
            WHERE promo.started_at >= '2024-01-01'
        ),
        promo_revenue AS (
            SELECT
                ppr.promo_id,
                ppr.promo_name,
                ppr.started_at,
                ppr.ended_at,
                SUM(CASE
                    WHEN o.ordered_at BETWEEN ppr.started_at AND ppr.ended_at
                    THEN oi.quantity * oi.unit_price ELSE 0
                END) AS during_revenue,
                SUM(CASE
                    WHEN o.ordered_at < ppr.started_at
                     AND o.ordered_at >= DATE(ppr.started_at, '-' || CAST(JULIANDAY(ppr.ended_at) - JULIANDAY(ppr.started_at) AS INTEGER) || ' days')
                    THEN oi.quantity * oi.unit_price ELSE 0
                END) AS before_revenue,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at BETWEEN ppr.started_at AND ppr.ended_at
                    THEN o.id
                END) AS during_orders
            FROM promo_products AS ppr
            INNER JOIN order_items AS oi ON ppr.product_id = oi.product_id
            INNER JOIN orders      AS o  ON oi.order_id = o.id
            WHERE o.status NOT IN ('cancelled')
            GROUP BY ppr.promo_id, ppr.promo_name, ppr.started_at, ppr.ended_at
        )
        SELECT
            promo_name,
            started_at,
            ended_at,
            during_orders,
            ROUND(during_revenue, 0) AS during_revenue,
            ROUND(before_revenue, 0) AS before_revenue,
            CASE
                WHEN before_revenue > 0
                THEN ROUND(100.0 * (during_revenue - before_revenue) / before_revenue, 1)
                ELSE NULL
            END AS revenue_change_pct
        FROM promo_revenue
        WHERE during_revenue > 0
        ORDER BY revenue_change_pct DESC
        LIMIT 20;
      mysql: |
        WITH promo_products AS (
            SELECT
                promo.id AS promo_id,
                promo.name AS promo_name,
                promo.started_at,
                promo.ended_at,
                pp.product_id
            FROM promotions AS promo
            INNER JOIN promotion_products AS pp ON promo.id = pp.promotion_id
            WHERE promo.started_at >= '2024-01-01'
        ),
        promo_revenue AS (
            SELECT
                ppr.promo_id,
                ppr.promo_name,
                ppr.started_at,
                ppr.ended_at,
                SUM(CASE
                    WHEN o.ordered_at BETWEEN ppr.started_at AND ppr.ended_at
                    THEN oi.quantity * oi.unit_price ELSE 0
                END) AS during_revenue,
                SUM(CASE
                    WHEN o.ordered_at < ppr.started_at
                     AND o.ordered_at >= DATE_SUB(ppr.started_at, INTERVAL DATEDIFF(ppr.ended_at, ppr.started_at) DAY)
                    THEN oi.quantity * oi.unit_price ELSE 0
                END) AS before_revenue,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at BETWEEN ppr.started_at AND ppr.ended_at
                    THEN o.id
                END) AS during_orders
            FROM promo_products AS ppr
            INNER JOIN order_items AS oi ON ppr.product_id = oi.product_id
            INNER JOIN orders      AS o  ON oi.order_id = o.id
            WHERE o.status NOT IN ('cancelled')
            GROUP BY ppr.promo_id, ppr.promo_name, ppr.started_at, ppr.ended_at
        )
        SELECT
            promo_name,
            started_at,
            ended_at,
            during_orders,
            ROUND(during_revenue, 0) AS during_revenue,
            ROUND(before_revenue, 0) AS before_revenue,
            CASE
                WHEN before_revenue > 0
                THEN ROUND(100.0 * (during_revenue - before_revenue) / before_revenue, 1)
                ELSE NULL
            END AS revenue_change_pct
        FROM promo_revenue
        WHERE during_revenue > 0
        ORDER BY revenue_change_pct DESC
        LIMIT 20;
      postgresql: |
        WITH promo_products AS (
            SELECT
                promo.id AS promo_id,
                promo.name AS promo_name,
                promo.started_at,
                promo.ended_at,
                pp.product_id
            FROM promotions AS promo
            INNER JOIN promotion_products AS pp ON promo.id = pp.promotion_id
            WHERE promo.started_at >= '2024-01-01'
        ),
        promo_revenue AS (
            SELECT
                ppr.promo_id,
                ppr.promo_name,
                ppr.started_at,
                ppr.ended_at,
                SUM(CASE
                    WHEN o.ordered_at BETWEEN ppr.started_at AND ppr.ended_at
                    THEN oi.quantity * oi.unit_price ELSE 0
                END) AS during_revenue,
                SUM(CASE
                    WHEN o.ordered_at < ppr.started_at
                     AND o.ordered_at >= (ppr.started_at::date - (ppr.ended_at::date - ppr.started_at::date))
                    THEN oi.quantity * oi.unit_price ELSE 0
                END) AS before_revenue,
                COUNT(DISTINCT CASE
                    WHEN o.ordered_at BETWEEN ppr.started_at AND ppr.ended_at
                    THEN o.id
                END) AS during_orders
            FROM promo_products AS ppr
            INNER JOIN order_items AS oi ON ppr.product_id = oi.product_id
            INNER JOIN orders      AS o  ON oi.order_id = o.id
            WHERE o.status NOT IN ('cancelled')
            GROUP BY ppr.promo_id, ppr.promo_name, ppr.started_at, ppr.ended_at
        )
        SELECT
            promo_name,
            started_at,
            ended_at,
            during_orders,
            ROUND(during_revenue, 0) AS during_revenue,
            ROUND(before_revenue, 0) AS before_revenue,
            CASE
                WHEN before_revenue > 0
                THEN ROUND(100.0 * (during_revenue - before_revenue) / before_revenue, 1)
                ELSE NULL
            END AS revenue_change_pct
        FROM promo_revenue
        WHERE during_revenue > 0
        ORDER BY revenue_change_pct DESC
        LIMIT 20;

  - id: a22-07
    level: 4
    type: "Subquery/CTE"
    tags: [CTE, Recursive CTE, staff]
    title: "재귀 조직도: 직원 계층과 레벨"
    title_en: "Recursive Org Chart: Staff Hierarchy with Levels"
    body: |
      재귀 CTE를 사용하여 전체 직원 조직도를 생성하세요.
      각 직원의 계층 레벨, 전체 경로(CEO > 부장 > 과장 > ...)를 표시합니다.
    body_en: |
      Use a recursive CTE to build the full staff org chart.
      Show each staff member's hierarchy level and full path (CEO > Director > Manager > ...).
    hint: |
      - 시작점: `manager_id IS NULL` (최상위 관리자)
      - 재귀: `staff.manager_id = tree.id`
      - 경로: `tree.path || ' > ' || staff.name`
    hint_en: |
      - Start: `manager_id IS NULL` (top-level)
      - Recurse: `staff.manager_id = tree.id`
      - Path: `tree.path || ' > ' || staff.name`
    reference_sql: |
      WITH RECURSIVE org AS (
          SELECT
              id,
              name,
              department,
              role,
              manager_id,
              name AS path,
              0 AS level
          FROM staff
          WHERE manager_id IS NULL
          UNION ALL
          SELECT
              s.id,
              s.name,
              s.department,
              s.role,
              s.manager_id,
              org.path || ' > ' || s.name,
              org.level + 1
          FROM staff AS s
          INNER JOIN org ON s.manager_id = org.id
      )
      SELECT
          level,
          name,
          department,
          role,
          path
      FROM org
      ORDER BY path;

  - id: a22-08
    level: 4
    type: "Subquery/CTE"
    tags: [CTE, Recursive CTE, JOIN, product_qna, products, customers, staff]
    title: "재귀 Q&A 트리: 질문 -> 답변 -> 후속"
    title_en: "Recursive Q&A Tree: Question -> Answer -> Follow-up"
    body: |
      재귀 CTE를 사용하여 Q&A 스레드의 전체 대화 체인을 구성하세요.
      질문 -> 답변 -> 추가 질문 -> 추가 답변 순으로 표시합니다.
    body_en: |
      Use a recursive CTE to build the full Q&A conversation chain.
      Display in order: question -> answer -> follow-up question -> follow-up answer.
    hint: |
      - 시작점: `parent_id IS NULL` (최초 질문)
      - 재귀: `product_qna.parent_id = tree.id`
      - 들여쓰기나 레벨로 계층 표현
    hint_en: |
      - Start: `parent_id IS NULL` (root questions)
      - Recurse: `product_qna.parent_id = tree.id`
      - Use indentation or levels to show hierarchy
    reference_sql: |
      WITH RECURSIVE qna_tree AS (
          SELECT
              q.id,
              q.product_id,
              q.parent_id,
              q.content,
              q.customer_id,
              q.staff_id,
              q.created_at,
              0 AS depth,
              CAST(q.id AS TEXT) AS thread_path
          FROM product_qna AS q
          WHERE q.parent_id IS NULL
            AND q.product_id <= 100
          UNION ALL
          SELECT
              child.id,
              child.product_id,
              child.parent_id,
              child.content,
              child.customer_id,
              child.staff_id,
              child.created_at,
              tree.depth + 1,
              tree.thread_path || '.' || CAST(child.id AS TEXT)
          FROM product_qna AS child
          INNER JOIN qna_tree AS tree ON child.parent_id = tree.id
      )
      SELECT
          qt.product_id,
          p.name AS product_name,
          qt.depth,
          CASE
              WHEN qt.customer_id IS NOT NULL THEN '[Q] ' || COALESCE(c.name, '?')
              WHEN qt.staff_id IS NOT NULL    THEN '[A] ' || COALESCE(s.name, '?')
              ELSE '[?]'
          END AS author,
          SUBSTR(qt.content, 1, 80) AS content_preview,
          qt.created_at
      FROM qna_tree AS qt
      INNER JOIN products AS p ON qt.product_id = p.id
      LEFT JOIN customers AS c ON qt.customer_id = c.id
      LEFT JOIN staff     AS s ON qt.staff_id = s.id
      ORDER BY qt.product_id, qt.thread_path
      LIMIT 50;

  - id: a22-09
    level: 5
    type: "Subquery/CTE"
    tags: [CTE, Recursive CTE, CASE, products]
    title: "상품 후속 모델 체인 (Recursive CTE)"
    title_en: "Product Successor Chain (Recursive CTE)"
    body: |
      재귀 CTE를 사용하여 단종 상품의 전체 후속 모델 체인을 추적하세요.
      예: A -> B -> C (A가 단종되어 B로 대체, B도 단종되어 C로 대체)
    body_en: |
      Use a recursive CTE to trace the full product successor chain.
      e.g., A -> B -> C (A discontinued, replaced by B, B discontinued, replaced by C)
    hint: |
      - 시작점: `discontinued_at IS NOT NULL AND successor_id IS NOT NULL`
      - 재귀: `products.id = tree.successor_id`
      - 체인 길이(depth)도 계산
    hint_en: |
      - Start: `discontinued_at IS NOT NULL AND successor_id IS NOT NULL`
      - Recurse: `products.id = tree.successor_id`
      - Also calculate chain length (depth)
    reference_sql: |
      WITH RECURSIVE successor_chain AS (
          SELECT
              id AS origin_id,
              name AS origin_name,
              id AS current_id,
              name AS current_name,
              price AS current_price,
              successor_id,
              discontinued_at,
              0 AS depth
          FROM products
          WHERE discontinued_at IS NOT NULL
            AND successor_id IS NOT NULL
          UNION ALL
          SELECT
              sc.origin_id,
              sc.origin_name,
              p.id,
              p.name,
              p.price,
              p.successor_id,
              p.discontinued_at,
              sc.depth + 1
          FROM products AS p
          INNER JOIN successor_chain AS sc ON p.id = sc.successor_id
          WHERE sc.depth < 10
      )
      SELECT
          origin_name AS discontinued_product,
          current_name AS final_successor,
          depth AS chain_length,
          current_price AS successor_price,
          CASE
              WHEN successor_id IS NULL THEN 'Current Model'
              WHEN discontinued_at IS NOT NULL THEN 'Also Discontinued'
              ELSE 'Active'
          END AS status
      FROM successor_chain
      WHERE successor_id IS NULL
         OR discontinued_at IS NULL
      ORDER BY chain_length DESC, origin_name
      LIMIT 30;

  - id: a22-10
    level: 5
    type: "Analytics"
    tags: [CTE, Window funcs, NTILE, CASE, Analytics patterns, RFM, customer_grade_history, customers, orders]
    title: "RFM + 등급 이력 트렌드 분석"
    title_en: "RFM with Grade History Trend Analysis"
    body: |
      RFM 분석과 등급 변경 이력을 결합하여
      등급이 하락한 고객의 RFM 점수 분포를 분석하세요.
      등급 하락 고객 vs 유지/상승 고객의 RFM 차이를 비교합니다.
    body_en: |
      Combine RFM analysis with grade history to analyze
      the RFM score distribution of downgraded customers.
      Compare RFM differences between downgraded vs maintained/upgraded customers.
    hint: |
      - 등급 변경 이력에서 하락(downgrade) 고객 식별
      - RFM 점수를 별도 CTE로 계산
      - 두 결과를 JOIN하여 그룹별 비교
    hint_en: |
      - Identify downgraded customers from grade history
      - Calculate RFM scores in a separate CTE
      - JOIN both results for group comparison
    reference_sql: |
      WITH recent_grade_change AS (
          SELECT
              customer_id,
              reason AS last_change_reason,
              ROW_NUMBER() OVER (
                  PARTITION BY customer_id
                  ORDER BY changed_at DESC
              ) AS rn
          FROM customer_grade_history
          WHERE changed_at >= '2024-01-01'
      ),
      customer_trend AS (
          SELECT
              customer_id,
              last_change_reason,
              CASE
                  WHEN last_change_reason = 'downgrade' THEN 'Downgraded'
                  WHEN last_change_reason = 'upgrade'   THEN 'Upgraded'
                  ELSE 'Maintained'
              END AS trend
          FROM recent_grade_change
          WHERE rn = 1
      ),
      rfm AS (
          SELECT
              c.id AS customer_id,
              c.grade,
              MAX(o.ordered_at) AS last_order,
              COUNT(*) AS frequency,
              ROUND(SUM(o.total_amount), 0) AS monetary,
              NTILE(4) OVER (ORDER BY MAX(o.ordered_at) ASC)  AS r_score,
              NTILE(4) OVER (ORDER BY COUNT(*) ASC)            AS f_score,
              NTILE(4) OVER (ORDER BY SUM(o.total_amount) ASC) AS m_score
          FROM customers AS c
          INNER JOIN orders AS o ON c.id = o.customer_id
          WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
          GROUP BY c.id, c.grade
      )
      SELECT
          ct.trend,
          COUNT(*) AS customer_count,
          ROUND(AVG(r.r_score), 2) AS avg_recency,
          ROUND(AVG(r.f_score), 2) AS avg_frequency,
          ROUND(AVG(r.m_score), 2) AS avg_monetary,
          ROUND(AVG(r.r_score + r.f_score + r.m_score), 2) AS avg_rfm_total,
          ROUND(AVG(r.monetary), 0) AS avg_total_spent,
          ROUND(AVG(r.frequency), 1) AS avg_order_count
      FROM customer_trend AS ct
      INNER JOIN rfm AS r ON ct.customer_id = r.customer_id
      GROUP BY ct.trend
      ORDER BY
          CASE ct.trend
              WHEN 'Downgraded' THEN 1
              WHEN 'Maintained' THEN 2
              WHEN 'Upgraded' THEN 3
          END;

  - id: a10-11
    level: 2
    type: "JOIN/UNION"
    tags: [INNER JOIN, WHERE, customer_grade_history, customers]
    title: "등급 승격 이력 조회"
    title_en: "Grade Upgrade History"
    body: |
      VIP로 승격된 고객의 이력을 조회하세요.
      고객명, 이전 등급, 변경일, 변경 사유를 표시합니다.
    body_en: |
      Find customers who were upgraded to VIP.
      Show customer name, previous grade, change date, and reason.
    hint: |
      - `customer_grade_history.new_grade = 'VIP'` 필터
      - `customer_grade_history.reason = 'upgrade'` 필터
      - `customers` JOIN으로 고객 정보 포함
    hint_en: |
      - Filter `customer_grade_history.new_grade = 'VIP'`
      - Filter `customer_grade_history.reason = 'upgrade'`
      - JOIN `customers` for customer info
    reference_sql: |
      SELECT
          c.name          AS customer_name,
          c.email,
          cgh.old_grade,
          cgh.new_grade,
          cgh.changed_at,
          cgh.reason
      FROM customer_grade_history AS cgh
      INNER JOIN customers AS c ON cgh.customer_id = c.id
      WHERE cgh.new_grade = 'VIP'
        AND cgh.reason = 'upgrade'
      ORDER BY cgh.changed_at DESC
      LIMIT 20;

  - id: a10-12
    level: 3
    type: "Aggregate"
    tags: [INNER JOIN, GROUP BY, HAVING, SUM, customers, point_transactions]
    title: "포인트 잔액 검증"
    title_en: "Point Balance Verification"
    body: |
      point_transactions의 누적 합계와 customers.point_balance를 비교하여
      불일치하는 고객을 찾으세요.
    body_en: |
      Compare the sum of point_transactions with customers.point_balance
      to find customers with mismatches.
    hint: |
      - `SUM(amount)`으로 포인트 거래 합계 계산
      - `customers.point_balance`와 비교
      - `HAVING`으로 불일치 필터
    hint_en: |
      - Calculate total with `SUM(amount)` from point_transactions
      - Compare with `customers.point_balance`
      - Use `HAVING` to filter mismatches
    reference_sql: |
      SELECT
          c.id          AS customer_id,
          c.name,
          c.point_balance AS current_balance,
          SUM(pt.amount)  AS calculated_balance,
          c.point_balance - SUM(pt.amount) AS difference
      FROM customers AS c
      INNER JOIN point_transactions AS pt ON c.id = pt.customer_id
      GROUP BY c.id, c.name, c.point_balance
      HAVING ABS(c.point_balance - SUM(pt.amount)) > 0
      ORDER BY ABS(difference) DESC
      LIMIT 20;
