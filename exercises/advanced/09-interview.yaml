metadata:
  id: advanced-09-interview
  title: "SQL 면접 대비"
  title_en: "SQL Interview Preparation"
  difficulty: advanced
  category: exercises
  concepts: [ROW_NUMBER, LAG, Running Total, Moving Average, Recursive CTE, NTILE, Funnel]
  table_count: 5
  tables: [orders, order_items, products, categories, reviews, customers]

problems:
  - id: a20-01
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, ROW_NUMBER, JOIN, Aggregate, order_items, orders, products, categories]
    title: "Top-N per Group"
    title_en: "Top-N per Group"
    body: |
      각 카테고리에서 매출 1위 상품을 구하세요. (동률 시 하나만)
    body_en: |
      Find the #1 product by revenue in each category. (One per tie)
    hint: |
      `ROW_NUMBER() OVER (PARTITION BY category ORDER BY revenue DESC)`로
      그룹 내 순위를 매기고, `WHERE rn = 1`로 필터링합니다.
    hint_en: |
      Use `ROW_NUMBER() OVER (PARTITION BY category ORDER BY revenue DESC)`
      to rank within groups, then filter `WHERE rn = 1`.
    reference_sql: |
      WITH ranked AS (
          SELECT
              cat.name AS category,
              p.name AS product,
              ROUND(SUM(oi.quantity * oi.unit_price), 0) AS revenue,
              ROW_NUMBER() OVER (PARTITION BY cat.id ORDER BY SUM(oi.quantity * oi.unit_price) DESC) AS rn
          FROM order_items oi
          INNER JOIN orders o ON oi.order_id = o.id
          INNER JOIN products p ON oi.product_id = p.id
          INNER JOIN categories cat ON p.category_id = cat.id
          WHERE o.status NOT IN ('cancelled')
          GROUP BY cat.id, cat.name, p.id, p.name
      )
      SELECT category, product, revenue
      FROM ranked
      WHERE rn = 1
      ORDER BY revenue DESC;

  - id: a20-02
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, LAG, Aggregate, orders]
    title: "연속 증가 구간"
    title_en: "Consecutive Growth Periods"
    body: |
      월별 매출이 3개월 연속 증가한 구간을 찾으세요.
    body_en: |
      Find periods where monthly revenue increased for 3 consecutive months.
    hint: |
      `LAG(revenue, 1)`과 `LAG(revenue, 2)`로 이전 2개월 매출을 가져와서
      현재 > 전월 > 전전월 조건 비교.
    hint_en: |
      Use `LAG(revenue, 1)` and `LAG(revenue, 2)` to get previous 2 months,
      then compare current > prev1 > prev2.
    reference_sql: |
      WITH monthly AS (
          SELECT
              SUBSTR(ordered_at, 1, 7) AS month,
              SUM(total_amount) AS revenue
          FROM orders
          WHERE status NOT IN ('cancelled')
          GROUP BY SUBSTR(ordered_at, 1, 7)
      ),
      with_lag AS (
          SELECT
              month, revenue,
              LAG(revenue, 1) OVER (ORDER BY month) AS prev_1,
              LAG(revenue, 2) OVER (ORDER BY month) AS prev_2
          FROM monthly
      )
      SELECT month, revenue, prev_1, prev_2
      FROM with_lag
      WHERE revenue > prev_1 AND prev_1 > prev_2
      ORDER BY month;

  - id: a20-03
    level: 4
    type: "Window"
    tags: [Window funcs, Aggregate, Running total, orders]
    title: "누적 합계 (Running Total)"
    title_en: "Running Total"
    body: |
      2024년 월별 매출과 누적 매출을 구하세요.
    body_en: |
      Calculate monthly revenue and cumulative revenue for 2024.
    hint: |
      `SUM(monthly_revenue) OVER (ORDER BY month)`로 누적 합계를 구합니다.
    hint_en: |
      Use `SUM(monthly_revenue) OVER (ORDER BY month)` for running total.
    reference_sql: |
      SELECT
          SUBSTR(ordered_at, 1, 7) AS month,
          ROUND(SUM(total_amount), 0) AS monthly_revenue,
          ROUND(SUM(SUM(total_amount)) OVER (ORDER BY SUBSTR(ordered_at, 1, 7)), 0) AS cumulative_revenue
      FROM orders
      WHERE ordered_at LIKE '2024%'
        AND status NOT IN ('cancelled')
      GROUP BY SUBSTR(ordered_at, 1, 7)
      ORDER BY month;

  - id: a20-04
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, Moving average, Aggregate, orders]
    title: "이동 평균 (Moving Average)"
    title_en: "Moving Average"
    body: |
      3개월 이동 평균 매출을 구하세요.
    body_en: |
      Calculate a 3-month moving average of revenue.
    hint: |
      `AVG(revenue) OVER (ORDER BY month ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)`
    hint_en: |
      `AVG(revenue) OVER (ORDER BY month ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)`
    reference_sql: |
      WITH monthly AS (
          SELECT
              SUBSTR(ordered_at, 1, 7) AS month,
              ROUND(SUM(total_amount), 0) AS revenue
          FROM orders
          WHERE status NOT IN ('cancelled')
          GROUP BY SUBSTR(ordered_at, 1, 7)
      )
      SELECT
          month,
          revenue,
          ROUND(AVG(revenue) OVER (
              ORDER BY month
              ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
          ), 0) AS moving_avg_3m
      FROM monthly
      ORDER BY month;

  - id: a20-05
    level: 4
    type: "Subquery/CTE"
    tags: [CTE, Recursive CTE, JOIN, Date, orders]
    title: "갭 분석 (Missing Data)"
    title_en: "Gap Analysis (Missing Data)"
    body: |
      2024년에 주문이 없는 날짜를 찾으세요.
    body_en: |
      Find dates in 2024 with no orders.
    hint: |
      `WITH RECURSIVE`로 2024년 모든 날짜를 생성한 뒤,
      실제 주문 날짜와 `LEFT JOIN`하여 `NULL`인 날을 찾습니다.
    hint_en: |
      Generate all 2024 dates with `WITH RECURSIVE`,
      then `LEFT JOIN` with actual order dates and find `NULL` rows.
    reference_sql: |
      WITH RECURSIVE all_dates AS (
          SELECT '2024-01-01' AS dt
          UNION ALL
          SELECT DATE(dt, '+1 day')
          FROM all_dates
          WHERE dt < '2024-12-31'
      ),
      order_dates AS (
          SELECT DISTINCT SUBSTR(ordered_at, 1, 10) AS dt
          FROM orders
          WHERE ordered_at LIKE '2024%'
      )
      SELECT ad.dt AS missing_date
      FROM all_dates ad
      LEFT JOIN order_dates od ON ad.dt = od.dt
      WHERE od.dt IS NULL
      ORDER BY ad.dt;

  - id: a20-06
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, NTILE, Aggregate, orders]
    title: "백분위수 (Percentile)"
    title_en: "Percentile"
    body: |
      고객 구매 금액의 상위 10%, 25%, 50%(중앙값), 75%, 90% 지점을 구하세요.
    body_en: |
      Find the 10th, 25th, 50th (median), 75th, and 90th percentiles of customer total spend.
    hint: |
      `NTILE(100) OVER (ORDER BY total_spent)`로 백분위 그룹을 만들고,
      `MAX(CASE WHEN percentile = N ...)`로 각 지점의 값을 추출합니다.
    hint_en: |
      Create percentile groups with `NTILE(100) OVER (ORDER BY total_spent)`,
      extract values with `MAX(CASE WHEN percentile = N ...)`.
    reference_sql: |
      WITH customer_spend AS (
          SELECT
              customer_id,
              SUM(total_amount) AS total_spent
          FROM orders
          WHERE status NOT IN ('cancelled')
          GROUP BY customer_id
      ),
      ranked AS (
          SELECT
              total_spent,
              NTILE(100) OVER (ORDER BY total_spent) AS percentile
          FROM customer_spend
      )
      SELECT
          MAX(CASE WHEN percentile = 10 THEN total_spent END) AS p10,
          MAX(CASE WHEN percentile = 25 THEN total_spent END) AS p25,
          MAX(CASE WHEN percentile = 50 THEN total_spent END) AS p50_median,
          MAX(CASE WHEN percentile = 75 THEN total_spent END) AS p75,
          MAX(CASE WHEN percentile = 90 THEN total_spent END) AS p90
      FROM ranked;

  - id: a20-07
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, RANK, LAG, JOIN, Aggregate, order_items, orders, products, categories]
    title: "연도별 순위 변동"
    title_en: "Yearly Rank Changes"
    body: |
      카테고리별 연도별 매출 순위를 구하고, 전년 대비 순위 변동을 표시하세요.
    body_en: |
      Calculate yearly revenue rank by category and show year-over-year rank changes.
    hint: |
      `RANK() OVER (PARTITION BY year ORDER BY revenue DESC)`로 연도별 순위를 매기고,
      `LAG(rank) OVER (PARTITION BY category ORDER BY year)`로 전년 순위를 가져옵니다.
    hint_en: |
      Use `RANK() OVER (PARTITION BY year ORDER BY revenue DESC)` for yearly rank,
      `LAG(rank) OVER (PARTITION BY category ORDER BY year)` for previous year rank.
    reference_sql: |
      WITH yearly_category AS (
          SELECT
              SUBSTR(o.ordered_at, 1, 4) AS year,
              cat.name AS category,
              ROUND(SUM(oi.quantity * oi.unit_price), 0) AS revenue
          FROM order_items oi
          INNER JOIN orders o ON oi.order_id = o.id
          INNER JOIN products p ON oi.product_id = p.id
          INNER JOIN categories cat ON p.category_id = cat.id
          WHERE o.status NOT IN ('cancelled')
          GROUP BY SUBSTR(o.ordered_at, 1, 4), cat.name
      ),
      with_rank AS (
          SELECT *,
              RANK() OVER (PARTITION BY year ORDER BY revenue DESC) AS rank
          FROM yearly_category
      )
      SELECT
          wr.year, wr.category, wr.revenue, wr.rank,
          LAG(wr.rank) OVER (PARTITION BY wr.category ORDER BY wr.year) AS prev_rank,
          LAG(wr.rank) OVER (PARTITION BY wr.category ORDER BY wr.year) - wr.rank AS rank_change
      FROM with_rank wr
      WHERE wr.year >= '2022'
      ORDER BY wr.year, wr.rank;

  - id: a20-08
    level: 3
    type: "Subquery/CTE"
    tags: [Subquery, Aggregate, Analytics patterns, customers, orders, reviews]
    title: "Funnel 분석 (퍼널)"
    title_en: "Funnel Analysis"
    body: |
      고객 여정 퍼널을 분석하세요: 가입 -> 첫 주문 -> 리뷰 작성 -> 재구매.
      각 단계의 전환율을 구하세요.
    body_en: |
      Analyze the customer journey funnel: signup -> first order -> write review -> repeat purchase.
      Calculate conversion rates between each step.
    hint: |
      각 단계의 고유 고객 수를 스칼라 서브쿼리로 구하고,
      `100.0 * next_step / prev_step`로 전환율을 계산합니다.
    hint_en: |
      Calculate unique customer count per step with scalar subqueries,
      then `100.0 * next_step / prev_step` for conversion rates.
    reference_sql: |
      WITH funnel AS (
          SELECT
              (SELECT COUNT(*) FROM customers) AS step1_signup,
              (SELECT COUNT(DISTINCT customer_id) FROM orders
               WHERE status NOT IN ('cancelled')) AS step2_first_order,
              (SELECT COUNT(DISTINCT customer_id) FROM reviews) AS step3_review,
              (SELECT COUNT(*) FROM (
                  SELECT customer_id FROM orders
                  WHERE status NOT IN ('cancelled')
                  GROUP BY customer_id HAVING COUNT(*) >= 2
              )) AS step4_repeat
      )
      SELECT
          step1_signup,
          step2_first_order,
          ROUND(100.0 * step2_first_order / step1_signup, 1) AS cvr_1_2,
          step3_review,
          ROUND(100.0 * step3_review / step2_first_order, 1) AS cvr_2_3,
          step4_repeat,
          ROUND(100.0 * step4_repeat / step2_first_order, 1) AS cvr_2_4
      FROM funnel;

  - id: a20-09
    level: 4
    type: "Subquery/CTE"
    tags: [CTE, Recursive CTE, categories]
    title: "자기 참조 계층 깊이 탐색"
    title_en: "Self-Reference Hierarchy Depth Exploration"
    body: |
      카테고리 계층의 최대 깊이와 각 깊이별 카테고리 수를 구하세요. 재귀 CTE를 사용하세요.
    body_en: |
      Find the maximum depth and category count per depth level. Use a recursive CTE.
    hint: |
      `WITH RECURSIVE`에서 `parent_id IS NULL`을 시작점(depth=0)으로,
      `c.parent_id = tree.id`로 자식을 재귀 탐색합니다.
    hint_en: |
      Start recursive CTE from `parent_id IS NULL` (depth=0),
      traverse children with `c.parent_id = tree.id`.
    reference_sql: |
      WITH RECURSIVE tree AS (
          SELECT id, name, parent_id, 0 AS depth
          FROM categories
          WHERE parent_id IS NULL
          UNION ALL
          SELECT c.id, c.name, c.parent_id, t.depth + 1
          FROM categories c
          INNER JOIN tree t ON c.parent_id = t.id
      )
      SELECT
          depth,
          COUNT(*) AS category_count,
          GROUP_CONCAT(name, ', ') AS categories
      FROM tree
      GROUP BY depth
      ORDER BY depth;

  - id: a20-10
    level: 4
    type: "Window"
    tags: [CTE, Window funcs, LAG, JULIANDAY, order_items, orders]
    title: "동일 상품 재구매 간격"
    title_en: "Same Product Repurchase Interval"
    body: |
      같은 상품을 2회 이상 구매한 고객의 평균 재구매 간격(일)을 구하세요.
    body_en: |
      Calculate the average repurchase interval (days) for customers who bought the same product 2+ times.
    hint: |
      `LAG(ordered_at) OVER (PARTITION BY customer_id, product_id ORDER BY ordered_at)`로
      같은 고객-상품의 이전 주문일을 가져와 JULIANDAY 차이를 계산합니다.
    hint_en: |
      Use `LAG(ordered_at) OVER (PARTITION BY customer_id, product_id ORDER BY ordered_at)`
      to get previous order date for same customer-product, then calculate JULIANDAY difference.
    reference_sql: |
      WITH repeat_purchases AS (
          SELECT
              o.customer_id,
              oi.product_id,
              o.ordered_at,
              LAG(o.ordered_at) OVER (
                  PARTITION BY o.customer_id, oi.product_id
                  ORDER BY o.ordered_at
              ) AS prev_order_date
          FROM order_items oi
          INNER JOIN orders o ON oi.order_id = o.id
          WHERE o.status NOT IN ('cancelled')
      )
      SELECT
          ROUND(AVG(JULIANDAY(ordered_at) - JULIANDAY(prev_order_date)), 1) AS avg_repurchase_days,
          MIN(CAST(JULIANDAY(ordered_at) - JULIANDAY(prev_order_date) AS INTEGER)) AS min_days,
          MAX(CAST(JULIANDAY(ordered_at) - JULIANDAY(prev_order_date) AS INTEGER)) AS max_days,
          COUNT(*) AS repurchase_count
      FROM repeat_purchases
      WHERE prev_order_date IS NOT NULL;
