metadata:
  id: advanced-01-window-functions
  title: "윈도우 함수 실전"
  title_en: "Window Functions Practice"
  difficulty: advanced
  category: exercises
  concepts: [ROW_NUMBER, RANK, DENSE_RANK, NTILE, LAG, LEAD, SUM OVER, AVG OVER, FIRST_VALUE, LAST_VALUE, ROWS BETWEEN]
  table_count: 7
  tables: [orders, order_items, products, customers, reviews, payments, categories]

problems:
  - id: a01w-01
    level: 3
    type: "Window"
    title: "각 고객의 주문을 시간순으로 정렬하여, 고객별 주문 순번을 매기세요."
    title_en: "Sort each customer's orders in chronological order and number the orders for each customer."
    body: |
      고객 ID, 고객명, 주문번호, 주문일, 주문금액, 그리고 해당 고객 내에서 몇 번째 주문인지(`order_seq`)를 표시합니다.
      상위 20행만 출력하세요.
    body_en: |
      Displays customer ID, customer name, order number, order date, order amount, and order number (`order_seq`) within the customer.
      Print only the top 20 rows.
    hint: |
      `ROW_NUMBER() OVER (PARTITION BY ... ORDER BY ...)`를 사용합니다.
      `PARTITION BY customer_id`로 고객별로 그룹을 나누고, `ORDER BY ordered_at`으로 시간순 정렬합니다.
    hint_en: |
      Use `ROW_NUMBER() OVER (PARTITION BY ... ORDER BY ...)`.
      Group by customer with `PARTITION BY customer_id` and sort chronologically with `ORDER BY ordered_at`.
    reference_sql: |
      SELECT
          c.id             AS customer_id,
          c.name           AS customer_name,
          o.order_number,
          o.ordered_at,
          o.total_amount,
          ROW_NUMBER() OVER (
              PARTITION BY c.id
              ORDER BY o.ordered_at
          ) AS order_seq
      FROM orders AS o
      INNER JOIN customers AS c ON o.customer_id = c.id
      WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
      ORDER BY c.id, order_seq
      LIMIT 20;

  - id: a01w-02
    level: 3
    type: "Window"
    title: "2024년 월별 매출 순위를 매기세요. 동일 매출이면 같은 순위를 부여합니다."
    title_en: "Ranking monthly sales for 2024. If the sales are the same, the same ranking is given."
    body: |
      각 월의 총 매출, `RANK`와 `DENSE_RANK` 값을 모두 표시하여 차이를 비교하세요.
    body_en: |
      Total sales for each month, display both `RANK` and `DENSE_RANK` values ​​to compare the differences.
    hint: |
      먼저 `SUBSTR(ordered_at, 1, 7)`로 월별 매출을 집계한 서브쿼리(또는 CTE)를 만들고,
      그 결과에 `RANK() OVER (ORDER BY revenue DESC)`와 `DENSE_RANK()`를 적용합니다.
    hint_en: |
      First, create a subquery (or CTE) that aggregates monthly sales with `SUBSTR(ordered_at, 1, 7)`,
      Apply `RANK() OVER (ORDER BY revenue DESC)` and `DENSE_RANK()` to the result.
    reference_sql: |
      WITH monthly_revenue AS (
          SELECT
              SUBSTR(ordered_at, 1, 7) AS year_month,
              ROUND(SUM(total_amount), 0) AS revenue
          FROM orders
          WHERE ordered_at LIKE '2024%'
            AND status NOT IN ('cancelled', 'returned', 'return_requested')
          GROUP BY SUBSTR(ordered_at, 1, 7)
      )
      SELECT
          year_month,
          revenue,
          RANK()       OVER (ORDER BY revenue DESC) AS rank_val,
          DENSE_RANK() OVER (ORDER BY revenue DESC) AS dense_rank_val
      FROM monthly_revenue
      ORDER BY year_month;

  - id: a01w-03
    level: 3
    type: "Window"
    title: "상품별 총 매출과 함께, 해당 카테고리 내에서의 매출 비중(%)을 구하세요."
    title_en: "In addition to the total sales for each product, find the percentage of sales within that category."
    body: |
      2024년 기준, 상위 15개 상품을 매출 내림차순으로 표시합니다.
    body_en: |
      As of 2024, the top 15 products are displayed in descending order of sales.
    hint: |
      `SUM(매출) OVER (PARTITION BY category_id)`로 카테고리 전체 매출을 구하고,
      개별 상품 매출을 카테고리 매출로 나누면 비중이 됩니다.
    hint_en: |
      Find the total sales of the category with `SUM(revenue) OVER (PARTITION BY category_id)`,
      Divide individual product sales by category sales to get the ratio.
    reference_sql: |
      SELECT
          p.name            AS product_name,
          cat.name          AS category,
          ROUND(SUM(oi.quantity * oi.unit_price), 0) AS product_revenue,
          ROUND(SUM(SUM(oi.quantity * oi.unit_price)) OVER (
              PARTITION BY p.category_id
          ), 0) AS category_revenue,
          ROUND(100.0 * SUM(oi.quantity * oi.unit_price)
              / SUM(SUM(oi.quantity * oi.unit_price)) OVER (PARTITION BY p.category_id),
          1) AS pct_of_category
      FROM order_items AS oi
      INNER JOIN orders     AS o   ON oi.order_id   = o.id
      INNER JOIN products   AS p   ON oi.product_id = p.id
      INNER JOIN categories AS cat ON p.category_id = cat.id
      WHERE o.ordered_at LIKE '2024%'
        AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
      GROUP BY p.id, p.name, cat.name, p.category_id
      ORDER BY product_revenue DESC
      LIMIT 15;

  - id: a01w-04
    level: 3
    type: "Window"
    title: "각 고객의 주문 금액에 대해 누적 합계(running total)를 계산하세요."
    title_en: "Calculate a running total for each customer's order amount."
    body: |
      고객 ID 1~5번에 대해, 주문 시간순으로 누적 주문 금액을 표시합니다.
    body_en: |
      For customer IDs 1 to 5, the cumulative order amount is displayed in order of order time.
    hint: |
      `SUM(total_amount) OVER (PARTITION BY customer_id ORDER BY ordered_at ROWS UNBOUNDED PRECEDING)`
      이 구문이 누적 합계(running total)를 만듭니다.
    hint_en: |
      `SUM(total_amount) OVER (PARTITION BY customer_id ORDER BY ordered_at ROWS UNBOUNDED PRECEDING)`
      This statement creates a running total.
    reference_sql: |
      SELECT
          c.id            AS customer_id,
          c.name          AS customer_name,
          o.ordered_at,
          o.total_amount,
          SUM(o.total_amount) OVER (
              PARTITION BY c.id
              ORDER BY o.ordered_at
              ROWS UNBOUNDED PRECEDING
          ) AS running_total
      FROM orders AS o
      INNER JOIN customers AS c ON o.customer_id = c.id
      WHERE c.id BETWEEN 1 AND 5
        AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
      ORDER BY c.id, o.ordered_at;

  - id: a01w-05
    level: 3
    type: "Window"
    title: "결제 건수 기준으로 결제 수단을 4개 그룹(분위)으로 나누세요."
    title_en: "Divide payment methods into 4 groups (quartiles) based on the number of payments."
    body: |
      2024년 완료된 결제(`status = 'completed'`)를 수단별로 집계하고, `NTILE(4)`로 분위를 매깁니다.
    body_en: |
      Payments completed in 2024 (`status = 'completed'`) are tallied by means, and quantified by `NTILE(4)`.
    hint: |
      먼저 결제 수단별 건수를 집계한 CTE를 만들고,
      `NTILE(4) OVER (ORDER BY payment_count DESC)`로 4분위를 나눕니다.
      1분위가 가장 많이 사용된 그룹입니다.
    hint_en: |
      First, create a CTE that counts the number of transactions by payment method,
      Divide into quartiles by `NTILE(4) OVER (ORDER BY payment_count DESC)`.
      Decile 1 is the most used group.
    reference_sql: |
      WITH method_stats AS (
          SELECT
              method,
              COUNT(*)              AS payment_count,
              ROUND(SUM(amount), 0) AS total_amount
          FROM payments
          WHERE status = 'completed'
            AND paid_at LIKE '2024%'
          GROUP BY method
      )
      SELECT
          method,
          payment_count,
          total_amount,
          NTILE(4) OVER (ORDER BY payment_count DESC) AS quartile
      FROM method_stats
      ORDER BY payment_count DESC;

  - id: a01w-06
    level: 3
    type: "Window"
    title: "월별 매출의 전월 대비 증감액과 증감률을 구하세요."
    title_en: "Find the increase/decrease and increase/decrease rate of monthly sales compared to the previous month."
    body: |
      2023~2024년 데이터를 사용합니다.
    body_en: |
      We use data from 2023 to 2024.
    hint: |
      `LAG(revenue, 1) OVER (ORDER BY year_month)`로 이전 월 매출을 가져옵니다.
      증감률은 `(당월 - 전월) / 전월 * 100`으로 계산합니다.
    hint_en: |
      Get the previous month's sales with `LAG(revenue, 1) OVER (ORDER BY year_month)`.
      The increase/decrease rate is calculated as `(current_month - previous_month) / previous_month * 100`.
    reference_sql: |
      WITH monthly AS (
          SELECT
              SUBSTR(ordered_at, 1, 7) AS year_month,
              ROUND(SUM(total_amount), 0) AS revenue
          FROM orders
          WHERE ordered_at >= '2023-01-01'
            AND ordered_at < '2025-01-01'
            AND status NOT IN ('cancelled', 'returned', 'return_requested')
          GROUP BY SUBSTR(ordered_at, 1, 7)
      )
      SELECT
          year_month,
          revenue,
          LAG(revenue, 1) OVER (ORDER BY year_month) AS prev_revenue,
          revenue - LAG(revenue, 1) OVER (ORDER BY year_month) AS diff,
          ROUND(100.0 * (revenue - LAG(revenue, 1) OVER (ORDER BY year_month))
              / LAG(revenue, 1) OVER (ORDER BY year_month), 1) AS growth_pct
      FROM monthly
      ORDER BY year_month;

  - id: a01w-07
    level: 3
    type: "Window"
    title: "고객의 다음 주문까지 걸린 일수를 계산하세요."
    title_en: "Calculate the number of days until your customer's next order."
    body: |
      VIP 등급 고객에 대해, 각 주문과 다음 주문 사이의 간격(일)을 구합니다.
      평균 간격이 가장 짧은 상위 10명을 표시하세요.
    body_en: |
      For VIP-level customers, find the number of days between each order and the next order.
      Show the top 10 people with the shortest average intervals.
    hint: |
      `LEAD(ordered_at, 1) OVER (PARTITION BY customer_id ORDER BY ordered_at)`로 다음 주문일을 가져오고,
      `JULIANDAY(next_order) - JULIANDAY(ordered_at)`로 간격을 계산합니다.
    hint_en: |
      Get the next order date with `LEAD(ordered_at, 1) OVER (PARTITION BY customer_id ORDER BY ordered_at)`,
      Calculate the interval with `JULIANDAY(next_order) - JULIANDAY(ordered_at)`.
    reference_sql: |
      WITH order_gaps AS (
          SELECT
              o.customer_id,
              c.name,
              o.ordered_at,
              LEAD(o.ordered_at, 1) OVER (
                  PARTITION BY o.customer_id
                  ORDER BY o.ordered_at
              ) AS next_order_at,
              ROUND(
                  JULIANDAY(LEAD(o.ordered_at, 1) OVER (
                      PARTITION BY o.customer_id
                      ORDER BY o.ordered_at
                  )) - JULIANDAY(o.ordered_at),
              0) AS days_to_next
          FROM orders AS o
          INNER JOIN customers AS c ON o.customer_id = c.id
          WHERE c.grade = 'VIP'
            AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
      )
      SELECT
          customer_id,
          name,
          COUNT(days_to_next)       AS gap_count,
          ROUND(AVG(days_to_next), 1) AS avg_days_between,
          MIN(days_to_next)           AS min_gap,
          MAX(days_to_next)           AS max_gap
      FROM order_gaps
      WHERE days_to_next IS NOT NULL
      GROUP BY customer_id, name
      ORDER BY avg_days_between ASC
      LIMIT 10;

  - id: a01w-08
    level: 3
    type: "Window"
    title: "3개월 이동 평균 매출을 구하세요."
    title_en: "Find the three-month moving average of sales."
    body: |
      2023~2024년 월별 매출에 대해, 현재 월 포함 직전 3개월의 이동 평균을 계산합니다.
    body_en: |
      For monthly sales for 2023-2024, calculate the moving average of the three months preceding the current month.
    hint: |
      `AVG(revenue) OVER (ORDER BY year_month ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)`
      이 구문이 현재 행 포함 이전 2행(총 3행)의 평균을 계산합니다.
    hint_en: |
      `AVG(revenue) OVER (ORDER BY year_month ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)`
      This statement calculates the average of the 2 rows preceding the current row (3 rows in total).
    reference_sql: |
      WITH monthly AS (
          SELECT
              SUBSTR(ordered_at, 1, 7) AS year_month,
              ROUND(SUM(total_amount), 0) AS revenue
          FROM orders
          WHERE ordered_at >= '2023-01-01'
            AND ordered_at < '2025-01-01'
            AND status NOT IN ('cancelled', 'returned', 'return_requested')
          GROUP BY SUBSTR(ordered_at, 1, 7)
      )
      SELECT
          year_month,
          revenue,
          ROUND(AVG(revenue) OVER (
              ORDER BY year_month
              ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
          ), 0) AS moving_avg_3m,
          COUNT(*) OVER (
              ORDER BY year_month
              ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
          ) AS window_size
      FROM monthly
      ORDER BY year_month;

  - id: a01w-09
    level: 3
    type: "Window"
    title: "카테고리별로 가장 비싼 상품과 가장 저렴한 상품의 이름을 한 행에 표시하세요."
    title_en: "List the names of the most expensive and least expensive products in each category in one row."
    body: |
      `FIRST_VALUE`와 `LAST_VALUE`를 사용합니다.
    body_en: |
      Use `FIRST_VALUE` and `LAST_VALUE`.
    hint: |
      `FIRST_VALUE(name) OVER (PARTITION BY category_id ORDER BY price DESC)`는 가장 비싼 상품명입니다.
      `LAST_VALUE` 사용 시 반드시 `ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING`을 명시해야 전체 파티션을 봅니다.
    hint_en: |
      `FIRST_VALUE(name) OVER (PARTITION BY category_id ORDER BY price DESC)` is the most expensive product name.
      When using `LAST_VALUE`, `ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING` must be specified to view the entire partition.
    reference_sql: |
      WITH ranked AS (
          SELECT DISTINCT
              cat.name AS category,
              FIRST_VALUE(p.name) OVER (
                  PARTITION BY p.category_id
                  ORDER BY p.price DESC
                  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING
              ) AS most_expensive,
              FIRST_VALUE(p.price) OVER (
                  PARTITION BY p.category_id
                  ORDER BY p.price DESC
                  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING
              ) AS max_price,
              LAST_VALUE(p.name) OVER (
                  PARTITION BY p.category_id
                  ORDER BY p.price DESC
                  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING
              ) AS cheapest,
              LAST_VALUE(p.price) OVER (
                  PARTITION BY p.category_id
                  ORDER BY p.price DESC
                  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING
              ) AS min_price
          FROM products AS p
          INNER JOIN categories AS cat ON p.category_id = cat.id
          WHERE p.is_active = 1
      )
      SELECT DISTINCT
          category,
          most_expensive,
          max_price,
          cheapest,
          min_price
      FROM ranked
      ORDER BY category;

  - id: a01w-10
    level: 3
    type: "Window"
    title: "리뷰 평점 기준으로 상품을 5개 등급(NTILE)으로 나누고, 각 등급의 통계를 구하세요."
    title_en: "Divide products into 5 grades (NTILE) based on review ratings and obtain statistics for each grade."
    body: |
      리뷰가 3건 이상인 상품만 대상으로 합니다.
    body_en: |
      Only products with 3 or more reviews are eligible.
    hint: |
      먼저 상품별 평균 평점을 구하고(`HAVING COUNT(*) >= 3`),
      그 결과에 `NTILE(5) OVER (ORDER BY avg_rating)`로 등급을 나눈 뒤,
      등급별로 다시 집계합니다.
    hint_en: |
      First, find the average rating for each product (`HAVING COUNT(*) >= 3`),
      After dividing the result into `NTILE(5) OVER (ORDER BY avg_rating)`,
      We count again by grade.
    reference_sql: |
      WITH product_ratings AS (
          SELECT
              p.id,
              p.name,
              ROUND(AVG(r.rating), 2) AS avg_rating,
              COUNT(*)                AS review_count
          FROM reviews AS r
          INNER JOIN products AS p ON r.product_id = p.id
          GROUP BY p.id, p.name
          HAVING COUNT(*) >= 3
      ),
      tiered AS (
          SELECT
              *,
              NTILE(5) OVER (ORDER BY avg_rating) AS tier
          FROM product_ratings
      )
      SELECT
          tier,
          COUNT(*)                     AS product_count,
          ROUND(MIN(avg_rating), 2)    AS min_rating,
          ROUND(MAX(avg_rating), 2)    AS max_rating,
          ROUND(AVG(avg_rating), 2)    AS avg_of_avg,
          ROUND(AVG(review_count), 1)  AS avg_reviews
      FROM tiered
      GROUP BY tier
      ORDER BY tier;

  - id: a01w-11
    level: 4
    type: "Window"
    title: "고객 등급별로 주문 금액 순위를 매기고, 등급 내 상위 3명의 정보를 추출하세요."
    title_en: "Rank order amount by customer level and extract information from the top 3 people within the level."
    body: |
      각 등급(BRONZE, SILVER, GOLD, VIP)에서 총 주문 금액 기준 상위 3명을 보여줍니다.
    body_en: |
      Shows the top 3 players in each tier (BRONZE, SILVER, GOLD, VIP) by total order value.
    hint: |
      CTE에서 고객별 총 주문 금액을 집계한 뒤, `ROW_NUMBER() OVER (PARTITION BY grade ORDER BY total_spent DESC)`로
      등급별 순위를 매기고, 외부 쿼리에서 `WHERE rn <= 3`으로 필터링합니다.
    hint_en: |
      After tallying up the total order amount for each customer in CTE, enter `ROW_NUMBER() OVER (PARTITION BY grade ORDER BY total_spent DESC)`
      Rank by rating and filter by `WHERE rn <= 3` in the outer query.
    reference_sql: |
      WITH customer_totals AS (
          SELECT
              c.id,
              c.name,
              c.grade,
              COUNT(*)                    AS order_count,
              ROUND(SUM(o.total_amount), 0) AS total_spent
          FROM customers AS c
          INNER JOIN orders AS o ON c.id = o.customer_id
          WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
          GROUP BY c.id, c.name, c.grade
      ),
      ranked AS (
          SELECT
              *,
              ROW_NUMBER() OVER (
                  PARTITION BY grade
                  ORDER BY total_spent DESC
              ) AS rn
          FROM customer_totals
      )
      SELECT
          grade,
          rn   AS rank_in_grade,
          name AS customer_name,
          order_count,
          total_spent
      FROM ranked
      WHERE rn <= 3
      ORDER BY
          CASE grade
              WHEN 'VIP' THEN 1
              WHEN 'GOLD' THEN 2
              WHEN 'SILVER' THEN 3
              WHEN 'BRONZE' THEN 4
          END,
          rn;

  - id: a01w-12
    level: 4
    type: "Window"
    title: "상품별 월간 매출 추이와 함께, 해당 상품의 전체 평균 대비 비율을 표시하세요."
    title_en: "Display the monthly sales trend for each product and the ratio compared to the overall average for that product."
    body: |
      2024년 상위 5개 상품에 대해, 월별 매출과 해당 상품 전체 월 평균 매출 대비 비율(%)을 구합니다.
    body_en: |
      For the top five products in 2024, find the monthly sales and the ratio (%) of the average monthly sales for all products.
    hint: |
      1단계: 상품-월별 매출 집계. 2단계: 상위 5개 상품 선별(총 매출 기준).
      3단계: `AVG(monthly_revenue) OVER (PARTITION BY product_id)`로 상품별 전체 평균을 구하고,
      월별 매출을 평균으로 나누어 비율을 계산합니다.
    hint_en: |
      Step 1: Calculate product-monthly sales. Step 2: Select the top five products (based on total sales).
      Step 3: Find the overall average for each product with `AVG(monthly_revenue) OVER (PARTITION BY product_id)`,
      Calculate the ratio by dividing your monthly sales by the average.
    reference_sql: |
      WITH product_monthly AS (
          SELECT
              p.id       AS product_id,
              p.name     AS product_name,
              SUBSTR(o.ordered_at, 1, 7) AS year_month,
              ROUND(SUM(oi.quantity * oi.unit_price), 0) AS monthly_revenue
          FROM order_items AS oi
          INNER JOIN orders   AS o ON oi.order_id   = o.id
          INNER JOIN products AS p ON oi.product_id = p.id
          WHERE o.ordered_at LIKE '2024%'
            AND o.status NOT IN ('cancelled', 'returned', 'return_requested')
          GROUP BY p.id, p.name, SUBSTR(o.ordered_at, 1, 7)
      ),
      top5 AS (
          SELECT product_id
          FROM product_monthly
          GROUP BY product_id
          ORDER BY SUM(monthly_revenue) DESC
          LIMIT 5
      )
      SELECT
          pm.product_name,
          pm.year_month,
          pm.monthly_revenue,
          ROUND(AVG(pm.monthly_revenue) OVER (
              PARTITION BY pm.product_id
          ), 0) AS avg_monthly,
          ROUND(100.0 * pm.monthly_revenue
              / AVG(pm.monthly_revenue) OVER (PARTITION BY pm.product_id),
          1) AS pct_of_avg
      FROM product_monthly AS pm
      INNER JOIN top5 AS t ON pm.product_id = t.product_id
      ORDER BY pm.product_name, pm.year_month;

  - id: a01w-13
    level: 4
    type: "Window"
    title: "결제 수단별 월간 점유율 변화를 추적하세요."
    title_en: "Track monthly share changes by payment method."
    body: |
      2024년 월별로 각 결제 수단이 차지하는 비중(%)을 구하고, 전월 대비 점유율 변동(pp)을 계산합니다.
    body_en: |
      Calculate the share (%) of each payment method by month in 2024 and calculate the change in share (pp) compared to the previous month.
    hint: |
      월-결제수단별 금액을 구한 뒤, `SUM(amount) OVER (PARTITION BY year_month)`으로 월 전체 합계를 구합니다.
      `LAG(share_pct, 1) OVER (PARTITION BY method ORDER BY year_month)`로 전월 점유율을 가져옵니다.
    hint_en: |
      After finding the monthly amount by payment method, calculate the total monthly total with `SUM(amount) OVER (PARTITION BY year_month)`.
      Get the previous month's market share with `LAG(share_pct, 1) OVER (PARTITION BY method ORDER BY year_month)`.
    reference_sql: |
      WITH method_monthly AS (
          SELECT
              SUBSTR(paid_at, 1, 7) AS year_month,
              method,
              ROUND(SUM(amount), 0) AS method_amount
          FROM payments
          WHERE status = 'completed'
            AND paid_at LIKE '2024%'
          GROUP BY SUBSTR(paid_at, 1, 7), method
      ),
      with_share AS (
          SELECT
              year_month,
              method,
              method_amount,
              ROUND(100.0 * method_amount
                  / SUM(method_amount) OVER (PARTITION BY year_month),
              1) AS share_pct
          FROM method_monthly
      )
      SELECT
          year_month,
          method,
          method_amount,
          share_pct,
          LAG(share_pct, 1) OVER (
              PARTITION BY method
              ORDER BY year_month
          ) AS prev_share_pct,
          ROUND(share_pct - LAG(share_pct, 1) OVER (
              PARTITION BY method
              ORDER BY year_month
          ), 1) AS share_change_pp
      FROM with_share
      ORDER BY year_month, share_pct DESC;

  - id: a01w-14
    level: 4
    type: "Window"
    title: "고객별 주문 금액의 갭(Gap) 분석을 수행하세요."
    title_en: "Perform gap analysis of order amount for each customer."
    body: |
      각 고객의 주문을 금액 순으로 정렬했을 때, 이전 주문 대비 금액 차이가 가장 큰 "점프"를 찾습니다.
      점프 금액이 50만원 이상인 경우만 추출하세요.
    body_en: |
      각 고객의 주문을 금액 순으로 정렬했을 때, 이전 주문 대비 금액 차이가 가장 큰 "점프"를 찾습니다.
      Extract only if the jump amount is more than 500,000 won.
    hint: |
      `LAG(total_amount, 1) OVER (PARTITION BY customer_id ORDER BY total_amount)`로
      금액 순 이전 주문 금액을 가져옵니다. 차이를 구해 50만원 이상인 행만 필터링합니다.
    hint_en: |
      to `LAG(total_amount, 1) OVER (PARTITION BY customer_id ORDER BY total_amount)`
      Amount Net Get the amount of the previous order. Find the difference and filter only rows that are over 500,000 won.
    reference_sql: |
      WITH ordered AS (
          SELECT
              o.customer_id,
              c.name,
              o.order_number,
              o.total_amount,
              LAG(o.total_amount, 1) OVER (
                  PARTITION BY o.customer_id
                  ORDER BY o.total_amount
              ) AS prev_amount
          FROM orders AS o
          INNER JOIN customers AS c ON o.customer_id = c.id
          WHERE o.status NOT IN ('cancelled', 'returned', 'return_requested')
      )
      SELECT
          customer_id,
          name,
          order_number,
          prev_amount,
          total_amount,
          total_amount - prev_amount AS gap
      FROM ordered
      WHERE prev_amount IS NOT NULL
        AND (total_amount - prev_amount) >= 500000
      ORDER BY gap DESC
      LIMIT 20;

  - id: a01w-15
    level: 4
    type: "Window"
    title: "연도별(YoY) 매출 성장률을 윈도우 함수로 계산하고, 분기별 추세도 함께 표시하세요."
    title_en: "Calculate year-on-year (YoY) sales growth rate using a window function, and also display quarterly trends."
    body: |
      각 분기의 매출, 전년 동분기 매출, YoY 성장률을 구합니다.
    body_en: |
      Find sales for each quarter, sales for the same quarter last year, and YoY growth rate.
    hint: |
      분기는 `(CAST(SUBSTR(ordered_at,6,2) AS INTEGER) + 2) / 3`으로 계산합니다.
      `LAG(revenue, 4) OVER (ORDER BY year, quarter)`로 4분기 전(= 전년 동분기) 값을 가져옵니다.
    hint_en: |
      Branches are calculated as `(CAST(SUBSTR(ordered_at,6,2) AS INTEGER) + 2) / 3`.
      Get the value from 4 quarters ago (= same quarter of previous year) with `LAG(revenue, 4) OVER (ORDER BY year, quarter)`.
    reference_sql: |
      WITH quarterly AS (
          SELECT
              CAST(SUBSTR(ordered_at, 1, 4) AS INTEGER) AS year,
              (CAST(SUBSTR(ordered_at, 6, 2) AS INTEGER) + 2) / 3 AS quarter,
              ROUND(SUM(total_amount), 0) AS revenue,
              COUNT(*) AS order_count
          FROM orders
          WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
            AND ordered_at >= '2020-01-01'
          GROUP BY
              CAST(SUBSTR(ordered_at, 1, 4) AS INTEGER),
              (CAST(SUBSTR(ordered_at, 6, 2) AS INTEGER) + 2) / 3
      )
      SELECT
          year,
          quarter,
          revenue,
          order_count,
          LAG(revenue, 4) OVER (ORDER BY year, quarter) AS prev_year_revenue,
          CASE
              WHEN LAG(revenue, 4) OVER (ORDER BY year, quarter) IS NOT NULL
              THEN ROUND(100.0 * (revenue - LAG(revenue, 4) OVER (ORDER BY year, quarter))
                  / LAG(revenue, 4) OVER (ORDER BY year, quarter), 1)
          END AS yoy_growth_pct
      FROM quarterly
      ORDER BY year, quarter;
