  - id: i10d-23
    level: 3
    type: "SELECT"
    question: |
      다음 쿼리의 오류를 찾고 수정하세요. NOT IN + NULL 문제.
      ```sql
      SELECT c.name, c.email, c.grade FROM customers AS c
      WHERE c.grade = 'VIP' AND c.id NOT IN (
          SELECT customer_id FROM orders WHERE ordered_at >= DATE('now', '-6 months'));
      ```
    question_en: |
      Find and fix the error. NOT IN + NULL issue.
      ```sql
      SELECT c.name, c.email, c.grade FROM customers AS c
      WHERE c.grade = 'VIP' AND c.id NOT IN (
          SELECT customer_id FROM orders WHERE ordered_at >= DATE('now', '-6 months'));
      ```
    reference_sql:
      common: |
        SELECT c.name, c.email, c.grade
        FROM customers AS c
        WHERE c.grade = 'VIP'
          AND NOT EXISTS (
              SELECT 1 FROM orders AS o
              WHERE o.customer_id = c.id
                AND o.ordered_at >= DATE('now', '-6 months')
          );
    hints:
