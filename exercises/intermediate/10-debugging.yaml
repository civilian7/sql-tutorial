  - id: i10d-24
    level: 3
    type: "SELECT"
    question: |
      다음 쿼리의 오류를 찾고 수정하세요. 0으로 나누기 에러.
      ```sql
      SELECT s.company_name, COUNT(DISTINCT oi.id) AS total_sales, COUNT(DISTINCT ret.id) AS return_count,
             ROUND(100.0 * COUNT(DISTINCT ret.id) / COUNT(DISTINCT oi.id), 2) AS return_rate
      FROM suppliers AS s LEFT JOIN products AS p ON s.id = p.supplier_id
      LEFT JOIN order_items AS oi ON p.id = oi.product_id
      LEFT JOIN returns AS ret ON ret.order_id = oi.order_id
      GROUP BY s.id, s.company_name ORDER BY return_rate DESC;
      ```
    question_en: |
      Find and fix the error. Division by zero.
      ```sql
      SELECT s.company_name, COUNT(DISTINCT oi.id) AS total_sales, COUNT(DISTINCT ret.id) AS return_count,
             ROUND(100.0 * COUNT(DISTINCT ret.id) / COUNT(DISTINCT oi.id), 2) AS return_rate
      FROM suppliers AS s LEFT JOIN products AS p ON s.id = p.supplier_id
      LEFT JOIN order_items AS oi ON p.id = oi.product_id
      LEFT JOIN returns AS ret ON ret.order_id = oi.order_id
      GROUP BY s.id, s.company_name ORDER BY return_rate DESC;
      ```
    reference_sql:
      common: |
        SELECT s.company_name, COUNT(DISTINCT oi.id) AS total_sales, COUNT(DISTINCT ret.id) AS return_count,
               ROUND(100.0 * COUNT(DISTINCT ret.id) / NULLIF(COUNT(DISTINCT oi.id), 0), 2) AS return_rate
        FROM suppliers AS s LEFT JOIN products AS p ON s.id = p.supplier_id
        LEFT JOIN order_items AS oi ON p.id = oi.product_id
        LEFT JOIN returns AS ret ON ret.order_id = oi.order_id
        GROUP BY s.id, s.company_name ORDER BY return_rate DESC;
    hints:
      - ko: "판매 실적이 0인 공급업체에서 0으로 나누기 에러가 발생합니다. `NULLIF`로 분모가 0이면 NULL로 바꾸세요."
        en: "Suppliers with 0 sales cause division by zero. Use `NULLIF` to convert 0 denominator to NULL."
    max_score: 10
    tags: [NULLIF, division by zero]

  - id: i10d-25
    level: 3
    type: "SELECT"
    question: |
      다음 쿼리의 오류를 찾고 수정하세요. 다중 1:N JOIN으로 카디널리티 폭발, 주문 금액이 비정상적으로 큼.
      ```sql
      SELECT c.grade, COUNT(o.id) AS order_count, ROUND(AVG(o.total_amount), 0) AS avg_order_amount,
             ROUND(AVG(r.rating), 2) AS avg_rating, COUNT(r.id) AS review_count
      FROM customers AS c INNER JOIN orders AS o ON c.id = o.customer_id
      INNER JOIN order_items AS oi ON o.id = oi.order_id
      LEFT JOIN reviews AS r ON c.id = r.customer_id
      GROUP BY c.grade ORDER BY avg_order_amount DESC;
      ```
    question_en: |
      Find and fix the error. Multiple 1:N JOINs cause cardinality explosion, inflated order amounts.
      ```sql
      SELECT c.grade, COUNT(o.id) AS order_count, ROUND(AVG(o.total_amount), 0) AS avg_order_amount,
             ROUND(AVG(r.rating), 2) AS avg_rating, COUNT(r.id) AS review_count
      FROM customers AS c INNER JOIN orders AS o ON c.id = o.customer_id
      INNER JOIN order_items AS oi ON o.id = oi.order_id
      LEFT JOIN reviews AS r ON c.id = r.customer_id
      GROUP BY c.grade ORDER BY avg_order_amount DESC;
      ```
    reference_sql:
      common: |
        SELECT
            c.grade,
            COUNT(DISTINCT o.id) AS order_count,
            ROUND(SUM(o.total_amount) * 1.0 / NULLIF(COUNT(DISTINCT o.id), 0), 0) AS avg_order_amount,
            sub_r.avg_rating,
            sub_r.review_count
        FROM customers AS c
        INNER JOIN orders AS o ON c.id = o.customer_id
        LEFT JOIN (
            SELECT customer_id, ROUND(AVG(rating), 2) AS avg_rating, COUNT(*) AS review_count
            FROM reviews GROUP BY customer_id
        ) AS sub_r ON c.id = sub_r.customer_id
        GROUP BY c.grade, sub_r.avg_rating, sub_r.review_count
        ORDER BY avg_order_amount DESC;
    hints:
      - ko: "`order_items` JOIN으로 주문 행이 아이템 수만큼 복제되고, `reviews` JOIN으로 추가 카디널리티 폭발. 각 집계를 서브쿼리로 분리하세요."
        en: "order_items JOIN duplicates rows per item, reviews JOIN adds more explosion. Separate aggregations into subqueries."
    max_score: 10
    tags: [cardinality explosion, COUNT DISTINCT, FROM subquery, NULLIF]
