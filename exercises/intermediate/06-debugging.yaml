metadata:
  id: intermediate-06-debugging
  title: "SQL 디버깅"
  title_en: "SQL Debugging"
  difficulty: intermediate
  concepts: [cardinality explosion, NULL comparison, LEFT JOIN pitfall, GROUP BY, HAVING vs WHERE, DISTINCT, correlated subquery, date range, NULLIF, UNION]
  tables: [categories, customers, orders, order_items, products, reviews, returns, suppliers]
  prerequisites: [intermediate-05-joins, intermediate-07-subqueries]
  estimated_minutes: 35
  default_level: 2
  default_type: "SELECT"

problems:
  - id: i10-01
    level: 2
    type: "Subquery/CTE"
    question: |
      아래 쿼리는 2024년 상품별 매출을 구합니다. 그런데 실제보다 매출이 훨씬 크게 나옵니다. 왜일까요?

      ```sql
      SELECT
          p.name,
          SUM(oi.quantity * oi.unit_price) AS revenue,
          AVG(r.rating) AS avg_rating
      FROM products AS p
      INNER JOIN order_items AS oi ON p.id = oi.product_id
      INNER JOIN orders AS o ON oi.order_id = o.id
      INNER JOIN reviews AS r ON p.id = r.product_id
      WHERE o.ordered_at LIKE '2024%'
      GROUP BY p.id, p.name;
      ```
    question_en: |
      The query below calculates revenue by product for 2024. However, the revenue comes out much larger than expected. Why?

      ```sql
      SELECT
          p.name,
          SUM(oi.quantity * oi.unit_price) AS revenue,
          AVG(r.rating) AS avg_rating
      FROM products AS p
      INNER JOIN order_items AS oi ON p.id = oi.product_id
      INNER JOIN orders AS o ON oi.order_id = o.id
      INNER JOIN reviews AS r ON p.id = r.product_id
      WHERE o.ordered_at LIKE '2024%'
      GROUP BY p.id, p.name;
      ```
    reference_sql:
      common: |
        -- 수정: 리뷰를 서브쿼리로 분리
        SELECT
            p.name,
            SUM(oi.quantity * oi.unit_price) AS revenue,
            review.avg_rating
        FROM products AS p
        INNER JOIN order_items AS oi ON p.id = oi.product_id
        INNER JOIN orders AS o ON oi.order_id = o.id
        LEFT JOIN (
            SELECT product_id, ROUND(AVG(rating), 2) AS avg_rating
            FROM reviews GROUP BY product_id
        ) AS review ON p.id = review.product_id
        WHERE o.ordered_at LIKE '2024%'
        GROUP BY p.id, p.name, review.avg_rating;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "두 개의 1:N 관계를 동시에 JOIN하면 행이 곱해지는 상황(카디널리티 폭발)을 의심해보세요."
        en: "When two 1:N relationships are JOINed simultaneously, suspect a cardinality explosion where rows multiply."
    max_score: 10
    tags: [INNER JOIN, derived table, LEFT JOIN, products, order_items, reviews]

  - id: i10-02
    level: 1
    type: "SELECT"
    question: |
      아래 쿼리는 생년월일이 없는 고객을 찾으려 합니다. 결과가 0행입니다. 왜?

      ```sql
      SELECT name, email
      FROM customers
      WHERE birth_date = NULL;
      ```
    question_en: |
      The query below tries to find customers without a birth date. It returns 0 rows. Why?

      ```sql
      SELECT name, email
      FROM customers
      WHERE birth_date = NULL;
      ```
    reference_sql:
      common: |
        -- 수정: IS NULL 사용
        SELECT name, email
        FROM customers
        WHERE birth_date IS NULL;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "SQL에서 NULL과 `=` 비교는 항상 FALSE입니다. NULL 전용 비교 연산자를 사용하세요."
        en: "In SQL, comparing with NULL using `=` always returns FALSE. Use the NULL-specific comparison operator."
    max_score: 10
    tags: [WHERE, customers]

  - id: i10-03
    level: 2
    type: "JOIN/UNION"
    question: |
      리뷰가 없는 상품도 포함하려고 LEFT JOIN을 썼는데, 리뷰 없는 상품이 결과에 없습니다.

      ```sql
      SELECT p.name, p.price, r.rating
      FROM products AS p
      LEFT JOIN reviews AS r ON p.id = r.product_id
      WHERE r.rating >= 3;
      ```
    question_en: |
      LEFT JOIN was used to include products without reviews, but products without reviews are missing from the results.

      ```sql
      SELECT p.name, p.price, r.rating
      FROM products AS p
      LEFT JOIN reviews AS r ON p.id = r.product_id
      WHERE r.rating >= 3;
      ```
    reference_sql:
      common: |
        -- 수정: 조건을 ON 절로 이동
        SELECT p.name, p.price, r.rating
        FROM products AS p
        LEFT JOIN reviews AS r ON p.id = r.product_id AND r.rating >= 3;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`WHERE` 절에서 RIGHT 테이블의 칼럼을 필터링하면 NULL 행이 제거되어 LEFT JOIN이 INNER JOIN처럼 됩니다. 조건을 `ON` 절로 옮겨보세요."
        en: "Filtering on the RIGHT table's column in `WHERE` removes NULL rows, making a LEFT JOIN behave like an INNER JOIN. Try moving the condition to the `ON` clause."
    max_score: 10
    tags: [LEFT JOIN, products, reviews]

  - id: i10-04
    level: 1
    type: "Aggregate"
    question: |
      아래 쿼리는 카테고리별 상품 수를 구하려 합니다. 에러가 납니다.

      ```sql
      SELECT cat.name, COUNT(*) AS product_count
      FROM products AS p
      INNER JOIN categories AS cat ON p.category_id = cat.id;
      ```
    question_en: |
      The query below tries to count products per category. It throws an error.

      ```sql
      SELECT cat.name, COUNT(*) AS product_count
      FROM products AS p
      INNER JOIN categories AS cat ON p.category_id = cat.id;
      ```
    reference_sql:
      common: |
        -- 수정: GROUP BY 추가
        SELECT cat.name, COUNT(*) AS product_count
        FROM products AS p
        INNER JOIN categories AS cat ON p.category_id = cat.id
        GROUP BY cat.name;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "집계 함수(`COUNT`)를 쓰면서 비집계 칼럼(`cat.name`)이 있으면 반드시 필요한 절이 있습니다."
        en: "When using an aggregate function (`COUNT`) alongside a non-aggregate column (`cat.name`), a certain clause is required."
    max_score: 10
    tags: [GROUP BY, COUNT, INNER JOIN, products, categories]

  - id: i10-05
    level: 2
    type: "Aggregate"
    question: |
      가격이 10만원 이상인 상품이 5개 이상인 카테고리만 보려 합니다. 에러가 납니다.

      ```sql
      SELECT cat.name, COUNT(*) AS expensive_count
      FROM products AS p
      INNER JOIN categories AS cat ON p.category_id = cat.id
      HAVING p.price >= 100000 AND COUNT(*) >= 5
      GROUP BY cat.name;
      ```
    question_en: |
      The goal is to show only categories that have 5 or more products priced at 100,000 or above. It throws an error.

      ```sql
      SELECT cat.name, COUNT(*) AS expensive_count
      FROM products AS p
      INNER JOIN categories AS cat ON p.category_id = cat.id
      HAVING p.price >= 100000 AND COUNT(*) >= 5
      GROUP BY cat.name;
      ```
    reference_sql:
      common: |
        -- 수정
        SELECT cat.name, COUNT(*) AS expensive_count
        FROM products AS p
        INNER JOIN categories AS cat ON p.category_id = cat.id
        WHERE p.price >= 100000
        GROUP BY cat.name
        HAVING COUNT(*) >= 5;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "개별 행 필터(`p.price >= 100000`)는 `WHERE`, 그룹 필터(`COUNT(*) >= 5`)는 `HAVING`. 그리고 절의 순서도 확인하세요."
        en: "Row-level filters (`p.price >= 100000`) go in `WHERE`, group-level filters (`COUNT(*) >= 5`) go in `HAVING`. Also check the clause order."
    max_score: 10
    tags: [WHERE, GROUP BY, HAVING, COUNT, products, categories]

  - id: i10-06
    level: 2
    type: "Aggregate"
    question: |
      고객별 구매 카테고리 수를 구합니다. 수가 비정상적으로 큽니다.

      ```sql
      SELECT
          c.name,
          COUNT(p.category_id) AS category_count
      FROM customers AS c
      INNER JOIN orders AS o ON c.id = o.customer_id
      INNER JOIN order_items AS oi ON o.id = oi.order_id
      INNER JOIN products AS p ON oi.product_id = p.id
      GROUP BY c.id, c.name
      ORDER BY category_count DESC
      LIMIT 10;
      ```
    question_en: |
      Counting the number of categories each customer purchased from. The counts are abnormally large.

      ```sql
      SELECT
          c.name,
          COUNT(p.category_id) AS category_count
      FROM customers AS c
      INNER JOIN orders AS o ON c.id = o.customer_id
      INNER JOIN order_items AS oi ON o.id = oi.order_id
      INNER JOIN products AS p ON oi.product_id = p.id
      GROUP BY c.id, c.name
      ORDER BY category_count DESC
      LIMIT 10;
      ```
    reference_sql:
      common: |
        -- 수정: COUNT(DISTINCT ...)
        SELECT
            c.name,
            COUNT(DISTINCT p.category_id) AS category_count
        FROM customers AS c
        INNER JOIN orders AS o ON c.id = o.customer_id
        INNER JOIN order_items AS oi ON o.id = oi.order_id
        INNER JOIN products AS p ON oi.product_id = p.id
        GROUP BY c.id, c.name
        ORDER BY category_count DESC
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "같은 카테고리의 상품을 여러 번 사면 중복 카운트됩니다. `COUNT`에 중복 제거 키워드를 추가하세요."
        en: "Buying from the same category multiple times causes duplicate counts. Add a deduplication keyword to `COUNT`."
    max_score: 10
    tags: [COUNT DISTINCT, INNER JOIN, MULTI JOIN, customers, orders, order_items, products]

  - id: i10-07
    level: 2
    type: "Subquery/CTE"
    question: |
      평균보다 비싼 카테고리의 상품을 찾으려 합니다. 에러가 납니다.

      ```sql
      SELECT name, price
      FROM products
      WHERE price > (
          SELECT AVG(price) FROM products GROUP BY category_id
      );
      ```
    question_en: |
      Trying to find products more expensive than the category average. It throws an error.

      ```sql
      SELECT name, price
      FROM products
      WHERE price > (
          SELECT AVG(price) FROM products GROUP BY category_id
      );
      ```
    reference_sql:
      common: |
        -- 수정 방법 1: 전체 평균과 비교
        SELECT name, price
        FROM products
        WHERE price > (SELECT AVG(price) FROM products);

        -- 수정 방법 2: 자기 카테고리 평균과 비교 (상관 서브쿼리)
        SELECT p.name, p.price
        FROM products AS p
        WHERE p.price > (
            SELECT AVG(p2.price)
            FROM products AS p2
            WHERE p2.category_id = p.category_id
        );
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`>` 연산자는 단일 값만 비교할 수 있는데, 서브쿼리가 여러 행을 반환합니다. `GROUP BY`를 제거하거나 상관 서브쿼리로 바꿔보세요."
        en: "The `>` operator can only compare against a single value, but the subquery returns multiple rows. Remove the `GROUP BY` or convert to a correlated subquery."
    max_score: 10
    tags: [scalar subquery, correlated subquery, AVG, products]

  - id: i10-08
    level: 2
    type: "String/Date"
    question: |
      2024년 12월 주문을 구하려 합니다. 12월 31일 주문이 빠집니다.

      ```sql
      SELECT COUNT(*) AS december_orders
      FROM orders
      WHERE ordered_at BETWEEN '2024-12-01' AND '2024-12-31';
      ```
    question_en: |
      Trying to get December 2024 orders. Orders from December 31st are missing.

      ```sql
      SELECT COUNT(*) AS december_orders
      FROM orders
      WHERE ordered_at BETWEEN '2024-12-01' AND '2024-12-31';
      ```
    reference_sql:
      common: |
        -- 수정: 시간 끝까지 포함
        SELECT COUNT(*) AS december_orders
        FROM orders
        WHERE ordered_at BETWEEN '2024-12-01' AND '2024-12-31 23:59:59';

        -- 또는 LIKE 사용
        SELECT COUNT(*) AS december_orders
        FROM orders
        WHERE ordered_at LIKE '2024-12%';
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`ordered_at`에 시간 정보가 포함되어 있으면 `'2024-12-31'`은 `'2024-12-31 00:00:00'`으로 비교됩니다. 시간 끝까지 포함시키세요."
        en: "If `ordered_at` contains time information, `'2024-12-31'` is compared as `'2024-12-31 00:00:00'`. Make sure to include up to the end of the day."
    max_score: 10
    tags: [WHERE, date arithmetic, orders]

  - id: i10-09
    level: 2
    type: "Aggregate"
    question: |
      월별 매출 보고서인데 취소 주문이 매출에 포함되어 있습니다.

      ```sql
      SELECT
          SUBSTR(ordered_at, 1, 7) AS month,
          SUM(total_amount) AS revenue
      FROM orders
      GROUP BY SUBSTR(ordered_at, 1, 7)
      ORDER BY month;
      ```
    question_en: |
      A monthly revenue report includes cancelled orders in the revenue.

      ```sql
      SELECT
          SUBSTR(ordered_at, 1, 7) AS month,
          SUM(total_amount) AS revenue
      FROM orders
      GROUP BY SUBSTR(ordered_at, 1, 7)
      ORDER BY month;
      ```
    reference_sql:
      common: |
        -- 수정: 상태 필터 추가
        SELECT
            SUBSTR(ordered_at, 1, 7) AS month,
            SUM(total_amount) AS revenue
        FROM orders
        WHERE status NOT IN ('cancelled', 'returned', 'return_requested')
        GROUP BY SUBSTR(ordered_at, 1, 7)
        ORDER BY month;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE` 절에서 취소/반품 상태의 주문을 제외하는 조건이 빠져 있습니다."
        en: "The `WHERE` clause is missing a condition to exclude cancelled/returned order statuses."
    max_score: 10
    tags: [WHERE, GROUP BY, SUM, SUBSTR, orders]

  - id: i10-10
    level: 2
    type: "CASE/IF"
    question: |
      반품률을 계산합니다. 판매가 0인 공급업체에서 에러가 납니다.

      ```sql
      SELECT
          s.company_name,
          COUNT(DISTINCT ret.id) AS return_count,
          COUNT(DISTINCT oi.id) AS sale_count,
          100.0 * COUNT(DISTINCT ret.id) / COUNT(DISTINCT oi.id) AS return_rate
      FROM suppliers AS s
      LEFT JOIN products AS p ON s.id = p.supplier_id
      LEFT JOIN order_items AS oi ON p.id = oi.product_id
      LEFT JOIN returns AS ret ON ret.order_id = oi.order_id
      GROUP BY s.id, s.company_name;
      ```
    question_en: |
      Calculating the return rate. An error occurs for suppliers with zero sales.

      ```sql
      SELECT
          s.company_name,
          COUNT(DISTINCT ret.id) AS return_count,
          COUNT(DISTINCT oi.id) AS sale_count,
          100.0 * COUNT(DISTINCT ret.id) / COUNT(DISTINCT oi.id) AS return_rate
      FROM suppliers AS s
      LEFT JOIN products AS p ON s.id = p.supplier_id
      LEFT JOIN order_items AS oi ON p.id = oi.product_id
      LEFT JOIN returns AS ret ON ret.order_id = oi.order_id
      GROUP BY s.id, s.company_name;
      ```
    reference_sql:
      common: |
        -- 수정: NULLIF로 0 나누기 방지
        SELECT
            s.company_name,
            COUNT(DISTINCT ret.id) AS return_count,
            COUNT(DISTINCT oi.id) AS sale_count,
            ROUND(100.0 * COUNT(DISTINCT ret.id)
                / NULLIF(COUNT(DISTINCT oi.id), 0), 2) AS return_rate
        FROM suppliers AS s
        LEFT JOIN products AS p ON s.id = p.supplier_id
        LEFT JOIN order_items AS oi ON p.id = oi.product_id
        LEFT JOIN returns AS ret ON ret.order_id = oi.order_id
        GROUP BY s.id, s.company_name;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "분모가 0이 될 수 있는 나눗셈입니다. `NULLIF(값, 0)`으로 0을 NULL로 바꾸면 에러 대신 NULL이 됩니다."
        en: "The denominator can be zero. Use `NULLIF(value, 0)` to convert 0 to NULL, which returns NULL instead of an error."
    max_score: 10
    tags: [NULLIF, LEFT JOIN, COUNT DISTINCT, suppliers, products, order_items, returns]

  - id: i10-11
    level: 2
    type: "SELECT"
    question: |
      가격대별 상품 수를 구한 후 필터링하려 합니다. 에러가 납니다.

      ```sql
      SELECT
          CASE WHEN price < 100000 THEN '저가' ELSE '고가' END AS tier,
          COUNT(*) AS cnt
      FROM products
      WHERE tier = '저가'
      GROUP BY tier;
      ```
    question_en: |
      Trying to count products by price tier and then filter. It throws an error.

      ```sql
      SELECT
          CASE WHEN price < 100000 THEN '저가' ELSE '고가' END AS tier,
          COUNT(*) AS cnt
      FROM products
      WHERE tier = '저가'
      GROUP BY tier;
      ```
    reference_sql:
      common: |
        -- 수정: 원래 표현식을 WHERE에 사용
        SELECT
            CASE WHEN price < 100000 THEN '저가' ELSE '고가' END AS tier,
            COUNT(*) AS cnt
        FROM products
        WHERE price < 100000
        GROUP BY tier;

        -- 또는 HAVING 사용 (그룹 필터)
        SELECT
            CASE WHEN price < 100000 THEN '저가' ELSE '고가' END AS tier,
            COUNT(*) AS cnt
        FROM products
        GROUP BY tier
        HAVING tier = '저가';
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "SQL 실행 순서는 FROM -> WHERE -> GROUP BY -> SELECT. `WHERE`에서는 `SELECT`의 별칭을 참조할 수 없습니다."
        en: "SQL execution order is FROM -> WHERE -> GROUP BY -> SELECT. `WHERE` cannot reference aliases from `SELECT`."
    max_score: 10
    tags: [WHERE, CASE, GROUP BY, products]

  - id: i10-12
    level: 2
    type: "JOIN/UNION"
    question: |
      주문 이벤트와 문의 이벤트를 합치려 합니다. 에러가 납니다.

      ```sql
      SELECT order_number, total_amount, ordered_at FROM orders
      UNION ALL
      SELECT title, category, created_at FROM complaints;
      ```
    question_en: |
      Trying to combine order events and complaint events. It throws an error.

      ```sql
      SELECT order_number, total_amount, ordered_at FROM orders
      UNION ALL
      SELECT title, category, created_at FROM complaints;
      ```
    reference_sql:
      common: |
        -- 수정: 동일 구조로 맞추기
        SELECT '주문' AS type, order_number AS reference, ordered_at AS event_date
        FROM orders
        UNION ALL
        SELECT '문의' AS type, title AS reference, created_at AS event_date
        FROM complaints
        ORDER BY event_date DESC
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`UNION`의 각 SELECT는 칼럼 수와 타입이 호환되어야 합니다. 의미가 다른 칼럼을 통일된 구조로 맞춰보세요."
        en: "Each SELECT in a `UNION` must have the same number of columns with compatible types. Align the columns to a unified structure with matching semantics."
    max_score: 10
    tags: [UNION, orders, complaints]
