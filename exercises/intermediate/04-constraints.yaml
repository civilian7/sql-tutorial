metadata:
  id: intermediate-04-constraints
  title: "제약조건 체험"
  title_en: "Exploring Constraints"
  difficulty: intermediate
  concepts: [PRIMARY KEY, UNIQUE, FOREIGN KEY, CHECK, NOT NULL, ON CONFLICT, UPSERT]
  prerequisites: [intermediate-05-joins]
  estimated_minutes: 25
  default_level: 2
  default_type: "SELECT"

problems:
  - id: i08-01
    level: 2
    type: "SELECT"
    question: |
      이미 존재하는 id로 상품을 삽입하면 어떻게 될까요?
    question_en: |
      What happens if you insert a product with an id that already exists?
    reference_sql:
      common: |
        -- PRIMARY KEY 중복 → 에러 발생
        INSERT INTO products (id, category_id, supplier_id, name, sku, brand, price, cost_price, stock_qty, is_active, created_at, updated_at)
        VALUES (1, 1, 1, '중복 테스트', 'DUP-001', 'Test', 100, 50, 10, 1, '2025-01-01', '2025-01-01');
    supported_db: [sqlite]
    validation:
      type: error_expected
      ordered: false
    hints:
      - ko: "이미 존재하는 `id` 값으로 `INSERT`하면 PRIMARY KEY의 고유성 제약이 위반됩니다."
        en: "Inserting with an existing `id` value violates the PRIMARY KEY uniqueness constraint."
    max_score: 10
    tags: [INSERT, products]

  - id: i08-02
    level: 2
    type: "SELECT"
    question: |
      이미 등록된 이메일로 고객을 만들면?
    question_en: |
      What happens if you create a customer with an email that's already registered?
    reference_sql:
      common: |
        -- 해당 이메일을 복사하여 삽입 시도
        INSERT INTO customers (email, password_hash, name, phone, grade, point_balance, is_active, created_at, updated_at)
        VALUES ('user1@testmail.kr', 'hash123', '테스트', '020-0000-0000', 'BRONZE', 0, 1, '2025-01-01', '2025-01-01');
    supported_db: [sqlite]
    validation:
      type: error_expected
      ordered: false
    hints:
      - ko: "`UNIQUE` 제약이 걸린 컬럼에 이미 존재하는 값을 넣으면 중복 에러가 발생합니다."
        en: "Inserting an already-existing value into a column with a `UNIQUE` constraint causes a duplicate error."
    max_score: 10
    tags: [INSERT, customers]

  - id: i08-03
    level: 2
    type: "SELECT"
    question: |
      존재하지 않는 카테고리에 상품을 넣으면?
    question_en: |
      What happens if you insert a product into a non-existent category?
    reference_sql:
      common: |
        -- 존재하지 않는 category_id 사용
        INSERT INTO products (category_id, supplier_id, name, sku, brand, price, cost_price, stock_qty, is_active, created_at, updated_at)
        VALUES (99999, 1, 'FK 테스트', 'FK-001', 'Test', 100, 50, 10, 1, '2025-01-01', '2025-01-01');
    supported_db: [sqlite]
    validation:
      type: error_expected
      ordered: false
    hints:
      - ko: "`FOREIGN KEY`는 부모 테이블에 존재하는 값만 허용합니다. SQLite에서는 `PRAGMA foreign_keys = ON` 필요."
        en: "A `FOREIGN KEY` only allows values that exist in the parent table. In SQLite, `PRAGMA foreign_keys = ON` is required."
    max_score: 10
    tags: [INSERT, products]

  - id: i08-04
    level: 2
    type: "SELECT"
    question: |
      가격을 음수로 설정하면?
    question_en: |
      What happens if you set the price to a negative value?
    reference_sql:
      common: |
        -- price >= 0 CHECK 위반
        INSERT INTO products (category_id, supplier_id, name, sku, brand, price, cost_price, stock_qty, is_active, created_at, updated_at)
        VALUES (2, 1, '음수 가격', 'NEG-001', 'Test', -500, 50, 10, 1, '2025-01-01', '2025-01-01');
    supported_db: [sqlite]
    validation:
      type: error_expected
      ordered: false
    hints:
      - ko: "`CHECK(price >= 0)` 제약이 정의되어 있으면, 음수 값 삽입 시 거부됩니다."
        en: "If a `CHECK(price >= 0)` constraint is defined, inserting a negative value will be rejected."
    max_score: 10
    tags: [INSERT, products]

  - id: i08-05
    level: 2
    type: "SELECT"
    question: |
      고객 등급을 허용되지 않은 값으로 설정하면?
    question_en: |
      What happens if you set a customer grade to a value that's not allowed?
    reference_sql:
      common: |
        -- grade IN ('BRONZE', 'SILVER', 'GOLD', 'VIP') CHECK 위반
        INSERT INTO customers (email, password_hash, name, phone, grade, point_balance, is_active, created_at, updated_at)
        VALUES ('check-test@testmail.kr', 'hash', '등급테스트', '020-0000-0001', 'DIAMOND', 0, 1, '2025-01-01', '2025-01-01');
    supported_db: [sqlite]
    validation:
      type: error_expected
      ordered: false
    hints:
      - ko: "`CHECK(grade IN ('BRONZE','SILVER','GOLD','VIP'))` 같은 허용 목록 제약은 목록에 없는 값을 거부합니다."
        en: "An allowlist constraint like `CHECK(grade IN ('BRONZE','SILVER','GOLD','VIP'))` rejects values not in the list."
    max_score: 10
    tags: [INSERT, customers]

  - id: i08-06
    level: 2
    type: "SELECT"
    question: |
      필수 컬럼을 비우면?
    question_en: |
      What happens if you leave a required column empty?
    reference_sql:
      common: |
        -- name은 NOT NULL
        INSERT INTO products (category_id, supplier_id, name, sku, brand, price, cost_price, stock_qty, is_active, created_at, updated_at)
        VALUES (2, 1, NULL, 'NULL-001', 'Test', 100, 50, 10, 1, '2025-01-01', '2025-01-01');
    supported_db: [sqlite]
    validation:
      type: error_expected
      ordered: false
    hints:
      - ko: "`NOT NULL` 제약이 있는 컬럼에 `NULL`을 넣으면 에러가 발생합니다."
        en: "Inserting `NULL` into a column with a `NOT NULL` constraint causes an error."
    max_score: 10
    tags: [INSERT, products]

  - id: i08-07
    level: 2
    type: "SELECT"
    question: |
      같은 고객이 같은 상품을 위시리스트에 두 번 추가하면?
    question_en: |
      What happens if the same customer adds the same product to their wishlist twice?
    reference_sql:
      common: |
        -- (customer_id, product_id) 복합 UNIQUE 위반
        -- 위에서 확인한 값으로 교체하세요
        INSERT INTO wishlists (customer_id, product_id, created_at)
        VALUES (1, 1, '2025-01-01');

        -- 같은 조합을 다시 삽입
        INSERT INTO wishlists (customer_id, product_id, created_at)
        VALUES (1, 1, '2025-01-02');
    supported_db: [sqlite]
    validation:
      type: error_expected
      ordered: false
    hints:
      - ko: "`(customer_id, product_id)` 두 컬럼의 조합이 `UNIQUE`면, 같은 조합을 두 번째 삽입할 때 에러가 납니다."
        en: "If the combination of `(customer_id, product_id)` is `UNIQUE`, inserting the same combination a second time causes an error."
    max_score: 10
    tags: [INSERT, wishlists]

  - id: i08-08
    level: 2
    type: "SELECT"
    question: |
      리뷰 평점을 0점이나 6점으로 주면?
    question_en: |
      What happens if you give a review a rating of 0 or 6?
    reference_sql:
      common: |
        -- rating BETWEEN 1 AND 5 CHECK 위반
        INSERT INTO reviews (product_id, customer_id, order_id, rating, content, is_verified, created_at, updated_at)
        VALUES (1, 1, 1, 0, '별점 0점 테스트', 1, '2025-01-01', '2025-01-01');
    supported_db: [sqlite]
    validation:
      type: error_expected
      ordered: false
    hints:
      - ko: "`CHECK(rating BETWEEN 1 AND 5)` 제약은 범위를 벗어나는 값을 거부합니다."
        en: "A `CHECK(rating BETWEEN 1 AND 5)` constraint rejects values outside the range."
    max_score: 10
    tags: [INSERT, reviews]

  - id: i08-09
    level: 2
    type: "SELECT"
    question: |
      데이터베이스에 정의된 모든 제약조건을 확인하세요.
    question_en: |
      Check all constraints defined in the database.
    reference_sql:
      common: |
        -- CHECK 제약조건이 포함된 테이블 DDL 확인
        SELECT name, sql FROM sqlite_master
        WHERE type = 'table'
          AND sql LIKE '%CHECK%'
        ORDER BY name;
    supported_db: [sqlite]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`sqlite_master` 테이블에서 `type = 'table'`인 DDL을 조회하면 CHECK/NOT NULL 등을 볼 수 있고, `type = 'index'`에서 UNIQUE 인덱스를 확인."
        en: "Query the `sqlite_master` table with `type = 'table'` to see DDL with CHECK/NOT NULL constraints, and `type = 'index'` for UNIQUE indexes."
    max_score: 10
    tags: [SELECT, WHERE, LIKE, sqlite_master]

  - id: i08-10
    level: 2
    type: "SELECT"
    question: |
      중복 발생 시 에러 대신 업데이트하는 UPSERT를 실습하세요.
    question_en: |
      Practice UPSERT -- updating instead of throwing an error when a duplicate occurs.
    reference_sql:
      common: |
        -- 위시리스트: 이미 있으면 무시
        INSERT OR IGNORE INTO wishlists (customer_id, product_id, created_at)
        VALUES (1, 1, '2025-06-01');

        -- 상품: 이미 있으면 가격 업데이트
        INSERT INTO products (id, category_id, supplier_id, name, sku, brand, price, cost_price, stock_qty, is_active, created_at, updated_at)
        VALUES (1, 2, 1, '업데이트 테스트', 'SKU-0001', 'Test', 999999, 50, 10, 1, '2025-01-01', '2025-01-01')
        ON CONFLICT(id) DO UPDATE SET
            price = excluded.price,
            updated_at = excluded.updated_at;

        -- 변경 확인
        SELECT id, name, price FROM products WHERE id = 1;
    supported_db: [sqlite]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`INSERT OR IGNORE`는 중복 시 무시, `INSERT ... ON CONFLICT(id) DO UPDATE SET ...`는 중복 시 기존 행을 업데이트."
        en: "`INSERT OR IGNORE` silently skips duplicates, while `INSERT ... ON CONFLICT(id) DO UPDATE SET ...` updates the existing row on conflict."
    max_score: 10
    tags: [INSERT, UPDATE, products, wishlists]
