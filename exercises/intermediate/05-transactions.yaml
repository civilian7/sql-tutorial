metadata:
  id: intermediate-05-transactions
  title: "트랜잭션"
  title_en: "Transactions"
  difficulty: intermediate
  concepts: [BEGIN, COMMIT, ROLLBACK, SAVEPOINT, ACID, atomicity, bulk insert]
  tables: [customers, orders, payments, products, inventory_transactions]
  prerequisites: [intermediate-08-constraints]
  estimated_minutes: 25
  default_level: 2
  default_type: "SELECT"

problems:
  - id: i09-01
    level: 2
    type: "SELECT"
    question: |
      주문과 결제를 하나의 트랜잭션으로 묶으세요. 둘 다 성공해야 반영됩니다.
    question_en: |
      Wrap an order and its payment in a single transaction. Both must succeed for changes to be applied.
    reference_sql:
      common: |
        BEGIN TRANSACTION;

        INSERT INTO orders (order_number, customer_id, status, total_amount, shipping_fee, ordered_at, created_at, updated_at)
        VALUES ('ORD-TEST-00001', 1, 'pending', 150000, 0, '2025-12-01', '2025-12-01', '2025-12-01');

        INSERT INTO payments (order_id, method, amount, status, created_at)
        VALUES (last_insert_rowid(), 'card', 150000, 'pending', '2025-12-01');

        COMMIT;

        -- 확인
        SELECT * FROM orders WHERE order_number = 'ORD-TEST-00001';
    supported_db: [sqlite]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`BEGIN TRANSACTION` -> INSERT들 -> `COMMIT`으로 묶으면 전부 한꺼번에 반영됩니다. `last_insert_rowid()`로 방금 삽입한 id 참조."
        en: "Wrap with `BEGIN TRANSACTION` -> INSERTs -> `COMMIT` to apply everything at once. Use `last_insert_rowid()` to reference the just-inserted id."
    max_score: 10
    tags: [INSERT, orders, payments]

  - id: i09-02
    level: 2
    type: "SELECT"
    question: |
      실수로 모든 VIP 고객의 적립금을 0으로 만들었다면? ROLLBACK으로 복구합니다.
    question_en: |
      What if you accidentally set all VIP customers' points to 0? Use ROLLBACK to recover.
    reference_sql:
      common: |
        -- VIP 고객 적립금 현재 상태 확인
        SELECT COUNT(*), SUM(point_balance) FROM customers WHERE grade = 'VIP';

        BEGIN TRANSACTION;

        -- 실수! 전체 VIP 적립금을 0으로
        UPDATE customers SET point_balance = 0 WHERE grade = 'VIP';

        -- 피해 확인
        SELECT COUNT(*), SUM(point_balance) FROM customers WHERE grade = 'VIP';

        -- 되돌리기!
        ROLLBACK;

        -- 복구 확인
        SELECT COUNT(*), SUM(point_balance) FROM customers WHERE grade = 'VIP';
    supported_db: [sqlite]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`BEGIN` 후 UPDATE를 실행하고 결과를 확인. 잘못되었으면 `ROLLBACK`으로 `BEGIN` 이후 모든 변경을 취소."
        en: "After `BEGIN`, execute the UPDATE and check the result. If it's wrong, use `ROLLBACK` to undo all changes since `BEGIN`."
    max_score: 10
    tags: [UPDATE, customers]

  - id: i09-03
    level: 2
    type: "SELECT"
    question: |
      주문 삽입은 성공했지만 결제 삽입이 실패하면? 트랜잭션으로 원자성을 보장합니다.
    question_en: |
      What if the order insert succeeds but the payment insert fails? Transactions guarantee atomicity.
    reference_sql:
      common: |
        BEGIN TRANSACTION;

        INSERT INTO orders (order_number, customer_id, status, total_amount, shipping_fee, ordered_at, created_at, updated_at)
        VALUES ('ORD-TEST-00002', 1, 'pending', 200000, 0, '2025-12-01', '2025-12-01', '2025-12-01');

        -- 의도적으로 잘못된 데이터 삽입 (order_id에 NULL)
        INSERT INTO payments (order_id, method, amount, status, created_at)
        VALUES (NULL, 'card', 200000, 'pending', '2025-12-01');

        -- 에러 발생 시 수동으로 ROLLBACK
        ROLLBACK;

        -- 주문도 삽입되지 않았음을 확인
        SELECT * FROM orders WHERE order_number = 'ORD-TEST-00002';
    supported_db: [sqlite]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "트랜잭션 안에서 하나라도 실패하면 `ROLLBACK`하여 \"반쪽짜리 데이터\"를 방지합니다."
        en: "If any statement within a transaction fails, `ROLLBACK` to prevent \"half-committed\" data."
    max_score: 10
    tags: [INSERT, orders, payments]

  - id: i09-04
    level: 3
    type: "SELECT"
    question: |
      긴 트랜잭션에서 일부만 되돌리고 싶을 때 SAVEPOINT를 사용합니다.
    question_en: |
      Use SAVEPOINT when you want to undo only part of a long transaction.
    reference_sql:
      common: |
        BEGIN TRANSACTION;

        -- 1단계: 고객 등급 변경
        UPDATE customers SET grade = 'GOLD' WHERE id = 1;
        SAVEPOINT after_grade;

        -- 2단계: 적립금 변경 (실수!)
        UPDATE customers SET point_balance = -9999 WHERE id = 1;

        -- 2단계만 되돌리기
        ROLLBACK TO after_grade;

        -- 1단계(등급 변경)는 유지됨을 확인
        SELECT id, name, grade, point_balance FROM customers WHERE id = 1;

        -- 최종 반영 또는 전체 취소
        ROLLBACK;  -- 전체 취소
    supported_db: [sqlite]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`SAVEPOINT 이름`으로 체크포인트 생성, `ROLLBACK TO 이름`으로 그 지점까지만 되돌리기. 이전 변경은 유지."
        en: "Create a checkpoint with `SAVEPOINT name`, then roll back to that point with `ROLLBACK TO name`. Earlier changes are preserved."
    max_score: 10
    tags: [UPDATE, customers]

  - id: i09-05
    level: 2
    type: "SELECT"
    question: |
      10,000건을 INSERT할 때 트랜잭션 유무에 따른 차이를 이해합니다.
    question_en: |
      Understand the difference when inserting 10,000 records with and without a transaction.
    reference_sql:
      common: |
        -- 트랜잭션 없이: 각 INSERT마다 디스크에 쓰기 (느림)
        INSERT INTO inventory_transactions (product_id, type, quantity, created_at) VALUES (1, 'inbound', 10, '2025-12-01');
        INSERT INTO inventory_transactions (product_id, type, quantity, created_at) VALUES (2, 'inbound', 20, '2025-12-01');
        -- ... 10,000번 반복 → 각각 디스크 I/O

        -- 트랜잭션으로 묶기: 마지막 COMMIT 한 번만 디스크에 쓰기 (빠름)
        BEGIN TRANSACTION;
        INSERT INTO inventory_transactions (product_id, type, quantity, created_at) VALUES (1, 'inbound', 10, '2025-12-01');
        INSERT INTO inventory_transactions (product_id, type, quantity, created_at) VALUES (2, 'inbound', 20, '2025-12-01');
        -- ... 10,000번 반복 → 메모리에만 기록
        COMMIT;  -- 한 번에 디스크에 쓰기
    supported_db: [sqlite]
    validation:
      type: explanation
      ordered: false
    hints:
      - ko: "트랜잭션 없이는 매 INSERT마다 디스크 쓰기가 발생하지만, `BEGIN`~`COMMIT`으로 묶으면 한 번만 쓰기."
        en: "Without a transaction, each INSERT triggers a disk write. Wrapping with `BEGIN`~`COMMIT` writes to disk only once."
    max_score: 10
    tags: [INSERT, inventory_transactions]

  - id: i09-06
    level: 2
    type: "SELECT"
    question: |
      현재 데이터베이스의 ACID 설정을 확인하세요.
    question_en: |
      Check the current database's ACID settings.
    reference_sql:
      common: |
        -- SQLite 저널 모드 확인 (WAL이면 동시 읽기 가능)
        PRAGMA journal_mode;

        -- 자동 커밋 모드 확인
        PRAGMA auto_vacuum;

        -- 외래 키 강제 여부
        PRAGMA foreign_keys;
    supported_db: [sqlite]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`PRAGMA journal_mode`, `PRAGMA foreign_keys` 등으로 SQLite의 트랜잭션 관련 설정을 조회."
        en: "Use `PRAGMA journal_mode`, `PRAGMA foreign_keys`, etc. to query SQLite's transaction-related settings."
    max_score: 10
    tags: [SELECT, sqlite_master]

  - id: i09-07
    level: 3
    type: "SELECT"
    question: |
      주문 시 재고를 차감하는 트랜잭션을 작성하세요. 재고가 부족하면 ROLLBACK합니다.
    question_en: |
      Write a transaction that deducts inventory when an order is placed. ROLLBACK if stock is insufficient.
    reference_sql:
      common: |
        -- 현재 재고 확인
        SELECT id, name, stock_qty FROM products WHERE id = 1;

        BEGIN TRANSACTION;

        -- 재고 차감
        UPDATE products
        SET stock_qty = stock_qty - 3,
            updated_at = '2025-12-01'
        WHERE id = 1
          AND stock_qty >= 3;  -- 재고 부족 방지

        -- 변경된 행이 0이면 재고 부족 → ROLLBACK
        -- (SQLite에서는 changes() 함수로 확인)
        SELECT CASE
            WHEN changes() = 0 THEN '재고 부족! ROLLBACK 필요'
            ELSE '재고 차감 성공'
        END AS result;

        -- 성공 시 COMMIT, 실패 시 ROLLBACK
        COMMIT;

        -- 결과 확인
        SELECT id, name, stock_qty FROM products WHERE id = 1;
    supported_db: [sqlite]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`UPDATE ... SET stock_qty = stock_qty - N WHERE stock_qty >= N`으로 재고 부족 시 변경 0행. `changes()` 함수로 확인."
        en: "Use `UPDATE ... SET stock_qty = stock_qty - N WHERE stock_qty >= N` to prevent insufficient stock (0 rows affected). Check with the `changes()` function."
    max_score: 10
    tags: [UPDATE, SELECT, CASE, products]
