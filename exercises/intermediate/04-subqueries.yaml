metadata:
  id: intermediate-04-subqueries
  title: "서브쿼리 완전 정복"
  title_en: "Mastering Subqueries"
  difficulty: intermediate
  concepts: [scalar subquery, IN, NOT IN, EXISTS, NOT EXISTS, FROM clause subquery, correlated subquery]
  tables: [products, customers, orders, order_items, reviews, wishlists, categories, payments]
  prerequisites: [intermediate-01-joins]
  estimated_minutes: 40
  default_level: 2
  default_type: "SELECT"

problems:
  - id: i04s-01
    level: 1
    type: "SELECT"
    question: |
      전체 평균 가격보다 비싼 상품의 이름과 가격을 조회하세요. 가격 내림차순, 상위 10개.
    question_en: |
      Find products whose price is higher than the overall average price. Sort by price descending, top 10.
    reference_sql:
      common: |
        SELECT name, price
        FROM products
        WHERE price > (SELECT AVG(price) FROM products)
        ORDER BY price DESC
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE price > (SELECT AVG(price) FROM products)` 형태의 스칼라 서브쿼리를 사용합니다."
        en: "Use a scalar subquery in the form `WHERE price > (SELECT AVG(price) FROM products)`."
    max_score: 10
    tags: [scalar subquery, AVG, products]

  - id: i04s-02
    level: 1
    type: "SELECT"
    question: |
      가장 비싼 상품의 이름, 가격, 카테고리 ID를 조회하세요.
    question_en: |
      Find the name, price, and category ID of the most expensive product.
    reference_sql:
      common: |
        SELECT name, price, category_id
        FROM products
        WHERE price = (SELECT MAX(price) FROM products);
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`WHERE price = (SELECT MAX(price) FROM products)` 형태로 최대값을 서브쿼리로 구합니다."
        en: "Use the form `WHERE price = (SELECT MAX(price) FROM products)` to get the maximum value via subquery."
    max_score: 10
    tags: [scalar subquery, MAX, products]

  - id: i04s-03
    level: 1
    type: "SELECT"
    question: |
      주문을 한 번이라도 한 고객의 이름과 이메일을 조회하세요. 이름순 정렬, 상위 15개.
    question_en: |
      Find the name and email of customers who have placed at least one order. Sort by name, top 15.
    reference_sql:
      common: |
        SELECT name, email
        FROM customers
        WHERE id IN (SELECT customer_id FROM orders)
        ORDER BY name
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE id IN (SELECT customer_id FROM orders)` — 서브쿼리가 주문이 존재하는 고객 ID 목록을 반환합니다."
        en: "`WHERE id IN (SELECT customer_id FROM orders)` — the subquery returns the list of customer IDs that have orders."
    max_score: 10
    tags: [IN subquery, customers, orders]

  - id: i04s-04
    level: 1
    type: "SELECT"
    question: |
      리뷰를 한 번도 작성하지 않은 고객의 이름과 등급을 조회하세요. 등급 내림차순, 이름순, 상위 15개.
    question_en: |
      Find the name and grade of customers who have never written a review. Sort by grade descending, then by name, top 15.
    reference_sql:
      common: |
        SELECT name, grade
        FROM customers
        WHERE id NOT IN (SELECT customer_id FROM reviews)
        ORDER BY
            CASE grade
                WHEN 'VIP' THEN 1
                WHEN 'GOLD' THEN 2
                WHEN 'SILVER' THEN 3
                ELSE 4
            END,
            name
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE id NOT IN (SELECT customer_id FROM reviews)` — reviews 테이블에 없는 고객을 찾습니다."
        en: "`WHERE id NOT IN (SELECT customer_id FROM reviews)` — finds customers not in the reviews table."
    max_score: 10
    tags: [NOT IN subquery, CASE, customers, reviews]

  - id: i04s-05
    level: 1
    type: "SELECT"
    question: |
      위시리스트에 담긴 적이 있는 상품의 이름과 가격을 조회하세요. 가격 내림차순, 상위 10개.
    question_en: |
      Find products that have been added to a wishlist at least once, showing name and price. Sort by price descending, top 10.
    reference_sql:
      common: |
        SELECT name, price
        FROM products
        WHERE id IN (SELECT product_id FROM wishlists)
        ORDER BY price DESC
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE id IN (SELECT product_id FROM wishlists)` — 위시리스트에 한 번이라도 등록된 상품 ID를 구합니다."
        en: "`WHERE id IN (SELECT product_id FROM wishlists)` — gets product IDs that have been wishlisted at least once."
    max_score: 10
    tags: [IN subquery, products, wishlists]

  - id: i04s-06
    level: 1
    type: "SELECT"
    question: |
      한 번도 주문되지 않은 상품의 이름과 재고를 조회하세요.
    question_en: |
      Find products that have never been ordered, showing name and stock quantity.
    reference_sql:
      common: |
        SELECT name, stock_qty
        FROM products
        WHERE id NOT IN (SELECT product_id FROM order_items)
        ORDER BY stock_qty DESC;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE id NOT IN (SELECT product_id FROM order_items)` — 주문 상세에 없는 상품을 필터링합니다."
        en: "`WHERE id NOT IN (SELECT product_id FROM order_items)` — filters for products not in order details."
    max_score: 10
    tags: [NOT IN subquery, products, order_items]

  - id: i04s-07
    level: 2
    type: "SELECT"
    question: |
      평균 주문 금액보다 큰 주문의 주문번호, 금액, 주문일을 조회하세요. 취소 제외. 금액 내림차순, 상위 10개.
    question_en: |
      Find orders with amounts greater than the average. Exclude cancelled. Sort by amount descending, top 10.
    reference_sql:
      common: |
        SELECT order_number, total_amount, ordered_at
        FROM orders
        WHERE status NOT IN ('cancelled')
          AND total_amount > (
              SELECT AVG(total_amount)
              FROM orders
              WHERE status NOT IN ('cancelled')
          )
        ORDER BY total_amount DESC
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "서브쿼리에서도 취소 주문을 제외해야 공정한 비교가 됩니다."
        en: "Both the main query and the subquery should exclude cancelled orders for a fair comparison."
    max_score: 10
    tags: [scalar subquery, AVG, orders]

  - id: i04s-08
    level: 2
    type: "SELECT"
    question: |
      카테고리별 평균 가격을 구한 뒤, 자기 카테고리 평균보다 비싼 상품을 조회하세요. 상위 15개.
    question_en: |
      Find the average price per category, then find products more expensive than their category average. Top 15.
    reference_sql:
      common: |
        SELECT p.name, p.price, ca.avg_price
        FROM products AS p
        INNER JOIN (
            SELECT category_id, ROUND(AVG(price), 2) AS avg_price
            FROM products
            GROUP BY category_id
        ) AS ca ON p.category_id = ca.category_id
        WHERE p.price > ca.avg_price
        ORDER BY p.price DESC
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`FROM products AS p INNER JOIN (SELECT category_id, AVG(price) AS avg_price FROM products GROUP BY category_id) AS ca ON ...` — 인라인 뷰를 테이블처럼 JOIN합니다."
        en: "JOIN the inline view like a table using `FROM products AS p INNER JOIN (SELECT ...) AS ca ON ...`."
    max_score: 10
    tags: [FROM subquery, INNER JOIN, AVG, GROUP BY, products]

  - id: i04s-09
    level: 2
    type: "SELECT"
    question: |
      각 고객의 주문 횟수를 SELECT 절 스칼라 서브쿼리로 구하세요. 주문 3회 이상인 고객만, 주문 횟수 내림차순 15개.
    question_en: |
      Use a SELECT clause scalar subquery to compute each customer's order count. Show only customers with 3+ orders, top 15.
    reference_sql:
      common: |
        SELECT
            c.name,
            c.grade,
            (SELECT COUNT(*)
             FROM orders
             WHERE customer_id = c.id
               AND status NOT IN ('cancelled')) AS order_count
        FROM customers AS c
        WHERE (SELECT COUNT(*)
               FROM orders
               WHERE customer_id = c.id
                 AND status NOT IN ('cancelled')) >= 3
        ORDER BY order_count DESC
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`SELECT name, (SELECT COUNT(*) FROM orders WHERE customer_id = c.id) AS order_count FROM customers AS c` — 외부 쿼리의 `c.id`를 서브쿼리에서 참조합니다."
        en: "References the outer query's `c.id` in the subquery."
    max_score: 10
    tags: [correlated subquery, SELECT clause, COUNT, customers, orders]

  - id: i04s-10
    level: 2
    type: "SELECT"
    question: |
      상관 서브쿼리로 각 상품의 최근 리뷰 날짜를 함께 조회하세요. 상위 15개.
    question_en: |
      Use a correlated subquery to retrieve each product's most recent review date. Top 15.
    reference_sql:
      common: |
        SELECT
            p.name,
            p.price,
            (SELECT MAX(created_at)
             FROM reviews
             WHERE product_id = p.id) AS last_review_at
        FROM products AS p
        ORDER BY last_review_at DESC NULLS LAST
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`(SELECT MAX(created_at) FROM reviews WHERE product_id = p.id)` — 외부 쿼리의 `p.id`를 참조하는 상관 서브쿼리입니다."
        en: "`(SELECT MAX(created_at) FROM reviews WHERE product_id = p.id)` — a correlated subquery referencing the outer query's `p.id`."
    max_score: 10
    tags: [correlated subquery, MAX, products, reviews]

  - id: i04s-11
    level: 2
    type: "SELECT"
    question: |
      고객별 총 주문 금액을 FROM 서브쿼리로 구한 뒤, 상위 10명을 조회하세요.
    question_en: |
      Use a FROM subquery to compute total order amount per customer, then show the top 10.
    reference_sql:
      common: |
        SELECT c.name, c.grade, os.total_spent
        FROM customers AS c
        INNER JOIN (
            SELECT customer_id, ROUND(SUM(total_amount), 2) AS total_spent
            FROM orders
            WHERE status NOT IN ('cancelled')
            GROUP BY customer_id
        ) AS os ON c.id = os.customer_id
        ORDER BY os.total_spent DESC
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`FROM (SELECT customer_id, SUM(total_amount) AS total_spent FROM orders WHERE ... GROUP BY customer_id) AS os` — 파생 테이블을 별칭으로 사용합니다."
        en: "Use the derived table with an alias."
    max_score: 10
    tags: [FROM subquery, SUM, GROUP BY, customers, orders]

  - id: i04s-12
    level: 2
    type: "SELECT"
    question: |
      EXISTS를 사용하여 리뷰가 1건 이상 있는 상품만 조회하세요. 이름순, 상위 15개.
    question_en: |
      Use EXISTS to find only products that have at least one review. Sort by name, top 15.
    reference_sql:
      common: |
        SELECT p.name, p.price
        FROM products AS p
        WHERE EXISTS (
            SELECT 1
            FROM reviews
            WHERE product_id = p.id
        )
        ORDER BY p.name
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE EXISTS (SELECT 1 FROM reviews WHERE product_id = p.id)` — 서브쿼리가 한 행이라도 반환하면 TRUE입니다."
        en: "`WHERE EXISTS (SELECT 1 FROM reviews WHERE product_id = p.id)` — returns TRUE if the subquery returns at least one row."
    max_score: 10
    tags: [EXISTS, products, reviews]

  - id: i04s-13
    level: 3
    type: "SELECT"
    question: |
      위시리스트에 담았지만 한 번도 주문하지 않은 고객-상품 조합을 찾으세요. 최근 20개.
    question_en: |
      Find customer-product combinations that were wishlisted but never ordered. Most recent 20.
    reference_sql:
      common: |
        SELECT
            c.name AS customer,
            p.name AS product,
            w.created_at AS wishlisted_at
        FROM wishlists AS w
        INNER JOIN customers AS c ON w.customer_id = c.id
        INNER JOIN products AS p ON w.product_id = p.id
        WHERE NOT EXISTS (
            SELECT 1
            FROM order_items AS oi
            INNER JOIN orders AS o ON oi.order_id = o.id
            WHERE o.customer_id = w.customer_id
              AND oi.product_id = w.product_id
              AND o.status NOT IN ('cancelled')
        )
        ORDER BY w.created_at DESC
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE NOT EXISTS (SELECT 1 FROM order_items AS oi INNER JOIN orders AS o ON ... WHERE o.customer_id = w.customer_id AND oi.product_id = w.product_id)` — 두 조건을 동시에 확인하는 상관 서브쿼리입니다."
        en: "A correlated subquery checking two conditions simultaneously."
    max_score: 10
    tags: [NOT EXISTS, correlated subquery, wishlists, order_items]

  - id: i04s-14
    level: 2
    type: "SELECT"
    question: |
      각 카테고리에서 가장 비싼 상품의 이름과 가격을 구하세요.
    question_en: |
      Find the most expensive product in each category, showing name and price.
    reference_sql:
      common: |
        SELECT p.name, p.price, p.category_id
        FROM products AS p
        WHERE p.price = (
            SELECT MAX(price)
            FROM products
            WHERE category_id = p.category_id
        )
        ORDER BY p.price DESC;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE p.price = (SELECT MAX(price) FROM products WHERE category_id = p.category_id)` — 같은 카테고리 내 최대 가격을 상관 서브쿼리로 구합니다."
        en: "Computes the max price within the same category via correlated subquery."
    max_score: 10
    tags: [correlated subquery, MAX, products]

  - id: i04s-15
    level: 3
    type: "SELECT"
    question: |
      VIP 고객이 주문한 상품 중 평점 4 이상인 상품의 이름을 구하세요. 상위 15개.
    question_en: |
      Find products ordered by VIP customers that have an average rating of 4 or above. Top 15.
    reference_sql:
      common: |
        SELECT DISTINCT p.name, p.price
        FROM products AS p
        WHERE p.id IN (
            SELECT oi.product_id
            FROM order_items AS oi
            WHERE oi.order_id IN (
                SELECT o.id
                FROM orders AS o
                WHERE o.status NOT IN ('cancelled')
                  AND o.customer_id IN (
                      SELECT id FROM customers WHERE grade = 'VIP'
                  )
            )
        )
        AND p.id IN (
            SELECT product_id
            FROM reviews
            GROUP BY product_id
            HAVING AVG(rating) >= 4.0
        )
        ORDER BY p.price DESC
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "3단계 중첩 IN 서브쿼리: VIP 고객 → 주문 → 상품. 평점 조건도 별도 서브쿼리로 필터링합니다."
        en: "3-level nested IN subqueries: VIP customers -> orders -> products. Rating condition is filtered via a separate subquery."
    max_score: 10
    tags: [nested subquery, IN, HAVING, AVG, products, orders, customers, reviews]

  - id: i04s-16
    level: 3
    type: "SELECT"
    question: |
      전체 평균 주문 금액과 자신의 평균 주문 금액을 비교하여, 전체 평균보다 높은 고객을 찾으세요. 상위 15개.
    question_en: |
      Compare each customer's average order amount with the overall average, and find customers whose average is higher. Top 15.
    reference_sql:
      common: |
        SELECT
            c.name,
            c.grade,
            ca.avg_amount,
            ca.order_count
        FROM customers AS c
        INNER JOIN (
            SELECT
                customer_id,
                ROUND(AVG(total_amount), 2) AS avg_amount,
                COUNT(*) AS order_count
            FROM orders
            WHERE status NOT IN ('cancelled')
            GROUP BY customer_id
        ) AS ca ON c.id = ca.customer_id
        WHERE ca.avg_amount > (
            SELECT AVG(total_amount)
            FROM orders
            WHERE status NOT IN ('cancelled')
        )
        ORDER BY ca.avg_amount DESC
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "파생 테이블에서 고객별 평균 주문 금액을 구한 뒤, `WHERE avg_amount > (SELECT AVG(total_amount) FROM orders ...)` 조건으로 필터링합니다."
        en: "Compute per-customer average order amount in a derived table, then filter with a scalar subquery comparison."
    max_score: 10
    tags: [FROM subquery, scalar subquery, AVG, customers, orders]

  - id: i04s-17
    level: 3
    type: "SELECT"
    question: |
      상품별 판매 수량이 전체 상품 평균 판매 수량보다 많은 상품을 찾으세요. 상위 15개.
    question_en: |
      Find products whose total sales quantity exceeds the average sales quantity across all products. Top 15.
    reference_sql:
      common: |
        SELECT
            p.name,
            ps.total_qty
        FROM products AS p
        INNER JOIN (
            SELECT product_id, SUM(quantity) AS total_qty
            FROM order_items
            GROUP BY product_id
        ) AS ps ON p.id = ps.product_id
        WHERE ps.total_qty > (
            SELECT AVG(total_qty)
            FROM (
                SELECT SUM(quantity) AS total_qty
                FROM order_items
                GROUP BY product_id
            )
        )
        ORDER BY ps.total_qty DESC
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "먼저 상품별 총 판매량을 파생 테이블로 구합니다. 그 다음 `WHERE total_qty > (SELECT AVG(total_qty) FROM (...))` 형태로 평균과 비교하세요."
        en: "First compute total sales per product in a derived table. Then compare with the average via a nested subquery."
    max_score: 10
    tags: [nested subquery, FROM subquery, SUM, AVG, products, order_items]

  - id: i04s-18
    level: 2
    type: "SELECT"
    question: |
      리뷰 평점이 해당 상품의 평균 평점보다 낮은 리뷰를 찾으세요. 최근 15개.
    question_en: |
      Find reviews whose rating is below the product's average rating. Most recent 15.
    reference_sql:
      common: |
        SELECT
            r.id,
            p.name AS product,
            r.rating,
            ROUND((SELECT AVG(rating) FROM reviews WHERE product_id = r.product_id), 2) AS avg_rating,
            r.title,
            r.created_at
        FROM reviews AS r
        INNER JOIN products AS p ON r.product_id = p.id
        WHERE r.rating < (
            SELECT AVG(rating)
            FROM reviews
            WHERE product_id = r.product_id
        )
        ORDER BY r.created_at DESC
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE r.rating < (SELECT AVG(rating) FROM reviews WHERE product_id = r.product_id)` — 각 리뷰에 대해 같은 상품의 평균 평점을 상관 서브쿼리로 구합니다."
        en: "Computes the average rating for the same product via correlated subquery for each review."
    max_score: 10
    tags: [correlated subquery, AVG, reviews, products]

  - id: i04s-19
    level: 2
    type: "SELECT"
    question: |
      서브쿼리 vs JOIN 비교: "리뷰를 작성한 고객" 목록을 두 가지 방법으로 작성하세요.
    question_en: |
      Subquery vs JOIN comparison: Write the query "customers who have written a review" using two different approaches.
    reference_sql:
      common: |
        -- (A) IN 서브쿼리 방식
        SELECT name, email
        FROM customers
        WHERE id IN (SELECT customer_id FROM reviews)
        ORDER BY name
        LIMIT 10;

        -- (B) JOIN 방식 (DISTINCT 필요)
        SELECT DISTINCT c.name, c.email
        FROM customers AS c
        INNER JOIN reviews AS r ON c.id = r.customer_id
        ORDER BY c.name
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "(A) `WHERE id IN (SELECT customer_id FROM reviews)`, (B) `INNER JOIN reviews ON ...`에서 DISTINCT를 사용합니다. 두 쿼리의 결과는 동일하지만 실행 방식이 다릅니다."
