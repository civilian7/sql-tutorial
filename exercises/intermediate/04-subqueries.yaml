  - id: i04s-20
    level: 3
    type: "SELECT"
    question: |
      3개 이상의 카테고리에서 상품을 구매한 고객의 이름과 구매 카테고리 수를 구하세요. 상위 15개.
    question_en: |
      Find customers who have purchased products from 3 or more categories, showing name and category count. Top 15.
    reference_sql:
      common: |
        SELECT c.name, c.grade, cc.cat_count
        FROM customers AS c
        INNER JOIN (
            SELECT
                o.customer_id,
                COUNT(DISTINCT p.category_id) AS cat_count
            FROM orders AS o
            INNER JOIN order_items AS oi ON o.id = oi.order_id
            INNER JOIN products AS p ON oi.product_id = p.id
            WHERE o.status NOT IN ('cancelled')
            GROUP BY o.customer_id
            HAVING COUNT(DISTINCT p.category_id) >= 3
        ) AS cc ON c.id = cc.customer_id
        ORDER BY cc.cat_count DESC, c.name
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "orders → order_items → products를 JOIN하여 고객별 DISTINCT category_id 수를 구합니다. 이 집계를 파생 테이블로 만든 뒤 customers와 JOIN하세요."
        en: "JOIN orders -> order_items -> products to compute the DISTINCT category_id count per customer. Create this aggregation as a derived table, then JOIN with customers."
    max_score: 10
    tags: [FROM subquery, HAVING, COUNT DISTINCT, customers, orders, products]
