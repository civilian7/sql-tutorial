metadata:
  id: intermediate-09-comprehensive
  title: "중급 종합 문제"
  title_en: "Intermediate Comprehensive Exercises"
  difficulty: intermediate
  concepts: [JOIN, subquery, date functions, string functions, CASE, UNION, GROUP BY, HAVING, aggregate functions, LAG, window functions]
  tables: [orders, customers, order_items, products, categories, payments, reviews, shipping, complaints, wishlists, suppliers, returns, coupon_usage]
  prerequisites: [intermediate-01-joins, intermediate-02-dates, intermediate-03-string-math, intermediate-04-subqueries, intermediate-05-set-operations]
  estimated_minutes: 60
  default_level: 2
  default_type: "SELECT"

problems:
  - id: i09c-01
    level: 2
    type: "SELECT"
    question: |
      JOIN + GROUP BY: 카테고리별 판매 중인 상품 수와 평균 가격을 조회하세요. 상품 수가 많은 순으로 10개만.
    question_en: |
      JOIN + GROUP BY: Find active product count and average price per category. Top 10 by product count.
    reference_sql:
      common: |
        SELECT
            cat.name AS category,
            COUNT(*) AS product_count,
            ROUND(AVG(p.price)) AS avg_price
        FROM products p
        INNER JOIN categories cat ON p.category_id = cat.id
        WHERE p.is_active = 1
        GROUP BY cat.id, cat.name
        ORDER BY product_count DESC
        LIMIT 10;
    hints:
      - ko: "`products JOIN categories`로 연결 후 `GROUP BY`로 카테고리별 집계. `WHERE is_active = 1`로 판매 중만 필터링."
        en: "JOIN products with categories, aggregate per category with GROUP BY. Filter active with WHERE is_active = 1."
    max_score: 10
    tags: [INNER JOIN, GROUP BY, COUNT, AVG, products, categories]

  - id: i09c-02
    level: 2
    type: "SELECT"
    question: |
      JOIN + CASE: 각 주문의 주문번호, 고객명, 결제 방법을 조회하세요. 결제 방법은 한글로 변환. 최근 10건.
    question_en: |
      JOIN + CASE: Find order number, customer name, and payment method (in Korean). Most recent 10.
    reference_sql:
      common: |
        SELECT
            o.order_number,
            c.name AS customer_name,
            CASE pay.method
                WHEN 'card' THEN '카드'
                WHEN 'bank_transfer' THEN '계좌이체'
                WHEN 'kakao_pay' THEN '카카오페이'
                WHEN 'naver_pay' THEN '네이버페이'
                WHEN 'virtual_account' THEN '가상계좌'
                WHEN 'point' THEN '포인트'
                ELSE '기타'
            END AS payment_method_kr,
            o.total_amount
        FROM orders o
        INNER JOIN customers c ON o.customer_id = c.id
        INNER JOIN payments pay ON o.id = pay.order_id
        ORDER BY o.ordered_at DESC
        LIMIT 10;
    hints:
      - ko: "`orders JOIN customers JOIN payments`로 3개 테이블 연결. `CASE payments.method WHEN ... THEN ...`으로 한글 변환."
        en: "Connect 3 tables. Convert to Korean with `CASE payments.method WHEN ... THEN ...`."
    max_score: 10
    tags: [INNER JOIN, CASE, orders, customers, payments]

  - id: i09c-03
    level: 2
    type: "SELECT"
    question: |
      서브쿼리 + 날짜: 2024년에 가장 많이 주문한 고객 TOP 5의 이름, 주문 건수, 총 결제금액을 조회하세요.
    question_en: |
      Subquery + dates: Find the top 5 customers by order count in 2024, with name, count, and total spent.
    reference_sql:
      common: |
        SELECT
            c.name,
            sub.order_count,
            sub.total_spent
        FROM (
            SELECT customer_id, COUNT(*) AS order_count, SUM(total_amount) AS total_spent
            FROM orders
            WHERE ordered_at LIKE '2024%'
            GROUP BY customer_id
            ORDER BY order_count DESC
            LIMIT 5
        ) sub
        INNER JOIN customers c ON sub.customer_id = c.id
        ORDER BY sub.order_count DESC;
    hints:
      - ko: "`orders`에서 `ordered_at LIKE '2024%'`로 필터링 후 `GROUP BY customer_id`로 집계."
        en: "Filter with `ordered_at LIKE '2024%'` in orders, aggregate with `GROUP BY customer_id`."
    max_score: 10
    tags: [FROM subquery, GROUP BY, LIKE, customers, orders]

  - id: i09c-04
    level: 2
    type: "SELECT"
    question: |
      문자열 함수 + GROUP BY: 고객 이메일 도메인별 고객 수를 집계하세요.
    question_en: |
      String functions + GROUP BY: Aggregate customer count by email domain.
    reference_sql:
      common: |
        SELECT
            SUBSTR(email, INSTR(email, '@') + 1) AS domain,
            COUNT(*) AS customer_count
        FROM customers
        GROUP BY domain
        ORDER BY customer_count DESC;
    hints:
      - ko: "`SUBSTR(email, INSTR(email, '@') + 1)`로 도메인을 추출합니다."
        en: "Extract domain with `SUBSTR(email, INSTR(email, '@') + 1)`."
    max_score: 10
    tags: [SUBSTR, INSTR, GROUP BY, customers]

  - id: i09c-05
    level: 2
    type: "SELECT"
    question: |
      JOIN + HAVING: 리뷰를 5건 이상 작성한 고객의 이름과 평균 평점을 조회하세요. 상위 10명.
    question_en: |
      JOIN + HAVING: Find customers who wrote 5+ reviews, with name and average rating. Top 10.
    reference_sql:
      common: |
        SELECT
            c.name,
            COUNT(*) AS review_count,
            ROUND(AVG(r.rating), 1) AS avg_rating
        FROM reviews r
        INNER JOIN customers c ON r.customer_id = c.id
        GROUP BY r.customer_id, c.name
        HAVING COUNT(*) >= 5
        ORDER BY review_count DESC
        LIMIT 10;
    hints:
      - ko: "`reviews JOIN customers`로 연결 후 `GROUP BY customer_id` + `HAVING COUNT(*) >= 5`."
        en: "JOIN reviews with customers, then GROUP BY + HAVING COUNT(*) >= 5."
    max_score: 10
    tags: [INNER JOIN, GROUP BY, HAVING, AVG, reviews, customers]

  - id: i09c-06
    level: 2
    type: "SELECT"
    question: |
      UNION + CASE: 최근 1년간 신규 고객 수와 신규 상품 수를 하나의 결과로 합쳐서 보세요.
    question_en: |
      UNION + CASE: Combine new customer count and new product count from 2024 into a single result.
    reference_sql:
      common: |
        SELECT '신규 고객' AS category, COUNT(*) AS count_2024
        FROM customers
        WHERE created_at LIKE '2024%'
        UNION ALL
        SELECT '신규 상품' AS category, COUNT(*) AS count_2024
        FROM products
        WHERE created_at LIKE '2024%';
    hints:
      - ko: "각 테이블에서 2024년 데이터를 COUNT하고 UNION ALL로 합칩니다."
        en: "COUNT 2024 data from each table and combine with UNION ALL."
    max_score: 10
    tags: [UNION ALL, COUNT, customers, products]

  - id: i09c-07
    level: 2
    type: "SELECT"
    question: |
      날짜 함수 + JOIN: 주문 후 배송 완료까지 걸린 평균 일수를 택배사별로 조회하세요.
    question_en: |
      Date functions + JOIN: Find average delivery days per carrier. Delivered orders only.
    reference_sql:
      common: |
        SELECT
            s.carrier,
            COUNT(*) AS delivered_count,
            ROUND(AVG(julianday(s.delivered_at) - julianday(o.ordered_at)), 1) AS avg_days
        FROM shipping s
        INNER JOIN orders o ON s.order_id = o.id
        WHERE s.status = 'delivered' AND s.delivered_at IS NOT NULL
        GROUP BY s.carrier
        ORDER BY avg_days;
    hints:
      - ko: "`julianday(delivered_at) - julianday(ordered_at)`로 일수 계산."
        en: "Calculate days with `julianday(delivered_at) - julianday(ordered_at)`."
    max_score: 10
    tags: [julianday, INNER JOIN, GROUP BY, AVG, shipping, orders]

  - id: i09c-08
    level: 2
    type: "SELECT"
    question: |
      서브쿼리 + CASE: 각 상품의 카테고리 평균 가격 대비 고가/저가/평균 수준을 표시하세요. 상위 15개.
    question_en: |
      Subquery + CASE: Show each product's price level relative to its category average. Top 15.
    reference_sql:
      common: |
        SELECT
            p.name, p.price, cat_avg.avg_price,
            CASE
                WHEN p.price > cat_avg.avg_price * 1.2 THEN '고가'
                WHEN p.price < cat_avg.avg_price * 0.8 THEN '저가'
                ELSE '평균 수준'
            END AS price_level
        FROM products p
        INNER JOIN (
            SELECT category_id, ROUND(AVG(price)) AS avg_price
            FROM products WHERE is_active = 1
            GROUP BY category_id
        ) cat_avg ON p.category_id = cat_avg.category_id
        WHERE p.is_active = 1
        ORDER BY p.price DESC
        LIMIT 15;
    hints:
      - ko: "서브쿼리로 카테고리별 평균 가격을 구한 뒤 JOIN. `CASE WHEN price > avg_price * 1.2 THEN '고가'...`"
        en: "Compute category avg via subquery, JOIN it, then use CASE for comparison."
    max_score: 10
    tags: [FROM subquery, CASE, INNER JOIN, products]

  - id: i09c-09
    level: 3
    type: "SELECT"
    question: |
      JOIN + GROUP BY + HAVING + 서브쿼리: 전체 평균보다 높은 매출을 올린 브랜드의 이름, 총 매출, 주문 건수를 조회하세요. 상위 10개.
    question_en: |
      JOIN + GROUP BY + HAVING + Subquery: Find brands with above-average revenue. Top 10.
    reference_sql:
      common: |
        SELECT
            p.brand,
            SUM(oi.subtotal) AS total_revenue,
            COUNT(DISTINCT oi.order_id) AS order_count
        FROM order_items oi
        INNER JOIN products p ON oi.product_id = p.id
        GROUP BY p.brand
        HAVING SUM(oi.subtotal) > (
            SELECT AVG(brand_revenue)
            FROM (
                SELECT SUM(oi2.subtotal) AS brand_revenue
                FROM order_items oi2
                INNER JOIN products p2 ON oi2.product_id = p2.id
                GROUP BY p2.brand
            )
        )
        ORDER BY total_revenue DESC
        LIMIT 10;
    hints:
      - ko: "`HAVING SUM(subtotal) > (SELECT AVG(...))`. 전체 평균은 브랜드별 매출의 평균입니다."
        en: "Overall average is the mean of per-brand revenues."
    max_score: 10
    tags: [HAVING, nested subquery, SUM, AVG, order_items, products]

  - id: i09c-10
    level: 2
    type: "SELECT"
    question: |
      2024년 월별로 주문 상태 분포를 조회하세요. 완료, 취소, 기타 건수와 취소율을 표시합니다.
    question_en: |
      Show 2024 monthly order status distribution: confirmed, cancelled, in-progress counts and cancel rate.
    reference_sql:
      common: |
        SELECT
            SUBSTR(ordered_at, 1, 7) AS month,
            COUNT(*) AS total_orders,
            SUM(CASE WHEN status = 'confirmed' THEN 1 ELSE 0 END) AS confirmed,
            SUM(CASE WHEN status = 'cancelled' THEN 1 ELSE 0 END) AS cancelled,
            SUM(CASE WHEN status NOT IN ('confirmed', 'cancelled') THEN 1 ELSE 0 END) AS in_progress,
            ROUND(100.0 * SUM(CASE WHEN status = 'cancelled' THEN 1 ELSE 0 END) / COUNT(*), 1) AS cancel_rate
        FROM orders
        WHERE ordered_at LIKE '2024%'
        GROUP BY SUBSTR(ordered_at, 1, 7)
        ORDER BY month;
    hints:
      - ko: "`SUM(CASE WHEN status = 'confirmed' THEN 1 ELSE 0 END)`로 조건부 집계."
        en: "Conditional aggregation with `SUM(CASE WHEN ... THEN 1 ELSE 0 END)`."
    max_score: 10
    tags: [CASE, GROUP BY, SUM, conditional aggregation, orders]

  - id: i09c-11
    level: 3
    type: "SELECT"
    question: |
      VIP 고객이 구매한 상품 중, 리뷰 평점이 4점 이상인 상품의 이름, 브랜드, 평균 평점, VIP 구매 횟수를 조회하세요. 상위 10개.
    question_en: |
      Find products purchased by VIP customers with avg review rating >= 4.0. Show name, brand, rating, and VIP purchase count. Top 10.
    reference_sql:
      common: |
        SELECT
            p.name, p.brand, review_avg.avg_rating,
            COUNT(*) AS vip_purchase_count
        FROM order_items oi
        INNER JOIN orders o ON oi.order_id = o.id
        INNER JOIN customers c ON o.customer_id = c.id
        INNER JOIN products p ON oi.product_id = p.id
        INNER JOIN (
            SELECT product_id, ROUND(AVG(rating), 1) AS avg_rating
            FROM reviews GROUP BY product_id HAVING AVG(rating) >= 4.0
        ) review_avg ON p.id = review_avg.product_id
        WHERE c.grade = 'VIP'
        GROUP BY p.id, p.name, p.brand, review_avg.avg_rating
        ORDER BY vip_purchase_count DESC
        LIMIT 10;
    hints:
      - ko: "`customers(grade='VIP') JOIN orders JOIN order_items JOIN products`로 VIP 구매 상품을 파악. 서브쿼리로 리뷰 평균 4점 이상 필터링."
        en: "Multi-table JOIN for VIP purchases. Subquery for review avg >= 4.0."
    max_score: 10
    tags: [multi-table JOIN, HAVING, AVG, products, reviews, customers]

  - id: i09c-12
    level: 3
    type: "SELECT"
    question: |
      LEFT JOIN + COALESCE: 모든 상품의 이름, 가격, 총 판매 수량, 총 리뷰 수를 조회하세요. 없으면 0. 상위 15개.
    question_en: |
      LEFT JOIN + COALESCE: Find all products' name, price, total sold, and review count. Show 0 for none. Top 15.
    reference_sql:
      common: |
        SELECT
            p.name, p.price,
            COALESCE(sales.total_qty, 0) AS total_sold,
            COALESCE(rev.review_count, 0) AS review_count
        FROM products p
        LEFT JOIN (
            SELECT product_id, SUM(quantity) AS total_qty
            FROM order_items GROUP BY product_id
        ) sales ON p.id = sales.product_id
        LEFT JOIN (
            SELECT product_id, COUNT(*) AS review_count
            FROM reviews GROUP BY product_id
        ) rev ON p.id = rev.product_id
        WHERE p.is_active = 1
        ORDER BY total_sold DESC
        LIMIT 15;
    hints:
      - ko: "카디널리티 폭발 방지를 위해 판매 수량과 리뷰 수를 각각 서브쿼리로 집계한 뒤 LEFT JOIN합니다."
        en: "Aggregate sales and reviews separately as subqueries, then LEFT JOIN to prevent cardinality explosion."
    max_score: 10
    tags: [LEFT JOIN, COALESCE, FROM subquery, products]

  - id: i09c-13
    level: 3
    type: "SELECT"
    question: |
      UNION + JOIN + GROUP BY: 고객별 "활동 점수"를 계산하세요. 주문=10점, 리뷰=5점, 문의=3점. 상위 10명.
    question_en: |
      UNION + JOIN + GROUP BY: Calculate per-customer "activity score". Order=10pts, review=5pts, inquiry=3pts. Top 10.
    reference_sql:
      common: |
        SELECT
            c.name, c.grade,
            SUM(activity.score) AS total_score,
            SUM(CASE WHEN activity.type = '주문' THEN 1 ELSE 0 END) AS orders,
            SUM(CASE WHEN activity.type = '리뷰' THEN 1 ELSE 0 END) AS reviews,
            SUM(CASE WHEN activity.type = '문의' THEN 1 ELSE 0 END) AS complaints
        FROM (
            SELECT customer_id, '주문' AS type, 10 AS score FROM orders
            UNION ALL
            SELECT customer_id, '리뷰' AS type, 5 AS score FROM reviews
            UNION ALL
            SELECT customer_id, '문의' AS type, 3 AS score FROM complaints
        ) activity
        INNER JOIN customers c ON activity.customer_id = c.id
        GROUP BY activity.customer_id, c.name, c.grade
        ORDER BY total_score DESC
        LIMIT 10;
    hints:
      - ko: "각 활동별 점수를 UNION ALL로 합친 뒤, 외부에서 SUM으로 총점을 구합니다."
        en: "Combine scores per activity with UNION ALL, then SUM externally for total."
    max_score: 10
    tags: [UNION ALL, GROUP BY, SUM, CASE, customers, orders, reviews, complaints]

  - id: i09c-14
    level: 3
    type: "SELECT"
    question: |
      서브쿼리 + JOIN + 날짜: 가입 후 30일 이내/31~90일/90일 초과에 첫 주문을 한 고객 수를 비교하세요.
    question_en: |
      Subquery + JOIN + dates: Compare customer counts by time-to-first-order segments (30d/31-90d/90d+).
    reference_sql:
      common: |
        SELECT
            CASE
                WHEN days_to_first_order <= 30 THEN '30일 이내'
                WHEN days_to_first_order <= 90 THEN '31~90일'
                ELSE '90일 초과'
            END AS segment,
            COUNT(*) AS customer_count,
            ROUND(AVG(days_to_first_order), 1) AS avg_days
        FROM (
            SELECT c.id,
                ROUND(julianday(MIN(o.ordered_at)) - julianday(c.created_at)) AS days_to_first_order
            FROM customers c
            INNER JOIN orders o ON c.id = o.customer_id
            GROUP BY c.id, c.created_at
        )
        GROUP BY segment
        ORDER BY MIN(days_to_first_order);
    hints:
      - ko: "`MIN(ordered_at)`으로 고객별 첫 주문일을 구한 서브쿼리를 만들고, `julianday` 차이로 일수를 계산합니다."
        en: "Get first order date with `MIN(ordered_at)`, compute days with `julianday` difference."
    max_score: 10
    tags: [FROM subquery, CASE, julianday, MIN, customers, orders]

  - id: i09c-15
    level: 3
    type: "SELECT"
    question: |
      결제 방법별, 카드 발급사별 매출 현황을 조회하세요. 카드 아닌 경우 발급사는 '해당없음'. 상위 15개.
    question_en: |
      Show revenue by payment method and card issuer. Non-card shows 'N/A'. Top 15.
    reference_sql:
      common: |
        SELECT
            CASE pay.method
                WHEN 'card' THEN '카드'
                WHEN 'bank_transfer' THEN '계좌이체'
                WHEN 'kakao_pay' THEN '카카오페이'
                WHEN 'naver_pay' THEN '네이버페이'
                ELSE pay.method
            END AS method_kr,
            COALESCE(pay.card_issuer, '해당없음') AS issuer,
            COUNT(*) AS payment_count,
            SUM(pay.amount) AS total_amount,
            ROUND(AVG(pay.amount)) AS avg_amount
        FROM payments pay
        WHERE pay.status = 'completed'
        GROUP BY pay.method, pay.card_issuer
        ORDER BY total_amount DESC
        LIMIT 15;
    hints:
      - ko: "`COALESCE(card_issuer, '해당없음')`으로 NULL 처리. `GROUP BY method, card_issuer`."
        en: "Handle NULL with `COALESCE(card_issuer, 'N/A')`. `GROUP BY method, card_issuer`."
    max_score: 10
    tags: [CASE, COALESCE, GROUP BY, payments]

  - id: i09c-16
    level: 3
    type: "SELECT"
    question: |
      고객을 최근 주문일 기준 RFM R등급으로 분류하세요. Active(30일), Warm(90일), Cold(180일), Dormant.
    question_en: |
      Classify customers by RFM Recency: Active (30d), Warm (90d), Cold (180d), Dormant.
    reference_sql:
      common: |
        SELECT
            recency_group,
            COUNT(*) AS customer_count,
            ROUND(100.0 * COUNT(*) / SUM(COUNT(*)) OVER(), 1) AS pct
        FROM (
            SELECT c.id,
                CASE
                    WHEN MAX(o.ordered_at) IS NULL THEN 'Dormant'
                    WHEN julianday('now') - julianday(MAX(o.ordered_at)) <= 30 THEN 'Active'
                    WHEN julianday('now') - julianday(MAX(o.ordered_at)) <= 90 THEN 'Warm'
                    WHEN julianday('now') - julianday(MAX(o.ordered_at)) <= 180 THEN 'Cold'
                    ELSE 'Dormant'
                END AS recency_group
            FROM customers c
            LEFT JOIN orders o ON c.id = o.customer_id
            GROUP BY c.id
        )
        GROUP BY recency_group
        ORDER BY CASE recency_group WHEN 'Active' THEN 1 WHEN 'Warm' THEN 2 WHEN 'Cold' THEN 3 ELSE 4 END;
    hints:
      - ko: "`LEFT JOIN`으로 주문 없는 고객 포함. `MAX(ordered_at)`으로 최근 주문일 구한 뒤, `julianday('now') - julianday(last_order)`로 경과일 계산."
        en: "Include customers without orders via LEFT JOIN. Use MAX and julianday for elapsed days."
    max_score: 10
    tags: [LEFT JOIN, CASE, julianday, window function, RFM, customers, orders]

  - id: i09c-17
    level: 3
    type: "SELECT"
    question: |
      월간 매출 리포트: 2024년 월별 매출, 주문 건수, 고유 고객 수, 건당 평균, 전월 대비 증감율.
    question_en: |
      Monthly revenue report: 2024 monthly revenue, order count, unique customers, avg order value, and MoM growth rate.
    reference_sql:
      common: |
        SELECT
            month, total_revenue, order_count, unique_customers,
            ROUND(total_revenue * 1.0 / order_count) AS avg_order_value,
            CASE
                WHEN prev_revenue IS NULL THEN '-'
                ELSE ROUND((total_revenue - prev_revenue) * 100.0 / prev_revenue, 1) || '%'
            END AS growth_rate
        FROM (
            SELECT
                SUBSTR(ordered_at, 1, 7) AS month,
                SUM(total_amount) AS total_revenue,
                COUNT(*) AS order_count,
                COUNT(DISTINCT customer_id) AS unique_customers,
                LAG(SUM(total_amount)) OVER (ORDER BY SUBSTR(ordered_at, 1, 7)) AS prev_revenue
            FROM orders
            WHERE ordered_at LIKE '2024%' AND status NOT IN ('cancelled')
            GROUP BY SUBSTR(ordered_at, 1, 7)
        )
        ORDER BY month;
    hints:
      - ko: "`LAG()` 윈도우 함수로 전월 매출을 가져와 증감율을 계산합니다."
        en: "Use `LAG()` window function to get previous month revenue and calculate growth rate."
    max_score: 10
    tags: [LAG, window function, GROUP BY, SUM, orders]

  - id: i09c-18
    level: 3
    type: "SELECT"
    question: |
      고객 등급별 평균 주문 금액, 평균 리뷰 평점, 반품율을 조회하세요.
    question_en: |
      Find avg order amount, avg review rating, and return rate per customer grade.
    reference_sql:
      common: |
        SELECT
            c.grade,
            COUNT(DISTINCT c.id) AS customer_count,
            ROUND(AVG(order_stats.avg_amount)) AS avg_order_amount,
            ROUND(AVG(review_stats.avg_rating), 2) AS avg_rating,
            ROUND(100.0 * SUM(COALESCE(return_stats.return_count, 0))
                / NULLIF(SUM(COALESCE(order_stats.order_count, 0)), 0), 2) AS return_rate_pct
        FROM customers c
        LEFT JOIN (
            SELECT customer_id, COUNT(*) AS order_count, AVG(total_amount) AS avg_amount
            FROM orders GROUP BY customer_id
        ) order_stats ON c.id = order_stats.customer_id
        LEFT JOIN (
            SELECT customer_id, AVG(rating) AS avg_rating
            FROM reviews GROUP BY customer_id
        ) review_stats ON c.id = review_stats.customer_id
        LEFT JOIN (
            SELECT customer_id, COUNT(*) AS return_count
            FROM returns GROUP BY customer_id
        ) return_stats ON c.id = return_stats.customer_id
        GROUP BY c.grade
        ORDER BY CASE c.grade WHEN 'VIP' THEN 1 WHEN 'GOLD' THEN 2 WHEN 'SILVER' THEN 3 WHEN 'BRONZE' THEN 4 END;
    hints:
      - ko: "각 지표를 서브쿼리로 따로 집계한 뒤 `customers`의 `grade`로 GROUP BY."
        en: "Aggregate each metric separately as subqueries, then GROUP BY grade."
    max_score: 10
    tags: [LEFT JOIN, FROM subquery, COALESCE, NULLIF, customers, orders, reviews, returns]

  - id: i09c-19
    level: 3
    type: "SELECT"
    question: |
      재고 위험 상품 점검: 현재 재고가 최근 30일 판매량보다 적은 상품을 찾으세요. 예상 소진일 포함. 상위 15개.
    question_en: |
      Low stock risk check: Find products where current stock is less than 30-day sales volume. Include estimated days left. Top 15.
    reference_sql:
      common: |
        SELECT
            p.name, p.stock_qty AS current_stock,
            COALESCE(sales.qty_30d, 0) AS sold_30d,
            CASE
                WHEN COALESCE(sales.qty_30d, 0) = 0 THEN '판매 없음'
                ELSE CAST(ROUND(p.stock_qty * 30.0 / sales.qty_30d) AS INTEGER) || '일'
            END AS est_days_left
        FROM products p
        LEFT JOIN (
            SELECT oi.product_id, SUM(oi.quantity) AS qty_30d
            FROM order_items oi
            INNER JOIN orders o ON oi.order_id = o.id
            WHERE o.ordered_at >= date('now', '-30 days') AND o.status NOT IN ('cancelled')
            GROUP BY oi.product_id
        ) sales ON p.id = sales.product_id
        WHERE p.is_active = 1 AND p.stock_qty < COALESCE(sales.qty_30d, 0)
        ORDER BY p.stock_qty ASC
        LIMIT 15;
    hints:
      - ko: "최근 30일 판매량은 `order_items JOIN orders`에서 `ordered_at >= date('now', '-30 days')`로 계산."
        en: "Calculate 30-day sales from order_items JOIN orders with date filter."
    max_score: 10
    tags: [LEFT JOIN, CASE, COALESCE, date, products, order_items]

  - id: i09c-20
    level: 3
    type: "SELECT"
    question: |
      카테고리 계층 분석: 대분류(depth=0)별로 소속 상품 수, 총 매출, 평균 리뷰 평점을 조회하세요.
    question_en: |
      Category hierarchy analysis: Find product count, total revenue, and avg review rating per top-level category (depth=0).
    reference_sql:
      common: |
        SELECT
            top_cat.name AS top_category,
            COUNT(DISTINCT p.id) AS product_count,
            COALESCE(SUM(sales.revenue), 0) AS total_revenue,
            ROUND(AVG(rev.avg_rating), 1) AS avg_rating
        FROM categories top_cat
        LEFT JOIN categories mid_cat ON mid_cat.parent_id = top_cat.id
        LEFT JOIN categories sub_cat ON sub_cat.parent_id = mid_cat.id
        LEFT JOIN products p ON p.category_id IN (top_cat.id, mid_cat.id, sub_cat.id)
        LEFT JOIN (
            SELECT product_id, SUM(subtotal) AS revenue FROM order_items GROUP BY product_id
        ) sales ON p.id = sales.product_id
        LEFT JOIN (
            SELECT product_id, AVG(rating) AS avg_rating FROM reviews GROUP BY product_id
        ) rev ON p.id = rev.product_id
        WHERE top_cat.depth = 0
        GROUP BY top_cat.id, top_cat.name
        ORDER BY total_revenue DESC;
    hints:
      - ko: "카테고리의 `parent_id`를 따라 올라가야 합니다. `categories`를 자기 자신과 JOIN하여 대분류를 찾으세요."
        en: "Follow the category parent_id upward. Self-JOIN categories to find the top-level."
    max_score: 10
    tags: [self JOIN, LEFT JOIN, hierarchy, categories, products]

  - id: i09c-21
    level: 3
    type: "SELECT"
    question: |
      공급업체 성과 비교: 공급업체별 공급 상품 수, 총 매출, 평균 리뷰 평점, 반품률. 매출 상위 10개.
    question_en: |
      Supplier performance comparison: product count, revenue, avg rating, return rate per supplier. Top 10 by revenue.
    reference_sql:
      common: |
        SELECT
            s.company_name,
            COUNT(DISTINCT p.id) AS product_count,
            COALESCE(SUM(sales.revenue), 0) AS total_revenue,
            ROUND(AVG(rev.avg_rating), 1) AS avg_rating,
            ROUND(100.0 * COALESCE(SUM(ret.return_count), 0)
                / NULLIF(COALESCE(SUM(sales.sold_count), 0), 0), 2) AS return_rate_pct
        FROM suppliers s
        INNER JOIN products p ON p.supplier_id = s.id
        LEFT JOIN (SELECT product_id, SUM(subtotal) AS revenue, COUNT(*) AS sold_count FROM order_items GROUP BY product_id) sales ON p.id = sales.product_id
        LEFT JOIN (SELECT product_id, AVG(rating) AS avg_rating FROM reviews GROUP BY product_id) rev ON p.id = rev.product_id
        LEFT JOIN (SELECT oi.product_id, COUNT(DISTINCT r.id) AS return_count FROM returns r INNER JOIN orders o ON r.order_id = o.id INNER JOIN order_items oi ON o.id = oi.order_id GROUP BY oi.product_id) ret ON p.id = ret.product_id
        GROUP BY s.id, s.company_name
        ORDER BY total_revenue DESC
        LIMIT 10;
    hints:
      - ko: "각 지표를 서브쿼리로 분리하면 깔끔합니다."
        en: "Separating each metric into subqueries keeps it clean."
    max_score: 10
    tags: [multi-table JOIN, FROM subquery, NULLIF, suppliers, products]

  - id: i09c-22
    level: 3
    type: "SELECT"
    question: |
      쿠폰 효과 분석: 쿠폰 사용/미사용 주문의 평균 결제금액, 평균 상품 수, 완료율을 비교하세요.
    question_en: |
      Coupon impact analysis: Compare avg amount, avg items, and completion rate between coupon-used and non-coupon orders.
    reference_sql:
      common: |
        SELECT
            CASE WHEN cu.id IS NOT NULL THEN '쿠폰 사용' ELSE '쿠폰 미사용' END AS coupon_group,
            COUNT(DISTINCT o.id) AS order_count,
            ROUND(AVG(o.total_amount)) AS avg_amount,
            ROUND(AVG(item_stats.item_count), 1) AS avg_items,
            ROUND(100.0 * SUM(CASE WHEN o.status = 'confirmed' THEN 1 ELSE 0 END)
                / COUNT(DISTINCT o.id), 1) AS confirm_rate_pct
        FROM orders o
        LEFT JOIN coupon_usage cu ON o.id = cu.order_id
        LEFT JOIN (SELECT order_id, COUNT(*) AS item_count FROM order_items GROUP BY order_id) item_stats ON o.id = item_stats.order_id
        GROUP BY CASE WHEN cu.id IS NOT NULL THEN '쿠폰 사용' ELSE '쿠폰 미사용' END;
    hints:
      - ko: "`orders LEFT JOIN coupon_usage`로 연결. `CASE WHEN cu.id IS NOT NULL THEN '사용' ELSE '미사용' END`로 구분."
        en: "JOIN orders LEFT JOIN coupon_usage. Distinguish with CASE on cu.id IS NOT NULL."
    max_score: 10
    tags: [LEFT JOIN, CASE, GROUP BY, coupon_usage, orders]

  - id: i09c-23
    level: 2
    type: "SELECT"
    question: |
      위시리스트 전환 분석: 카테고리별 위시리스트→구매 전환율을 조회하세요. 5건 이상만. 상위 10개.
    question_en: |
      Wishlist conversion analysis: Find conversion rate per category for wishlisted products. 5+ entries only. Top 10.
    reference_sql:
      common: |
        SELECT
            cat.name AS category,
            COUNT(*) AS wishlist_count,
            SUM(w.is_purchased) AS purchased_count,
            ROUND(100.0 * SUM(w.is_purchased) / COUNT(*), 1) AS conversion_rate_pct
        FROM wishlists w
        INNER JOIN products p ON w.product_id = p.id
        INNER JOIN categories cat ON p.category_id = cat.id
        GROUP BY cat.id, cat.name
        HAVING COUNT(*) >= 5
        ORDER BY conversion_rate_pct DESC
        LIMIT 10;
    hints:
      - ko: "`wishlists`의 `is_purchased` 칼럼으로 전환 여부를 파악."
        en: "Determine conversion via `wishlists.is_purchased`."
    max_score: 10
    tags: [INNER JOIN, GROUP BY, HAVING, SUM, wishlists, products, categories]

  - id: i09c-24
    level: 2
    type: "SELECT"
    question: |
      고객 문의 응답 분석: 문의 유형별 평균 해결 시간, 해결률, 에스컬레이션 비율을 조회하세요.
    question_en: |
      Customer inquiry response analysis: Find avg resolution time, resolution rate, and escalation rate per inquiry type.
    reference_sql:
      common: |
        SELECT
            category,
            COUNT(*) AS total_count,
            ROUND(AVG(CASE WHEN resolved_at IS NOT NULL THEN julianday(resolved_at) - julianday(created_at) END), 1) AS avg_resolve_days,
            ROUND(100.0 * SUM(CASE WHEN resolved_at IS NOT NULL THEN 1 ELSE 0 END) / COUNT(*), 1) AS resolve_rate_pct,
            ROUND(100.0 * SUM(escalated) / COUNT(*), 1) AS escalation_rate_pct
        FROM complaints
        GROUP BY category
        ORDER BY total_count DESC;
    hints:
      - ko: "`julianday(resolved_at) - julianday(created_at)`로 해결 시간. `SUM(escalated)`로 에스컬레이션 집계."
        en: "Resolution time: julianday difference. Escalation: SUM(escalated)."
    max_score: 10
    tags: [julianday, CASE, SUM, AVG, GROUP BY, complaints]

  - id: i09c-25
    level: 3
    type: "SELECT"
    question: |
      종합 대시보드 쿼리: 총 고객 수, 활성 고객 수, 이번 달/지난 달 매출, 평균 주문 금액, 평균 리뷰 평점, 미해결 문의 건수를 한 번에 조회하세요.
    question_en: |
      Comprehensive dashboard query: Total customers, active customers, this/last month revenue, avg order amount, avg review rating, and unresolved inquiries in one query.
    reference_sql:
      common: |
        SELECT '총 고객 수' AS metric, CAST(COUNT(*) AS TEXT) AS value FROM customers
        UNION ALL
        SELECT '활성 고객 수', CAST(COUNT(*) AS TEXT) FROM customers WHERE is_active = 1
        UNION ALL
        SELECT '이번 달 매출', CAST(COALESCE(SUM(total_amount), 0) AS TEXT) FROM orders WHERE SUBSTR(ordered_at, 1, 7) = strftime('%Y-%m', 'now') AND status NOT IN ('cancelled')
        UNION ALL
        SELECT '지난 달 매출', CAST(COALESCE(SUM(total_amount), 0) AS TEXT) FROM orders WHERE SUBSTR(ordered_at, 1, 7) = strftime('%Y-%m', 'now', '-1 month') AND status NOT IN ('cancelled')
        UNION ALL
        SELECT '평균 주문 금액', CAST(ROUND(AVG(total_amount)) AS TEXT) FROM orders WHERE status NOT IN ('cancelled')
        UNION ALL
        SELECT '평균 리뷰 평점', CAST(ROUND(AVG(rating), 2) AS TEXT) FROM reviews
        UNION ALL
        SELECT '미해결 문의', CAST(COUNT(*) AS TEXT) FROM complaints WHERE status NOT IN ('resolved', 'closed');
    hints:
      - ko: "각 KPI를 `SELECT '지표명' AS metric, 값 AS value` 형태로 만들고 `UNION ALL`로 합칩니다."
        en: "Create each KPI as SELECT with metric name and value, combine with UNION ALL."
    max_score: 10
    tags: [UNION ALL, CAST, strftime, dashboard, multiple tables]
