metadata:
  id: intermediate-03-subqueries
  title: "서브쿼리와 데이터 변환"
  title_en: "Subqueries and Data Transformation"
  difficulty: intermediate
  concepts: [scalar subquery, correlated subquery, CTE, CASE WHEN, NOT EXISTS, UNION ALL, window functions]
  prerequisites: [intermediate-05-joins, intermediate-06-dates]
  estimated_minutes: 40
  default_level: 2
  default_type: "Subquery/CTE"

problems:
  - id: i07-01
    level: 2
    type: "Subquery/CTE"
    question: |
      전체 평균 가격보다 비싼 상품의 이름과 가격을 조회하세요.
    question_en: |
      Retrieve the name and price of products that are more expensive than the overall average price.
    reference_sql:
      common: |
        SELECT name, price
        FROM products
        WHERE price > (SELECT AVG(price) FROM products)
        ORDER BY price DESC;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE price > (SELECT AVG(price) FROM products)` 형태의 스칼라 서브쿼리 사용."
        en: "Use a scalar subquery: `WHERE price > (SELECT AVG(price) FROM products)`."
    max_score: 10
    tags: [scalar subquery, AVG, products]

  - id: i07-02
    level: 3
    type: "Aggregate"
    question: |
      판매 수량 1위 상품의 이름, 카테고리, 총 판매량, 총 매출을 구하세요.
    question_en: |
      Find the name, category, total quantity sold, and total revenue of the #1 best-selling product.
    reference_sql:
      common: |
        SELECT
            p.name,
            cat.name AS category,
            SUM(oi.quantity) AS total_sold,
            ROUND(SUM(oi.quantity * oi.unit_price), 2) AS total_revenue
        FROM order_items AS oi
        INNER JOIN products AS p ON oi.product_id = p.id
        INNER JOIN categories AS cat ON p.category_id = cat.id
        INNER JOIN orders AS o ON oi.order_id = o.id
        WHERE o.status NOT IN ('cancelled')
        GROUP BY p.id, p.name, cat.name
        ORDER BY total_sold DESC
        LIMIT 1;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "`order_items`를 `products`, `categories`와 JOIN 후 `GROUP BY`로 상품별 집계. `ORDER BY total_sold DESC LIMIT 1`."
        en: "JOIN `order_items` with `products` and `categories`, then aggregate per product with `GROUP BY`. Use `ORDER BY total_sold DESC LIMIT 1`."
    max_score: 10
    tags: [INNER JOIN, MULTI JOIN, GROUP BY, SUM, ORDER BY, order_items, products, categories]

  - id: i07-03
    level: 3
    type: "Subquery/CTE"
    question: |
      각 상품이 속한 카테고리의 평균 가격보다 비싼 상품만 조회하세요.
    question_en: |
      Retrieve only the products that are more expensive than the average price of their category.
    reference_sql:
      common: |
        SELECT p.name, p.price, cat.name AS category, cat_avg.avg_price
        FROM products AS p
        INNER JOIN categories AS cat ON p.category_id = cat.id
        INNER JOIN (
            SELECT category_id, ROUND(AVG(price), 2) AS avg_price
            FROM products
            GROUP BY category_id
        ) AS cat_avg ON p.category_id = cat_avg.category_id
        WHERE p.price > cat_avg.avg_price
        ORDER BY p.price DESC
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "카테고리별 평균 가격을 서브쿼리(인라인 뷰)로 구한 뒤, `JOIN`으로 연결하여 `WHERE p.price > cat_avg.avg_price`."
        en: "Calculate the category average price in a subquery (inline view), then `JOIN` it and filter with `WHERE p.price > cat_avg.avg_price`."
    max_score: 10
    tags: [derived table, INNER JOIN, AVG, GROUP BY, products, categories]

  - id: i07-04
    level: 3
    type: "Subquery/CTE"
    question: |
      평균 평점 4.5 이상이지만 총 매출이 하위 50%인 상품을 찾으세요.
    question_en: |
      Find products with an average rating of 4.5 or higher but whose total revenue is below the median (bottom 50%).
    reference_sql:
      common: |
        WITH product_stats AS (
            SELECT
                p.id,
                p.name,
                ROUND(AVG(r.rating), 2) AS avg_rating,
                COALESCE(SUM(oi.quantity * oi.unit_price), 0) AS revenue
            FROM products AS p
            LEFT JOIN reviews AS r ON p.id = r.product_id
            LEFT JOIN order_items AS oi ON p.id = oi.product_id
            GROUP BY p.id, p.name
            HAVING COUNT(r.id) >= 3
        )
        SELECT name, avg_rating, ROUND(revenue, 2) AS revenue
        FROM product_stats
        WHERE avg_rating >= 4.5
          AND revenue < (SELECT AVG(revenue) FROM product_stats)
        ORDER BY avg_rating DESC;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "CTE로 상품별 평균 평점과 매출을 구한 뒤, 평점 필터 + 매출이 전체 평균 미만인 조건으로 필터링."
        en: "Calculate per-product average rating and revenue in a CTE, then filter by rating threshold and revenue below the overall average."
    max_score: 10
    tags: [CTE, HAVING, COALESCE, scalar subquery, products, reviews, order_items]

  - id: i07-05
    level: 3
    type: "CASE/IF"
    question: |
      주문을 금액 기준으로 소액(5만 미만), 중액(5~20만), 대액(20~50만), 고액(50만 이상)으로 분류하고 각 등급의 건수와 비율을 구하세요.
    question_en: |
      Classify orders by amount into tiers -- small (under 50K), medium (50K-200K), large (200K-500K), premium (500K+) -- and find the count and ratio for each tier.
    reference_sql:
      common: |
        SELECT
            CASE
                WHEN total_amount < 50000 THEN '소액 (5만 미만)'
                WHEN total_amount < 200000 THEN '중액 (5~20만)'
                WHEN total_amount < 500000 THEN '대액 (20~50만)'
                ELSE '고액 (50만 이상)'
            END AS tier,
            COUNT(*) AS cnt,
            ROUND(100.0 * COUNT(*) / SUM(COUNT(*)) OVER (), 1) AS pct,
            ROUND(AVG(total_amount), 2) AS avg_amount
        FROM orders
        WHERE status NOT IN ('cancelled')
        GROUP BY tier
        ORDER BY MIN(total_amount);
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`CASE WHEN total_amount < 50000 THEN '소액' ...`으로 등급 분류 후 `GROUP BY`. 비율은 윈도우 함수 `SUM(COUNT(*)) OVER ()` 활용."
        en: "Classify tiers with `CASE WHEN total_amount < 50000 THEN 'Small' ...`, then `GROUP BY`. Calculate the ratio using the window function `SUM(COUNT(*)) OVER ()`."
    max_score: 10
    tags: [CASE, SUM OVER, GROUP BY, orders]

  - id: i07-06
    level: 3
    type: "Subquery/CTE"
    question: |
      위시리스트에 담았지만 한 번도 주문하지 않은 고객-상품 조합을 찾으세요.
    question_en: |
      Find customer-product combinations that are in a wishlist but have never been ordered.
    reference_sql:
      common: |
        SELECT
            c.name AS customer,
            p.name AS product,
            w.created_at AS wishlisted_at
        FROM wishlists AS w
        INNER JOIN customers AS c ON w.customer_id = c.id
        INNER JOIN products AS p ON w.product_id = p.id
        WHERE NOT EXISTS (
            SELECT 1
            FROM order_items AS oi
            INNER JOIN orders AS o ON oi.order_id = o.id
            WHERE o.customer_id = w.customer_id
              AND oi.product_id = w.product_id
              AND o.status NOT IN ('cancelled')
        )
        ORDER BY w.created_at DESC
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`NOT EXISTS`로 해당 고객이 해당 상품을 주문한 이력이 있는지 확인하는 상관 서브쿼리 사용."
        en: "Use `NOT EXISTS` with a correlated subquery to check if the customer has ever ordered that product."
    max_score: 10
    tags: [EXISTS, correlated subquery, INNER JOIN, wishlists, order_items, orders]

  - id: i07-07
    level: 2
    type: "Aggregate"
    question: |
      카드 결제의 발급사(card_issuer)별 건수, 평균 결제 금액, 할부 비율을 구하세요.
    question_en: |
      Find the count, average payment amount, and installment ratio per card issuer.
    reference_sql:
      common: |
        SELECT
            card_issuer,
            COUNT(*) AS tx_count,
            ROUND(AVG(amount), 2) AS avg_amount,
            ROUND(100.0 * SUM(CASE WHEN installment_months > 0 THEN 1 ELSE 0 END) / COUNT(*), 1) AS installment_pct
        FROM payments
        WHERE method = 'card'
          AND card_issuer IS NOT NULL
        GROUP BY card_issuer
        ORDER BY tx_count DESC;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`WHERE method = 'card'`로 카드 결제만 필터 후 `GROUP BY card_issuer`. 할부 비율은 `CASE WHEN installment_months > 0` 조건부 집계."
        en: "Filter card payments with `WHERE method = 'card'`, then `GROUP BY card_issuer`. Calculate installment ratio with conditional aggregation using `CASE WHEN installment_months > 0`."
    max_score: 10
    tags: [GROUP BY, CASE, AVG, COUNT, payments]

  - id: i07-08
    level: 2
    type: "Aggregate"
    question: |
      고객 문의 채널(channel)별 건수, 해결률, 평균 처리 시간을 구하세요.
    question_en: |
      Find the count, resolution rate, and average processing time per customer inquiry channel.
    reference_sql:
      common: |
        SELECT
            channel,
            COUNT(*) AS total,
            ROUND(100.0 * SUM(CASE WHEN status IN ('resolved', 'closed') THEN 1 ELSE 0 END) / COUNT(*), 1) AS resolution_pct,
            ROUND(AVG(CASE
                WHEN resolved_at IS NOT NULL
                THEN JULIANDAY(resolved_at) - JULIANDAY(created_at)
            END), 1) AS avg_days
        FROM complaints
        GROUP BY channel
        ORDER BY total DESC;
    supported_db: [sqlite]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`GROUP BY channel`로 집계. 해결률은 `CASE WHEN status IN ('resolved','closed')`로 조건부 카운트. 처리 시간은 `JULIANDAY` 차이."
        en: "Aggregate with `GROUP BY channel`. Calculate resolution rate with `CASE WHEN status IN ('resolved','closed')` conditional counting. Processing time uses `JULIANDAY` difference."
    max_score: 10
    tags: [GROUP BY, CASE, AVG, COUNT, date arithmetic, complaints]

  - id: i07-09
    level: 3
    type: "Subquery/CTE"
    question: |
      리뷰도 작성하고 위시리스트에도 상품을 등록한 고객의 이름, 리뷰 수, 위시리스트 수를 구하세요.
    question_en: |
      Find the name, review count, and wishlist count of customers who have both written reviews and added items to their wishlist.
    reference_sql:
      common: |
        SELECT
            c.name,
            r_cnt.review_count,
            w_cnt.wishlist_count
        FROM customers AS c
        INNER JOIN (
            SELECT customer_id, COUNT(*) AS review_count
            FROM reviews GROUP BY customer_id
        ) AS r_cnt ON c.id = r_cnt.customer_id
        INNER JOIN (
            SELECT customer_id, COUNT(*) AS wishlist_count
            FROM wishlists GROUP BY customer_id
        ) AS w_cnt ON c.id = w_cnt.customer_id
        ORDER BY r_cnt.review_count DESC
        LIMIT 15;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "리뷰와 위시리스트를 각각 서브쿼리로 집계한 뒤, 두 서브쿼리를 `INNER JOIN`으로 연결 (양쪽 모두 존재하는 고객만)."
        en: "Aggregate reviews and wishlists in separate subqueries, then `INNER JOIN` them together (only customers present in both)."
    max_score: 10
    tags: [derived table, INNER JOIN, GROUP BY, customers, reviews, wishlists]

  - id: i07-10
    level: 2
    type: "JOIN/UNION"
    question: |
      상품별 이미지 수를 구하고, 이미지가 없는 상품도 포함하세요.
    question_en: |
      Find the image count per product, including products with no images.
    reference_sql:
      common: |
        SELECT
            p.name,
            COUNT(pi.id) AS image_count,
            SUM(CASE WHEN pi.is_primary = 1 THEN 1 ELSE 0 END) AS has_primary
        FROM products AS p
        LEFT JOIN product_images AS pi ON p.id = pi.product_id
        GROUP BY p.id, p.name
        ORDER BY image_count ASC
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`products LEFT JOIN product_images`로 이미지 없는 상품도 포함. `COUNT(pi.id)`는 NULL을 세지 않으므로 0이 됨."
        en: "`products LEFT JOIN product_images` to include products without images. `COUNT(pi.id)` doesn't count NULLs, so it returns 0."
    max_score: 10
    tags: [LEFT JOIN, COUNT, CASE, products, product_images]

  - id: i07-11
    level: 2
    type: "Aggregate"
    question: |
      장바구니 상태(active/converted/abandoned)별 건수와 비율을 구하세요.
    question_en: |
      Find the count and percentage per cart status (active/converted/abandoned).
    reference_sql:
      common: |
        SELECT
            status,
            COUNT(*) AS cnt,
            ROUND(100.0 * COUNT(*) / SUM(COUNT(*)) OVER (), 1) AS pct
        FROM carts
        GROUP BY status
        ORDER BY cnt DESC;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`GROUP BY status`로 집계. 비율은 `100.0 * COUNT(*) / SUM(COUNT(*)) OVER ()`로 전체 대비 비율 계산."
        en: "Aggregate with `GROUP BY status`. Calculate the ratio with `100.0 * COUNT(*) / SUM(COUNT(*)) OVER ()`."
    max_score: 10
    tags: [GROUP BY, SUM OVER, COUNT, carts]

  - id: i07-12
    level: 2
    type: "JOIN/UNION"
    question: |
      주문 취소 이벤트와 반품 요청 이벤트를 하나의 타임라인으로 합치세요. 최근 20건.
    question_en: |
      Combine order cancellation events and return request events into a single timeline. Show the 20 most recent.
    reference_sql:
      common: |
        SELECT '취소' AS event_type, order_number AS reference, cancelled_at AS event_date
        FROM orders
        WHERE status = 'cancelled' AND cancelled_at IS NOT NULL
        UNION ALL
        SELECT '반품' AS event_type, CAST(order_id AS TEXT), requested_at
        FROM returns
        WHERE requested_at IS NOT NULL
        ORDER BY event_date DESC
        LIMIT 20;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "`UNION ALL`로 두 SELECT를 합치되, 컬럼 수와 의미를 맞춰야 함. 이벤트 유형 구분 컬럼 추가."
        en: "Combine two SELECTs with `UNION ALL`, matching the number and meaning of columns. Add an event type column to distinguish them."
    max_score: 10
    tags: [UNION, CAST, ORDER BY, orders, returns]
