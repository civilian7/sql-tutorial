metadata:
  id: intermediate-08-transactions
  title: "트랜잭션"
  title_en: "Transactions"
  difficulty: intermediate
  concepts: [BEGIN, COMMIT, ROLLBACK, SAVEPOINT, RELEASE, atomicity, concurrency control]
  tables: [orders, products, customers, payments]
  prerequisites: [intermediate-07-ddl]
  estimated_minutes: 35
  default_level: 2
  default_type: "Transaction"

problems:
  - id: i08t-01
    level: 1
    type: "Transaction"
    question: |
      가장 기본적인 트랜잭션을 실행하세요. temp_account 테이블을 만들고, 두 계좌를 INSERT한 뒤 COMMIT하세요.
    question_en: |
      Execute the most basic transaction. Create temp_account, INSERT two accounts, and COMMIT.
    reference_sql:
      common: |
        CREATE TABLE temp_account (
            id      INTEGER PRIMARY KEY,
            name    TEXT NOT NULL,
            balance INTEGER NOT NULL DEFAULT 0
        );

        BEGIN;
        INSERT INTO temp_account (id, name, balance) VALUES (1, '김철수', 100000);
        INSERT INTO temp_account (id, name, balance) VALUES (2, '이영희', 200000);
        COMMIT;

        SELECT * FROM temp_account;
    hints:
      - ko: "`BEGIN;` → INSERT 문 2개 → `COMMIT;` 순서입니다. COMMIT 전까지는 다른 연결에서 변경 내용이 보이지 않습니다."
        en: "`BEGIN;` -> 2 INSERT statements -> `COMMIT;`. Changes are not visible to other connections until COMMIT."
    max_score: 10
    tags: [BEGIN, COMMIT, INSERT]

  - id: i08t-02
    level: 1
    type: "Transaction"
    question: |
      ROLLBACK으로 변경을 취소하세요. 김철수의 잔액을 0으로 만드는 실수를 하고, ROLLBACK으로 되돌리세요.
    question_en: |
      Use ROLLBACK to undo changes. Accidentally set balance to 0, then ROLLBACK to recover.
    reference_sql:
      common: |
        SELECT * FROM temp_account WHERE id = 1;

        BEGIN;
        UPDATE temp_account SET balance = 0 WHERE id = 1;
        SELECT id, name, balance FROM temp_account WHERE id = 1;
        ROLLBACK;

        SELECT id, name, balance FROM temp_account WHERE id = 1;
    hints:
      - ko: "`BEGIN;` → UPDATE → 결과 확인 → `ROLLBACK;` → 복구 확인. ROLLBACK은 BEGIN 이후의 모든 변경을 취소합니다."
        en: "`BEGIN;` -> UPDATE -> verify -> `ROLLBACK;` -> verify recovery. ROLLBACK undoes all changes since BEGIN."
    max_score: 10
    tags: [BEGIN, ROLLBACK, UPDATE]

  - id: i08t-03
    level: 2
    type: "Transaction"
    question: |
      원자성(Atomicity)을 확인하세요. 김철수 → 이영희에게 30,000원 이체. 출금과 입금을 하나의 트랜잭션으로 묶으세요.
    question_en: |
      Verify atomicity. Transfer 30,000 won from 김철수 to 이영희. Wrap withdrawal and deposit in a single transaction.
    reference_sql:
      common: |
        SELECT id, name, balance FROM temp_account;

        BEGIN;
        UPDATE temp_account SET balance = balance - 30000 WHERE id = 1;
        UPDATE temp_account SET balance = balance + 30000 WHERE id = 2;
        COMMIT;

        SELECT id, name, balance FROM temp_account;
    hints:
      - ko: "트랜잭션 안에서 UPDATE 2번: 한쪽은 `balance - 30000`, 다른 쪽은 `balance + 30000`. 두 UPDATE가 모두 성공해야 COMMIT합니다."
        en: "Two UPDATEs in a transaction: one `balance - 30000`, the other `balance + 30000`. Both must succeed before COMMIT."
    max_score: 10
    tags: [BEGIN, COMMIT, atomicity, UPDATE]

  - id: i08t-04
    level: 2
    type: "Transaction"
    question: |
      실패 시 ROLLBACK하세요. 잔액(70,000)보다 큰 금액(500,000)을 이체하려고 합니다. 잔액 부족을 확인하고 ROLLBACK하세요.
    question_en: |
      ROLLBACK on failure. Attempt to transfer 500,000 (more than balance of 70,000). Check insufficient funds and ROLLBACK.
    reference_sql:
      common: |
        BEGIN;
        UPDATE temp_account SET balance = balance - 500000 WHERE id = 1;
        SELECT id, name, balance FROM temp_account WHERE id = 1;
        ROLLBACK;

        SELECT id, name, balance FROM temp_account WHERE id = 1;
    hints:
      - ko: "출금 UPDATE 후 잔액이 음수인지 SELECT로 확인합니다. 음수라면 ROLLBACK."
        en: "After UPDATE, check with SELECT if balance is negative. If negative, ROLLBACK."
    max_score: 10
    tags: [BEGIN, ROLLBACK, validation]

  - id: i08t-05
    level: 2
    type: "Transaction"
    question: |
      여러 INSERT를 트랜잭션으로 묶어 성능을 확인하세요. temp_log에 여러 건의 로그를 INSERT하세요.
    question_en: |
      Bundle multiple INSERTs in a transaction for performance. Insert multiple log records into temp_log.
    reference_sql:
      common: |
        CREATE TABLE temp_log (
            id         INTEGER PRIMARY KEY AUTOINCREMENT,
            message    TEXT NOT NULL,
            created_at TEXT NOT NULL DEFAULT CURRENT_TIMESTAMP
        );

        BEGIN;
        INSERT INTO temp_log (message) VALUES ('로그 1');
        INSERT INTO temp_log (message) VALUES ('로그 2');
        INSERT INTO temp_log (message) VALUES ('로그 3');
        INSERT INTO temp_log (message) VALUES ('로그 100');
        COMMIT;

        SELECT COUNT(*) AS total FROM temp_log;
    hints:
      - ko: "SQLite에서 트랜잭션 없이 INSERT하면 매 건마다 디스크에 쓰기가 발생합니다. `BEGIN`/`COMMIT`으로 묶으면 한 번만 씁니다."
        en: "Without a transaction, SQLite performs disk writes for every row. Wrapping with `BEGIN`/`COMMIT` results in only one write."
    max_score: 10
    tags: [BEGIN, COMMIT, INSERT, performance]

  - id: i08t-06
    level: 2
    type: "Transaction"
    question: |
      SAVEPOINT를 사용하여 부분 롤백하세요. 3번째 삽입만 취소하고 나머지는 유지하세요.
    question_en: |
      Use SAVEPOINT for partial rollback. Undo only the 3rd insertion, keep the rest.
    reference_sql:
      common: |
        BEGIN;
        INSERT INTO temp_account (id, name, balance) VALUES (3, '박민수', 150000);
        SAVEPOINT sp_after_park;
        INSERT INTO temp_account (id, name, balance) VALUES (4, '정수연', 80000);
        SAVEPOINT sp_after_jung;
        INSERT INTO temp_account (id, name, balance) VALUES (5, '오류데이터', -999);
        ROLLBACK TO sp_after_jung;
        COMMIT;

        SELECT * FROM temp_account ORDER BY id;
    hints:
      - ko: "`SAVEPOINT sp1;` → INSERT → `SAVEPOINT sp2;` → INSERT → `ROLLBACK TO sp2;`로 sp2 이후 변경만 취소합니다."
        en: "`ROLLBACK TO sp2;` undoes only changes after sp2."
    max_score: 10
    tags: [SAVEPOINT, ROLLBACK TO, partial rollback]

  - id: i08t-07
    level: 3
    type: "Transaction"
    question: |
      중첩 SAVEPOINT를 사용하세요. 여러 단계의 데이터 수정에서 원하는 지점으로 돌아가세요.
    question_en: |
      Use nested SAVEPOINTs. Roll back to a specific point across multiple stages of modifications.
    reference_sql:
      common: |
        SELECT id, name, balance FROM temp_account ORDER BY id;

        BEGIN;
        UPDATE temp_account SET balance = balance + 10000 WHERE id = 1;
        SAVEPOINT sp_a;
        UPDATE temp_account SET balance = balance + 20000 WHERE id = 2;
        SAVEPOINT sp_b;
        UPDATE temp_account SET balance = balance - 50000 WHERE id = 3;
        ROLLBACK TO sp_b;
        UPDATE temp_account SET balance = balance + 5000 WHERE id = 3;
        COMMIT;

        SELECT id, name, balance FROM temp_account ORDER BY id;
    hints:
      - ko: "SAVEPOINT는 이름으로 구분됩니다. `ROLLBACK TO B`는 B 이후의 변경만 취소하고 A ~ B까지의 변경은 유지합니다."
        en: "SAVEPOINTs are identified by name. `ROLLBACK TO B` undoes only changes after B."
    max_score: 10
    tags: [SAVEPOINT, nested, ROLLBACK TO]

  - id: i08t-08
    level: 2
    type: "Transaction"
    question: |
      SAVEPOINT를 활용한 일괄 처리: 모든 계좌에 이자 1%를 지급하세요.
    question_en: |
      Batch processing with SAVEPOINTs: Apply 1% interest to all accounts.
    reference_sql:
      common: |
        SELECT id, name, balance FROM temp_account ORDER BY id;

        BEGIN;
        SAVEPOINT sp_before_interest;
        UPDATE temp_account
        SET balance = balance + CAST(balance * 0.01 AS INTEGER);
        SELECT id, name, balance,
               CAST(balance * 0.01 AS INTEGER) AS interest
        FROM temp_account ORDER BY id;
        COMMIT;

        SELECT id, name, balance FROM temp_account ORDER BY id;
    hints:
      - ko: "전체 계좌에 일괄 적용 후 확인하는 방식으로 풀어봅니다."
        en: "Apply to all accounts at once then verify."
    max_score: 10
    tags: [SAVEPOINT, UPDATE, batch processing]

  - id: i08t-09
    level: 2
    type: "Transaction"
    question: |
      RELEASE SAVEPOINT를 이해하세요. SAVEPOINT를 만들고, 정상 처리가 확인되면 RELEASE하세요.
    question_en: |
      Understand RELEASE SAVEPOINT. Create a SAVEPOINT, then RELEASE it once normal processing is confirmed.
    reference_sql:
      common: |
        BEGIN;
        INSERT INTO temp_account (id, name, balance) VALUES (5, '최지우', 300000);
        SAVEPOINT sp_insert;
        RELEASE SAVEPOINT sp_insert;
        UPDATE temp_account SET balance = balance + 1000 WHERE id = 5;
        COMMIT;

        SELECT * FROM temp_account WHERE id = 5;
    hints:
      - ko: "`RELEASE SAVEPOINT sp1;`은 해당 SAVEPOINT를 삭제합니다. 이후 `ROLLBACK TO sp1`은 불가능해집니다. RELEASE는 COMMIT이 아닙니다."
        en: "`RELEASE SAVEPOINT sp1;` removes that SAVEPOINT. After that, `ROLLBACK TO sp1` would error. RELEASE is not COMMIT."
    max_score: 10
    tags: [RELEASE SAVEPOINT]

  - id: i08t-10
    level: 2
    type: "Transaction"
    question: |
      트랜잭션 내에서 DDL의 동작을 확인하세요. CREATE TABLE 후 ROLLBACK하면 테이블이 사라지나요?
    question_en: |
      Verify DDL behavior within transactions. Does CREATE TABLE get rolled back?
    reference_sql:
      common: |
        BEGIN;
        CREATE TABLE temp_will_vanish (
            id   INTEGER PRIMARY KEY,
            data TEXT
        );
        INSERT INTO temp_will_vanish VALUES (1, '사라질 데이터');
        ROLLBACK;

        SELECT COUNT(*) AS cnt
        FROM sqlite_master
        WHERE name = 'temp_will_vanish';
    hints:
      - ko: "SQLite에서 `BEGIN` → `CREATE TABLE` → `INSERT` → `ROLLBACK`을 실행하면 테이블 생성 자체가 취소됩니다."
        en: "In SQLite, `BEGIN` -> `CREATE TABLE` -> `INSERT` -> `ROLLBACK` cancels the table creation itself."
    max_score: 10
    tags: [DDL in transaction, ROLLBACK, CREATE TABLE]

  - id: i08t-11
    level: 2
    type: "Transaction"
    question: |
      주문 처리 트랜잭션: 잔액 차감 → 잔액 확인 → 거래 기록. 음수면 ROLLBACK.
    question_en: |
      Order processing transaction: deduct balance -> verify -> record transaction. ROLLBACK if negative.
    reference_sql:
      common: |
        SELECT balance FROM temp_account WHERE id = 1;

        BEGIN;
        UPDATE temp_account SET balance = balance - 50000 WHERE id = 1;
        SELECT balance FROM temp_account WHERE id = 1;
        INSERT INTO temp_log (message)
        VALUES ('김철수 50,000원 결제 - 잔액: 30800');
        COMMIT;

        SELECT id, name, balance FROM temp_account WHERE id = 1;
    hints:
      - ko: "UPDATE → SELECT로 잔액 확인 → 음수면 ROLLBACK, 양수면 INSERT + COMMIT."
        en: "UPDATE -> SELECT to check balance -> if negative ROLLBACK, if positive INSERT + COMMIT."
    max_score: 10
    tags: [BEGIN, COMMIT, ROLLBACK, business logic]

  - id: i08t-12
    level: 3
    type: "Transaction"
    question: |
      포인트 이체 트랜잭션: 이영희에서 박민수에게 50,000 포인트 이체. SAVEPOINT 사용.
    question_en: |
      Point transfer transaction: Transfer 50,000 from 이영희 to 박민수 using SAVEPOINT.
    reference_sql:
      common: |
        BEGIN;
        UPDATE temp_account SET balance = balance - 50000 WHERE id = 2;
        SAVEPOINT sp_withdrawal;
        SELECT balance FROM temp_account WHERE id = 2;
        UPDATE temp_account SET balance = balance + 50000 WHERE id = 3;
        INSERT INTO temp_log (message)
        VALUES ('이영희 → 박민수 50,000 이체');
        COMMIT;

        SELECT id, name, balance FROM temp_account ORDER BY id;
    hints:
      - ko: "출금 → SAVEPOINT → 입금 → 이체 기록 → COMMIT. 입금에서 문제가 생기면 SAVEPOINT로 돌아갈 수 있습니다."
        en: "Withdrawal -> SAVEPOINT -> Deposit -> Transfer record -> COMMIT."
    max_score: 10
    tags: [SAVEPOINT, transfer, multi-step]

  - id: i08t-13
    level: 3
    type: "Transaction"
    question: |
      일괄 등급 업데이트를 트랜잭션으로 처리하세요. 잔액 기준 등급 부여 (200,000+: VIP, 100,000+: GOLD, 그 외: SILVER).
    question_en: |
      Process a bulk grade update with a transaction. Assign grades based on balance.
    reference_sql:
      common: |
        CREATE TABLE temp_grade (
            account_id INTEGER PRIMARY KEY,
            name       TEXT NOT NULL,
            grade      TEXT NOT NULL,
            balance    INTEGER NOT NULL
        );

        BEGIN;
        DELETE FROM temp_grade;
        INSERT INTO temp_grade (account_id, name, grade, balance)
        SELECT
            id, name,
            CASE
                WHEN balance >= 200000 THEN 'VIP'
                WHEN balance >= 100000 THEN 'GOLD'
                ELSE 'SILVER'
            END,
            balance
        FROM temp_account;
        COMMIT;

        SELECT * FROM temp_grade ORDER BY balance DESC;
    hints:
      - ko: "`BEGIN` → `DELETE`(기존 데이터 제거) → `INSERT ... SELECT`로 등급 계산 → `COMMIT`."
        en: "`BEGIN` -> `DELETE` (clear existing) -> `INSERT ... SELECT` for grade calculation -> `COMMIT`."
    max_score: 10
    tags: [BEGIN, COMMIT, INSERT SELECT, CASE, bulk operation]

  - id: i08t-14
    level: 3
    type: "Transaction"
    question: |
      복잡한 비즈니스 시나리오: 주문 취소 처리. 취소 기록 → 환불 → 완료 기록을 SAVEPOINT로 단계별 처리하세요.
    question_en: |
      Complex business scenario: order cancellation. Record cancellation -> refund -> record completion with step-by-step SAVEPOINTs.
    reference_sql:
      common: |
        BEGIN;
        SAVEPOINT sp_step1;
        INSERT INTO temp_log (message) VALUES ('주문 취소 요청 - 고객: 김철수');
        SAVEPOINT sp_step2;
        UPDATE temp_account SET balance = balance + 50000 WHERE id = 1;
        SAVEPOINT sp_step3;
        INSERT INTO temp_log (message) VALUES ('환불 완료 - 김철수 +50,000원');
        COMMIT;

        SELECT id, name, balance FROM temp_account WHERE id = 1;
        SELECT id, message, created_at FROM temp_log ORDER BY id DESC LIMIT 3;
    hints:
      - ko: "SAVEPOINT를 단계별로 사용하면 어디서 실패했는지 파악하기 쉽습니다. 최종적으로 문제가 없으면 COMMIT합니다."
        en: "Using SAVEPOINTs at each step makes it easier to identify failures. COMMIT if everything is fine."
    max_score: 10
    tags: [SAVEPOINT, multi-step, business logic]

  - id: i08t-15
    level: 1
    type: "Transaction"
    question: |
      정리: 트랜잭션 연습에서 만든 모든 임시 테이블을 삭제하세요. 삭제 자체도 하나의 트랜잭션으로 묶으세요.
    question_en: |
      Cleanup: Drop all temporary tables. Wrap the deletion in a single transaction.
    reference_sql:
      common: |
        SELECT name FROM sqlite_master
        WHERE type = 'table' AND name LIKE 'temp_%'
        ORDER BY name;

        BEGIN;
        DROP TABLE IF EXISTS temp_grade;
        DROP TABLE IF EXISTS temp_log;
        DROP TABLE IF EXISTS temp_account;
        COMMIT;

        SELECT name FROM sqlite_master
        WHERE type = 'table' AND name LIKE 'temp_%';
    hints:
      - ko: "SQLite에서는 DDL도 트랜잭션에 포함됩니다. `BEGIN` → `DROP TABLE` 여러 번 → `COMMIT`이 가능합니다."
        en: "In SQLite, DDL is included in transactions. `BEGIN` -> multiple `DROP TABLE` -> `COMMIT` is possible."
    max_score: 10
    tags: [BEGIN, COMMIT, DROP TABLE, cleanup]
