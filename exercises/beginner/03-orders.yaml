metadata:
  id: beginner-03-orders
  title: "주문 기초"
  title_en: "Order Basics"
  difficulty: beginner
  concepts: [SELECT, WHERE, GROUP BY, COUNT, SUM, AVG, MAX, ROUND, SUBSTR, STRFTIME, CASE WHEN, LIKE, subquery]
  prerequisites: []
  estimated_minutes: 20
  default_level: 1
  default_type: "SELECT"
  description: "orders, payments 테이블을 사용합니다."
  description_en: "Uses orders and payments tables."

problems:
  - id: b03-01
    level: 1
    type: "Aggregate"
    question: |
      전체 주문 수와 총 매출을 구하세요.
    question_en: |
      Find the total number of orders and total revenue.
    reference_sql:
      common: |
        SELECT
            COUNT(*) AS total_orders,
            ROUND(SUM(total_amount), 2) AS total_revenue
        FROM orders;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "COUNT(*)와 SUM(total_amount)를 함께 사용하세요"
        en: "Use COUNT(*) and SUM(total_amount) together"
    rubric:
      ko: "COUNT(*)와 SUM(total_amount)를 사용해야 함"
      en: "Must use COUNT(*) and SUM(total_amount)"
    max_score: 10
    tags: [SELECT, COUNT, SUM, orders]

  - id: b03-02
    level: 1
    type: "Aggregate"
    question: |
      주문 상태(status)별 건수를 구하세요.
    question_en: |
      Find the count of orders per status.
    reference_sql:
      common: |
        SELECT status, COUNT(*) AS cnt
        FROM orders
        GROUP BY status
        ORDER BY cnt DESC;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "GROUP BY status와 COUNT(*)를 사용하세요"
        en: "Use GROUP BY status and COUNT(*)"
    rubric:
      ko: "GROUP BY status와 COUNT(*)를 사용해야 함"
      en: "Must use GROUP BY status and COUNT(*)"
    max_score: 10
    tags: [SELECT, GROUP BY, COUNT, ORDER BY, orders]

  - id: b03-03
    level: 1
    type: "Aggregate"
    question: |
      2024년에 접수된 주문 수와 총 매출을 구하세요.
    question_en: |
      Find the number of orders and total revenue for 2024.
    reference_sql:
      common: |
        SELECT
            COUNT(*) AS order_count,
            ROUND(SUM(total_amount), 2) AS revenue
        FROM orders
        WHERE ordered_at LIKE '2024%';
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "WHERE ordered_at LIKE '2024%'로 2024년 데이터만 필터링하세요"
        en: "Filter for 2024 data only with WHERE ordered_at LIKE '2024%'"
    rubric:
      ko: "WHERE ordered_at LIKE '2024%'를 사용해야 함"
      en: "Must use WHERE ordered_at LIKE '2024%'"
    max_score: 10
    tags: [SELECT, WHERE, LIKE, COUNT, SUM, orders]

  - id: b03-04
    level: 2
    type: "Subquery/CTE"
    question: |
      취소(cancelled) 상태의 주문 수와 취소율(%)을 구하세요.
    question_en: |
      Find the number of cancelled orders and the cancellation rate (%).
    reference_sql:
      common: |
        SELECT
            COUNT(*) AS cancelled_count,
            ROUND(100.0 * COUNT(*) / (SELECT COUNT(*) FROM orders), 2) AS cancel_rate
        FROM orders
        WHERE status = 'cancelled';
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "취소율은 100.0 * COUNT(*) / (SELECT COUNT(*) FROM orders)로 계산. 서브쿼리로 전체 수를 구하세요"
        en: "Calculate the cancellation rate with 100.0 * COUNT(*) / (SELECT COUNT(*) FROM orders). Use a subquery to get the total count"
    rubric:
      ko: "서브쿼리로 전체 수를 구하고 비율 계산해야 함"
      en: "Must use a subquery for total count and calculate ratio"
    max_score: 10
    tags: [SELECT, WHERE, COUNT, scalar subquery, orders]

  - id: b03-05
    level: 1
    type: "SELECT"
    question: |
      주문 금액이 가장 큰 상위 10건의 주문번호, 금액, 주문일을 조회하세요.
    question_en: |
      Retrieve the order number, amount, and order date of the top 10 orders by amount.
    reference_sql:
      common: |
        SELECT order_number, total_amount, ordered_at
        FROM orders
        ORDER BY total_amount DESC
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "ORDER BY total_amount DESC로 정렬 후 LIMIT 10"
        en: "Sort with ORDER BY total_amount DESC then LIMIT 10"
    rubric:
      ko: "ORDER BY total_amount DESC와 LIMIT 10을 사용해야 함"
      en: "Must use ORDER BY total_amount DESC and LIMIT 10"
    max_score: 10
    tags: [SELECT, ORDER BY, LIMIT, orders]

  - id: b03-06
    level: 2
    type: "String/Date"
    question: |
      2024년 월별 주문 수와 매출을 구하세요.
    question_en: |
      Find the number of orders and revenue per month in 2024.
    reference_sql:
      common: |
        SELECT
            SUBSTR(ordered_at, 1, 7) AS month,
            COUNT(*) AS orders,
            ROUND(SUM(total_amount), 2) AS revenue
        FROM orders
        WHERE ordered_at LIKE '2024%'
        GROUP BY SUBSTR(ordered_at, 1, 7)
        ORDER BY month;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "SUBSTR(ordered_at, 1, 7)로 'YYYY-MM'을 추출하고 GROUP BY로 월별 집계. WHERE로 2024년 필터링"
        en: "Extract 'YYYY-MM' with SUBSTR(ordered_at, 1, 7) and aggregate monthly with GROUP BY. Filter for 2024 with WHERE"
    rubric:
      ko: "SUBSTR로 월 추출 후 GROUP BY와 WHERE를 사용해야 함"
      en: "Must extract month with SUBSTR then use GROUP BY and WHERE"
    max_score: 10
    tags: [SELECT, SUBSTR, WHERE, GROUP BY, COUNT, SUM, orders]

  - id: b03-07
    level: 2
    type: "CASE/IF"
    question: |
      전체 평균 주문 금액과 취소 제외 평균을 비교하세요.
    question_en: |
      Compare the overall average order amount with the average excluding cancelled orders.
    reference_sql:
      common: |
        SELECT
            ROUND(AVG(total_amount), 2) AS avg_all,
            ROUND(AVG(CASE
                WHEN status NOT IN ('cancelled') THEN total_amount
            END), 2) AS avg_excl_cancelled
        FROM orders;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "AVG(total_amount)와 AVG(CASE WHEN status NOT IN ('cancelled') THEN total_amount END)를 한 쿼리에서 비교"
        en: "Compare AVG(total_amount) with AVG(CASE WHEN status NOT IN ('cancelled') THEN total_amount END) in a single query"
    rubric:
      ko: "AVG와 CASE WHEN을 사용해야 함"
      en: "Must use AVG and CASE WHEN"
    max_score: 10
    tags: [SELECT, AVG, CASE, orders]

  - id: b03-08
    level: 2
    type: "CASE/IF"
    question: |
      배송비(shipping_fee)가 0인 주문의 비율을 구하세요.
    question_en: |
      Find the percentage of orders with zero shipping fee.
    reference_sql:
      common: |
        SELECT
            SUM(CASE WHEN shipping_fee = 0 THEN 1 ELSE 0 END) AS free_shipping,
            COUNT(*) AS total,
            ROUND(100.0 * SUM(CASE WHEN shipping_fee = 0 THEN 1 ELSE 0 END) / COUNT(*), 1) AS pct
        FROM orders;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "SUM(CASE WHEN shipping_fee = 0 THEN 1 ELSE 0 END)로 조건부 카운트. 전체 COUNT(*)로 나눠 비율 계산"
        en: "Use SUM(CASE WHEN shipping_fee = 0 THEN 1 ELSE 0 END) for conditional counting. Divide by COUNT(*) to calculate the ratio"
    rubric:
      ko: "CASE WHEN으로 조건부 카운트와 비율 계산해야 함"
      en: "Must use CASE WHEN for conditional counting and ratio calculation"
    max_score: 10
    tags: [SELECT, SUM, CASE, COUNT, orders]

  - id: b03-09
    level: 1
    type: "Aggregate"
    question: |
      적립금(point_used)을 사용한 주문의 수와 평균 사용 금액을 구하세요.
    question_en: |
      Find the number of orders that used points and the average amount of points used.
    reference_sql:
      common: |
        SELECT
            COUNT(*) AS orders_with_points,
            ROUND(AVG(point_used), 0) AS avg_points_used,
            MAX(point_used) AS max_points_used
        FROM orders
        WHERE point_used > 0;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "WHERE point_used > 0으로 적립금 사용 주문만 필터링. AVG(point_used)로 평균 계산"
        en: "Filter with WHERE point_used > 0 for orders that used points. Calculate the average with AVG(point_used)"
    rubric:
      ko: "WHERE point_used > 0과 AVG를 사용해야 함"
      en: "Must use WHERE point_used > 0 and AVG"
    max_score: 10
    tags: [SELECT, WHERE, COUNT, AVG, MAX, orders]

  - id: b03-10
    level: 1
    type: "Aggregate"
    question: |
      결제 수단(method)별 건수와 총 결제 금액을 구하세요.
    question_en: |
      Find the count and total payment amount per payment method.
    reference_sql:
      common: |
        SELECT
            method,
            COUNT(*) AS tx_count,
            ROUND(SUM(amount), 2) AS total_amount
        FROM payments
        GROUP BY method
        ORDER BY total_amount DESC;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "payments 테이블에서 GROUP BY method로 그룹화. COUNT(*)와 SUM(amount) 사용"
        en: "Group with GROUP BY method from the payments table. Use COUNT(*) and SUM(amount)"
    rubric:
      ko: "payments 테이블에서 GROUP BY method를 사용해야 함"
      en: "Must use GROUP BY method from the payments table"
    max_score: 10
    tags: [SELECT, GROUP BY, COUNT, SUM, ORDER BY, payments]

  - id: b03-11
    level: 2
    type: "CASE/IF"
    question: |
      카드 결제 중 할부(installment_months > 0) 비율과 평균 할부 개월을 구하세요.
    question_en: |
      Find the installment ratio and average installment months among card payments.
    reference_sql:
      common: |
        SELECT
            COUNT(*) AS card_payments,
            SUM(CASE WHEN installment_months > 0 THEN 1 ELSE 0 END) AS installment_count,
            ROUND(100.0 * SUM(CASE WHEN installment_months > 0 THEN 1 ELSE 0 END) / COUNT(*), 1) AS installment_pct,
            ROUND(AVG(CASE WHEN installment_months > 0 THEN installment_months END), 1) AS avg_months
        FROM payments
        WHERE method = 'card';
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "WHERE method = 'card'로 카드 결제만 필터. CASE WHEN으로 할부 건수를 세고, 조건부 AVG로 평균 개월 계산"
        en: "Filter card payments with WHERE method = 'card'. Use CASE WHEN to count installment transactions and conditional AVG for average months"
    rubric:
      ko: "WHERE method = 'card'와 CASE WHEN을 사용해야 함"
      en: "Must use WHERE method = 'card' and CASE WHEN"
    max_score: 10
    tags: [SELECT, WHERE, CASE, COUNT, SUM, AVG, payments]

  - id: b03-12
    level: 2
    type: "String/Date"
    question: |
      요일별(월~일) 주문 수를 구하세요.
    question_en: |
      Find the number of orders per day of the week (Mon-Sun).
    reference_sql:
      common: |
        SELECT
            CASE CAST(STRFTIME('%w', ordered_at) AS INTEGER)
                WHEN 0 THEN '일'
                WHEN 1 THEN '월'
                WHEN 2 THEN '화'
                WHEN 3 THEN '수'
                WHEN 4 THEN '목'
                WHEN 5 THEN '금'
                WHEN 6 THEN '토'
            END AS day_name,
            COUNT(*) AS order_count
        FROM orders
        GROUP BY STRFTIME('%w', ordered_at)
        ORDER BY STRFTIME('%w', ordered_at);
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "STRFTIME('%w', ordered_at)로 요일 번호(0=일, 1=월, ...)를 추출. CASE로 한글 요일명 매핑"
        en: "Extract the day-of-week number with STRFTIME('%w', ordered_at) (0=Sun, 1=Mon, ...). Map to day names with CASE"
    rubric:
      ko: "STRFTIME과 CASE를 사용해야 함"
      en: "Must use STRFTIME and CASE"
    max_score: 10
    tags: [SELECT, CASE, GROUP BY, COUNT, date extract, orders]

  - id: b03-13
    level: 2
    type: "CASE/IF"
    question: |
      배송 메모(notes)가 있는 주문의 비율을 구하세요.
    question_en: |
      Find the percentage of orders that have a delivery note (notes).
    reference_sql:
      common: |
        SELECT
            SUM(CASE WHEN notes IS NOT NULL THEN 1 ELSE 0 END) AS with_notes,
            COUNT(*) AS total,
            ROUND(100.0 * SUM(CASE WHEN notes IS NOT NULL THEN 1 ELSE 0 END) / COUNT(*), 1) AS pct
        FROM orders;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "CASE WHEN notes IS NOT NULL THEN 1 ELSE 0 END로 메모 유무를 판별하고 SUM으로 집계"
        en: "Determine note presence with CASE WHEN notes IS NOT NULL THEN 1 ELSE 0 END and aggregate with SUM"
    rubric:
      ko: "CASE WHEN과 IS NOT NULL을 사용해야 함"
      en: "Must use CASE WHEN and IS NOT NULL"
    max_score: 10
    tags: [SELECT, SUM, CASE, COUNT, orders]

  - id: b03-14
    level: 2
    type: "Aggregate"
    question: |
      연도별 주문 수, 총 매출, 평균 주문 금액을 구하세요. 취소 주문은 제외합니다.
    question_en: |
      Find the order count, total revenue, and average order amount per year. Exclude cancelled orders.
    reference_sql:
      common: |
        SELECT
            SUBSTR(ordered_at, 1, 4) AS year,
            COUNT(*) AS orders,
            ROUND(SUM(total_amount), 2) AS revenue,
            ROUND(AVG(total_amount), 2) AS avg_order
        FROM orders
        WHERE status NOT IN ('cancelled')
        GROUP BY SUBSTR(ordered_at, 1, 4)
        ORDER BY year;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "WHERE status NOT IN ('cancelled')로 취소 제외. SUBSTR(ordered_at, 1, 4)로 연도 추출 후 GROUP BY"
        en: "Exclude cancelled orders with WHERE status NOT IN ('cancelled'). Extract the year with SUBSTR(ordered_at, 1, 4) then GROUP BY"
    rubric:
      ko: "NOT IN으로 취소 제외하고 SUBSTR로 연도 추출해야 함"
      en: "Must exclude cancelled with NOT IN and extract year with SUBSTR"
    max_score: 10
    tags: [SELECT, WHERE, SUBSTR, GROUP BY, COUNT, SUM, AVG, orders]

  - id: b03-15
    level: 1
    type: "Aggregate"
    question: |
      환불(refunded) 상태의 결제 건수와 총 환불 금액을 구하세요.
    question_en: |
      Find the count and total amount of refunded payments.
    reference_sql:
      common: |
        SELECT
            COUNT(*) AS refund_count,
            ROUND(SUM(amount), 2) AS total_refunded
        FROM payments
        WHERE status = 'refunded';
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "payments 테이블에서 WHERE status = 'refunded'로 필터링. COUNT(*)와 SUM(amount) 사용"
        en: "Filter with WHERE status = 'refunded' from the payments table. Use COUNT(*) and SUM(amount)"
    rubric:
      ko: "WHERE status = 'refunded'를 사용해야 함"
      en: "Must use WHERE status = 'refunded'"
    max_score: 10
    tags: [SELECT, WHERE, COUNT, SUM, payments]
