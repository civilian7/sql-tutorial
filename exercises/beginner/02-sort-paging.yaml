        WHERE created_at >= '2025-01-01'
          AND grade IN ('GOLD', 'VIP')
        ORDER BY point_balance DESC
        LIMIT 5;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "WHERE created_at >= '2025-01-01' AND grade IN ('GOLD', 'VIP')로 조건을 조합합니다"
        en: "Combine conditions with WHERE created_at >= '2025-01-01' AND grade IN ('GOLD', 'VIP')"
    rubric:
      ko: "날짜 조건과 IN을 AND로 결합해야 함"
      en: "Must combine date condition and IN with AND"
    max_score: 10
    tags: [SELECT, WHERE, IN, ORDER BY, LIMIT, customers]

  - id: b02s-29
    level: 3
    type: "SELECT"
    question: |
      ASUS 브랜드가 아닌 상품(`brand != 'ASUS'`) 중 삼성전자, LG전자, MSI도 제외한 상품을 가격 내림차순으로 5개 조회하세요. 이름, 브랜드, 가격을 출력합니다.
    question_en: |
      View 5 non-ASUS brand products (`brand != 'ASUS'`) excluding Samsung Electronics, LG Electronics, and MSI in descending order of price. Prints name, brand, and price.
    reference_sql:
      common: |
        SELECT name, brand, price
        FROM products
        WHERE brand NOT IN ('ASUS', '삼성전자', 'LG전자', 'MSI')
        ORDER BY price DESC
        LIMIT 5;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "NOT IN을 사용하면 여러 값을 한꺼번에 제외할 수 있습니다"
        en: "NOT IN allows you to exclude multiple values at once"
    rubric:
      ko: "NOT IN을 사용해야 함"
      en: "Must use NOT IN"
    max_score: 10
    tags: [SELECT, WHERE, NOT IN, ORDER BY, LIMIT, products]

  - id: b02s-30
    level: 3
    type: "SELECT"
    question: |
      무게(`weight_grams`)가 기록된 상품 중 가장 무거운 상품 5개의 이름, 무게(그램), 가격을 조회하세요. 무게를 킬로그램으로 환산한 `weight_kg` 칼럼도 함께 출력하세요.
    question_en: |
      Look up the names, weights (grams), and prices of the five heaviest products among products with recorded weight (`weight_grams`). Also print the `weight_kg` column, which converts the weight to kilograms.
    reference_sql:
      common: |
        SELECT name,
               weight_grams,
               ROUND(weight_grams / 1000.0, 1) AS weight_kg,
               price
        FROM products
        WHERE weight_grams IS NOT NULL
        ORDER BY weight_grams DESC
        LIMIT 5;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "WHERE weight_grams IS NOT NULL로 무게가 있는 상품만 필터링합니다. weight_grams / 1000.0으로 킬로그램을 계산합니다"
        en: "Filter only products with weight by WHERE weight_grams IS NOT NULL. Calculate kilograms with weight_grams / 1000.0"
    rubric:
      ko: "IS NOT NULL 필터링과 산술 연산을 사용해야 함"
      en: "Must use IS NOT NULL filtering and arithmetic operations"
    max_score: 10
    tags: [SELECT, WHERE, IS NOT NULL, ORDER BY, LIMIT, AS, products]
