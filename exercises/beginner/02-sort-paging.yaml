    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "WHERE stock_qty <= 10으로 필터링하고 ORDER BY stock_qty ASC, price DESC로 다중 정렬합니다"
        en: "Filter by WHERE stock_qty <= 10 and multi-sort by ORDER BY stock_qty ASC, price DESC"
    rubric:
      ko: "WHERE 필터링과 다중 정렬을 사용해야 함"
      en: "Must use WHERE filtering and multiple sorting"
    max_score: 10
    tags: [SELECT, WHERE, ORDER BY, products]

  - id: b02s-23
    level: 2
    type: "SELECT"
    question: |
      한 번도 로그인하지 않은 고객(`last_login_at`이 NULL)을 가입일 순서대로 정렬하여 이름, 이메일, 등급을 10명 조회하세요.
    question_en: |
      View 10 customers who have never logged in (`last_login_at` is NULL) by name, email, and rating by sorting them in order of sign-up date.
    reference_sql:
      common: |
        SELECT name, email, grade
        FROM customers
        WHERE last_login_at IS NULL
        ORDER BY created_at ASC
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "NULL 여부는 = NULL이 아니라 IS NULL로 확인합니다"
        en: "NULL is checked with IS NULL, not = NULL"
    rubric:
      ko: "WHERE last_login_at IS NULL을 사용해야 함"
      en: "Must use WHERE last_login_at IS NULL"
    max_score: 10
    tags: [SELECT, WHERE, IS NULL, ORDER BY, LIMIT, customers]

  - id: b02s-24
    level: 2
    type: "SELECT"
    question: |
      상품의 이름, 가격, 부가세 포함 가격을 조회하세요. 부가세 포함 가격은 `price * 1.1`로 계산하고 `price_with_tax`라는 별칭을 붙이세요. 부가세 포함 가격이 비싼 순서대로 5개만 출력합니다.
    question_en: |
      Check the product name, price, and price including VAT. Calculate the price including VAT as `price * 1.1` and add the aliases `price_with_tax`. Only 5 items will be printed in order of highest price including VAT.
    reference_sql:
      common: |
        SELECT name, price, ROUND(price * 1.1) AS price_with_tax
        FROM products
        ORDER BY price_with_tax DESC
        LIMIT 5;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "ROUND(price * 1.1)로 소수점을 정리하면 깔끔한 결과를 얻을 수 있습니다"
        en: "You can get neat results by organizing the decimal points with ROUND(price * 1.1)"
    rubric:
      ko: "산술 연산과 ROUND, AS 별칭을 사용해야 함"
      en: "Must use arithmetic operations, ROUND, and AS alias"
    max_score: 10
    tags: [SELECT, ORDER BY, LIMIT, AS, ROUND, products]

  - id: b02s-25
    level: 2
    type: "SELECT"
    question: |
      2024년에 접수된 주문(`ordered_at`이 2024년) 중 주문 금액이 가장 큰 5건의 주문번호, 주문 금액, 주문일을 조회하세요.
    question_en: |
      Look up the order number, order amount, and order date of the five orders with the largest order amount among orders received in 2024 (`ordered_at` is 2024).
    reference_sql:
      common: |
        SELECT order_number, total_amount, ordered_at
        FROM orders
        WHERE ordered_at >= '2024-01-01'
          AND ordered_at < '2025-01-01'
        ORDER BY total_amount DESC
        LIMIT 5;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "WHERE ordered_at >= '2024-01-01' AND ordered_at < '2025-01-01'로 2024년 범위를 지정합니다"
        en: "Specify the range to 2024 with WHERE ordered_at >= '2024-01-01' AND ordered_at < '2025-01-01'"
    rubric:
      ko: "날짜 범위 필터링과 ORDER BY, LIMIT를 사용해야 함"
      en: "Must use date range filtering with ORDER BY and LIMIT"
    max_score: 10
    tags: [SELECT, WHERE, ORDER BY, LIMIT, orders]

  - id: b02s-26
    level: 2
    type: "SELECT"
    question: |
      할인 금액(`discount_amount`)이 0보다 큰 주문을 할인 금액이 큰 순서대로 정렬하여 주문번호, 주문 금액, 할인 금액, 주문일을 5건 조회하세요.
    question_en: |
      Order orders with a discount amount (`discount_amount`) greater than 0 in descending order of discount amount, and view 5 order numbers, order amount, discount amount, and order date.
