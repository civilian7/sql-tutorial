metadata:
  id: beginner-05-null
  title: NULL 처리
  title_en: NULL Handling
  difficulty: beginner
  concepts:
  - IS NULL
  - IS NOT NULL
  - COALESCE
  - IFNULL
  - NULL and aggregates
  - NULL sorting
  tables:
  - customers
  - orders
  - products
  prerequisites: []
  estimated_minutes: 30
  default_level: 1
  default_type: SELECT
  description: customers, orders, products 테이블을 사용합니다.
  description_en: Uses customers, orders, products tables.
problems:
- id: b05n-01
  level: 1
  type: SELECT
  question: |
    생년월일(`birth_date`)이 없는 고객의 이름과 이메일을 조회하세요.
  question_en: |
    Query the name and email of customers who do not have a date of birth (`birth_date`).
  reference_sql:
    common: |
      SELECT name, email
      FROM customers
      WHERE birth_date IS NULL;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: NULL 값을 찾으려면 `= NULL`이 아니라 `IS NULL`을 사용해야 합니다.
    en: To find NULL values, you must use `IS NULL` instead of `= NULL`.
  rubric:
    ko: NULL 값을 찾으려면 `= NULL`이 아니라 `IS NULL`을 사용해야 합니다.
    en: To find NULL values, you must use `IS NULL` instead of `= NULL`.
  max_score: 10
  tags: []
- id: b05n-02
  level: 1
  type: SELECT
  question: |
    성별(`gender`)이 입력되어 있는 고객의 수를 구하세요.
  question_en: |
    Find the number of customers who have a gender (`gender`) value entered.
  reference_sql:
    common: |
      SELECT COUNT(*) AS gender_filled_count
      FROM customers
      WHERE gender IS NOT NULL;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`IS NOT NULL`로 값이 있는 행만 필터링한 뒤 `COUNT(*)`로 셉니다.'
    en: Filter only rows with values using `IS NOT NULL`, then count with `COUNT(*)`.
  rubric:
    ko: '`IS NOT NULL`로 값이 있는 행만 필터링한 뒤 `COUNT(*)`로 셉니다.'
    en: Filter only rows with values using `IS NOT NULL`, then count with `COUNT(*)`.
  max_score: 10
  tags: []
- id: b05n-03
  level: 1
  type: SELECT
  question: |
    한 번도 로그인하지 않은(`last_login_at`이 NULL인) 고객의 이름, 등급, 가입일을 조회하세요.
  question_en: |
    Query the name, tier, and signup date of customers who have never logged in (`last_login_at` is NULL).
  reference_sql:
    common: |
      SELECT name, grade, created_at
      FROM customers
      WHERE last_login_at IS NULL;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`last_login_at IS NULL`로 로그인 기록이 없는 고객을 찾습니다.'
    en: Use `last_login_at IS NULL` to find customers with no login history.
  rubric:
    ko: '`last_login_at IS NULL`로 로그인 기록이 없는 고객을 찾습니다.'
    en: Use `last_login_at IS NULL` to find customers with no login history.
  max_score: 10
  tags: []
- id: b05n-04
  level: 1
  type: SELECT
  question: |
    배송 요청사항(`notes`)이 있는 주문의 주문번호와 요청사항을 최근 주문 순으로 10건 조회하세요.
  question_en: |
    Query the order number and delivery notes (`notes`) for orders that have delivery instructions. Show the 10 most recent orders.
  reference_sql:
    common: |
      SELECT order_number, notes
      FROM orders
      WHERE notes IS NOT NULL
      ORDER BY ordered_at DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`IS NOT NULL`로 notes가 비어있지 않은 주문만 필터링합니다.'
    en: Use `IS NOT NULL` to filter only orders where notes is not empty.
  rubric:
    ko: '`IS NOT NULL`로 notes가 비어있지 않은 주문만 필터링합니다.'
    en: Use `IS NOT NULL` to filter only orders where notes is not empty.
  max_score: 10
  tags: []
- id: b05n-05
  level: 1
  type: SELECT
  question: |
    취소된 주문(`cancelled_at`이 NULL이 아닌)의 수를 구하세요.
  question_en: |
    Find the number of cancelled orders (where `cancelled_at` is not NULL).
  reference_sql:
    common: |
      SELECT COUNT(*) AS cancelled_count
      FROM orders
      WHERE cancelled_at IS NOT NULL;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`cancelled_at IS NOT NULL`이면 취소 일시가 기록된, 즉 취소된 주문입니다.'
    en: If `cancelled_at IS NOT NULL`, it means the cancellation date was recorded, i.e., the order was cancelled.
  rubric:
    ko: '`cancelled_at IS NOT NULL`이면 취소 일시가 기록된, 즉 취소된 주문입니다.'
    en: If `cancelled_at IS NOT NULL`, it means the cancellation date was recorded, i.e.
  max_score: 10
  tags: []
- id: b05n-06
  level: 1
  type: SELECT
  question: |
    상품의 사양 정보(`specs`)가 없는 상품의 이름과 브랜드를 조회하세요.
  question_en: |
    Query the name and brand of products that have no specification information (`specs`).
  reference_sql:
    common: |
      SELECT name, brand
      FROM products
      WHERE specs IS NULL;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`specs IS NULL`로 사양 정보가 누락된 상품을 찾습니다.'
    en: Use `specs IS NULL` to find products with missing specification information.
  rubric:
    ko: '`specs IS NULL`로 사양 정보가 누락된 상품을 찾습니다.'
    en: Use `specs IS NULL` to find products with missing specification information.
  max_score: 10
  tags: []
- id: b05n-07
  level: 1
  type: SELECT
  question: |
    고객의 이름과 성별을 조회하되, 성별이 NULL이면 '미입력'으로 표시하세요.
  question_en: |
    Query the name and gender of customers, displaying 'N/A' when gender is NULL.
  reference_sql:
    common: |
      SELECT name, COALESCE(gender, '미입력') AS gender
      FROM customers;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`COALESCE(칼럼, 대체값)`은 칼럼이 NULL일 때 대체값을 반환합니다.'
    en: '`COALESCE(column, replacement)` returns the replacement value when the column is NULL.'
  rubric:
    ko: '`COALESCE(칼럼, 대체값)`은 칼럼이 NULL일 때 대체값을 반환합니다.'
    en: '`COALESCE(column, replacement)` returns the replacement value when the column is'
  max_score: 10
  tags: []
- id: b05n-08
  level: 1
  type: SELECT
  question: |
    주문의 주문번호와 배송 요청사항을 조회하되, 요청사항이 없으면 '없음'으로 표시하세요. 최근 10건만 조회합니다.
  question_en: |
    Query the order number and delivery notes, displaying 'None' when notes are missing. Show only the 10 most recent orders.
  reference_sql:
    common: |
      SELECT order_number, IFNULL(notes, '없음') AS notes
      FROM orders
      ORDER BY ordered_at DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`IFNULL(notes, ''없음'')` 또는 `COALESCE(notes, ''없음'')`을 사용합니다. SQLite에서 둘 다 동작합니다.'
    en: Use `IFNULL(notes, 'None')` or `COALESCE(notes, 'None')`. Both work in SQLite.
  rubric:
    ko: '`IFNULL(notes, ''없음'')` 또는 `COALESCE(notes, ''없음'')`을 사용합니다. SQLite에서 둘 다 동작합니다.'
    en: Use `IFNULL(notes, 'None')` or `COALESCE(notes, 'None')`. Both work in SQLite.
  max_score: 10
  tags: []
- id: b05n-09
  level: 1
  type: SELECT
  question: |
    단종일(`discontinued_at`)이 있는 상품의 이름, 가격, 단종일을 조회하세요.
  question_en: |
    Query the name, price, and discontinuation date of products that have a discontinuation date (`discontinued_at`).
  reference_sql:
    common: |
      SELECT name, price, discontinued_at
      FROM products
      WHERE discontinued_at IS NOT NULL;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`discontinued_at IS NOT NULL`이면 단종된 상품입니다.'
    en: If `discontinued_at IS NOT NULL`, the product has been discontinued.
  rubric:
    ko: '`discontinued_at IS NOT NULL`이면 단종된 상품입니다.'
    en: If `discontinued_at IS NOT NULL`, the product has been discontinued.
  max_score: 10
  tags: []
- id: b05n-10
  level: 1
  type: SELECT
  question: |
    구매 확정(`completed_at`)이 아직 되지 않은 주문 중 취소도 되지 않은 주문의 수를 구하세요.
  question_en: |
    Find the number of orders that have not been confirmed (`completed_at`) and have not been cancelled either.
  reference_sql:
    common: |
      SELECT COUNT(*) AS pending_count
      FROM orders
      WHERE completed_at IS NULL
        AND cancelled_at IS NULL;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`completed_at IS NULL AND cancelled_at IS NULL`로 두 칼럼 모두 NULL인 행을 찾습니다.'
    en: Use `completed_at IS NULL AND cancelled_at IS NULL` to find rows where both columns are NULL.
  rubric:
    ko: '`completed_at IS NULL AND cancelled_at IS NULL`로 두 칼럼 모두 NULL인 행을 찾습니다.'
    en: Use `completed_at IS NULL AND cancelled_at IS NULL` to find rows where both colu
  max_score: 10
  tags: []
- id: b05n-11
  level: 2
  type: SELECT
  question: |
    고객의 이름, 생년월일, 성별을 조회하되 생년월일은 NULL이면 '정보없음', 성별은 NULL이면 '미선택'으로 표시하세요. 상위 20건만 조회합니다.
  question_en: |
    Query the name, birth date, and gender of customers, displaying 'Unknown' for NULL birth dates and 'Not specified' for NULL genders. Show only the top 20 rows.
  reference_sql:
    common: |
      SELECT name,
             COALESCE(birth_date, '정보없음') AS birth_date,
             COALESCE(gender, '미선택') AS gender
      FROM customers
      LIMIT 20;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`COALESCE`를 각 칼럼에 개별 적용합니다.'
    en: Apply `COALESCE` individually to each column.
  rubric:
    ko: '`COALESCE`를 각 칼럼에 개별 적용합니다.'
    en: Apply `COALESCE` individually to each column.
  max_score: 10
  tags: []
- id: b05n-12
  level: 2
  type: SELECT
  question: |
    상품의 이름, 무게를 조회하되 무게(`weight_grams`)가 NULL이면 0으로 대체하세요. 무게가 무거운 순으로 10건만 조회합니다.
  question_en: |
    Query the name and weight of products, replacing NULL weight (`weight_grams`) with 0. Show the 10 heaviest products.
  reference_sql:
    common: |
      SELECT name, COALESCE(weight_grams, 0) AS weight_grams
      FROM products
      ORDER BY weight_grams DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`COALESCE(weight_grams, 0)`으로 NULL을 0으로 대체한 뒤 정렬합니다.'
    en: Replace NULL with 0 using `COALESCE(weight_grams, 0)`, then sort.
  rubric:
    ko: '`COALESCE(weight_grams, 0)`으로 NULL을 0으로 대체한 뒤 정렬합니다.'
    en: Replace NULL with 0 using `COALESCE(weight_grams, 0)`, then sort.
  max_score: 10
  tags: []
- id: b05n-13
  level: 2
  type: SELECT
  question: |
    전체 고객 수와 생년월일이 입력된 고객 수를 함께 조회하세요.
  question_en: |
    Query the total number of customers and the number of customers with a birth date entered, in a single query.
  reference_sql:
    common: |
      SELECT COUNT(*) AS total_customers,
             COUNT(birth_date) AS has_birth_date
      FROM customers;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`COUNT(*)`는 모든 행을 세고, `COUNT(칼럼)`은 해당 칼럼이 NULL이 아닌 행만 셉니다.'
    en: '`COUNT(*)` counts all rows, while `COUNT(column)` counts only rows where the column is not NULL.'
  rubric:
    ko: '`COUNT(*)`는 모든 행을 세고, `COUNT(칼럼)`은 해당 칼럼이 NULL이 아닌 행만 셉니다.'
    en: '`COUNT(*)` counts all rows, while `COUNT(column)` counts only rows where the col'
  max_score: 10
  tags: []
