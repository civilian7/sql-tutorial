  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`ORDER BY discontinued_at IS NULL, discontinued_at ASC`로 NULL을 뒤로 보냅니다.'
    en: Use `ORDER BY discontinued_at IS NULL, discontinued_at ASC` to push NULLs to the end.
