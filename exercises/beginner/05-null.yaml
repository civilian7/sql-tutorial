- id: b05n-17
  level: 2
  type: SELECT
  question: |
    등급별 고객 수와 생년월일 입력률(%)을 구하세요. 입력률은 소수점 1자리까지 반올림합니다.
  question_en: |
    Find the customer count and birth date completion rate (%) per tier. Round the rate to 1 decimal place.
  reference_sql:
    common: |
      SELECT grade,
             COUNT(*) AS total,
             COUNT(birth_date) AS has_birth,
             ROUND(COUNT(birth_date) * 100.0 / COUNT(*), 1) AS birth_rate_pct
      FROM customers
      GROUP BY grade
      ORDER BY birth_rate_pct DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`COUNT(birth_date) * 100.0 / COUNT(*)`로 NULL이 아닌 비율을 계산합니다. `GROUP BY grade`로 등급별 집계합니다.'
    en: Calculate the non-NULL ratio with `COUNT(birth_date) * 100.0 / COUNT(*)`. Aggregate by tier with `GROUP BY grade`.
  rubric:
    ko: '`COUNT(birth_date) * 100.0 / COUNT(*)`로 NULL이 아닌 비율을 계산합니다. `GROUP BY grade`로 등급'
    en: Calculate the non-NULL ratio with `COUNT(birth_date) * 100.0 / COUNT(*)`. Aggreg
  max_score: 10
  tags: []
- id: b05n-18
  level: 2
  type: SELECT
  question: |
    가입 경로(`acquisition_channel`)별 고객 수를 구하되, NULL인 경우 '미분류'로 표시하세요.
  question_en: |
    Find the customer count per signup channel (`acquisition_channel`), displaying 'Unclassified' for NULL values.
  reference_sql:
    common: |
      SELECT COALESCE(acquisition_channel, '미분류') AS channel,
             COUNT(*) AS customer_count
      FROM customers
      GROUP BY COALESCE(acquisition_channel, '미분류')
      ORDER BY customer_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`COALESCE(acquisition_channel, ''미분류'')`를 SELECT와 GROUP BY 모두에 사용합니다.'
    en: Use `COALESCE(acquisition_channel, 'Unclassified')` in both `SELECT` and `GROUP BY`.
  rubric:
    ko: '`COALESCE(acquisition_channel, ''미분류'')`를 SELECT와 GROUP BY 모두에 사용합니다.'
    en: 'Use `COALESCE(acquisition_channel, ''Unclassified'')` in both `SELECT` and `GROUP '
  max_score: 10
  tags: []
- id: b05n-19
  level: 2
  type: SELECT
  question: |
    주문 상태별로 주문 수와 배송 요청사항 입력 비율(%)을 구하세요.
  question_en: |
    Find the order count and delivery notes completion rate (%) per order status.
  reference_sql:
    common: |
      SELECT status,
             COUNT(*) AS order_count,
             ROUND(COUNT(notes) * 100.0 / COUNT(*), 1) AS notes_rate_pct
      FROM orders
      GROUP BY status
      ORDER BY order_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`COUNT(notes) * 100.0 / COUNT(*)`로 notes가 NULL이 아닌 비율을 계산합니다.'
    en: Calculate the non-NULL ratio of notes with `COUNT(notes) * 100.0 / COUNT(*)`.
  rubric:
    ko: '`COUNT(notes) * 100.0 / COUNT(*)`로 notes가 NULL이 아닌 비율을 계산합니다.'
    en: Calculate the non-NULL ratio of notes with `COUNT(notes) * 100.0 / COUNT(*)`.
  max_score: 10
