  type: SELECT
  question: |
    전체 주문 수, 배송 요청사항이 있는 주문 수, 구매 확정된 주문 수를 한 번에 조회하세요.
  question_en: |
    Query the total number of orders, the number of orders with delivery notes, and the number of confirmed orders in a single query.
  reference_sql:
    common: |
      SELECT COUNT(*) AS total_orders,
             COUNT(notes) AS has_notes,
             COUNT(completed_at) AS completed
      FROM orders;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`COUNT(notes)`, `COUNT(completed_at)`처럼 각 칼럼에 `COUNT`를 적용하면 NULL이 아닌 행만 셉니다.'
    en: Applying `COUNT` to each column like `COUNT(notes)` and `COUNT(completed_at)` counts only non-NULL rows.
  rubric:
    ko: '`COUNT(notes)`, `COUNT(completed_at)`처럼 각 칼럼에 `COUNT`를 적용하면 NULL이 아닌 행만 셉니다.'
    en: Applying `COUNT` to each column like `COUNT(notes)` and `COUNT(completed_at)` co
  max_score: 10
  tags: []
- id: b05n-15
  level: 2
  type: SELECT
  question: |
    고객을 마지막 로그인일 기준 최근 순으로 정렬하되, 로그인 기록이 없는(NULL) 고객은 맨 뒤에 표시하세요. 상위 20건만 조회합니다.
  question_en: |
    Sort customers by last login date in descending order, but place customers with no login history (NULL) at the end. Show only the top 20 rows.
  reference_sql:
    common: |
      SELECT name, last_login_at
      FROM customers
      ORDER BY last_login_at IS NULL, last_login_at DESC
      LIMIT 20;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: SQLite에서 `ORDER BY 칼럼 DESC`를 사용하면 NULL이 맨 뒤로 갑니다. 또는 `ORDER BY 칼럼 IS NULL, 칼럼 DESC`로 명시적으로 제어합니다.
    en: In SQLite, using `ORDER BY column DESC` places NULLs at the end. Alternatively, use `ORDER BY column IS NULL, column
      DESC` for explicit control.
  rubric:
    ko: SQLite에서 `ORDER BY 칼럼 DESC`를 사용하면 NULL이 맨 뒤로 갑니다. 또는 `ORDER BY 칼럼 IS NULL, 칼럼 DE
    en: 'In SQLite, using `ORDER BY column DESC` places NULLs at the end. Alternatively, '
  max_score: 10
  tags: []
- id: b05n-16
  level: 2
  type: SELECT
  question: |
    상품을 단종일 기준 오래된 순으로 정렬하되, 단종되지 않은 상품(NULL)은 맨 뒤에 표시하세요. 상위 10건만 조회합니다.
  question_en: |
    Sort products by discontinuation date in ascending order, but place non-discontinued products (NULL) at the end. Show only the top 10 rows.
