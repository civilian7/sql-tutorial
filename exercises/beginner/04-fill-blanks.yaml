metadata:
  id: beginner-04-fill-blanks
  title: "빈칸 채우기"
  title_en: "Fill in the Blanks"
  difficulty: beginner
  concepts: [WHERE, ORDER BY, COUNT, HAVING, JOIN, LEFT JOIN, IS NULL, BETWEEN, CASE WHEN, COALESCE, subquery, GROUP BY, LIKE, SUBSTR, IN]
  prerequisites: []
  estimated_minutes: 20
  default_level: 1
  default_type: "SELECT"
  description: "쿼리의 핵심 부분이 ___로 비어 있습니다. 올바른 SQL을 채워 넣으세요."
  description_en: "The key parts of the query are replaced with ___. Fill in the correct SQL."

problems:
  - id: b04-01
    level: 1
    type: "SELECT"
    question: |
      VIP 등급 고객만 조회합니다.

      ```sql
      SELECT name, email, grade
      FROM customers
      WHERE ___
      ORDER BY name;
      ```
    question_en: |
      Retrieve only VIP grade customers.

      ```sql
      SELECT name, email, grade
      FROM customers
      WHERE ___
      ORDER BY name;
      ```
    reference_sql:
      common: |
        SELECT name, email, grade
        FROM customers
        WHERE grade = 'VIP'
        ORDER BY name;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "빈칸에는 grade 컬럼과 'VIP' 값을 비교하는 등호 조건이 들어갑니다"
        en: "The blank needs an equality condition comparing the grade column with the value 'VIP'"
    rubric:
      ko: "grade = 'VIP' 조건을 사용해야 함"
      en: "Must use grade = 'VIP' condition"
    max_score: 10
    tags: [WHERE, customers]

  - id: b04-02
    level: 1
    type: "SELECT"
    question: |
      상품을 가격이 높은 순으로 정렬합니다.

      ```sql
      SELECT name, price
      FROM products
      ORDER BY ___
      LIMIT 10;
      ```
    question_en: |
      Sort products by price in descending order.

      ```sql
      SELECT name, price
      FROM products
      ORDER BY ___
      LIMIT 10;
      ```
    reference_sql:
      common: |
        SELECT name, price
        FROM products
        ORDER BY price DESC
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "빈칸에는 정렬 기준 컬럼과 내림차순 키워드(DESC)가 들어갑니다"
        en: "The blank needs the sort column and the descending keyword (DESC)"
    rubric:
      ko: "price DESC를 사용해야 함"
      en: "Must use price DESC"
    max_score: 10
    tags: [ORDER BY, LIMIT, products]

  - id: b04-03
    level: 1
    type: "Aggregate"
    question: |
      카테고리별 상품 수를 구합니다.

      ```sql
      SELECT category_id, ___ AS product_count
      FROM products
      GROUP BY category_id;
      ```
    question_en: |
      Count the number of products per category.

      ```sql
      SELECT category_id, ___ AS product_count
      FROM products
      GROUP BY category_id;
      ```
    reference_sql:
      common: |
        SELECT category_id, COUNT(*) AS product_count
        FROM products
        GROUP BY category_id;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "빈칸에는 행의 수를 세는 집계 함수가 들어갑니다"
        en: "The blank needs an aggregate function that counts rows"
    rubric:
      ko: "COUNT(*)를 사용해야 함"
      en: "Must use COUNT(*)"
    max_score: 10
    tags: [COUNT, GROUP BY, products]

  - id: b04-04
    level: 2
    type: "Aggregate"
    question: |
      주문이 10건 이상인 고객만 필터링합니다.

      ```sql
      SELECT customer_id, COUNT(*) AS order_count
      FROM orders
      GROUP BY customer_id
      ___ ;
      ```
    question_en: |
      Filter only customers with 10 or more orders.

      ```sql
      SELECT customer_id, COUNT(*) AS order_count
      FROM orders
      GROUP BY customer_id
      ___ ;
      ```
    reference_sql:
      common: |
        SELECT customer_id, COUNT(*) AS order_count
        FROM orders
        GROUP BY customer_id
        HAVING COUNT(*) >= 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "빈칸에는 그룹화된 결과를 필터링하는 HAVING 절이 들어갑니다. WHERE는 그룹화 전, HAVING은 그룹화 후 필터링"
        en: "The blank needs a HAVING clause that filters grouped results. WHERE filters before grouping, HAVING filters after grouping"
    rubric:
      ko: "HAVING COUNT(*) >= 10을 사용해야 함"
      en: "Must use HAVING COUNT(*) >= 10"
    max_score: 10
    tags: [GROUP BY, HAVING, COUNT, orders]

  - id: b04-05
    level: 2
    type: "JOIN/UNION"
    question: |
      상품과 카테고리를 연결합니다.

      ```sql
      SELECT p.name, cat.name AS category
      FROM products AS p
      INNER JOIN categories AS cat ON ___
      LIMIT 10;
      ```
    question_en: |
      Connect products with their categories.

      ```sql
      SELECT p.name, cat.name AS category
      FROM products AS p
      INNER JOIN categories AS cat ON ___
      LIMIT 10;
      ```
    reference_sql:
      common: |
        SELECT p.name, cat.name AS category
        FROM products AS p
        INNER JOIN categories AS cat ON p.category_id = cat.id
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "빈칸에는 두 테이블의 연결 조건이 들어갑니다. products의 외래키와 categories의 기본키를 매칭"
        en: "The blank needs the join condition linking the two tables. Match the foreign key in products with the primary key in categories"
    rubric:
      ko: "p.category_id = cat.id 조건을 사용해야 함"
      en: "Must use p.category_id = cat.id condition"
    max_score: 10
    tags: [INNER JOIN, products, categories]

  - id: b04-06
    level: 2
    type: "JOIN/UNION"
    question: |
      주문이 없는 고객을 찾습니다.

      ```sql
      SELECT c.name, c.email
      FROM customers AS c
      LEFT JOIN orders AS o ON c.id = o.customer_id
      WHERE ___ ;
      ```
    question_en: |
      Find customers who have never placed an order.

      ```sql
      SELECT c.name, c.email
      FROM customers AS c
      LEFT JOIN orders AS o ON c.id = o.customer_id
      WHERE ___ ;
      ```
    reference_sql:
      common: |
        SELECT c.name, c.email
        FROM customers AS c
        LEFT JOIN orders AS o ON c.id = o.customer_id
        WHERE o.id IS NULL;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "LEFT JOIN 후 매칭되지 않은 행은 오른쪽 테이블 컬럼이 NULL. IS NULL로 확인"
        en: "After a LEFT JOIN, unmatched rows have NULL in the right table's columns. Use IS NULL to check"
    rubric:
      ko: "o.id IS NULL을 사용해야 함"
      en: "Must use o.id IS NULL"
    max_score: 10
    tags: [LEFT JOIN, ANTI JOIN, customers, orders]

  - id: b04-07
    level: 1
    type: "SELECT"
    question: |
      2024년 1분기(1~3월) 주문을 조회합니다.

      ```sql
      SELECT order_number, total_amount, ordered_at
      FROM orders
      WHERE ordered_at ___ ;
      ```
    question_en: |
      Retrieve orders from Q1 2024 (January through March).

      ```sql
      SELECT order_number, total_amount, ordered_at
      FROM orders
      WHERE ordered_at ___ ;
      ```
    reference_sql:
      common: |
        SELECT order_number, total_amount, ordered_at
        FROM orders
        WHERE ordered_at BETWEEN '2024-01-01' AND '2024-03-31 23:59:59';
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "빈칸에는 BETWEEN '시작일' AND '종료일'로 날짜 범위를 지정하세요"
        en: "The blank needs BETWEEN 'start_date' AND 'end_date' to specify a date range"
    rubric:
      ko: "BETWEEN으로 날짜 범위를 지정해야 함"
      en: "Must specify date range with BETWEEN"
    max_score: 10
    tags: [WHERE, date arithmetic, orders]

  - id: b04-08
    level: 1
    type: "CASE/IF"
    question: |
      재고 상태를 분류합니다.

      ```sql
      SELECT
          name,
          stock_qty,
          CASE
              ___
          END AS stock_status
      FROM products;
      ```
    question_en: |
      Classify inventory status.

      ```sql
      SELECT
          name,
          stock_qty,
          CASE
              ___
          END AS stock_status
      FROM products;
      ```
    reference_sql:
      common: |
        SELECT
            name,
            stock_qty,
            CASE
                WHEN stock_qty = 0 THEN '품절'
                WHEN stock_qty <= 10 THEN '부족'
                WHEN stock_qty <= 100 THEN '보통'
                ELSE '충분'
            END AS stock_status
        FROM products;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "WHEN stock_qty = 0 THEN '품절' 식으로 구간별 조건을 나열하세요. 마지막은 ELSE"
        en: "List conditions for each range like WHEN stock_qty = 0 THEN 'Out of Stock'. End with ELSE for the default"
    rubric:
      ko: "CASE WHEN으로 재고 구간을 분류해야 함"
      en: "Must classify stock ranges with CASE WHEN"
    max_score: 10
    tags: [CASE, products]

  - id: b04-09
    level: 1
    type: "CASE/IF"
    question: |
      생년월일이 없으면 '미입력'으로 표시합니다.

      ```sql
      SELECT
          name,
          ___ AS birth_date
      FROM customers
      LIMIT 10;
      ```
    question_en: |
      Display 'N/A' when the birth date is missing.

      ```sql
      SELECT
          name,
          ___ AS birth_date
      FROM customers
      LIMIT 10;
      ```
    reference_sql:
      common: |
        SELECT
            name,
            COALESCE(birth_date, '미입력') AS birth_date
        FROM customers
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "COALESCE(컬럼, 기본값) 함수는 NULL일 때 대체값을 반환합니다"
        en: "The COALESCE(column, default_value) function returns a substitute value when the column is NULL"
    rubric:
      ko: "COALESCE를 사용해야 함"
      en: "Must use COALESCE"
    max_score: 10
    tags: [COALESCE, customers]

  - id: b04-10
    level: 2
    type: "Subquery/CTE"
    question: |
      평균 가격보다 비싼 상품을 조회합니다.

      ```sql
      SELECT name, price
      FROM products
      WHERE price > ___
      ORDER BY price DESC;
      ```
    question_en: |
      Retrieve products more expensive than the average price.

      ```sql
      SELECT name, price
      FROM products
      WHERE price > ___
      ORDER BY price DESC;
      ```
    reference_sql:
      common: |
        SELECT name, price
        FROM products
        WHERE price > (SELECT AVG(price) FROM products)
        ORDER BY price DESC;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "빈칸에는 평균 가격을 구하는 서브쿼리 (SELECT AVG(price) FROM products)가 들어갑니다"
        en: "The blank needs a subquery that calculates the average price: (SELECT AVG(price) FROM products)"
    rubric:
      ko: "서브쿼리로 평균 가격을 구해야 함"
      en: "Must use a subquery to calculate average price"
    max_score: 10
    tags: [WHERE, scalar subquery, AVG, products]

  - id: b04-11
    level: 1
    type: "Aggregate"
    question: |
      등급별 고객 수, 평균 적립금, 최대 적립금을 구합니다.

      ```sql
      SELECT
          grade,
          ___ AS customer_count,
          ___ AS avg_points,
          ___ AS max_points
      FROM customers
      GROUP BY grade;
      ```
    question_en: |
      Get the customer count, average points, and maximum points by grade.

      ```sql
      SELECT
          grade,
          ___ AS customer_count,
          ___ AS avg_points,
          ___ AS max_points
      FROM customers
      GROUP BY grade;
      ```
    reference_sql:
      common: |
        SELECT
            grade,
            COUNT(*) AS customer_count,
            ROUND(AVG(point_balance), 0) AS avg_points,
            MAX(point_balance) AS max_points
        FROM customers
        GROUP BY grade;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "세 빈칸에는 각각 COUNT(*), ROUND(AVG(...), 0), MAX(...) 집계 함수가 들어갑니다"
        en: "The three blanks need COUNT(*), ROUND(AVG(...), 0), and MAX(...) aggregate functions respectively"
    rubric:
      ko: "COUNT(*), AVG(), MAX()를 사용해야 함"
      en: "Must use COUNT(*), AVG(), MAX()"
    max_score: 10
    tags: [GROUP BY, COUNT, AVG, MAX, customers]

  - id: b04-12
    level: 1
    type: "SELECT"
    question: |
      이메일이 testmail.kr 도메인인 고객을 찾습니다.

      ```sql
      SELECT name, email
      FROM customers
      WHERE email LIKE ___
      LIMIT 10;
      ```
    question_en: |
      Find customers whose email is from the testmail.kr domain.

      ```sql
      SELECT name, email
      FROM customers
      WHERE email LIKE ___
      LIMIT 10;
      ```
    reference_sql:
      common: |
        SELECT name, email
        FROM customers
        WHERE email LIKE '%@testmail.kr'
        LIMIT 10;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "LIKE 패턴에서 %는 임의 문자열. @testmail.kr로 끝나는 패턴을 만드세요"
        en: "In LIKE patterns, % represents any string. Create a pattern that ends with @testmail.kr"
    rubric:
      ko: "LIKE '%@testmail.kr'을 사용해야 함"
      en: "Must use LIKE '%@testmail.kr'"
    max_score: 10
    tags: [WHERE, LIKE, customers]

  - id: b04-13
    level: 1
    type: "String/Date"
    question: |
      주문의 연도와 월을 추출합니다.

      ```sql
      SELECT
          ___ AS year,
          ___ AS month,
          COUNT(*) AS order_count
      FROM orders
      GROUP BY year, month
      ORDER BY year, month;
      ```
    question_en: |
      Extract the year and month from orders.

      ```sql
      SELECT
          ___ AS year,
          ___ AS month,
          COUNT(*) AS order_count
      FROM orders
      GROUP BY year, month
      ORDER BY year, month;
      ```
    reference_sql:
      common: |
        SELECT
            SUBSTR(ordered_at, 1, 4) AS year,
            SUBSTR(ordered_at, 6, 2) AS month,
            COUNT(*) AS order_count
        FROM orders
        GROUP BY year, month
        ORDER BY year, month;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "SUBSTR(ordered_at, 시작위치, 길이)로 문자열을 잘라냅니다. 연도는 1~4자리, 월은 6~2자리"
        en: "Use SUBSTR(ordered_at, start_position, length) to extract substrings. Year is positions 1-4, month is positions 6-2"
    rubric:
      ko: "SUBSTR로 연도와 월을 추출해야 함"
      en: "Must extract year and month with SUBSTR"
    max_score: 10
    tags: [SUBSTR, GROUP BY, COUNT, orders]

  - id: b04-14
    level: 1
    type: "SELECT"
    question: |
      결제 상태가 completed 또는 refunded인 건만 조회합니다.

      ```sql
      SELECT id, order_id, method, amount, status
      FROM payments
      WHERE status ___ ;
      ```
    question_en: |
      Retrieve only payments with status completed or refunded.

      ```sql
      SELECT id, order_id, method, amount, status
      FROM payments
      WHERE status ___ ;
      ```
    reference_sql:
      common: |
        SELECT id, order_id, method, amount, status
        FROM payments
        WHERE status IN ('completed', 'refunded');
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "여러 값 중 하나와 일치하는지 확인할 때 IN ('값1', '값2') 연산자를 사용하세요"
        en: "Use the IN ('value1', 'value2') operator to check if a value matches one of several values"
    rubric:
      ko: "IN ('completed', 'refunded')를 사용해야 함"
      en: "Must use IN ('completed', 'refunded')"
    max_score: 10
    tags: [WHERE, IN, payments]

  - id: b04-15
    level: 2
    type: "JOIN/UNION"
    question: |
      주문번호, 고객명, 결제 금액, 배송 상태를 한 번에 조회합니다.

      ```sql
      SELECT
          o.order_number,
          c.name AS customer,
          p.amount AS paid,
          sh.status AS shipping_status
      FROM orders AS o
      INNER JOIN customers AS c ON ___
      INNER JOIN payments AS p ON ___
      LEFT JOIN shipping AS sh ON ___
      ORDER BY o.ordered_at DESC
      LIMIT 5;
      ```
    question_en: |
      Retrieve the order number, customer name, payment amount, and shipping status in one query.

      ```sql
      SELECT
          o.order_number,
          c.name AS customer,
          p.amount AS paid,
          sh.status AS shipping_status
      FROM orders AS o
      INNER JOIN customers AS c ON ___
      INNER JOIN payments AS p ON ___
      LEFT JOIN shipping AS sh ON ___
      ORDER BY o.ordered_at DESC
      LIMIT 5;
      ```
    reference_sql:
      common: |
        SELECT
            o.order_number,
            c.name AS customer,
            p.amount AS paid,
            sh.status AS shipping_status
        FROM orders AS o
        INNER JOIN customers AS c ON o.customer_id = c.id
        INNER JOIN payments AS p ON o.id = p.order_id
        LEFT JOIN shipping AS sh ON o.id = sh.order_id
        ORDER BY o.ordered_at DESC
        LIMIT 5;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: true
    hints:
      - ko: "각 빈칸에는 외래키 관계가 들어갑니다. o.customer_id = c.id, o.id = p.order_id, o.id = sh.order_id 패턴"
        en: "Each blank needs a foreign key relationship: o.customer_id = c.id, o.id = p.order_id, o.id = sh.order_id pattern"
    rubric:
      ko: "세 JOIN 조건을 모두 올바르게 작성해야 함"
      en: "Must correctly write all three JOIN conditions"
    max_score: 10
    tags: [INNER JOIN, LEFT JOIN, MULTI JOIN, orders, customers, payments, shipping]
