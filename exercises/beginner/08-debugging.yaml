metadata:
  id: beginner-08-debugging
  title: SQL 오류 찾기 -- 초급
  title_en: SQL Error Detection -- Beginner
  difficulty: beginner
  concepts:
  - Syntax errors
  - Logic errors
  - NULL comparison
  - WHERE vs HAVING
  - GROUP BY rules
  - CASE order
  tables:
  - products
  - customers
  - orders
  - reviews
  - payments
  prerequisites: []
  estimated_minutes: 30
  default_level: 1
  default_type: DEBUG
  description: products, customers, orders, reviews, payments 테이블을 사용합니다.
  description_en: Uses products, customers, orders, reviews, payments tables.
problems:
- id: b08d-01
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT name, price, brand
      FROM products
      LIMIT 5;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: SELECT 절에서 칼럼을 나열할 때 필요한 구분 기호를 확인하세요.
    en: Check the required separator when listing columns in the SELECT clause.
  rubric:
    ko: SELECT 절에서 칼럼을 나열할 때 필요한 구분 기호를 확인하세요.
    en: Check the required separator when listing columns in the SELECT clause.
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name price brand
    FROM products
    LIMIT 5;
  error_description: 칼럼 사이에 쉼표(`,`)가 빠져 있습니다.
  error_description_en: Commas (`,`) are missing between columns.
- id: b08d-02
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT name, price
      FROM products
      WHERE brand = 'ASUS';
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: SQL 표준에서 문자열 리터럴에 사용하는 따옴표 종류를 확인하세요. SQLite에서는 동작할 수 있지만 표준 SQL 관점에서 문제가 있습니다.
    en: Check the type of quotes used for string literals in the SQL standard. It may work in SQLite, but it's problematic
      from a standard SQL perspective.
  rubric:
    ko: SQL 표준에서 문자열 리터럴에 사용하는 따옴표 종류를 확인하세요. SQLite에서는 동작할 수 있지만 표준 SQL 관점에서 문제가 있습니다.
    en: Check the type of quotes used for string literals in the SQL standard. It may wo
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name, price
    FROM products
    WHERE brand = "ASUS";
  error_description: SQL 표준에서 문자열 리터럴은 작은따옴표(`'`)를 사용합니다. 큰따옴표(`"`)는 식별자(칼럼명, 테이블명) 용도입니다. SQLite에서는 큰따옴표도 문자열로 허용되지만, 다른
    DB에서는 에러가 발생합니다.
  error_description_en: In the SQL standard, string literals use single quotes (`'`). Double quotes (`"`) are for identifiers
    (column names, table names). SQLite allows double quotes for strings, but other databases will throw an error.
- id: b08d-03
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT name, email
      FROM customers
      WHERE grade = 'VIP';
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: SQL 키워드의 철자를 확인하세요.
    en: Check the spelling of the SQL keyword.
  rubric:
    ko: SQL 키워드의 철자를 확인하세요.
    en: Check the spelling of the SQL keyword.
  max_score: 10
  tags: []
  buggy_sql: |
    SELCET name, email
    FROM customers
    WHERE grade = 'VIP';
  error_description: '`SELCET`는 오타입니다. 올바른 키워드는 `SELECT`입니다.'
  error_description_en: '`SELCET` is a typo. The correct keyword is `SELECT`.'
- id: b08d-04
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT name, price
      FROM products
      WHERE price BETWEEN 100000 AND 500000
      ORDER BY price DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: 이 쿼리는 사실 문법적으로 올바릅니다. `ORDER BY price`의 기본 정렬 방향을 생각해보세요. 의도가 "비싼 순"이라면?
    en: This query is actually syntactically correct. Think about the default sort direction of `ORDER BY price`. What if
      the intent is "most expensive first"?
  rubric:
    ko: 이 쿼리는 사실 문법적으로 올바릅니다. `ORDER BY price`의 기본 정렬 방향을 생각해보세요. 의도가 "비싼 순"이라면?
    en: This query is actually syntactically correct. Think about the default sort direc
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name, price
    FROM products
    WHERE price BETWEEN 100000 AND 500000
    ORDER BY price
    LIMIT 10;
  error_description: 문법 오류는 없지만, `ORDER BY price`는 기본 오름차순(ASC)입니다. 비싼 순으로 정렬하려면 `DESC`가 필요합니다. 의도에 따라 올바를 수 있습니다.
  error_description_en: There is no syntax error, but `ORDER BY price` defaults to ascending (ASC). If the intent is to sort
    most expensive first, `DESC` is needed. This may or may not be correct depending on intent.
- id: b08d-05
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT name, email, grade
      FROM customers
      WHERE grade = 'VIP'
      ORDER BY name;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: 정렬에 사용하는 키워드를 정확히 확인하세요.
    en: Check the exact keyword used for sorting.
  rubric:
    ko: 정렬에 사용하는 키워드를 정확히 확인하세요.
    en: Check the exact keyword used for sorting.
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name, email, grade
    FROM customers
    WHERE grade = 'VIP'
    ORDER name;
  error_description: '`ORDER name`은 잘못된 문법입니다. `ORDER BY name`이 올바릅니다.'
  error_description_en: '`ORDER name` is incorrect syntax. The correct form is `ORDER BY name`.'
- id: b08d-06
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT name, price
      FROM products
      WHERE name LIKE '%게이밍%';
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: LIKE 패턴의 따옴표 위치를 확인하세요. `%`가 문자열 안에 있어야 합니다.
    en: Check the position of the quotes in the LIKE pattern. The `%` must be inside the string.
  rubric:
    ko: LIKE 패턴의 따옴표 위치를 확인하세요. `%`가 문자열 안에 있어야 합니다.
    en: Check the position of the quotes in the LIKE pattern. The `%` must be inside the
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name, price
    FROM products
    WHERE name LIKE '%게이밍'%;
  error_description: '`''%게이밍''%`에서 닫는 따옴표 위치가 잘못되었습니다. `%`가 문자열 밖에 있습니다.'
  error_description_en: The closing quote in `'%게이밍'%` is in the wrong position. The `%` is outside the string.
- id: b08d-07
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT name, price, stock_qty
      FROM products
      WHERE price > 100000
        AND stock_qty > 0
        AND is_active = 1
      ORDER BY price DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: SQL 절의 순서를 확인하세요. WHERE는 어디에 위치해야 하나요?
    en: Check the order of SQL clauses. Where should WHERE be positioned?
  rubric:
    ko: SQL 절의 순서를 확인하세요. WHERE는 어디에 위치해야 하나요?
    en: Check the order of SQL clauses. Where should WHERE be positioned?
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name, price, stock_qty
    FROM products
    WHERE price > 100000
      AND stock_qty > 0
    ORDER BY price DESC
    LIMIT 10
    WHERE is_active = 1;
  error_description: '`WHERE`절이 두 번 사용되었고, `LIMIT` 뒤에 올 수 없습니다. 모든 조건은 하나의 `WHERE`절에 `AND`로 결합해야 합니다.'
  error_description_en: The `WHERE` clause is used twice, and it cannot appear after `LIMIT`. All conditions must be combined
    with `AND` in a single `WHERE` clause.
- id: b08d-08
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT name AS 상품명, price AS 가격
      FROM products
      LIMIT 5;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: SELECT 절에서 칼럼 별칭을 지정할 때도 칼럼 사이에 필요한 것이 있습니다.
    en: Even when assigning column aliases in the SELECT clause, something is needed between columns.
  rubric:
    ko: SELECT 절에서 칼럼 별칭을 지정할 때도 칼럼 사이에 필요한 것이 있습니다.
    en: Even when assigning column aliases in the SELECT clause, something is needed bet
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name AS 상품명 price AS 가격
    FROM products
    LIMIT 5;
  error_description: '`상품명`과 `price` 사이에 쉼표(`,`)가 빠져 있습니다.'
  error_description_en: A comma (`,`) is missing between `product_name` and `price`.
- id: b08d-09
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT name, price
      FROM products
      WHERE brand IN ('ASUS', 'MSI', 'Dell');
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`IN` 목록 안의 값 구분 기호를 확인하세요.'
    en: Check the separator between values in the `IN` list.
  rubric:
    ko: '`IN` 목록 안의 값 구분 기호를 확인하세요.'
    en: Check the separator between values in the `IN` list.
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name, price
    FROM products
    WHERE brand IN ('ASUS' 'MSI' 'Dell');
  error_description: '`IN` 목록의 값들 사이에 쉼표가 빠져 있습니다. `(''ASUS'' ''MSI'' ''Dell'')`은 문자열 연결로 해석될 수 있습니다.'
  error_description_en: Commas are missing between values in the `IN` list. `('ASUS' 'MSI' 'Dell')` may be interpreted as
    string concatenation.
- id: b08d-10
  level: 1
  type: DEBUG
  question: |
    다음 쿼리의 오류를 찾고 수정하세요.
  question_en: |
    Find and fix the error in the following query.
  reference_sql:
    common: |
      SELECT COUNT(*) AS total,
             AVG(price) AS avg_price,
             SUM(price) AS total_price
      FROM products;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: SELECT 목록의 칼럼 사이를 확인하세요.
    en: Check the separator between columns in the SELECT list.
  rubric:
    ko: SELECT 목록의 칼럼 사이를 확인하세요.
    en: Check the separator between columns in the SELECT list.
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT COUNT(*) AS total,
           AVG(price) AS avg_price
           SUM(price) AS total_price
    FROM products;
  error_description: '`AVG(price) AS avg_price`와 `SUM(price) AS total_price` 사이에 쉼표가 빠져 있습니다.'
  error_description_en: A comma is missing between `AVG(price) AS avg_price` and `SUM(price) AS total_price`.
- id: b08d-11
  level: 2
  type: DEBUG
  question: |
    다음 쿼리는 생년월일이 없는 고객을 찾으려 합니다. 결과가 0행입니다. 왜일까요?
  question_en: |
    The following query tries to find customers without a birth date. The result returns 0 rows. Why?
  reference_sql:
    common: |
      SELECT name, email
      FROM customers
      WHERE birth_date IS NULL;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: SQL에서 NULL은 "알 수 없는 값"입니다. `=` 연산자로 비교하면 항상 어떤 결과가 나올까요?
    en: In SQL, NULL means "unknown value." What happens when you compare with `=`? The result is always something specific.
  rubric:
    ko: SQL에서 NULL은 "알 수 없는 값"입니다. `=` 연산자로 비교하면 항상 어떤 결과가 나올까요?
    en: 'In SQL, NULL means "unknown value." What happens when you compare with `=`? The '
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name, email
    FROM customers
    WHERE birth_date = NULL;
  error_description: '`NULL = NULL`은 TRUE가 아니라 NULL(UNKNOWN)을 반환합니다. NULL 비교에는 `= NULL` 대신 `IS NULL`을 사용해야 합니다.'
  error_description_en: '`NULL = NULL` returns NULL (UNKNOWN), not TRUE. You must use `IS NULL` instead of `= NULL` when comparing
    with NULL.'
- id: b08d-12
  level: 2
  type: DEBUG
  question: |
    다음 쿼리는 브랜드별 상품 수를 구하려 합니다. 에러가 납니다.
  question_en: |
    The following query tries to find the product count per brand. It throws an error.
  reference_sql:
    common: |
      SELECT brand, COUNT(*) AS product_count
      FROM products
      GROUP BY brand;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: 집계 함수와 비집계 칼럼을 함께 SELECT할 때 필요한 절이 있습니다.
    en: There is a required clause when using an aggregate function alongside a non-aggregate column in SELECT.
  rubric:
    ko: 집계 함수와 비집계 칼럼을 함께 SELECT할 때 필요한 절이 있습니다.
    en: There is a required clause when using an aggregate function alongside a non-aggr
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT brand, COUNT(*) AS product_count
    FROM products;
  error_description: '`COUNT(*)`는 집계 함수인데 `brand`는 비집계 칼럼입니다. `GROUP BY` 절이 없으면 어떤 브랜드의 값을 표시할지 알 수 없습니다.'
  error_description_en: '`COUNT(*)` is an aggregate function, but `brand` is a non-aggregate column. Without a `GROUP BY`
    clause, the database cannot determine which brand value to display.'
- id: b08d-13
  level: 2
  type: DEBUG
  question: |
    다음 쿼리는 상품 수가 10개 이상인 브랜드만 조회하려 합니다. 에러가 납니다.
  question_en: |
    The following query tries to show only brands with 10 or more products. It throws an error.
  reference_sql:
    common: |
      SELECT brand, COUNT(*) AS product_count
      FROM products
      GROUP BY brand
      HAVING COUNT(*) >= 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`WHERE`절에서 집계 함수를 사용할 수 있을까요?'
    en: Can aggregate functions be used in the `WHERE` clause?
  rubric:
    ko: '`WHERE`절에서 집계 함수를 사용할 수 있을까요?'
    en: Can aggregate functions be used in the `WHERE` clause?
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT brand, COUNT(*) AS product_count
    FROM products
    WHERE COUNT(*) >= 10
    GROUP BY brand;
  error_description: '`WHERE`절에서는 집계 함수를 사용할 수 없습니다. 그룹화 후 필터링은 `HAVING`을 사용해야 합니다.'
  error_description_en: Aggregate functions cannot be used in the `WHERE` clause. Filtering after grouping requires `HAVING`.
- id: b08d-14
  level: 2
  type: DEBUG
  question: |
    다음 쿼리는 'ASUS'가 아닌 상품을 찾으려 합니다. 그런데 brand가 NULL인 상품이 누락됩니다.
  question_en: |
    The following query tries to find products that are not 'ASUS'. However, products with a NULL brand are missing from the results.
  reference_sql:
    common: |
      SELECT name, brand
      FROM products
      WHERE brand != 'ASUS' OR brand IS NULL;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`NULL != ''ASUS''`의 결과는 TRUE일까요? NULL과의 비교는 항상 NULL(UNKNOWN)입니다.'
    en: What is the result of `NULL != 'ASUS'`? Comparisons with NULL always return NULL (UNKNOWN).
  rubric:
    ko: '`NULL != ''ASUS''`의 결과는 TRUE일까요? NULL과의 비교는 항상 NULL(UNKNOWN)입니다.'
    en: What is the result of `NULL != 'ASUS'`? Comparisons with NULL always return NULL
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT name, brand
    FROM products
    WHERE brand != 'ASUS';
  error_description: '`brand`가 NULL인 행에서 `NULL != ''ASUS''`는 NULL(UNKNOWN)을 반환하므로 결과에서 제외됩니다. NULL인 행도 포함하려면 명시적으로 처리해야 합니다.'
  error_description_en: For rows where `brand` is NULL, `NULL != 'ASUS'` returns NULL (UNKNOWN), so those rows are excluded
    from the results. To include NULL rows, you must handle them explicitly.
- id: b08d-15
  level: 2
  type: DEBUG
  question: |
    다음 쿼리는 주문 금액 상위 10건을 구하려 합니다. ORDER BY의 위치가 잘못되었습니다.
  question_en: |
    The following query tries to find the top 10 orders by amount. The ORDER BY placement is wrong.
  reference_sql:
    common: |
      SELECT order_number, total_amount
      FROM orders
      ORDER BY total_amount DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: SQL 절의 실행 순서를 생각해보세요. LIMIT과 ORDER BY 중 어느 것이 먼저 와야 할까요?
    en: Think about the execution order of SQL clauses. Which should come first, LIMIT or ORDER BY?
  rubric:
    ko: SQL 절의 실행 순서를 생각해보세요. LIMIT과 ORDER BY 중 어느 것이 먼저 와야 할까요?
    en: Think about the execution order of SQL clauses. Which should come first, LIMIT o
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT order_number, total_amount
    FROM orders
    LIMIT 10
    ORDER BY total_amount DESC;
  error_description: '`LIMIT`이 `ORDER BY` 앞에 있습니다. SQL에서 `ORDER BY`는 `LIMIT`보다 먼저 와야 합니다. 이 쿼리는 정렬 없이 아무 10건을 가져온 후 정렬하므로
    상위 10건이 아닙니다.'
  error_description_en: '`LIMIT` appears before `ORDER BY`. In SQL, `ORDER BY` must come before `LIMIT`. This query retrieves
    any 10 rows without sorting first, then sorts them, so the result is not the top 10.'
- id: b08d-16
  level: 2
  type: DEBUG
  question: |
