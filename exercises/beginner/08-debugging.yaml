- id: b08d-30
  level: 3
  type: DEBUG
  question: |
    다음 쿼리는 고객의 가입 연도별 데이터를 분석합니다. WHERE와 HAVING이 혼동되어 있습니다.
  question_en: |
    The following query analyzes customer data by signup year. WHERE and HAVING are confused.
  reference_sql:
    common: |
      SELECT SUBSTR(created_at, 1, 4) AS join_year,
             grade,
             COUNT(*) AS customer_count,
             ROUND(AVG(point_balance)) AS avg_points
      FROM customers
      WHERE grade IN ('GOLD', 'VIP')
      GROUP BY join_year, grade
      HAVING COUNT(*) >= 50
      ORDER BY join_year, grade;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: HAVING이 두 번 사용되었고, SQL 절의 순서도 틀렸습니다. 개별 행 필터링과 그룹 필터링을 구분하세요.
    en: HAVING is used twice, and the SQL clause order is also wrong. Distinguish between row-level filtering and group-level
      filtering.
  rubric:
    ko: HAVING이 두 번 사용되었고, SQL 절의 순서도 틀렸습니다. 개별 행 필터링과 그룹 필터링을 구분하세요.
    en: HAVING is used twice, and the SQL clause order is also wrong. Distinguish betwee
  max_score: 10
  tags: []
  buggy_sql: |
    SELECT SUBSTR(created_at, 1, 4) AS join_year,
           grade,
           COUNT(*) AS customer_count,
           ROUND(AVG(point_balance)) AS avg_points
    FROM customers
    HAVING grade IN ('GOLD', 'VIP')
    GROUP BY join_year, grade
    HAVING COUNT(*) >= 50
    ORDER BY join_year, grade;
  error_description: |-
    세 가지 문제가 있습니다.
        1. `HAVING`이 `GROUP BY` 앞에 있습니다 (절 순서 오류).
        2. `HAVING`이 두 번 사용되었습니다.
        3. `grade IN ('GOLD', 'VIP')`는 개별 행 필터링이므로 `WHERE`를 사용해야 합니다.
  error_description_en: |-
    There are three problems:
        1. `HAVING` appears before `GROUP BY` (clause order error).
        2. `HAVING` is used twice.
        3. `grade IN ('GOLD', 'VIP')` is row-level filtering, so `WHERE` should be used.
