    ko: '마진율 = `(price - cost_price) * 100.0 / price`. `WHERE` + `GROUP BY` + `HAVING` + '
    en: Margin rate = `(price - cost_price) * 100.0 / price`. This is a combination of `
  max_score: 10
  tags: []
- id: b07x-12
  level: 2
  type: SELECT
  question: |
    연도별 주문 건수, 총 매출, 평균 주문 금액, 취소 건수를 구하세요. 취소 건수는 cancelled_at이 NULL이 아닌 행의 수입니다.
  question_en: |
    Find the order count, total revenue, average order amount, and cancellation count per year. The cancellation count is the number of rows where cancelled_at is not NULL.
