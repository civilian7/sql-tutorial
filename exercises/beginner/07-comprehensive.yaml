    en: This is a combination of `WHERE acquisition_channel IS NULL` + `GROUP BY grade` + `ORDER BY CASE`.
  rubric:
    ko: '`WHERE acquisition_channel IS NULL` + `GROUP BY grade` + `ORDER BY CASE` 조합입니다.'
    en: 'This is a combination of `WHERE acquisition_channel IS NULL` + `GROUP BY grade` '
  max_score: 10
  tags: []
- id: b07x-09
  level: 1
  type: SELECT
  question: |
    주문 상태별 건수와 평균 주문 금액을 구하되, 배송 요청사항의 입력률(%)도 함께 표시하세요. 건수가 많은 순으로 정렬합니다.
  question_en: |
    Find the count, average order amount, and delivery notes completion rate (%) per order status. Sort by count descending.
  reference_sql:
    common: |
      SELECT status,
             COUNT(*) AS order_count,
             ROUND(AVG(total_amount)) AS avg_amount,
             ROUND(COUNT(notes) * 100.0 / COUNT(*), 1) AS notes_rate_pct
      FROM orders
      GROUP BY status
      ORDER BY order_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
