- id: b07x-10
  level: 1
  type: SELECT
  question: |
    상품을 재고 상태(품절/부족/보통/충분)로 분류하고, 각 그룹의 상품 수와 평균 가격을 구하세요. 판매 중인 상품만 대상입니다.
  question_en: |
    Classify products by stock status (Out of stock/Low/Normal/Sufficient) and find the product count and average price per group. Active products only.
  reference_sql:
    common: |
      SELECT CASE
                 WHEN stock_qty = 0 THEN '품절'
                 WHEN stock_qty <= 10 THEN '부족'
                 WHEN stock_qty <= 100 THEN '보통'
                 ELSE '충분'
             END AS stock_status,
             COUNT(*) AS product_count,
             ROUND(AVG(price)) AS avg_price
      FROM products
      WHERE is_active = 1
      GROUP BY stock_status
      ORDER BY product_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`WHERE is_active = 1` + `CASE`로 재고 분류 + `GROUP BY` + 집계 함수 조합입니다.'
    en: This is a combination of `WHERE is_active = 1` + `CASE` for stock classification + `GROUP BY` + aggregate functions.
  rubric:
    ko: '`WHERE is_active = 1` + `CASE`로 재고 분류 + `GROUP BY` + 집계 함수 조합입니다.'
    en: This is a combination of `WHERE is_active = 1` + `CASE` for stock classification
  max_score: 10
  tags: []
- id: b07x-11
  level: 2
  type: SELECT
  question: |
    브랜드별 판매 중인 상품 수, 평균 가격, 평균 마진율(%)을 구하세요. 상품 수가 5개 이상인 브랜드만 평균 마진율이 높은 순으로 조회합니다.
  question_en: |
    Find the active product count, average price, and average margin rate (%) per brand. Show only brands with 5+ products, sorted by average margin rate descending.
  reference_sql:
    common: |
      SELECT brand,
             COUNT(*) AS product_count,
             ROUND(AVG(price)) AS avg_price,
             ROUND(AVG((price - cost_price) * 100.0 / price), 1) AS avg_margin_pct
      FROM products
      WHERE is_active = 1
      GROUP BY brand
      HAVING COUNT(*) >= 5
      ORDER BY avg_margin_pct DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
