    en: Calculate the completion rate with `COUNT(notes) * 100.0 / COUNT(*)`. This leverages the relationship between NULL
      and aggregate functions.
  rubric:
    ko: '`COUNT(notes) * 100.0 / COUNT(*)`로 입력률을 계산합니다. NULL과 집계 함수의 관계를 활용합니다.'
    en: Calculate the completion rate with `COUNT(notes) * 100.0 / COUNT(*)`. This lever
  max_score: 10
