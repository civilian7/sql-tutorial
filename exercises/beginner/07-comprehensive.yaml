metadata:
  id: beginner-07-comprehensive
  title: 종합 문제
  title_en: Comprehensive Exercises
  difficulty: beginner
  concepts:
  - SELECT
  - WHERE
  - ORDER BY
  - LIMIT
  - Aggregate functions
  - GROUP BY
  - HAVING
  - IS NULL
  - COALESCE
  - CASE
  tables:
  - products
  - customers
  - orders
  - reviews
  - payments
  - categories
  - suppliers
  prerequisites: []
  estimated_minutes: 40
  default_level: 1
  default_type: SELECT
  description: products, customers, orders, reviews, payments, categories, suppliers 테이블을 사용합니다.
  description_en: Uses products, customers, orders, reviews, payments, categories, suppliers tables.
problems:
- id: b07x-01
  level: 1
  type: SELECT
  question: |
    판매 중인 상품(`is_active = 1`) 중 가격이 가장 비싼 상위 5개의 이름, 브랜드, 가격을 조회하세요.
  question_en: |
    Query the name, brand, and price of the top 5 most expensive active products (`is_active = 1`).
  reference_sql:
    common: |
      SELECT name, brand, price
      FROM products
      WHERE is_active = 1
      ORDER BY price DESC
      LIMIT 5;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`WHERE`로 필터링 + `ORDER BY DESC` + `LIMIT` 조합입니다.'
    en: This is a combination of `WHERE` filtering + `ORDER BY DESC` + `LIMIT`.
  rubric:
    ko: '`WHERE`로 필터링 + `ORDER BY DESC` + `LIMIT` 조합입니다.'
    en: This is a combination of `WHERE` filtering + `ORDER BY DESC` + `LIMIT`.
  max_score: 10
  tags: []
- id: b07x-02
  level: 1
  type: SELECT
  question: |
    VIP 등급 고객 중 마지막 로그인 기록이 있는 고객의 이름과 마지막 로그인일을 최근순으로 10건 조회하세요.
  question_en: |
    Query the name and last login date of VIP-tier customers who have a login history, sorted by most recent, limited to 10 rows.
  reference_sql:
    common: |
      SELECT name, last_login_at
      FROM customers
      WHERE grade = 'VIP'
        AND last_login_at IS NOT NULL
      ORDER BY last_login_at DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`WHERE grade = ''VIP'' AND last_login_at IS NOT NULL`로 두 조건을 결합합니다.'
    en: Combine two conditions with `WHERE grade = 'VIP' AND last_login_at IS NOT NULL`.
  rubric:
    ko: '`WHERE grade = ''VIP'' AND last_login_at IS NOT NULL`로 두 조건을 결합합니다.'
    en: Combine two conditions with `WHERE grade = 'VIP' AND last_login_at IS NOT NULL`.
  max_score: 10
  tags: []
- id: b07x-03
  level: 1
  type: SELECT
  question: |
    2024년 취소된 주문의 주문번호, 주문 금액, 취소일을 최근 취소 순으로 10건 조회하세요.
  question_en: |
    Query the order number, order amount, and cancellation date of cancelled orders in 2024, sorted by most recent cancellation, limited to 10 rows.
  reference_sql:
    common: |
      SELECT order_number, total_amount, cancelled_at
      FROM orders
      WHERE ordered_at LIKE '2024%'
        AND cancelled_at IS NOT NULL
      ORDER BY cancelled_at DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`WHERE ordered_at LIKE ''2024%'' AND cancelled_at IS NOT NULL`로 조건을 결합합니다.'
    en: Combine conditions with `WHERE ordered_at LIKE '2024%' AND cancelled_at IS NOT NULL`.
  rubric:
    ko: '`WHERE ordered_at LIKE ''2024%'' AND cancelled_at IS NOT NULL`로 조건을 결합합니다.'
    en: Combine conditions with `WHERE ordered_at LIKE '2024%' AND cancelled_at IS NOT N
  max_score: 10
  tags: []
- id: b07x-04
  level: 1
  type: SELECT
  question: |
    평점 4점 이상인 리뷰 수와 평균 평점을 구하세요. 평균은 소수점 2자리까지 표시합니다.
  question_en: |
    Find the count and average rating of reviews with a rating of 4 or higher. Display the average to 2 decimal places.
  reference_sql:
    common: |
      SELECT COUNT(*) AS high_rating_count,
             ROUND(AVG(rating), 2) AS avg_rating
      FROM reviews
      WHERE rating >= 4;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`WHERE rating >= 4`로 필터링 후 `COUNT(*)`와 `ROUND(AVG(rating), 2)`를 사용합니다.'
    en: Filter with `WHERE rating >= 4`, then use `COUNT(*)` and `ROUND(AVG(rating), 2)`.
  rubric:
    ko: '`WHERE rating >= 4`로 필터링 후 `COUNT(*)`와 `ROUND(AVG(rating), 2)`를 사용합니다.'
    en: Filter with `WHERE rating >= 4`, then use `COUNT(*)` and `ROUND(AVG(rating), 2)`
  max_score: 10
  tags: []
- id: b07x-05
  level: 1
  type: SELECT
  question: |
    브랜드별 판매 중인 상품 수를 구하되, 10개 이상인 브랜드만 상품 수 내림차순으로 조회하세요.
  question_en: |
    Find the number of active products per brand, showing only brands with 10 or more, sorted by product count descending.
  reference_sql:
    common: |
      SELECT brand, COUNT(*) AS product_count
      FROM products
      WHERE is_active = 1
      GROUP BY brand
      HAVING COUNT(*) >= 10
      ORDER BY product_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`WHERE is_active = 1` + `GROUP BY brand` + `HAVING COUNT(*) >= 10` 조합입니다.'
    en: This is a combination of `WHERE is_active = 1` + `GROUP BY brand` + `HAVING COUNT(*) >= 10`.
  rubric:
    ko: '`WHERE is_active = 1` + `GROUP BY brand` + `HAVING COUNT(*) >= 10` 조합입니다.'
    en: This is a combination of `WHERE is_active = 1` + `GROUP BY brand` + `HAVING COUN
  max_score: 10
  tags: []
- id: b07x-06
  level: 1
  type: SELECT
  question: |
    고객 등급별 평균 적립금을 구하되, 등급을 한글로 표시하세요. 평균 적립금이 높은 순으로 정렬합니다.
  question_en: |
    Find the average points per customer tier, displaying the tier in Korean. Sort by average points descending.
  reference_sql:
    common: |
      SELECT CASE grade
                 WHEN 'VIP' THEN 'VIP'
                 WHEN 'GOLD' THEN '골드'
                 WHEN 'SILVER' THEN '실버'
                 WHEN 'BRONZE' THEN '브론즈'
             END AS grade_kr,
             ROUND(AVG(point_balance)) AS avg_points
      FROM customers
      GROUP BY grade
      ORDER BY avg_points DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`CASE`로 등급 변환 + `GROUP BY` + `AVG` + `ORDER BY` 조합입니다.'
    en: This is a combination of `CASE` for tier conversion + `GROUP BY` + `AVG` + `ORDER BY`.
  rubric:
    ko: '`CASE`로 등급 변환 + `GROUP BY` + `AVG` + `ORDER BY` 조합입니다.'
    en: This is a combination of `CASE` for tier conversion + `GROUP BY` + `AVG` + `ORDE
  max_score: 10
  tags: []
- id: b07x-07
  level: 1
  type: SELECT
  question: |
    결제 수단별 총 결제 금액과 건수를 구하되, 총 금액이 10억 이상인 수단만 조회하세요.
  question_en: |
    Find the total payment amount and count per payment method, showing only methods with a total of 1 billion or more.
  reference_sql:
    common: |
      SELECT method,
             COUNT(*) AS payment_count,
             ROUND(SUM(amount)) AS total_amount
      FROM payments
      GROUP BY method
      HAVING SUM(amount) >= 1000000000
      ORDER BY total_amount DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`GROUP BY method` + `HAVING SUM(amount) >= 1000000000` 조합입니다.'
    en: This is a combination of `GROUP BY method` + `HAVING SUM(amount) >= 1000000000`.
  rubric:
    ko: '`GROUP BY method` + `HAVING SUM(amount) >= 1000000000` 조합입니다.'
    en: This is a combination of `GROUP BY method` + `HAVING SUM(amount) >= 1000000000`.
  max_score: 10
  tags: []
- id: b07x-08
  level: 1
  type: SELECT
  question: |
    가입 경로가 NULL인 고객의 등급별 수를 구하세요. CASE로 등급 순서를 지정하여 VIP부터 표시합니다.
  question_en: |
    Find the count per tier for customers with a NULL signup channel. Use CASE to sort tiers in order starting from VIP.
  reference_sql:
    common: |
      SELECT grade, COUNT(*) AS customer_count
      FROM customers
      WHERE acquisition_channel IS NULL
      GROUP BY grade
      ORDER BY CASE grade
                   WHEN 'VIP' THEN 1
                   WHEN 'GOLD' THEN 2
                   WHEN 'SILVER' THEN 3
                   WHEN 'BRONZE' THEN 4
               END;
