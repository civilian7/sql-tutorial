- id: b07x-13
  level: 2
  type: SELECT
  question: |
    가입 경로별 고객 수, VIP 비율(%), 평균 적립금을 구하세요. 경로가 NULL이면 '미분류'로 표시하고, 고객 수가 많은 순으로 정렬합니다.
  question_en: |
    Find the customer count, VIP rate (%), and average points per signup channel. Display 'Unclassified' for NULL channels, sorted by customer count descending.
  reference_sql:
    common: |
      SELECT COALESCE(acquisition_channel, '미분류') AS channel,
             COUNT(*) AS customer_count,
             ROUND(SUM(CASE WHEN grade = 'VIP' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS vip_rate_pct,
             ROUND(AVG(point_balance)) AS avg_points
      FROM customers
      GROUP BY COALESCE(acquisition_channel, '미분류')
      ORDER BY customer_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`COALESCE`로 NULL 대체 + `SUM(CASE WHEN grade = ''VIP'' THEN 1 ELSE 0 END)`로 VIP 수 집계 + `GROUP BY` 조합입니다.'
    en: This is a combination of `COALESCE` for NULL replacement + `SUM(CASE WHEN grade = 'VIP' THEN 1 ELSE 0 END)` for VIP
      count aggregation + `GROUP BY`.
  rubric:
    ko: '`COALESCE`로 NULL 대체 + `SUM(CASE WHEN grade = ''VIP'' THEN 1 ELSE 0 END)`로 VIP 수 집계'
    en: 'This is a combination of `COALESCE` for NULL replacement + `SUM(CASE WHEN grade '
  max_score: 10
  tags: []
- id: b07x-14
  level: 2
  type: SELECT
  question: |
    2024년 월별 주문 건수와 평균 주문 금액을 구하되, 계절(봄/여름/가을/겨울)도 함께 표시하세요.
  question_en: |
    Find the monthly order count and average order amount for 2024, also displaying the season (Spring/Summer/Fall/Winter).
  reference_sql:
    common: |
      SELECT SUBSTR(ordered_at, 1, 7) AS month,
             CASE
                 WHEN CAST(SUBSTR(ordered_at, 6, 2) AS INTEGER) IN (3, 4, 5) THEN '봄'
                 WHEN CAST(SUBSTR(ordered_at, 6, 2) AS INTEGER) IN (6, 7, 8) THEN '여름'
                 WHEN CAST(SUBSTR(ordered_at, 6, 2) AS INTEGER) IN (9, 10, 11) THEN '가을'
                 ELSE '겨울'
             END AS season,
             COUNT(*) AS order_count,
             ROUND(AVG(total_amount)) AS avg_amount
      FROM orders
      WHERE ordered_at LIKE '2024%'
      GROUP BY month
      ORDER BY month;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`SUBSTR`로 월 추출 + `CASE`로 계절 분류 + `GROUP BY` + 집계 조합입니다.'
    en: This is a combination of `SUBSTR` for month extraction + `CASE` for season classification + `GROUP BY` + aggregation.
  rubric:
    ko: '`SUBSTR`로 월 추출 + `CASE`로 계절 분류 + `GROUP BY` + 집계 조합입니다.'
    en: This is a combination of `SUBSTR` for month extraction + `CASE` for season class
  max_score: 10
  tags: []
- id: b07x-15
  level: 2
  type: SELECT
  question: |
    리뷰를 평점별로 집계하되, 각 평점의 한글 라벨, 건수, 전체 대비 비율(%), 제목 입력률(%)을 함께 표시하세요. 평점 높은 순으로 정렬합니다.
  question_en: |
    Aggregate reviews by rating, displaying the Korean label, count, overall percentage (%), and title completion rate (%) for each rating. Sort by rating descending.
  reference_sql:
    common: |
      SELECT rating,
             CASE rating
                 WHEN 5 THEN '최고'
                 WHEN 4 THEN '좋음'
                 WHEN 3 THEN '보통'
                 WHEN 2 THEN '별로'
                 WHEN 1 THEN '최악'
             END AS rating_label,
             COUNT(*) AS review_count,
             ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS pct,
             ROUND(COUNT(title) * 100.0 / COUNT(*), 1) AS title_rate_pct
      FROM reviews
      GROUP BY rating
      ORDER BY rating DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`CASE`로 평점 라벨 + `COUNT(*)` + 비율 계산 + `COUNT(title)` 조합입니다.'
    en: This is a combination of `CASE` for rating labels + `COUNT(*)` + percentage calculation + `COUNT(title)`.
  rubric:
    ko: '`CASE`로 평점 라벨 + `COUNT(*)` + 비율 계산 + `COUNT(title)` 조합입니다.'
    en: This is a combination of `CASE` for rating labels + `COUNT(*)` + percentage calc
  max_score: 10
  tags: []
- id: b07x-16
  level: 2
  type: SELECT
  question: |
    상품의 가격대(저가/중저가/중가/고가)별로 상품 수, 평균 재고, 단종률(%)을 구하세요. 단종률은 is_active=0인 비율입니다.
  question_en: |
    Find the product count, average stock, and discontinuation rate (%) per price tier (Budget/Mid-low/Mid/Premium). The discontinuation rate is the percentage of is_active=0.
  reference_sql:
    common: |
      SELECT CASE
                 WHEN price < 100000 THEN '저가'
                 WHEN price < 500000 THEN '중저가'
                 WHEN price < 1000000 THEN '중가'
                 ELSE '고가'
             END AS price_tier,
             COUNT(*) AS product_count,
             ROUND(AVG(stock_qty)) AS avg_stock,
             ROUND(SUM(CASE WHEN is_active = 0 THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS discontinued_pct
      FROM products
      GROUP BY price_tier
