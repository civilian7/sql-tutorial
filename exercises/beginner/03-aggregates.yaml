  - id: b03a-29
    level: 3
    type: "Aggregate"
    question: |
      판매 중인 상품의 평균 마진율(%)을 구하세요. 마진율은 `(price - cost_price) * 100.0 / price`이며, 소수점 첫째 자리까지 반올림합니다.
    question_en: |
      Find the average margin rate (%) for products being sold. The margin rate is `(price - cost_price) * 100.0 / price`, rounded to one decimal place.
    reference_sql:
      common: |
        SELECT ROUND(AVG((price - cost_price) * 100.0 / price), 1) AS avg_margin_pct
        FROM products
        WHERE is_active = 1;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "AVG 안에 산술식을 넣을 수 있습니다. AVG((price - cost_price) * 100.0 / price)로 각 행의 마진율 평균을 구합니다"
        en: "You can put an arithmetic expression in AVG. Calculate the average margin rate for each row with AVG((price - cost_price) * 100.0 / price)"
    rubric:
      ko: "AVG 안에 마진율 산술식을 사용해야 함"
      en: "Must use margin rate arithmetic inside AVG"
    max_score: 10
    tags: [SELECT, WHERE, AVG, ROUND, products]

  - id: b03a-30
    level: 3
    type: "Aggregate"
    question: |
      주문 테이블에서 전체 건수, 총 매출, 평균 주문 금액, 총 할인 금액, 총 배송비, 총 사용 포인트를 한 번에 조회하세요. 금액은 모두 소수점 없이 반올림합니다.
    question_en: |
      View the total number of orders, total sales, average order amount, total discount amount, total shipping cost, and total points used in the order table at once. All amounts are rounded without decimal places.
    reference_sql:
      common: |
        SELECT COUNT(*) AS total_orders,
               ROUND(SUM(total_amount), 0) AS total_revenue,
               ROUND(AVG(total_amount), 0) AS avg_amount,
               ROUND(SUM(discount_amount), 0) AS total_discount,
               ROUND(SUM(shipping_fee), 0) AS total_shipping,
               SUM(point_used) AS total_point_used
        FROM orders;
    supported_db: [sqlite, mysql, postgresql]
    validation:
      type: result_match
      ordered: false
    hints:
      - ko: "하나의 SELECT에 6개의 집계 함수를 나열합니다"
        en: "Lists six aggregate functions in one SELECT"
    rubric:
      ko: "COUNT, SUM, AVG를 한 쿼리에서 6개 칼럼에 사용해야 함"
      en: "Must use COUNT, SUM, AVG on 6 columns in one query"
    max_score: 10
    tags: [SELECT, COUNT, SUM, AVG, ROUND, orders]
