metadata:
  id: beginner-06-case
  title: CASE 표현식
  title_en: CASE Expressions
  difficulty: beginner
  concepts:
  - CASE WHEN THEN ELSE END
  - Simple CASE
  - Searched CASE
  - CASE + aggregation
  - CASE + sorting
  tables:
  - products
  - customers
  - orders
  - reviews
  - payments
  prerequisites: []
  estimated_minutes: 30
  default_level: 1
  default_type: SELECT
  description: products, customers, orders, reviews, payments 테이블을 사용합니다.
  description_en: Uses products, customers, orders, reviews, payments tables.
problems:
- id: b06c-01
  level: 1
  type: SELECT
  question: |
    고객의 이름과 등급을 조회하되, 등급을 한글로 표시하세요. BRONZE='브론즈', SILVER='실버', GOLD='골드', VIP='VIP'
  question_en: |
    Query customer names and tiers, displaying the tier in Korean. BRONZE='브론즈', SILVER='실버', GOLD='골드', VIP='VIP'
  reference_sql:
    common: |
      SELECT name,
             CASE grade
                 WHEN 'BRONZE' THEN '브론즈'
                 WHEN 'SILVER' THEN '실버'
                 WHEN 'GOLD' THEN '골드'
                 WHEN 'VIP' THEN 'VIP'
             END AS grade_kr
      FROM customers
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '단순 CASE 문법: `CASE 칼럼 WHEN 값1 THEN 결과1 WHEN 값2 THEN 결과2 ... END`'
    en: 'Simple CASE syntax: `CASE column WHEN value1 THEN result1 WHEN value2 THEN result2 ... END`'
  rubric:
    ko: '단순 CASE 문법: `CASE 칼럼 WHEN 값1 THEN 결과1 WHEN 값2 THEN 결과2 ... END`'
    en: 'Simple CASE syntax: `CASE column WHEN value1 THEN result1 WHEN value2 THEN resul'
  max_score: 10
  tags: []
- id: b06c-02
  level: 1
  type: SELECT
  question: |
    상품의 이름과 가격, 그리고 가격대를 표시하세요. 10만원 미만='저가', 10만원~50만원='중저가', 50만원~100만원='중가', 100만원 이상='고가'
  question_en: |
    Display the product name, price, and price tier. Under 100K='Budget', 100K-500K='Mid-low', 500K-1M='Mid', 1M+='Premium'
  reference_sql:
    common: |
      SELECT name, price,
             CASE
                 WHEN price < 100000 THEN '저가'
                 WHEN price < 500000 THEN '중저가'
                 WHEN price < 1000000 THEN '중가'
                 ELSE '고가'
             END AS price_tier
      FROM products
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '검색 CASE 문법: `CASE WHEN 조건1 THEN 결과1 WHEN 조건2 THEN 결과2 ... ELSE 기본값 END`. 조건은 위에서 아래로 평가되므로 순서에 주의하세요.'
    en: 'Searched CASE syntax: `CASE WHEN condition1 THEN result1 WHEN condition2 THEN result2 ... ELSE default END`. Conditions
      are evaluated top-to-bottom, so order matters.'
  rubric:
    ko: '검색 CASE 문법: `CASE WHEN 조건1 THEN 결과1 WHEN 조건2 THEN 결과2 ... ELSE 기본값 END`. 조건은 위에서'
    en: 'Searched CASE syntax: `CASE WHEN condition1 THEN result1 WHEN condition2 THEN re'
  max_score: 10
  tags: []
- id: b06c-03
  level: 1
  type: SELECT
  question: |
    주문의 주문번호와 상태를 조회하되, 상태를 한글로 표시하세요. pending='주문접수', paid='결제완료', preparing='준비중', shipped='배송중', delivered='배송완료', confirmed='구매확정', cancelled='취소', return_requested='반품요청', returned='반품완료'
  question_en: |
    Query order numbers and statuses, displaying the status in Korean. pending='주문접수', paid='결제완료', preparing='준비중', shipped='배송중', delivered='배송완료', confirmed='구매확정', cancelled='취소', return_requested='반품요청', returned='반품완료'
  reference_sql:
    common: |
      SELECT order_number,
             CASE status
                 WHEN 'pending' THEN '주문접수'
                 WHEN 'paid' THEN '결제완료'
                 WHEN 'preparing' THEN '준비중'
                 WHEN 'shipped' THEN '배송중'
                 WHEN 'delivered' THEN '배송완료'
                 WHEN 'confirmed' THEN '구매확정'
                 WHEN 'cancelled' THEN '취소'
                 WHEN 'return_requested' THEN '반품요청'
                 WHEN 'returned' THEN '반품완료'
             END AS status_kr
      FROM orders
      ORDER BY ordered_at DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: 단순 CASE를 사용하여 status 값을 한글로 변환합니다.
    en: Use simple CASE to convert status values to Korean.
  rubric:
    ko: 단순 CASE를 사용하여 status 값을 한글로 변환합니다.
    en: Use simple CASE to convert status values to Korean.
  max_score: 10
  tags: []
- id: b06c-04
  level: 1
  type: SELECT
  question: |
    리뷰의 평점을 텍스트로 표시하세요. 5='최고', 4='좋음', 3='보통', 2='별로', 1='최악'
  question_en: |
    Display review ratings as text. 5='Excellent', 4='Good', 3='Average', 2='Poor', 1='Terrible'
  reference_sql:
    common: |
      SELECT rating,
             CASE rating
                 WHEN 5 THEN '최고'
                 WHEN 4 THEN '좋음'
                 WHEN 3 THEN '보통'
                 WHEN 2 THEN '별로'
                 WHEN 1 THEN '최악'
             END AS rating_text,
             title
      FROM reviews
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`CASE rating WHEN 5 THEN ''최고'' ...` 형태의 단순 CASE를 사용합니다.'
    en: 'Use simple CASE: `CASE rating WHEN 5 THEN ''Excellent'' ...`'
  rubric:
    ko: '`CASE rating WHEN 5 THEN ''최고'' ...` 형태의 단순 CASE를 사용합니다.'
    en: 'Use simple CASE: `CASE rating WHEN 5 THEN ''Excellent'' ...`'
  max_score: 10
  tags: []
- id: b06c-05
  level: 1
  type: SELECT
  question: |
    상품의 재고 상태를 표시하세요. 재고 0='품절', 1~10='부족', 11~100='보통', 101 이상='충분'
  question_en: |
    Display the stock status of products. Stock 0='Out of stock', 1-10='Low', 11-100='Normal', 101+='Sufficient'
  reference_sql:
    common: |
      SELECT name, stock_qty,
             CASE
                 WHEN stock_qty = 0 THEN '품절'
                 WHEN stock_qty <= 10 THEN '부족'
                 WHEN stock_qty <= 100 THEN '보통'
                 ELSE '충분'
             END AS stock_status
      FROM products
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: 검색 CASE에서 `stock_qty`의 범위를 조건으로 사용합니다.
    en: Use the `stock_qty` range as conditions in a searched CASE.
  rubric:
    ko: 검색 CASE에서 `stock_qty`의 범위를 조건으로 사용합니다.
    en: Use the `stock_qty` range as conditions in a searched CASE.
  max_score: 10
  tags: []
- id: b06c-06
  level: 1
  type: SELECT
  question: |
    결제 수단(`method`)을 한글로 표시하세요. card='신용카드', bank_transfer='계좌이체', virtual_account='가상계좌', kakao_pay='카카오페이', naver_pay='네이버페이', point='포인트'. 상위 10건만 조회합니다.
  question_en: |
    Display the payment method (`method`) in Korean. card='신용카드', bank_transfer='계좌이체', virtual_account='가상계좌', kakao_pay='카카오페이', naver_pay='네이버페이', point='포인트'. Show only the top 10 rows.
  reference_sql:
    common: |
      SELECT order_id,
             CASE method
                 WHEN 'card' THEN '신용카드'
                 WHEN 'bank_transfer' THEN '계좌이체'
                 WHEN 'virtual_account' THEN '가상계좌'
                 WHEN 'kakao_pay' THEN '카카오페이'
                 WHEN 'naver_pay' THEN '네이버페이'
                 WHEN 'point' THEN '포인트'
             END AS method_kr,
             amount
      FROM payments
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: 단순 CASE로 method 값을 한글로 변환합니다.
    en: Use simple CASE to convert method values to Korean.
  rubric:
    ko: 단순 CASE로 method 값을 한글로 변환합니다.
    en: Use simple CASE to convert method values to Korean.
  max_score: 10
  tags: []
- id: b06c-07
  level: 1
  type: SELECT
  question: |
    고객의 활성 상태를 텍스트로 표시하세요. is_active가 1이면 '활성', 0이면 '탈퇴'
  question_en: |
    Display the customer active status as text. is_active 1='Active', 0='Withdrawn'
  reference_sql:
    common: |
      SELECT name, email,
             CASE is_active
                 WHEN 1 THEN '활성'
                 WHEN 0 THEN '탈퇴'
             END AS status
      FROM customers
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`CASE is_active WHEN 1 THEN ''활성'' WHEN 0 THEN ''탈퇴'' END` 또는 검색 CASE를 사용합니다.'
    en: Use `CASE is_active WHEN 1 THEN 'Active' WHEN 0 THEN 'Withdrawn' END` or a searched CASE.
  rubric:
    ko: '`CASE is_active WHEN 1 THEN ''활성'' WHEN 0 THEN ''탈퇴'' END` 또는 검색 CASE를 사용합니다.'
    en: Use `CASE is_active WHEN 1 THEN 'Active' WHEN 0 THEN 'Withdrawn' END` or a searc
  max_score: 10
  tags: []
- id: b06c-08
  level: 1
  type: SELECT
  question: |
    주문 금액 구간을 표시하세요. 5만원 미만='소액', 5만원~20만원='일반', 20만원~100만원='고액', 100만원 이상='VIP급'. 최근 주문 10건에 대해 조회합니다.
  question_en: |
    Display the order amount tier. Under 50K='Small', 50K-200K='Regular', 200K-1M='Large', 1M+='VIP-level'. Show the 10 most recent orders.
  reference_sql:
    common: |
      SELECT order_number, total_amount,
             CASE
                 WHEN total_amount < 50000 THEN '소액'
                 WHEN total_amount < 200000 THEN '일반'
                 WHEN total_amount < 1000000 THEN '고액'
                 ELSE 'VIP급'
             END AS amount_tier
      FROM orders
      ORDER BY ordered_at DESC
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: 검색 CASE로 `total_amount`의 범위를 구분합니다.
    en: Use searched CASE to categorize `total_amount` ranges.
  rubric:
    ko: 검색 CASE로 `total_amount`의 범위를 구분합니다.
    en: Use searched CASE to categorize `total_amount` ranges.
  max_score: 10
  tags: []
- id: b06c-09
  level: 1
  type: SELECT
  question: |
    상품의 판매 상태를 종합적으로 표시하세요. is_active가 0이면 '단종', stock_qty가 0이면 '품절', 그 외는 '판매중'
  question_en: |
    Display the comprehensive sale status of products. If is_active is 0, show 'Discontinued'; if stock_qty is 0, show 'Out of stock'; otherwise show 'On sale'
  reference_sql:
    common: |
      SELECT name, price, is_active, stock_qty,
             CASE
                 WHEN is_active = 0 THEN '단종'
                 WHEN stock_qty = 0 THEN '품절'
                 ELSE '판매중'
             END AS sale_status
      FROM products
      LIMIT 15;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: CASE는 위에서 아래로 평가됩니다. 단종 여부를 먼저 체크하고, 그다음 품절을 체크합니다.
    en: CASE evaluates conditions top-to-bottom. Check discontinuation first, then out-of-stock.
  rubric:
    ko: CASE는 위에서 아래로 평가됩니다. 단종 여부를 먼저 체크하고, 그다음 품절을 체크합니다.
    en: CASE evaluates conditions top-to-bottom. Check discontinuation first, then out-o
  max_score: 10
  tags: []
- id: b06c-10
  level: 1
  type: SELECT
  question: |
    고객의 적립금 수준을 표시하세요. 0='없음', 1~5000='소액', 5001~20000='보통', 20001 이상='고액'. 상위 10건만 조회합니다.
  question_en: |
    Display the customer points level. 0='None', 1-5000='Low', 5001-20000='Medium', 20001+='High'. Show only the top 10 rows.
  reference_sql:
    common: |
      SELECT name, point_balance,
             CASE
                 WHEN point_balance = 0 THEN '없음'
                 WHEN point_balance <= 5000 THEN '소액'
                 WHEN point_balance <= 20000 THEN '보통'
                 ELSE '고액'
             END AS point_level
      FROM customers
      LIMIT 10;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`point_balance`의 범위를 검색 CASE로 분류합니다.'
    en: Classify `point_balance` ranges using searched CASE.
  rubric:
    ko: '`point_balance`의 범위를 검색 CASE로 분류합니다.'
    en: Classify `point_balance` ranges using searched CASE.
  max_score: 10
  tags: []
- id: b06c-11
  level: 2
  type: SELECT
  question: |
    상품을 가격대별로 분류하고, 각 가격대의 상품 수를 구하세요. 10만원 미만='저가', 10만원~50만원='중저가', 50만원~100만원='중가', 100만원 이상='고가'
  question_en: |
    Classify products by price tier and find the product count per tier. Under 100K='Budget', 100K-500K='Mid-low', 500K-1M='Mid', 1M+='Premium'
  reference_sql:
    common: |
      SELECT CASE
                 WHEN price < 100000 THEN '저가'
                 WHEN price < 500000 THEN '중저가'
                 WHEN price < 1000000 THEN '중가'
                 ELSE '고가'
             END AS price_tier,
             COUNT(*) AS product_count
      FROM products
      GROUP BY CASE
                   WHEN price < 100000 THEN '저가'
                   WHEN price < 500000 THEN '중저가'
                   WHEN price < 1000000 THEN '중가'
                   ELSE '고가'
               END
      ORDER BY product_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: CASE 표현식을 `SELECT`와 `GROUP BY` 모두에 사용합니다.
    en: Use the CASE expression in both `SELECT` and `GROUP BY`.
  rubric:
    ko: CASE 표현식을 `SELECT`와 `GROUP BY` 모두에 사용합니다.
    en: Use the CASE expression in both `SELECT` and `GROUP BY`.
  max_score: 10
  tags: []
- id: b06c-12
  level: 2
  type: SELECT
  question: |
    주문을 진행 상태로 크게 3분류하고, 각각의 건수를 구하세요. pending/paid/preparing='처리중', shipped/delivered/confirmed='완료', cancelled/return_requested/returned='취소/반품'
  question_en: |
    Classify orders into 3 major status groups and find the count for each. pending/paid/preparing='Processing', shipped/delivered/confirmed='Completed', cancelled/return_requested/returned='Cancelled/Returned'
  reference_sql:
    common: |
      SELECT CASE
                 WHEN status IN ('pending', 'paid', 'preparing') THEN '처리중'
                 WHEN status IN ('shipped', 'delivered', 'confirmed') THEN '완료'
                 WHEN status IN ('cancelled', 'return_requested', 'returned') THEN '취소/반품'
             END AS status_group,
             COUNT(*) AS order_count
      FROM orders
      GROUP BY status_group
      ORDER BY order_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`CASE WHEN status IN (...) THEN ...`으로 여러 값을 하나의 그룹으로 묶습니다.'
    en: Use `CASE WHEN status IN (...) THEN ...` to group multiple values into a single category.
  rubric:
    ko: '`CASE WHEN status IN (...) THEN ...`으로 여러 값을 하나의 그룹으로 묶습니다.'
    en: 'Use `CASE WHEN status IN (...) THEN ...` to group multiple values into a single '
  max_score: 10
  tags: []
- id: b06c-13
  level: 2
  type: SELECT
  question: |
    리뷰를 긍정(4~5점)/보통(3점)/부정(1~2점)으로 분류하고, 각 그룹의 리뷰 수를 구하세요.
  question_en: |
    Classify reviews as Positive (4-5 stars), Neutral (3 stars), or Negative (1-2 stars) and find the count for each group.
  reference_sql:
    common: |
      SELECT CASE
                 WHEN rating >= 4 THEN '긍정'
                 WHEN rating = 3 THEN '보통'
                 ELSE '부정'
             END AS sentiment,
             COUNT(*) AS review_count
      FROM reviews
      GROUP BY sentiment
      ORDER BY review_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: 검색 CASE로 rating 범위를 3개 그룹으로 나눕니다.
    en: Use searched CASE to divide the rating range into 3 groups.
  rubric:
    ko: 검색 CASE로 rating 범위를 3개 그룹으로 나눕니다.
    en: Use searched CASE to divide the rating range into 3 groups.
  max_score: 10
  tags: []
- id: b06c-14
  level: 2
  type: SELECT
  question: |
    상품을 가격대별로 분류하고, 각 가격대의 평균 재고 수량을 구하세요. 소수점 없이 반올림합니다.
  question_en: |
    Classify products by price tier and find the average stock quantity per tier. Round to no decimal places.
  reference_sql:
    common: |
      SELECT CASE
                 WHEN price < 100000 THEN '저가'
                 WHEN price < 500000 THEN '중저가'
                 WHEN price < 1000000 THEN '중가'
                 ELSE '고가'
             END AS price_tier,
             COUNT(*) AS product_count,
             ROUND(AVG(stock_qty)) AS avg_stock
      FROM products
      GROUP BY price_tier
      ORDER BY avg_stock DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: CASE로 가격대를 분류하고 `AVG(stock_qty)`로 평균 재고를 구합니다.
    en: Classify the price tier with CASE and calculate the average stock with `AVG(stock_qty)`.
  rubric:
    ko: CASE로 가격대를 분류하고 `AVG(stock_qty)`로 평균 재고를 구합니다.
    en: Classify the price tier with CASE and calculate the average stock with `AVG(stoc
  max_score: 10
  tags: []
- id: b06c-15
  level: 2
  type: SELECT
  question: |
    고객을 성별로 분류하되, NULL은 '미입력'으로 표시하고 각 그룹의 수를 구하세요.
  question_en: |
    Classify customers by gender, displaying NULL as 'Not entered', and find the count per group.
  reference_sql:
    common: |
      SELECT CASE
                 WHEN gender IS NULL THEN '미입력'
                 WHEN gender = 'M' THEN '남성'
                 WHEN gender = 'F' THEN '여성'
             END AS gender_kr,
             COUNT(*) AS customer_count
      FROM customers
      GROUP BY gender_kr
      ORDER BY customer_count DESC;
  supported_db:
  - sqlite
  - mysql
  - postgresql
  validation:
    type: result_match
    ordered: false
  hints:
  - ko: '`CASE WHEN gender IS NULL THEN ''미입력'' WHEN gender = ''M'' THEN ''남성'' ...`처럼 NULL을 먼저 처리합니다.'
    en: 'Handle NULL first: `CASE WHEN gender IS NULL THEN ''Not entered'' WHEN gender = ''M'' THEN ''Male'' ...`'
  rubric:
    ko: '`CASE WHEN gender IS NULL THEN ''미입력'' WHEN gender = ''M'' THEN ''남성'' ...`처럼 NULL을 먼저'
    en: 'Handle NULL first: `CASE WHEN gender IS NULL THEN ''Not entered'' WHEN gender = ''M'
  max_score: 10
  tags: []
