                 WHEN is_active = 1 AND stock_qty = 0 THEN '판매중+품절'
             END AS status_group,
             COUNT(*) AS product_count,
             ROUND(AVG(price)) AS avg_price
      FROM products
      GROUP BY status_group
      ORDER BY product_count DESC;
