             COUNT(*) AS product_count,
             ROUND(AVG((price - cost_price) * 100.0 / price), 1) AS avg_margin_pct
      FROM products
      WHERE is_active = 1
      GROUP BY margin_tier
      ORDER BY avg_margin_pct DESC;
