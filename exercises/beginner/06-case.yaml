    common: |
      SELECT CASE
                 WHEN (price - cost_price) * 100.0 / price < 10 THEN '저마진'
                 WHEN (price - cost_price) * 100.0 / price < 20 THEN '표준'
                 WHEN (price - cost_price) * 100.0 / price < 30 THEN '고마진'
