  level: 3
  type: SELECT
  question: |
    상품을 마진율 구간으로 분류하세요. 마진율 = (price - cost_price) / price * 100. 10% 미만='저마진', 10~20%='표준', 20~30%='고마진', 30% 이상='프리미엄'. 판매 중인 상품(`is_active = 1`)만 대상으로, 구간별 상품 수와 평균 마진율을 구하세요.
