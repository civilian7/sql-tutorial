             COUNT(*) AS product_count,
             ROUND(AVG(price)) AS avg_price,
             CASE
                 WHEN AVG(price) >= 1000000 THEN '프리미엄 브랜드'
                 WHEN AVG(price) >= 300000 THEN '대중 브랜드'
                 ELSE '보급형 브랜드'
             END AS brand_tier
      FROM products
