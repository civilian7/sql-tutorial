site_name: SQL 튜토리얼
site_description: 현실적인 전자상거래 데이터베이스로 배우는 SQL
repo_url: https://github.com/civilian7/sql-tutorial
repo_name: GitHub
docs_dir: ko
site_dir: ../output/docs/ko

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight

copyright: Copyright &copy; 2023-2026 Fullbit Computing. All rights reserved.

extra:
  generator: false
  alternate:
    - name: 한국어
      link: ../ko/
      lang: ko
    - name: English
      link: ../en/
      lang: en

extra_css:
  - css/extra.css

hooks:
  - hooks/mermaid_hook.py

nav:
  - 교재 소개: index.md
  - 준비하기:
    - setup/index.md
    - "00. 프로젝트 다운로드": setup/00-install.md
    - "01. 데이터베이스 선택": setup/01-choose-db.md
    - "02. 데이터베이스 설치": setup/02-database.md
    - "03. 데이터 생성": setup/03-generate.md
    - "04. 생성기 고급 옵션": setup/04-generate-advanced.md
    - "05. 확인 및 첫 쿼리": setup/05-verify.md
  - 데이터베이스 스키마:
    - schema/index.md
    - "01. 테이블": schema/tables.md
    - "02. 뷰": schema/views.md
    - "03. 트리거": schema/triggers.md
    - "04. 저장 프로시저": schema/procedures.md
    - "05. 스키마 조회 쿼리": schema/queries.md
    - "06. 페르소나별 활용 가이드": schema/personas.md
  - 강의:
    - 초급:
      - "00. 데이터베이스와 SQL 소개": beginner/00-introduction.md
      - "01. SELECT 기초": beginner/01-select.md
      - "02. WHERE로 필터링": beginner/02-where.md
      - "03. 정렬과 페이징": beginner/03-sort-limit.md
      - "04. 집계 함수": beginner/04-aggregates.md
      - "05. GROUP BY와 HAVING": beginner/05-group-by.md
      - "06. NULL 처리": beginner/06-null.md
      - "07. CASE 표현식": beginner/07-case.md
    - 중급:
      - "08. INNER JOIN": intermediate/08-inner-join.md
      - "09. LEFT JOIN과 외부 조인": intermediate/09-left-join.md
      - "10. 서브쿼리": intermediate/10-subqueries.md
      - "11. 날짜/시간 함수": intermediate/11-datetime.md
      - "12. 문자열 함수": intermediate/12-string.md
      - "13. 숫자·변환·조건 함수": intermediate/13-utility-functions.md
      - "14. UNION": intermediate/14-union.md
      - "15. INSERT, UPDATE, DELETE": intermediate/15-dml.md
      - "16. DDL — 테이블 생성과 변경": intermediate/16-ddl.md
      - "17. 트랜잭션과 ACID": intermediate/17-transactions.md
    - 고급:
      - "18. 윈도우 함수": advanced/18-window.md
      - "19. CTE와 재귀 CTE": advanced/19-cte.md
      - "20. EXISTS와 상관 서브쿼리": advanced/20-exists.md
      - "21. SELF JOIN과 CROSS JOIN": advanced/21-self-cross-join.md
      - "22. 뷰(Views)": advanced/22-views.md
      - "23. 인덱스와 성능": advanced/23-indexes.md
      - "24. 트리거": advanced/24-triggers.md
      - "25. JSON 데이터 쿼리": advanced/25-json.md
      - "26. 저장 프로시저": advanced/26-stored-procedures.md
  - 참고:
    - "데이터베이스별 SQL 차이": dialect-comparison.md
    - "용어사전": appendix/glossary.md
  - 부록 — DBA 기초:
    - "권한과 보안": appendix/dba-security.md
    - "동시성과 격리 수준": appendix/dba-concurrency.md
    - "데이터베이스 유지보수": appendix/dba-maintenance.md
  - 연습 문제:
    - exercises/index.md
    - 초급:
      - "상품 탐색": exercises/beginner-01-products.md
      - "정렬과 페이징": exercises/beginner-02-sort-paging.md
      - "집계 함수": exercises/beginner-03-aggregates.md
      - "그룹화와 필터": exercises/beginner-04-group-by.md
      - "NULL 처리": exercises/beginner-05-null.md
      - "CASE 표현식": exercises/beginner-06-case.md
      - "종합 문제": exercises/beginner-07-comprehensive.md
      - "SQL 오류 찾기": exercises/beginner-08-debugging.md
    - 중급:
      - "JOIN 마스터": exercises/intermediate-01-joins.md
      - "날짜/시간 분석": exercises/intermediate-02-dates.md
      - "문자열/숫자 함수": exercises/intermediate-03-string-math.md
      - "서브쿼리": exercises/intermediate-04-subqueries.md
      - "집합 연산": exercises/intermediate-05-set-operations.md
      - "DML 실습": exercises/intermediate-06-dml.md
      - "DDL/제약조건": exercises/intermediate-07-ddl.md
      - "트랜잭션": exercises/intermediate-08-transactions.md
      - "종합 문제": exercises/intermediate-09-comprehensive.md
      - "SQL 디버깅": exercises/intermediate-10-debugging.md
      - "데이터 품질": exercises/intermediate-11-data-quality.md

    - 고급:
      - "윈도우 함수 실전": exercises/advanced-01-window-functions.md
      - "CTE 활용": exercises/advanced-02-cte.md
      - "EXISTS와 안티 패턴": exercises/advanced-03-exists-antipattern.md
      - "DB 객체 설계": exercises/advanced-04-db-objects.md
      - "JSON 활용": exercises/advanced-05-json.md
      - "인덱스와 최적화": exercises/advanced-06-optimization.md
      - "매출 분석": exercises/advanced-07-sales-analysis.md
      - "고객/운영 분석": exercises/advanced-08-customer-ops.md
      - "실무 SQL 패턴": exercises/advanced-09-patterns.md
      - "면접 대비": exercises/advanced-10-interview.md
      - "도전 문제": exercises/advanced-11-challenge.md

plugins:
  - search
  - glightbox
  - exporter:
      formats:
        pdf:
          enabled: !ENV [MKDOCS_EXPORTER_PDF, false]
          concurrency: 4
          aggregator:
            enabled: true
            output: pdf/sql-tutorial-ko.pdf
            covers: none

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
