site_name: SQL 튜토리얼 v2.0
site_description: 현실적인 전자상거래 데이터베이스(30 테이블)로 배우는 SQL
repo_url: https://github.com/civilian7/sql-tutorial
repo_name: GitHub
docs_dir: ko
site_dir: ../output/docs/ko

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight

copyright: Copyright &copy; 2023-2026 Fullbit Computing. All rights reserved.

extra:
  generator: false
  alternate:
    - name: 한국어
      link: ../ko/
      lang: ko
    - name: English
      link: ../en/
      lang: en

extra_css:
  - css/extra.css

nav:
  - 홈: index.md
  - 시작하기: getting-started.md
  - 데이터베이스 스키마: schema.md
  - 초급:
    - "01. SELECT 기초": beginner/01-select.md
    - "02. WHERE로 필터링": beginner/02-where.md
    - "03. 정렬과 페이징": beginner/03-sort-limit.md
    - "04. 집계 함수": beginner/04-aggregates.md
    - "05. GROUP BY와 HAVING": beginner/05-group-by.md
    - "06. NULL 처리": beginner/06-null.md
  - 중급:
    - "07. INNER JOIN": intermediate/07-inner-join.md
    - "08. LEFT JOIN": intermediate/08-left-join.md
    - "09. 서브쿼리": intermediate/09-subqueries.md
    - "10. CASE 표현식": intermediate/10-case.md
    - "11. 날짜/시간 함수": intermediate/11-datetime.md
    - "12. 문자열 함수": intermediate/12-string.md
    - "13. UNION": intermediate/13-union.md
    - "14. INSERT, UPDATE, DELETE": intermediate/14-dml.md
    - "15. DDL — 테이블 생성과 변경": intermediate/15-ddl.md
    - "16. SELF JOIN과 CROSS JOIN": intermediate/16-self-cross-join.md
  - 고급:
    - "17. 윈도우 함수": advanced/17-window.md
    - "18. CTE와 재귀 CTE": advanced/18-cte.md
    - "19. EXISTS와 상관 서브쿼리": advanced/19-exists.md
    - "20. 뷰(Views)": advanced/20-views.md
    - "21. 인덱스와 성능": advanced/21-indexes.md
    - "22. 트리거": advanced/22-triggers.md
  - 참고:
    - "생성기 상세 가이드": generator-guide.md
    - "데이터베이스별 SQL 차이": dialect-comparison.md
  - 연습 문제:
    - exercises/index.md
    - 초급:
      - "상품 탐색": exercises/beginner-01-products.md
      - "고객 분석": exercises/beginner-02-customers.md
      - "주문 기초": exercises/beginner-03-orders.md
      - "빈칸 채우기": exercises/beginner-04-fill-blanks.md
    - 중급:
      - "JOIN 마스터": exercises/intermediate-01-joins.md
      - "날짜/시간 분석": exercises/intermediate-02-dates.md
      - "서브쿼리와 변환": exercises/intermediate-03-subqueries.md
      - "제약조건 체험": exercises/intermediate-04-constraints.md
      - "트랜잭션": exercises/intermediate-05-transactions.md
      - "SQL 디버깅": exercises/intermediate-06-debugging.md
      - "데이터 품질 점검": exercises/intermediate-07-data-quality.md

    - 고급:
      - "매출 분석": exercises/advanced-01-sales-analysis.md
      - "고객 세분화": exercises/advanced-02-customer-segmentation.md
      - "재고 관리": exercises/advanced-03-inventory.md
      - "CS 성과 분석": exercises/advanced-04-cs-performance.md
      - "실무 SQL 패턴": exercises/advanced-05-real-world-patterns.md
      - "정규화 이해": exercises/advanced-06-normalization.md
      - "비즈니스 시나리오": exercises/advanced-07-scenarios.md
      - "쿼리 최적화": exercises/advanced-08-optimization.md
      - "면접 대비": exercises/advanced-09-interview.md
      - "고급 분석": exercises/advanced-10-analytics.md
      - "도전 문제": exercises/advanced-11-challenge.md
      - "실행 계획 분석": exercises/advanced-12-explain-plan.md

plugins:
  - search
  - exporter:
      formats:
        pdf:
          enabled: !ENV [MKDOCS_EXPORTER_PDF, false]
          concurrency: 4
          aggregator:
            enabled: true
            output: pdf/sql-tutorial-ko.pdf
            covers: none

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables
