<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 180" font-family="system-ui,sans-serif">
  <style>
    text{font-size:11px} .h{font-weight:700;font-size:12px}
    .cell{fill:rgba(76,175,80,0.15);stroke:rgba(76,175,80,0.4);stroke-width:1;rx:2}
    .hdr-a{fill:rgba(91,141,239,0.2);rx:2} .hdr-b{fill:rgba(240,192,64,0.2);rx:2}
  </style>
  <text x="170" y="18" text-anchor="middle" class="h" font-size="13">CROSS JOIN — 3 x 4 = 12 rows</text>

  <text x="15" y="48" class="h" fill="rgba(91,141,239,0.8)">A</text>
  <rect x="10" y="56" width="60" height="22" class="hdr-a"/><text x="40" y="72" text-anchor="middle">Red</text>
  <rect x="10" y="82" width="60" height="22" class="hdr-a"/><text x="40" y="98" text-anchor="middle">Blue</text>
  <rect x="10" y="108" width="60" height="22" class="hdr-a"/><text x="40" y="124" text-anchor="middle">Green</text>

  <text x="130" y="38" class="h" fill="rgba(210,170,40,0.9)">B</text>
  <rect x="90" y="42" width="55" height="22" class="hdr-b"/><text x="117" y="58" text-anchor="middle">S</text>
  <rect x="152" y="42" width="55" height="22" class="hdr-b"/><text x="179" y="58" text-anchor="middle">M</text>
  <rect x="214" y="42" width="55" height="22" class="hdr-b"/><text x="241" y="58" text-anchor="middle">L</text>
  <rect x="276" y="42" width="55" height="22" class="hdr-b"/><text x="303" y="58" text-anchor="middle">XL</text>

  <rect x="90" y="68" width="55" height="22" class="cell"/><text x="117" y="84" text-anchor="middle" font-size="10">Red,S</text>
  <rect x="152" y="68" width="55" height="22" class="cell"/><text x="179" y="84" text-anchor="middle" font-size="10">Red,M</text>
  <rect x="214" y="68" width="55" height="22" class="cell"/><text x="241" y="84" text-anchor="middle" font-size="10">Red,L</text>
  <rect x="276" y="68" width="55" height="22" class="cell"/><text x="303" y="84" text-anchor="middle" font-size="10">Red,XL</text>
  <rect x="90" y="94" width="55" height="22" class="cell"/><text x="117" y="110" text-anchor="middle" font-size="10">Blue,S</text>
  <rect x="152" y="94" width="55" height="22" class="cell"/><text x="179" y="110" text-anchor="middle" font-size="10">Blue,M</text>
  <rect x="214" y="94" width="55" height="22" class="cell"/><text x="241" y="110" text-anchor="middle" font-size="10">Blue,L</text>
  <rect x="276" y="94" width="55" height="22" class="cell"/><text x="303" y="110" text-anchor="middle" font-size="10">Blue,XL</text>
  <rect x="90" y="120" width="55" height="22" class="cell"/><text x="117" y="136" text-anchor="middle" font-size="10">Grn,S</text>
  <rect x="152" y="120" width="55" height="22" class="cell"/><text x="179" y="136" text-anchor="middle" font-size="10">Grn,M</text>
  <rect x="214" y="120" width="55" height="22" class="cell"/><text x="241" y="136" text-anchor="middle" font-size="10">Grn,L</text>
  <rect x="276" y="120" width="55" height="22" class="cell"/><text x="303" y="136" text-anchor="middle" font-size="10">Grn,XL</text>

  <text x="170" y="165" text-anchor="middle" font-size="10" opacity=".5">Result = left rows x right rows (no ON condition)</text>
</svg>
