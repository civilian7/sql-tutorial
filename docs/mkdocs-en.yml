site_name: SQL Tutorial
site_description: Learn SQL with a realistic e-commerce database
repo_url: https://github.com/civilian7/sql-tutorial
repo_name: GitHub
docs_dir: en
site_dir: ../output/docs/en

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight

copyright: Copyright &copy; 2023-2026 Fullbit Computing. All rights reserved.

extra:
  generator: false
  alternate:
    - name: 한국어
      link: ../ko/
      lang: ko
    - name: English
      link: ../en/
      lang: en

extra_css:
  - css/extra.css

hooks:
  - hooks/mermaid_hook.py

nav:
  - Home: index.md
  - Getting Started:
    - setup/index.md
    - "00. Download the Project": setup/00-install.md
    - "01. Choose a Database": setup/01-choose-db.md
    - "02. Install the Database": setup/02-database.md
    - "03. Generate Data": setup/03-generate.md
    - "04. Advanced Generator Options": setup/04-generate-advanced.md
    - "05. Verify & First Query": setup/05-verify.md
  - Database Schema:
