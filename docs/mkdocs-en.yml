      - "23. Indexes & Query Plans": advanced/23-indexes.md
      - "24. Triggers": advanced/24-triggers.md
      - "25. JSON Data Queries": advanced/25-json.md
      - "26. Stored Procedures & Functions": advanced/26-stored-procedures.md
  - Reference:
