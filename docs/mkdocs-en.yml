site_name: SQL Tutorial v2.0
site_description: Learn SQL with a realistic e-commerce database (30 tables, 3 RDBMS)
repo_url: https://github.com/civilian7/sql-tutorial
repo_name: GitHub
docs_dir: en
site_dir: ../output/docs/en

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight

copyright: Copyright &copy; 2023-2026 Fullbit Computing. All rights reserved.

extra:
  generator: false
  alternate:
    - name: 한국어
      link: ../ko/
      lang: ko
    - name: English
      link: ../en/
      lang: en

extra_css:
  - css/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Database Schema: schema.md
  - Beginner:
    - "01. SELECT Basics": beginner/01-select.md
    - "02. Filtering with WHERE": beginner/02-where.md
    - "03. Sorting & Limiting": beginner/03-sort-limit.md
    - "04. Aggregate Functions": beginner/04-aggregates.md
    - "05. GROUP BY & HAVING": beginner/05-group-by.md
    - "06. NULL Handling": beginner/06-null.md
  - Intermediate:
    - "07. INNER JOIN": intermediate/07-inner-join.md
    - "08. LEFT JOIN & Outer Joins": intermediate/08-left-join.md
    - "09. Subqueries": intermediate/09-subqueries.md
    - "10. CASE Expressions": intermediate/10-case.md
    - "11. Date & Time Functions": intermediate/11-datetime.md
    - "12. String Functions": intermediate/12-string.md
    - "13. UNION & Set Operations": intermediate/13-union.md
    - "14. INSERT, UPDATE, DELETE": intermediate/14-dml.md
    - "15. DDL": intermediate/15-ddl.md
    - "16. SELF JOIN & CROSS JOIN": intermediate/16-self-cross-join.md
  - Advanced:
    - "17. Window Functions": advanced/17-window.md
    - "18. CTE & Recursive CTE": advanced/18-cte.md
    - "19. EXISTS & Correlated Subqueries": advanced/19-exists.md
    - "20. Views": advanced/20-views.md
    - "21. Indexes & Performance": advanced/21-indexes.md
    - "22. Triggers": advanced/22-triggers.md
  - Reference:
    - "Generator Reference": generator-guide.md
    - "SQL Across Databases": dialect-comparison.md
  - Exercises:
    - exercises/index.md
    - Beginner:
      - "Product Exploration": exercises/beginner-01-products.md
      - "Customer Analysis": exercises/beginner-02-customers.md
      - "Order Basics": exercises/beginner-03-orders.md
      - "Fill in the Blanks": exercises/beginner-04-fill-blanks.md
    - Intermediate:
      - "JOIN Master": exercises/intermediate-01-joins.md
      - "Date & Time Analysis": exercises/intermediate-02-dates.md
      - "Subqueries & Transformations": exercises/intermediate-03-subqueries.md
      - "Constraints": exercises/intermediate-04-constraints.md
      - "Transactions": exercises/intermediate-05-transactions.md
      - "SQL Debugging": exercises/intermediate-06-debugging.md
      - "Data Quality Checks": exercises/intermediate-07-data-quality.md

    - Advanced:
      - "Sales Analysis": exercises/advanced-01-sales-analysis.md
      - "Customer Segmentation": exercises/advanced-02-customer-segmentation.md
      - "Inventory Management": exercises/advanced-03-inventory.md
      - "CS Performance": exercises/advanced-04-cs-performance.md
      - "Real-World SQL Patterns": exercises/advanced-05-real-world-patterns.md
      - "Normalization": exercises/advanced-06-normalization.md
      - "Business Scenarios": exercises/advanced-07-scenarios.md
      - "Query Optimization": exercises/advanced-08-optimization.md
      - "Interview Prep": exercises/advanced-09-interview.md
      - "Advanced Analytics": exercises/advanced-10-analytics.md
      - "Challenge Problems": exercises/advanced-11-challenge.md
      - "EXPLAIN / Query Plan": exercises/advanced-12-explain-plan.md

plugins:
  - search
  - exporter:
      formats:
        pdf:
          enabled: !ENV [MKDOCS_EXPORTER_PDF, false]
          concurrency: 4
          aggregator:
            enabled: true
            output: pdf/sql-tutorial-en.pdf
            covers: none

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables
