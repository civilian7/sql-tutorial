site_name: SQL Tutorial - E-Commerce Database v2.0
site_description: Learn SQL with a realistic e-commerce database (30 tables, 3 RDBMS)
docs_dir: en
site_dir: ../output/docs/default
copyright: Copyright &copy; 2023-2026 Fullbit Computing. All rights reserved.

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

plugins:
  - search
  - glightbox

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Database Schema: schema.md
  - Beginner:
    - "00. Introduction": beginner/00-introduction.md
    - "01. SELECT Basics": beginner/01-select.md
    - "02. Filtering with WHERE": beginner/02-where.md
    - "03. Sorting & Limiting": beginner/03-sort-limit.md
    - "04. Aggregate Functions": beginner/04-aggregates.md
    - "05. GROUP BY & HAVING": beginner/05-group-by.md
    - "06. NULL Handling": beginner/06-null.md
  - Intermediate:
    - "07. INNER JOIN": intermediate/07-inner-join.md
    - "08. LEFT JOIN & Outer Joins": intermediate/08-left-join.md
    - "09. Subqueries": intermediate/09-subqueries.md
    - "10. CASE Expressions": intermediate/10-case.md
    - "11. Date & Time Functions": intermediate/11-datetime.md
    - "12. String Functions": intermediate/12-string.md
    - "13. UNION & Set Operations": intermediate/13-union.md
    - "14. INSERT, UPDATE, DELETE": intermediate/14-dml.md
    - "15. DDL": intermediate/15-ddl.md
    - "16. Transactions & ACID": intermediate/16-transactions.md
    - "17. SELF JOIN & CROSS JOIN": intermediate/17-self-cross-join.md
  - Advanced:
    - "18. Window Functions": advanced/18-window.md
    - "19. CTE & Recursive CTE": advanced/19-cte.md
    - "20. EXISTS & Correlated Subqueries": advanced/20-exists.md
    - "21. Views": advanced/21-views.md
    - "22. Indexes & Performance": advanced/22-indexes.md
    - "23. Triggers": advanced/23-triggers.md
    - "24. JSON Data": advanced/24-json.md
    - "25. Stored Procedures": advanced/25-stored-procedures.md
  - Reference:
    - "DB Dialect Comparison": dialect-comparison.md
  - Exercises:
    - exercises/index.md
    - Beginner:
      - "Product Exploration": exercises/beginner-products.md
      - "Customer Analysis": exercises/beginner-customers.md
      - "Order Basics": exercises/beginner-orders.md
      - "Fill in the Blanks": exercises/beginner-fill-blanks.md
    - Intermediate:
      - "JOIN Master": exercises/intermediate-joins.md
      - "Date & Time Analysis": exercises/intermediate-dates.md
      - "Subqueries & Transformations": exercises/intermediate-subqueries.md
      - "Constraints": exercises/intermediate-constraints.md
      - "Transactions": exercises/intermediate-transactions.md
      - "SQL Debugging": exercises/intermediate-debugging.md
      - "Data Quality Checks": exercises/intermediate-data-quality.md
    - Advanced:
      - "Sales Analysis": exercises/sales-analysis.md
      - "Customer Segmentation": exercises/customer-segmentation.md
      - "Inventory Management": exercises/inventory.md
      - "CS Performance": exercises/cs-performance.md
      - "Real-World SQL Patterns": exercises/real-world-patterns.md
      - "Normalization": exercises/advanced-normalization.md
      - "Business Scenarios": exercises/advanced-scenarios.md
      - "Query Optimization": exercises/advanced-optimization.md
      - "Interview Prep": exercises/advanced-interview.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables
